<svg width="900" height="520" viewBox="0 0 900 520" fill="none" xmlns="http://www.w3.org/2000/svg">
  <!-- Background -->
  <rect width="900" height="520" rx="18" fill="#0f172a"/>
  <rect x="1" y="1" width="898" height="518" rx="17" fill="none" stroke="#1e293b" stroke-width="2"/>

  <!-- Title -->
  <text x="450" y="48" fill="#f1f5f9" font-size="26" font-family="Segoe UI, Arial, sans-serif" font-weight="700" text-anchor="middle">AWS Service Landscape</text>
  <text x="450" y="74" fill="#94a3b8" font-size="14" font-family="Segoe UI, Arial, sans-serif" text-anchor="middle">Compute · Storage · Networking · Security · Observability</text>

  <!-- Row 1 -->
  <!-- Compute -->
  <rect x="30" y="100" width="255" height="160" rx="12" fill="#1e293b" stroke="#f59e0b" stroke-width="2"/>
  <rect x="30" y="100" width="255" height="36" rx="12" fill="#f59e0b"/>
  <rect x="30" y="118" width="255" height="18" fill="#f59e0b"/>
  <text x="158" y="125" fill="#0f172a" font-size="15" font-family="Segoe UI, Arial, sans-serif" font-weight="700" text-anchor="middle">Compute</text>
  <circle cx="56" cy="164" r="5" fill="#f59e0b"/>
  <text x="70" y="169" fill="#e2e8f0" font-size="13" font-family="Segoe UI, Arial, sans-serif">EC2 — Virtual Machines</text>
  <circle cx="56" cy="192" r="5" fill="#f59e0b"/>
  <text x="70" y="197" fill="#e2e8f0" font-size="13" font-family="Segoe UI, Arial, sans-serif">Lambda — Serverless Functions</text>
  <circle cx="56" cy="220" r="5" fill="#f59e0b"/>
  <text x="70" y="225" fill="#e2e8f0" font-size="13" font-family="Segoe UI, Arial, sans-serif">ECS / EKS — Containers</text>
  <circle cx="56" cy="248" r="5" fill="#f59e0b"/>
  <text x="70" y="253" fill="#94a3b8" font-size="12" font-family="Segoe UI, Arial, sans-serif">Fargate — Serverless Containers</text>

  <!-- Storage & Data -->
  <rect x="322" y="100" width="255" height="160" rx="12" fill="#1e293b" stroke="#10b981" stroke-width="2"/>
  <rect x="322" y="100" width="255" height="36" rx="12" fill="#10b981"/>
  <rect x="322" y="118" width="255" height="18" fill="#10b981"/>
  <text x="450" y="125" fill="#0f172a" font-size="15" font-family="Segoe UI, Arial, sans-serif" font-weight="700" text-anchor="middle">Storage &amp; Data</text>
  <circle cx="348" cy="164" r="5" fill="#10b981"/>
  <text x="362" y="169" fill="#e2e8f0" font-size="13" font-family="Segoe UI, Arial, sans-serif">S3 — Object Storage</text>
  <circle cx="348" cy="192" r="5" fill="#10b981"/>
  <text x="362" y="197" fill="#e2e8f0" font-size="13" font-family="Segoe UI, Arial, sans-serif">RDS / Aurora — Managed SQL</text>
  <circle cx="348" cy="220" r="5" fill="#10b981"/>
  <text x="362" y="225" fill="#e2e8f0" font-size="13" font-family="Segoe UI, Arial, sans-serif">DynamoDB — NoSQL</text>
  <circle cx="348" cy="248" r="5" fill="#10b981"/>
  <text x="362" y="253" fill="#94a3b8" font-size="12" font-family="Segoe UI, Arial, sans-serif">ElastiCache — In-Memory Cache</text>

  <!-- Networking -->
  <rect x="614" y="100" width="255" height="160" rx="12" fill="#1e293b" stroke="#3b82f6" stroke-width="2"/>
  <rect x="614" y="100" width="255" height="36" rx="12" fill="#3b82f6"/>
  <rect x="614" y="118" width="255" height="18" fill="#3b82f6"/>
  <text x="742" y="125" fill="#ffffff" font-size="15" font-family="Segoe UI, Arial, sans-serif" font-weight="700" text-anchor="middle">Networking</text>
  <circle cx="640" cy="164" r="5" fill="#3b82f6"/>
  <text x="654" y="169" fill="#e2e8f0" font-size="13" font-family="Segoe UI, Arial, sans-serif">VPC — Virtual Private Cloud</text>
  <circle cx="640" cy="192" r="5" fill="#3b82f6"/>
  <text x="654" y="197" fill="#e2e8f0" font-size="13" font-family="Segoe UI, Arial, sans-serif">ALB / NLB — Load Balancers</text>
  <circle cx="640" cy="220" r="5" fill="#3b82f6"/>
  <text x="654" y="225" fill="#e2e8f0" font-size="13" font-family="Segoe UI, Arial, sans-serif">Route 53 — DNS</text>
  <circle cx="640" cy="248" r="5" fill="#3b82f6"/>
  <text x="654" y="253" fill="#94a3b8" font-size="12" font-family="Segoe UI, Arial, sans-serif">CloudFront — CDN Edge Cache</text>

  <!-- Row 2 -->
  <!-- Security -->
  <rect x="110" y="296" width="255" height="160" rx="12" fill="#1e293b" stroke="#ef4444" stroke-width="2"/>
  <rect x="110" y="296" width="255" height="36" rx="12" fill="#ef4444"/>
  <rect x="110" y="314" width="255" height="18" fill="#ef4444"/>
  <text x="238" y="321" fill="#ffffff" font-size="15" font-family="Segoe UI, Arial, sans-serif" font-weight="700" text-anchor="middle">Security &amp; IAM</text>
  <circle cx="136" cy="360" r="5" fill="#ef4444"/>
  <text x="150" y="365" fill="#e2e8f0" font-size="13" font-family="Segoe UI, Arial, sans-serif">IAM — Roles &amp; Policies</text>
  <circle cx="136" cy="388" r="5" fill="#ef4444"/>
  <text x="150" y="393" fill="#e2e8f0" font-size="13" font-family="Segoe UI, Arial, sans-serif">KMS — Encryption Keys</text>
  <circle cx="136" cy="416" r="5" fill="#ef4444"/>
  <text x="150" y="421" fill="#e2e8f0" font-size="13" font-family="Segoe UI, Arial, sans-serif">Security Groups &amp; NACLs</text>
  <circle cx="136" cy="444" r="5" fill="#ef4444"/>
  <text x="150" y="449" fill="#94a3b8" font-size="12" font-family="Segoe UI, Arial, sans-serif">WAF — Web Application Firewall</text>

  <!-- Observability -->
  <rect x="534" y="296" width="255" height="160" rx="12" fill="#1e293b" stroke="#a78bfa" stroke-width="2"/>
  <rect x="534" y="296" width="255" height="36" rx="12" fill="#a78bfa"/>
  <rect x="534" y="314" width="255" height="18" fill="#a78bfa"/>
  <text x="662" y="321" fill="#0f172a" font-size="15" font-family="Segoe UI, Arial, sans-serif" font-weight="700" text-anchor="middle">Observability</text>
  <circle cx="560" cy="360" r="5" fill="#a78bfa"/>
  <text x="574" y="365" fill="#e2e8f0" font-size="13" font-family="Segoe UI, Arial, sans-serif">CloudWatch — Metrics &amp; Logs</text>
  <circle cx="560" cy="388" r="5" fill="#a78bfa"/>
  <text x="574" y="393" fill="#e2e8f0" font-size="13" font-family="Segoe UI, Arial, sans-serif">CloudTrail — Audit History</text>
  <circle cx="560" cy="416" r="5" fill="#a78bfa"/>
  <text x="574" y="421" fill="#e2e8f0" font-size="13" font-family="Segoe UI, Arial, sans-serif">Auto Scaling — Dynamic Capacity</text>
  <circle cx="560" cy="444" r="5" fill="#a78bfa"/>
  <text x="574" y="449" fill="#94a3b8" font-size="12" font-family="Segoe UI, Arial, sans-serif">X-Ray — Distributed Tracing</text>

  <!-- Connector lines -->
  <line x1="285" y1="180" x2="322" y2="180" stroke="#334155" stroke-width="2" stroke-dasharray="6,4"/>
  <line x1="577" y1="180" x2="614" y2="180" stroke="#334155" stroke-width="2" stroke-dasharray="6,4"/>
  <line x1="238" y1="260" x2="238" y2="296" stroke="#334155" stroke-width="2" stroke-dasharray="6,4"/>
  <line x1="662" y1="260" x2="662" y2="296" stroke="#334155" stroke-width="2" stroke-dasharray="6,4"/>
  <line x1="365" y1="376" x2="534" y2="376" stroke="#334155" stroke-width="2" stroke-dasharray="6,4"/>

  <!-- Footer -->
  <text x="450" y="498" fill="#475569" font-size="12" font-family="Segoe UI, Arial, sans-serif" text-anchor="middle">Choose services by capability area — Compute, Storage, Networking, Security, Observability</text>
</svg>
