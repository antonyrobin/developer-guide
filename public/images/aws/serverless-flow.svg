  <text x="84" y="546" fill="#2B313B" font-size="22" font-family="Segoe UI, Arial, sans-serif">Pattern: DNS → API → function compute → database or object store → logs and alarms.</text>
  <text x="84" y="584" fill="#2B313B" font-size="22" font-family="Segoe UI, Arial, sans-serif">This is a strong beginner architecture because it is small, event-driven, and easy to evolve.</text>
