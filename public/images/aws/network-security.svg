<svg width="1200" height="760" viewBox="0 0 1200 760" fill="none" xmlns="http://www.w3.org/2000/svg">
  <rect width="1200" height="760" fill="#F5F1EA"/>
  <text x="80" y="104" fill="#1F2937" font-size="38" font-family="Segoe UI, Arial, sans-serif" font-weight="700">AWS Network and Security Zones</text>
  <text x="80" y="142" fill="#7C5A2C" font-size="20" font-family="Segoe UI, Arial, sans-serif">Public entry points stay narrow; workloads and data move deeper into private layers.</text>

  <rect x="90" y="190" width="1020" height="470" rx="34" fill="#FFFDF8" stroke="#D5C3A7" stroke-width="2"/>
  <text x="120" y="236" fill="#7C5A2C" font-size="28" font-family="Segoe UI, Arial, sans-serif" font-weight="700">VPC</text>

  <rect x="140" y="280" width="250" height="300" rx="24" fill="#E6F0FF" stroke="#7CA7F0" stroke-width="2"/>
  <text x="190" y="330" fill="#194B96" font-size="28" font-family="Segoe UI, Arial, sans-serif" font-weight="700">Public Subnet</text>
  <text x="170" y="382" fill="#2B313B" font-size="21" font-family="Segoe UI, Arial, sans-serif">ALB / Bastion</text>
  <text x="170" y="418" fill="#2B313B" font-size="21" font-family="Segoe UI, Arial, sans-serif">Internet Gateway</text>
  <text x="170" y="454" fill="#2B313B" font-size="21" font-family="Segoe UI, Arial, sans-serif">Strict inbound rules</text>

  <rect x="475" y="280" width="250" height="300" rx="24" fill="#E8F7F0" stroke="#69C596" stroke-width="2"/>
  <text x="520" y="330" fill="#11643B" font-size="28" font-family="Segoe UI, Arial, sans-serif" font-weight="700">Private App</text>
  <text x="515" y="382" fill="#2B313B" font-size="21" font-family="Segoe UI, Arial, sans-serif">EC2 / ECS / Lambda</text>
  <text x="515" y="418" fill="#2B313B" font-size="21" font-family="Segoe UI, Arial, sans-serif">IAM role-based access</text>
  <text x="515" y="454" fill="#2B313B" font-size="21" font-family="Segoe UI, Arial, sans-serif">Outbound through NAT if needed</text>

  <rect x="810" y="280" width="250" height="300" rx="24" fill="#FDEBEC" stroke="#E28A93" stroke-width="2"/>
  <text x="855" y="330" fill="#9A2837" font-size="28" font-family="Segoe UI, Arial, sans-serif" font-weight="700">Private Data</text>
  <text x="860" y="382" fill="#2B313B" font-size="21" font-family="Segoe UI, Arial, sans-serif">RDS / Aurora</text>
  <text x="860" y="418" fill="#2B313B" font-size="21" font-family="Segoe UI, Arial, sans-serif">Encryption with KMS</text>
  <text x="860" y="454" fill="#2B313B" font-size="21" font-family="Segoe UI, Arial, sans-serif">No public access</text>

  <path d="M390 430H475" stroke="#7CA7F0" stroke-width="5" stroke-linecap="round"/>
  <path d="M725 430H810" stroke="#69C596" stroke-width="5" stroke-linecap="round"/>
  <text x="170" y="626" fill="#2B313B" font-size="22" font-family="Segoe UI, Arial, sans-serif">Security model: least privilege IAM + subnet isolation + encrypted data + audit logs.</text>
</svg>