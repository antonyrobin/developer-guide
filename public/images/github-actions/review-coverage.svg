<svg width="1200" height="620" viewBox="0 0 1200 620" fill="none" xmlns="http://www.w3.org/2000/svg">
  <rect width="1200" height="620" fill="#F5F7F4"/>

  <!-- Title -->
  <text x="78" y="76" fill="#1F2937" font-size="34" font-family="Segoe UI, Arial, sans-serif" font-weight="700">Code Review, Coverage, and PR Checklist Automation</text>
  <text x="78" y="108" fill="#4E6A50" font-size="17" font-family="Segoe UI, Arial, sans-serif">Actions can reject weak pull requests before reviewers spend time on them.</text>

  <!-- Card 1: Review checks -->
  <rect x="78" y="160" width="320" height="280" rx="20" fill="#E8F1FF" stroke="#7CA7F0" stroke-width="2"/>
  <text x="238" y="206" fill="#184A95" font-size="24" font-family="Segoe UI, Arial, sans-serif" font-weight="700" text-anchor="middle">Review Checks</text>
  <line x1="118" y1="220" x2="358" y2="220" stroke="#7CA7F0" stroke-width="1" stroke-opacity="0.4"/>
  <circle cx="118" cy="256" r="5" fill="#7CA7F0"/>
  <text x="134" y="261" fill="#2B313B" font-size="15" font-family="Segoe UI, Arial, sans-serif">Lint and unit tests</text>
  <circle cx="118" cy="286" r="5" fill="#7CA7F0"/>
  <text x="134" y="291" fill="#2B313B" font-size="15" font-family="Segoe UI, Arial, sans-serif">Required reviewers</text>
  <circle cx="118" cy="316" r="5" fill="#7CA7F0"/>
  <text x="134" y="321" fill="#2B313B" font-size="15" font-family="Segoe UI, Arial, sans-serif">Comment automation</text>
  <circle cx="118" cy="346" r="5" fill="#7CA7F0"/>
  <text x="134" y="351" fill="#2B313B" font-size="15" font-family="Segoe UI, Arial, sans-serif">Label enforcement</text>
  <text x="238" y="406" fill="#7CA7F0" font-size="14" font-family="Segoe UI, Arial, sans-serif" font-weight="600" text-anchor="middle">Objective quality gate</text>

  <!-- Card 2: Coverage gates -->
  <rect x="440" y="160" width="320" height="280" rx="20" fill="#E8F7F0" stroke="#69C596" stroke-width="2"/>
  <text x="600" y="206" fill="#11643B" font-size="24" font-family="Segoe UI, Arial, sans-serif" font-weight="700" text-anchor="middle">Coverage Gates</text>
  <line x1="480" y1="220" x2="720" y2="220" stroke="#69C596" stroke-width="1" stroke-opacity="0.4"/>
  <circle cx="480" cy="256" r="5" fill="#69C596"/>
  <text x="496" y="261" fill="#2B313B" font-size="15" font-family="Segoe UI, Arial, sans-serif">Upload report artifact</text>
  <circle cx="480" cy="286" r="5" fill="#69C596"/>
  <text x="496" y="291" fill="#2B313B" font-size="15" font-family="Segoe UI, Arial, sans-serif">Fail below threshold</text>
  <circle cx="480" cy="316" r="5" fill="#69C596"/>
  <text x="496" y="321" fill="#2B313B" font-size="15" font-family="Segoe UI, Arial, sans-serif">Post summary in PR</text>
  <circle cx="480" cy="346" r="5" fill="#69C596"/>
  <text x="496" y="351" fill="#2B313B" font-size="15" font-family="Segoe UI, Arial, sans-serif">Diff coverage tracking</text>
  <text x="600" y="406" fill="#69C596" font-size="14" font-family="Segoe UI, Arial, sans-serif" font-weight="600" text-anchor="middle">Testing visibility</text>

  <!-- Card 3: PR checklist -->
  <rect x="802" y="160" width="320" height="280" rx="20" fill="#FFF3D9" stroke="#DDAE4B" stroke-width="2"/>
  <text x="962" y="206" fill="#8A5B07" font-size="24" font-family="Segoe UI, Arial, sans-serif" font-weight="700" text-anchor="middle">PR Checklist</text>
  <line x1="842" y1="220" x2="1082" y2="220" stroke="#DDAE4B" stroke-width="1" stroke-opacity="0.4"/>
  <circle cx="842" cy="256" r="5" fill="#DDAE4B"/>
  <text x="858" y="261" fill="#2B313B" font-size="15" font-family="Segoe UI, Arial, sans-serif">Template completed</text>
  <circle cx="842" cy="286" r="5" fill="#DDAE4B"/>
  <text x="858" y="291" fill="#2B313B" font-size="15" font-family="Segoe UI, Arial, sans-serif">Linked issue present</text>
  <circle cx="842" cy="316" r="5" fill="#DDAE4B"/>
  <text x="858" y="321" fill="#2B313B" font-size="15" font-family="Segoe UI, Arial, sans-serif">Screenshots or notes</text>
  <circle cx="842" cy="346" r="5" fill="#DDAE4B"/>
  <text x="858" y="351" fill="#2B313B" font-size="15" font-family="Segoe UI, Arial, sans-serif">Rollout notes included</text>
  <text x="962" y="406" fill="#DDAE4B" font-size="14" font-family="Segoe UI, Arial, sans-serif" font-weight="600" text-anchor="middle">Author accountability</text>

  <!-- Bottom note -->
  <text x="78" y="510" fill="#2B313B" font-size="16" font-family="Segoe UI, Arial, sans-serif">Automate objective checks so human reviewers can focus on</text>
  <text x="78" y="534" fill="#2B313B" font-size="16" font-family="Segoe UI, Arial, sans-serif">correctness, design, and risk.</text>
</svg>
