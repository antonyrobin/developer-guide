<svg width="1200" height="700" viewBox="0 0 1200 700" fill="none" xmlns="http://www.w3.org/2000/svg">
  <rect width="1200" height="700" fill="#F5F7F4"/>

  <!-- Outer frame -->
  <rect x="48" y="40" width="1104" height="620" rx="24" fill="#FBFCFA" stroke="#D1D9CD" stroke-width="1.5"/>

  <!-- Title -->
  <text x="84" y="100" fill="#1F2937" font-size="34" font-family="Segoe UI, Arial, sans-serif" font-weight="700">GitHub Actions Workflow Anatomy</text>
  <text x="84" y="132" fill="#4E6A50" font-size="17" font-family="Segoe UI, Arial, sans-serif">A workflow is built from events, jobs, steps, and reusable actions.</text>

  <!-- Box 1: on: -->
  <rect x="78" y="180" width="230" height="155" rx="18" fill="#E8F1FF" stroke="#7CA7F0" stroke-width="2"/>
  <text x="193" y="228" fill="#184A95" font-size="26" font-family="Segoe UI, Arial, sans-serif" font-weight="700" text-anchor="middle">on:</text>
  <line x1="108" y1="242" x2="278" y2="242" stroke="#7CA7F0" stroke-width="1" stroke-opacity="0.4"/>
  <text x="193" y="272" fill="#2B313B" font-size="15" font-family="Segoe UI, Arial, sans-serif" text-anchor="middle">push, pull_request,</text>
  <text x="193" y="294" fill="#2B313B" font-size="15" font-family="Segoe UI, Arial, sans-serif" text-anchor="middle">workflow_dispatch</text>
  <text x="193" y="322" fill="#7CA7F0" font-size="13" font-family="Segoe UI, Arial, sans-serif" font-weight="600" text-anchor="middle">Trigger event</text>

  <!-- Arrow 1→2 -->
  <line x1="308" y1="258" x2="344" y2="258" stroke="#94B8F2" stroke-width="3" stroke-linecap="round"/>
  <polygon points="344,252 356,258 344,264" fill="#94B8F2"/>

  <!-- Box 2: jobs: -->
  <rect x="358" y="180" width="230" height="155" rx="18" fill="#E8F7F0" stroke="#69C596" stroke-width="2"/>
  <text x="473" y="228" fill="#11643B" font-size="26" font-family="Segoe UI, Arial, sans-serif" font-weight="700" text-anchor="middle">jobs:</text>
  <line x1="388" y1="242" x2="558" y2="242" stroke="#69C596" stroke-width="1" stroke-opacity="0.4"/>
  <text x="473" y="272" fill="#2B313B" font-size="15" font-family="Segoe UI, Arial, sans-serif" text-anchor="middle">build, test, deploy</text>
  <text x="473" y="294" fill="#2B313B" font-size="15" font-family="Segoe UI, Arial, sans-serif" text-anchor="middle">parallel or sequential</text>
  <text x="473" y="322" fill="#69C596" font-size="13" font-family="Segoe UI, Arial, sans-serif" font-weight="600" text-anchor="middle">Run on runners</text>

  <!-- Arrow 2→3 -->
  <line x1="588" y1="258" x2="624" y2="258" stroke="#8DCEA0" stroke-width="3" stroke-linecap="round"/>
  <polygon points="624,252 636,258 624,264" fill="#8DCEA0"/>

  <!-- Box 3: steps: -->
  <rect x="638" y="180" width="230" height="155" rx="18" fill="#FFF3D9" stroke="#DDAE4B" stroke-width="2"/>
  <text x="753" y="228" fill="#8A5B07" font-size="26" font-family="Segoe UI, Arial, sans-serif" font-weight="700" text-anchor="middle">steps:</text>
  <line x1="668" y1="242" x2="838" y2="242" stroke="#DDAE4B" stroke-width="1" stroke-opacity="0.4"/>
  <text x="753" y="272" fill="#2B313B" font-size="15" font-family="Segoe UI, Arial, sans-serif" text-anchor="middle">checkout, setup,</text>
  <text x="753" y="294" fill="#2B313B" font-size="15" font-family="Segoe UI, Arial, sans-serif" text-anchor="middle">build, test, publish</text>
  <text x="753" y="322" fill="#DDAE4B" font-size="13" font-family="Segoe UI, Arial, sans-serif" font-weight="600" text-anchor="middle">Sequential in job</text>

  <!-- Arrow 3→4 -->
  <line x1="868" y1="258" x2="904" y2="258" stroke="#D4B65E" stroke-width="3" stroke-linecap="round"/>
  <polygon points="904,252 916,258 904,264" fill="#D4B65E"/>

  <!-- Box 4: uses / run -->
  <rect x="918" y="180" width="200" height="155" rx="18" fill="#F4EDFF" stroke="#A78BFA" stroke-width="2"/>
  <text x="1018" y="228" fill="#5B34B4" font-size="26" font-family="Segoe UI, Arial, sans-serif" font-weight="700" text-anchor="middle">uses / run</text>
  <line x1="948" y1="242" x2="1088" y2="242" stroke="#A78BFA" stroke-width="1" stroke-opacity="0.4"/>
  <text x="1018" y="272" fill="#2B313B" font-size="15" font-family="Segoe UI, Arial, sans-serif" text-anchor="middle">Marketplace actions</text>
  <text x="1018" y="294" fill="#2B313B" font-size="15" font-family="Segoe UI, Arial, sans-serif" text-anchor="middle">or shell commands</text>
  <text x="1018" y="322" fill="#A78BFA" font-size="13" font-family="Segoe UI, Arial, sans-serif" font-weight="600" text-anchor="middle">Actual execution</text>

  <!-- Mental model box -->
  <rect x="78" y="400" width="1040" height="210" rx="18" fill="#F7FAF6" stroke="#D1D9CD" stroke-width="1.5"/>
  <text x="108" y="440" fill="#1F2937" font-size="22" font-family="Segoe UI, Arial, sans-serif" font-weight="700">Mental Model</text>
  <line x1="108" y1="454" x2="1088" y2="454" stroke="#D1D9CD" stroke-width="1" stroke-opacity="0.5"/>
  <text x="108" y="484" fill="#2B313B" font-size="16" font-family="Segoe UI, Arial, sans-serif">Event starts workflow → workflow schedules jobs →</text>
  <text x="108" y="508" fill="#2B313B" font-size="16" font-family="Segoe UI, Arial, sans-serif">each job runs steps → steps call actions or scripts →</text>
  <text x="108" y="532" fill="#2B313B" font-size="16" font-family="Segoe UI, Arial, sans-serif">outputs can gate later jobs.</text>
  <text x="108" y="568" fill="#2B313B" font-size="16" font-family="Segoe UI, Arial, sans-serif">Debugging is easier once you know which level failed:</text>
  <text x="108" y="592" fill="#2B313B" font-size="16" font-family="Segoe UI, Arial, sans-serif">trigger, job, step, action, or script.</text>
</svg>
