<svg width="1200" height="720" viewBox="0 0 1200 720" fill="none" xmlns="http://www.w3.org/2000/svg">
  <rect width="1200" height="720" fill="#F5F7F4"/>
  <text x="78" y="100" fill="#1F2937" font-size="38" font-family="Segoe UI, Arial, sans-serif" font-weight="700">Dev, Stage, Prod with Environment Approvals</text>
  <text x="78" y="138" fill="#4E6A50" font-size="20" font-family="Segoe UI, Arial, sans-serif">Deploy automatically where risk is low, and require reviewers where risk is high.</text>

