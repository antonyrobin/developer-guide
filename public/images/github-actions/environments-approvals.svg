  <text x="146" y="374" fill="#2B313B" font-size="22" font-family="Segoe UI, Arial, sans-serif">Auto deploy after CI passes</text>

  <rect x="476" y="270" width="250" height="150" rx="24" fill="#FFF3D9" stroke="#DDAE4B" stroke-width="2"/>
  <text x="562" y="332" fill="#8A5B07" font-size="30" font-family="Segoe UI, Arial, sans-serif" font-weight="700">Stage</text>
  <text x="512" y="374" fill="#2B313B" font-size="22" font-family="Segoe UI, Arial, sans-serif">Approval + smoke test gates</text>

  <rect x="842" y="270" width="250" height="150" rx="24" fill="#FDEBEC" stroke="#E28A93" stroke-width="2"/>
  <text x="932" y="332" fill="#9A2837" font-size="30" font-family="Segoe UI, Arial, sans-serif" font-weight="700">Prod</text>
  <text x="870" y="374" fill="#2B313B" font-size="22" font-family="Segoe UI, Arial, sans-serif">Strict approval and protected secrets</text>

  <path d="M360 345H476" stroke="#70C58F" stroke-width="5" stroke-linecap="round"/>
  <path d="M726 345H842" stroke="#D0A946" stroke-width="5" stroke-linecap="round"/>
