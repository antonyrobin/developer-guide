<svg width="1200" height="620" viewBox="0 0 1200 620" fill="none" xmlns="http://www.w3.org/2000/svg">
  <rect width="1200" height="620" fill="#F5F7F4"/>

  <!-- Title -->
  <text x="78" y="76" fill="#1F2937" font-size="34" font-family="Segoe UI, Arial, sans-serif" font-weight="700">Dev, Stage, Prod with Environment Approvals</text>
  <text x="78" y="108" fill="#4E6A50" font-size="17" font-family="Segoe UI, Arial, sans-serif">Deploy automatically where risk is low, and require reviewers where risk is high.</text>

  <!-- Dev Box -->
  <rect x="78" y="170" width="300" height="190" rx="20" fill="#E8F7F0" stroke="#69C596" stroke-width="2"/>
  <text x="228" y="218" fill="#11643B" font-size="26" font-family="Segoe UI, Arial, sans-serif" font-weight="700" text-anchor="middle">Dev</text>
  <line x1="118" y1="232" x2="338" y2="232" stroke="#69C596" stroke-width="1" stroke-opacity="0.4"/>
  <text x="228" y="266" fill="#2B313B" font-size="15" font-family="Segoe UI, Arial, sans-serif" text-anchor="middle">Automatic deploy</text>
  <text x="228" y="288" fill="#2B313B" font-size="15" font-family="Segoe UI, Arial, sans-serif" text-anchor="middle">after CI passes</text>
  <text x="228" y="336" fill="#69C596" font-size="14" font-family="Segoe UI, Arial, sans-serif" font-weight="600" text-anchor="middle">No approval needed</text>

  <!-- Arrow Dev → Stage -->
  <line x1="378" y1="265" x2="436" y2="265" stroke="#70C58F" stroke-width="3" stroke-linecap="round"/>
  <polygon points="436,259 448,265 436,271" fill="#70C58F"/>

  <!-- Stage Box -->
  <rect x="450" y="170" width="300" height="190" rx="20" fill="#FFF3D9" stroke="#DDAE4B" stroke-width="2"/>
  <text x="600" y="218" fill="#8A5B07" font-size="26" font-family="Segoe UI, Arial, sans-serif" font-weight="700" text-anchor="middle">Stage</text>
  <line x1="490" y1="232" x2="710" y2="232" stroke="#DDAE4B" stroke-width="1" stroke-opacity="0.4"/>
  <text x="600" y="266" fill="#2B313B" font-size="15" font-family="Segoe UI, Arial, sans-serif" text-anchor="middle">Approval gate and</text>
  <text x="600" y="288" fill="#2B313B" font-size="15" font-family="Segoe UI, Arial, sans-serif" text-anchor="middle">smoke tests required</text>
  <text x="600" y="336" fill="#DDAE4B" font-size="14" font-family="Segoe UI, Arial, sans-serif" font-weight="600" text-anchor="middle">1 reviewer required</text>

  <!-- Arrow Stage → Prod -->
  <line x1="750" y1="265" x2="808" y2="265" stroke="#D0A946" stroke-width="3" stroke-linecap="round"/>
  <polygon points="808,259 820,265 808,271" fill="#D0A946"/>

  <!-- Prod Box -->
  <rect x="822" y="170" width="300" height="190" rx="20" fill="#FDEBEC" stroke="#E28A93" stroke-width="2"/>
  <text x="972" y="218" fill="#9A2837" font-size="26" font-family="Segoe UI, Arial, sans-serif" font-weight="700" text-anchor="middle">Prod</text>
  <line x1="862" y1="232" x2="1082" y2="232" stroke="#E28A93" stroke-width="1" stroke-opacity="0.4"/>
  <text x="972" y="266" fill="#2B313B" font-size="15" font-family="Segoe UI, Arial, sans-serif" text-anchor="middle">Strict approval with</text>
  <text x="972" y="288" fill="#2B313B" font-size="15" font-family="Segoe UI, Arial, sans-serif" text-anchor="middle">protected secrets</text>
  <text x="972" y="336" fill="#E28A93" font-size="14" font-family="Segoe UI, Arial, sans-serif" font-weight="600" text-anchor="middle">2+ reviewers required</text>

  <!-- Bottom note box -->
  <rect x="78" y="430" width="1044" height="120" rx="16" fill="#FBFCFA" stroke="#D1D9CD" stroke-width="1.5"/>
  <text x="108" y="472" fill="#1F2937" font-size="20" font-family="Segoe UI, Arial, sans-serif" font-weight="700">How it works</text>
  <line x1="108" y1="484" x2="1088" y2="484" stroke="#D1D9CD" stroke-width="1" stroke-opacity="0.5"/>
  <text x="108" y="510" fill="#2B313B" font-size="16" font-family="Segoe UI, Arial, sans-serif">GitHub Environments attach reviewers, wait timers, and scoped secrets</text>
  <text x="108" y="534" fill="#2B313B" font-size="16" font-family="Segoe UI, Arial, sans-serif">to each promotion step. Keep Dev fast and add gates for Stage and Prod.</text>
</svg>
