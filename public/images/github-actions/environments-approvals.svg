  <text x="403" y="353" fill="#11643B" font-size="20" font-family="Segoe UI, Arial, sans-serif" font-weight="700">OK</text>
  <circle cx="784" cy="345" r="24" fill="#FBFCFA" stroke="#D0A946" stroke-width="3"/>
  <text x="750" y="352" fill="#8A5B07" font-size="18" font-family="Segoe UI, Arial, sans-serif" font-weight="700">Review</text>

  <text x="110" y="570" fill="#2B313B" font-size="22" font-family="Segoe UI, Arial, sans-serif">GitHub Environments let you attach reviewers, wait timers, and environment-specific secrets to each promotion step.</text>
