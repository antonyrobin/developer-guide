<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 400">
  <rect width="900" height="400" rx="16" fill="#0f172a"/>
  <text x="450" y="44" text-anchor="middle" fill="#fff" font-size="26" font-weight="700" font-family="Segoe UI,Arial,sans-serif">React Hooks at a Glance</text>

  <!-- useState -->
  <rect x="50" y="80" width="250" height="90" rx="12" fill="#1e40af"/>
  <text x="175" y="112" text-anchor="middle" fill="#fff" font-size="18" font-weight="700" font-family="Segoe UI,Arial,sans-serif">useState</text>
  <text x="175" y="135" text-anchor="middle" fill="#bfdbfe" font-size="13" font-family="Segoe UI,Arial,sans-serif">Local component state</text>
  <text x="175" y="155" text-anchor="middle" fill="#93c5fd" font-size="11" font-family="monospace">const [val, setVal] = useState(0)</text>

  <!-- useEffect -->
  <rect x="325" y="80" width="250" height="90" rx="12" fill="#166534"/>
  <text x="450" y="112" text-anchor="middle" fill="#fff" font-size="18" font-weight="700" font-family="Segoe UI,Arial,sans-serif">useEffect</text>
  <text x="450" y="135" text-anchor="middle" fill="#bbf7d0" font-size="13" font-family="Segoe UI,Arial,sans-serif">Side effects &amp; lifecycle</text>
  <text x="450" y="155" text-anchor="middle" fill="#86efac" font-size="11" font-family="monospace">useEffect(() =&gt; { ... }, [deps])</text>

  <!-- useContext -->
  <rect x="600" y="80" width="250" height="90" rx="12" fill="#7c3aed"/>
  <text x="725" y="112" text-anchor="middle" fill="#fff" font-size="18" font-weight="700" font-family="Segoe UI,Arial,sans-serif">useContext</text>
  <text x="725" y="135" text-anchor="middle" fill="#e9d5ff" font-size="13" font-family="Segoe UI,Arial,sans-serif">Global state / theme</text>
  <text x="725" y="155" text-anchor="middle" fill="#d8b4fe" font-size="11" font-family="monospace">const ctx = useContext(MyCtx)</text>

  <!-- useRef -->
  <rect x="50" y="195" width="250" height="90" rx="12" fill="#854d0e"/>
  <text x="175" y="227" text-anchor="middle" fill="#fff" font-size="18" font-weight="700" font-family="Segoe UI,Arial,sans-serif">useRef</text>
  <text x="175" y="250" text-anchor="middle" fill="#fef3c7" font-size="13" font-family="Segoe UI,Arial,sans-serif">DOM refs &amp; mutable values</text>
  <text x="175" y="270" text-anchor="middle" fill="#fde68a" font-size="11" font-family="monospace">const ref = useRef(null)</text>

  <!-- useMemo -->
  <rect x="325" y="195" width="250" height="90" rx="12" fill="#0e7490"/>
  <text x="450" y="227" text-anchor="middle" fill="#fff" font-size="18" font-weight="700" font-family="Segoe UI,Arial,sans-serif">useMemo</text>
  <text x="450" y="250" text-anchor="middle" fill="#d4f5f4" font-size="13" font-family="Segoe UI,Arial,sans-serif">Memoize expensive computation</text>
  <text x="450" y="270" text-anchor="middle" fill="#a5f3fc" font-size="11" font-family="monospace">useMemo(() =&gt; calc(a), [a])</text>

  <!-- useReducer -->
  <rect x="600" y="195" width="250" height="90" rx="12" fill="#b91c1c"/>
  <text x="725" y="227" text-anchor="middle" fill="#fff" font-size="18" font-weight="700" font-family="Segoe UI,Arial,sans-serif">useReducer</text>
  <text x="725" y="250" text-anchor="middle" fill="#fecaca" font-size="13" font-family="Segoe UI,Arial,sans-serif">Complex state logic</text>
  <text x="725" y="270" text-anchor="middle" fill="#fca5a5" font-size="11" font-family="monospace">useReducer(reducer, init)</text>

  <!-- Bottom note -->
  <rect x="100" y="320" width="700" height="55" rx="12" fill="#1e293b"/>
  <text x="450" y="345" text-anchor="middle" fill="#94a3b8" font-size="14" font-family="Segoe UI,Arial,sans-serif">Rules: Only call hooks at the top level · Only call hooks from React functions</text>
  <text x="450" y="365" text-anchor="middle" fill="#64748b" font-size="12" font-family="Segoe UI,Arial,sans-serif">Custom hooks: extract reusable logic into useYourHook() functions</text>
</svg>
