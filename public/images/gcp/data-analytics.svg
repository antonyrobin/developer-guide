<svg width="1200" height="720" viewBox="0 0 1200 720" fill="none" xmlns="http://www.w3.org/2000/svg">
  <rect width="1200" height="720" fill="#F4F8F7"/>
  <text x="76" y="102" fill="#1F2937" font-size="38" font-family="Segoe UI, Arial, sans-serif" font-weight="700">GCP Data and Analytics Path</text>
  <text x="76" y="140" fill="#3D6B61" font-size="20" font-family="Segoe UI, Arial, sans-serif">Store raw data, process events, and query at warehouse scale.</text>

  <rect x="80" y="270" width="220" height="120" rx="24" fill="#E7F0FF" stroke="#7CA7F0" stroke-width="2"/>
  <text x="123" y="340" fill="#184A95" font-size="28" font-family="Segoe UI, Arial, sans-serif" font-weight="700">Cloud Storage</text>

  <rect x="362" y="270" width="220" height="120" rx="24" fill="#E8F7F0" stroke="#69C596" stroke-width="2"/>
  <text x="432" y="340" fill="#11643B" font-size="28" font-family="Segoe UI, Arial, sans-serif" font-weight="700">Pub/Sub</text>

  <rect x="644" y="270" width="220" height="120" rx="24" fill="#FFF4D8" stroke="#E0B85B" stroke-width="2"/>
  <text x="702" y="340" fill="#8A5B07" font-size="28" font-family="Segoe UI, Arial, sans-serif" font-weight="700">Dataflow</text>

  <rect x="926" y="270" width="200" height="120" rx="24" fill="#F3EDFF" stroke="#A78BFA" stroke-width="2"/>
  <text x="974" y="340" fill="#5B34B4" font-size="28" font-family="Segoe UI, Arial, sans-serif" font-weight="700">BigQuery</text>

  <path d="M300 330H362" stroke="#6AA1E4" stroke-width="5" stroke-linecap="round"/>
  <path d="M582 330H644" stroke="#6CBF88" stroke-width="5" stroke-linecap="round"/>
  <path d="M864 330H926" stroke="#D7AE4B" stroke-width="5" stroke-linecap="round"/>

  <text x="96" y="500" fill="#2B313B" font-size="22" font-family="Segoe UI, Arial, sans-serif">Common learning pattern: raw files land in Cloud Storage, events stream through Pub/Sub, pipelines transform in Dataflow, and analysts query in BigQuery.</text>
  <text x="96" y="540" fill="#2B313B" font-size="22" font-family="Segoe UI, Arial, sans-serif">This is why GCP is strong in analytics-heavy workloads.</text>
</svg>