<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 380">
  <rect width="900" height="380" rx="16" fill="#0f172a"/>
  <text x="450" y="36" text-anchor="middle" fill="#fff" font-size="22" font-weight="700" font-family="Segoe UI,Arial,sans-serif">Angular Component Lifecycle</text>
  <text x="450" y="56" text-anchor="middle" fill="#94a3b8" font-size="12" font-family="Segoe UI,Arial,sans-serif">Hooks execute in sequence from creation to destruction</text>

  <!-- Timeline line -->
  <line x1="60" y1="120" x2="840" y2="120" stroke="#475569" stroke-width="2"/>

  <!-- Hook 1: constructor -->
  <circle cx="80" cy="120" r="8" fill="#64748b" stroke="#94a3b8" stroke-width="2"/>
  <text x="80" y="100" text-anchor="middle" fill="#94a3b8" font-size="10" font-weight="600" font-family="Segoe UI,Arial,sans-serif">constructor</text>
  <text x="80" y="150" text-anchor="middle" fill="#64748b" font-size="9" font-family="Segoe UI,Arial,sans-serif">DI only</text>

  <!-- Hook 2: ngOnChanges -->
  <circle cx="195" cy="120" r="8" fill="#fbbf24" stroke="#fbbf24" stroke-width="2"/>
  <text x="195" y="100" text-anchor="middle" fill="#fbbf24" font-size="10" font-weight="600" font-family="Segoe UI,Arial,sans-serif">ngOnChanges</text>
  <text x="195" y="150" text-anchor="middle" fill="#94a3b8" font-size="9" font-family="Segoe UI,Arial,sans-serif">@Input changed</text>

  <!-- Hook 3: ngOnInit -->
  <circle cx="320" cy="120" r="12" fill="#4ade80" stroke="#4ade80" stroke-width="2"/>
  <text x="320" y="96" text-anchor="middle" fill="#4ade80" font-size="11" font-weight="700" font-family="Segoe UI,Arial,sans-serif">ngOnInit</text>
  <text x="320" y="150" text-anchor="middle" fill="#86efac" font-size="9" font-weight="600" font-family="Segoe UI,Arial,sans-serif">Fetch data here</text>
  <rect x="270" y="158" width="100" height="16" rx="3" fill="#14532d"/>
  <text x="320" y="170" text-anchor="middle" fill="#4ade80" font-size="8" font-weight="600" font-family="Segoe UI,Arial,sans-serif">MOST USED</text>

  <!-- Hook 4: ngDoCheck -->
  <circle cx="430" cy="120" r="6" fill="#64748b" stroke="#94a3b8" stroke-width="1.5"/>
  <text x="430" y="100" text-anchor="middle" fill="#94a3b8" font-size="10" font-weight="600" font-family="Segoe UI,Arial,sans-serif">ngDoCheck</text>
  <text x="430" y="150" text-anchor="middle" fill="#64748b" font-size="9" font-family="Segoe UI,Arial,sans-serif">Custom CD</text>

  <!-- Hook 5: ngAfterContentInit -->
  <circle cx="530" cy="120" r="6" fill="#38bdf8" stroke="#38bdf8" stroke-width="1.5"/>
  <text x="530" y="100" text-anchor="middle" fill="#38bdf8" font-size="9" font-weight="600" font-family="Segoe UI,Arial,sans-serif">AfterContentInit</text>
  <text x="530" y="150" text-anchor="middle" fill="#64748b" font-size="9" font-family="Segoe UI,Arial,sans-serif">Projected content</text>

  <!-- Hook 6: ngAfterViewInit -->
  <circle cx="640" cy="120" r="8" fill="#a78bfa" stroke="#a78bfa" stroke-width="2"/>
  <text x="640" y="96" text-anchor="middle" fill="#a78bfa" font-size="10" font-weight="600" font-family="Segoe UI,Arial,sans-serif">AfterViewInit</text>
  <text x="640" y="150" text-anchor="middle" fill="#94a3b8" font-size="9" font-family="Segoe UI,Arial,sans-serif">DOM access safe</text>
  <rect x="596" y="158" width="88" height="16" rx="3" fill="#2e1065"/>
  <text x="640" y="170" text-anchor="middle" fill="#a78bfa" font-size="8" font-weight="600" font-family="Segoe UI,Arial,sans-serif">@ViewChild</text>

  <!-- Hook 7: ngOnDestroy -->
  <circle cx="800" cy="120" r="12" fill="#f87171" stroke="#f87171" stroke-width="2"/>
  <text x="800" y="96" text-anchor="middle" fill="#f87171" font-size="11" font-weight="700" font-family="Segoe UI,Arial,sans-serif">ngOnDestroy</text>
  <text x="800" y="150" text-anchor="middle" fill="#fca5a5" font-size="9" font-weight="600" font-family="Segoe UI,Arial,sans-serif">Cleanup here</text>
  <rect x="750" y="158" width="100" height="16" rx="3" fill="#7f1d1d"/>
  <text x="800" y="170" text-anchor="middle" fill="#f87171" font-size="8" font-weight="600" font-family="Segoe UI,Arial,sans-serif">MOST USED</text>

  <!-- Repeated loop indicator -->
  <path d="M 195 135 C 195 200 640 200 640 135" fill="none" stroke="#475569" stroke-width="1" stroke-dasharray="4,3"/>
  <text x="418" y="210" text-anchor="middle" fill="#475569" font-size="10" font-family="Segoe UI,Arial,sans-serif">↻ Repeats on change detection cycles</text>

  <!-- Usage summary boxes -->
  <rect x="50" y="240" width="250" height="55" rx="8" fill="#14532d" stroke="#4ade80" stroke-width="1.5"/>
  <text x="175" y="260" text-anchor="middle" fill="#4ade80" font-size="12" font-weight="700" font-family="Segoe UI,Arial,sans-serif">ngOnInit</text>
  <text x="175" y="278" text-anchor="middle" fill="#86efac" font-size="10" font-family="Segoe UI,Arial,sans-serif">API calls, subscriptions, initial logic</text>
  <text x="175" y="290" text-anchor="middle" fill="#86efac" font-size="9" font-family="Segoe UI,Arial,sans-serif">Runs once after first ngOnChanges</text>

  <rect x="325" y="240" width="250" height="55" rx="8" fill="#7f1d1d" stroke="#f87171" stroke-width="1.5"/>
  <text x="450" y="260" text-anchor="middle" fill="#f87171" font-size="12" font-weight="700" font-family="Segoe UI,Arial,sans-serif">ngOnDestroy</text>
  <text x="450" y="278" text-anchor="middle" fill="#fca5a5" font-size="10" font-family="Segoe UI,Arial,sans-serif">Unsubscribe, clear timers, detach listeners</text>
  <text x="450" y="290" text-anchor="middle" fill="#fca5a5" font-size="9" font-family="Segoe UI,Arial,sans-serif">Prevents memory leaks</text>

  <rect x="600" y="240" width="250" height="55" rx="8" fill="#1e1b4b" stroke="#a78bfa" stroke-width="1.5"/>
  <text x="725" y="260" text-anchor="middle" fill="#a78bfa" font-size="12" font-weight="700" font-family="Segoe UI,Arial,sans-serif">ngAfterViewInit</text>
  <text x="725" y="278" text-anchor="middle" fill="#c4b5fd" font-size="10" font-family="Segoe UI,Arial,sans-serif">DOM manipulation, charts, @ViewChild</text>
  <text x="725" y="290" text-anchor="middle" fill="#c4b5fd" font-size="9" font-family="Segoe UI,Arial,sans-serif">View &amp; children fully rendered</text>

  <!-- Rule box -->
  <rect x="50" y="315" width="800" height="50" rx="8" fill="#111827" stroke="#475569" stroke-width="1"/>
  <text x="450" y="338" text-anchor="middle" fill="#fbbf24" font-size="12" font-weight="700" font-family="Segoe UI,Arial,sans-serif">⚠️ Rules</text>
  <text x="450" y="355" text-anchor="middle" fill="#94a3b8" font-size="10" font-family="Segoe UI,Arial,sans-serif">Constructor → DI only (no logic) · ngOnInit → Initialization · ngOnDestroy → Always clean up subscriptions &amp; timers</text>
</svg>
