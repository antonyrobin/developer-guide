<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 400">
  <rect width="900" height="400" rx="16" fill="#0f172a"/>
  <text x="450" y="38" text-anchor="middle" fill="#fff" font-size="22" font-weight="700" font-family="Segoe UI,Arial,sans-serif">Angular Data Binding Types</text>
  <text x="450" y="58" text-anchor="middle" fill="#94a3b8" font-size="12" font-family="Segoe UI,Arial,sans-serif">Four ways to connect Component class to DOM Template</text>

  <!-- Component box (left) -->
  <rect x="50" y="100" width="200" height="220" rx="12" fill="#1e293b" stroke="#dd0031" stroke-width="2"/>
  <text x="150" y="130" text-anchor="middle" fill="#dd0031" font-size="16" font-weight="700" font-family="Segoe UI,Arial,sans-serif">Component</text>
  <text x="150" y="150" text-anchor="middle" fill="#94a3b8" font-size="11" font-family="Segoe UI,Arial,sans-serif">(TypeScript Class)</text>
  <rect x="70" y="170" width="160" height="22" rx="4" fill="#374151"/>
  <text x="150" y="186" text-anchor="middle" fill="#86efac" font-size="10" font-family="Segoe UI,Arial,sans-serif">title = 'Hello'</text>
  <rect x="70" y="200" width="160" height="22" rx="4" fill="#374151"/>
  <text x="150" y="216" text-anchor="middle" fill="#86efac" font-size="10" font-family="Segoe UI,Arial,sans-serif">imageUrl = '/img.png'</text>
  <rect x="70" y="230" width="160" height="22" rx="4" fill="#374151"/>
  <text x="150" y="246" text-anchor="middle" fill="#86efac" font-size="10" font-family="Segoe UI,Arial,sans-serif">onSave() { ... }</text>
  <rect x="70" y="260" width="160" height="22" rx="4" fill="#374151"/>
  <text x="150" y="276" text-anchor="middle" fill="#86efac" font-size="10" font-family="Segoe UI,Arial,sans-serif">searchTerm = ''</text>

  <!-- Template box (right) -->
  <rect x="650" y="100" width="200" height="220" rx="12" fill="#1e293b" stroke="#fb923c" stroke-width="2"/>
  <text x="750" y="130" text-anchor="middle" fill="#fb923c" font-size="16" font-weight="700" font-family="Segoe UI,Arial,sans-serif">Template</text>
  <text x="750" y="150" text-anchor="middle" fill="#94a3b8" font-size="11" font-family="Segoe UI,Arial,sans-serif">(HTML View)</text>
  <rect x="670" y="170" width="160" height="22" rx="4" fill="#374151"/>
  <text x="750" y="186" text-anchor="middle" fill="#67e8f9" font-size="10" font-family="Segoe UI,Arial,sans-serif">{{ title }}</text>
  <rect x="670" y="200" width="160" height="22" rx="4" fill="#374151"/>
  <text x="750" y="216" text-anchor="middle" fill="#67e8f9" font-size="10" font-family="Segoe UI,Arial,sans-serif">[src]="imageUrl"</text>
  <rect x="670" y="230" width="160" height="22" rx="4" fill="#374151"/>
  <text x="750" y="246" text-anchor="middle" fill="#67e8f9" font-size="10" font-family="Segoe UI,Arial,sans-serif">(click)="onSave()"</text>
  <rect x="670" y="260" width="160" height="22" rx="4" fill="#374151"/>
  <text x="750" y="276" text-anchor="middle" fill="#67e8f9" font-size="10" font-family="Segoe UI,Arial,sans-serif">[(ngModel)]="searchTerm"</text>

  <!-- Binding 1: Interpolation (→) -->
  <line x1="250" y1="181" x2="650" y2="181" stroke="#4ade80" stroke-width="2"/>
  <polygon points="648,176 658,181 648,186" fill="#4ade80"/>
  <rect x="370" y="168" width="160" height="26" rx="6" fill="#14532d" stroke="#4ade80" stroke-width="1.5"/>
  <text x="450" y="185" text-anchor="middle" fill="#4ade80" font-size="11" font-weight="700" font-family="Segoe UI,Arial,sans-serif">Interpolation {{ }}</text>

  <!-- Binding 2: Property (→) -->
  <line x1="250" y1="211" x2="650" y2="211" stroke="#3b82f6" stroke-width="2"/>
  <polygon points="648,206 658,211 648,216" fill="#3b82f6"/>
  <rect x="370" y="198" width="160" height="26" rx="6" fill="#172554" stroke="#3b82f6" stroke-width="1.5"/>
  <text x="450" y="215" text-anchor="middle" fill="#3b82f6" font-size="11" font-weight="700" font-family="Segoe UI,Arial,sans-serif">Property [prop]</text>

  <!-- Binding 3: Event (←) -->
  <line x1="650" y1="241" x2="250" y2="241" stroke="#f87171" stroke-width="2"/>
  <polygon points="252,236 242,241 252,246" fill="#f87171"/>
  <rect x="370" y="228" width="160" height="26" rx="6" fill="#7f1d1d" stroke="#f87171" stroke-width="1.5"/>
  <text x="450" y="245" text-anchor="middle" fill="#f87171" font-size="11" font-weight="700" font-family="Segoe UI,Arial,sans-serif">Event (event)</text>

  <!-- Binding 4: Two-Way (↔) -->
  <line x1="250" y1="268" x2="650" y2="268" stroke="#fbbf24" stroke-width="2"/>
  <polygon points="648,263 658,268 648,273" fill="#fbbf24"/>
  <line x1="650" y1="274" x2="250" y2="274" stroke="#fbbf24" stroke-width="2"/>
  <polygon points="252,269 242,274 252,279" fill="#fbbf24"/>
  <rect x="370" y="258" width="160" height="26" rx="6" fill="#422006" stroke="#fbbf24" stroke-width="1.5"/>
  <text x="450" y="275" text-anchor="middle" fill="#fbbf24" font-size="11" font-weight="700" font-family="Segoe UI,Arial,sans-serif">Two-Way [(ngModel)]</text>

  <!-- Summary row -->
  <rect x="50" y="340" width="190" height="42" rx="8" fill="#14532d"/>
  <text x="145" y="358" text-anchor="middle" fill="#4ade80" font-size="11" font-weight="600" font-family="Segoe UI,Arial,sans-serif">{{ value }}</text>
  <text x="145" y="374" text-anchor="middle" fill="#86efac" font-size="9" font-family="Segoe UI,Arial,sans-serif">Component → View</text>

  <rect x="260" y="340" width="160" height="42" rx="8" fill="#172554"/>
  <text x="340" y="358" text-anchor="middle" fill="#3b82f6" font-size="11" font-weight="600" font-family="Segoe UI,Arial,sans-serif">[property]="val"</text>
  <text x="340" y="374" text-anchor="middle" fill="#93c5fd" font-size="9" font-family="Segoe UI,Arial,sans-serif">Component → View</text>

  <rect x="440" y="340" width="160" height="42" rx="8" fill="#7f1d1d"/>
  <text x="520" y="358" text-anchor="middle" fill="#f87171" font-size="11" font-weight="600" font-family="Segoe UI,Arial,sans-serif">(event)="fn()"</text>
  <text x="520" y="374" text-anchor="middle" fill="#fca5a5" font-size="9" font-family="Segoe UI,Arial,sans-serif">View → Component</text>

  <rect x="620" y="340" width="230" height="42" rx="8" fill="#422006"/>
  <text x="735" y="358" text-anchor="middle" fill="#fbbf24" font-size="11" font-weight="600" font-family="Segoe UI,Arial,sans-serif">[(ngModel)]="val"</text>
  <text x="735" y="374" text-anchor="middle" fill="#fde68a" font-size="9" font-family="Segoe UI,Arial,sans-serif">Component ↔ View (Two-Way)</text>
</svg>
