<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 500">
  <rect width="900" height="500" rx="16" fill="#0f172a"/>
  <text x="450" y="38" text-anchor="middle" fill="#fff" font-size="22" font-weight="700" font-family="Segoe UI,Arial,sans-serif">Angular Architecture</text>
  <text x="450" y="58" text-anchor="middle" fill="#94a3b8" font-size="12" font-family="Segoe UI,Arial,sans-serif">Component-based framework with Modules, Services &amp; Dependency Injection</text>

  <!-- Module -->
  <rect x="330" y="80" width="240" height="50" rx="10" fill="#1e293b" stroke="#dd0031" stroke-width="2"/>
  <text x="450" y="102" text-anchor="middle" fill="#dd0031" font-size="15" font-weight="700" font-family="Segoe UI,Arial,sans-serif">AppModule / Standalone</text>
  <text x="450" y="120" text-anchor="middle" fill="#94a3b8" font-size="10" font-family="Segoe UI,Arial,sans-serif">Bootstrap &amp; Configuration</text>

  <!-- Lines from Module -->
  <line x1="370" y1="130" x2="150" y2="180" stroke="#475569" stroke-width="1.5"/>
  <line x1="450" y1="130" x2="450" y2="180" stroke="#475569" stroke-width="1.5"/>
  <line x1="530" y1="130" x2="750" y2="180" stroke="#475569" stroke-width="1.5"/>

  <!-- Component Box -->
  <rect x="50" y="180" width="200" height="200" rx="10" fill="#1e293b" stroke="#c3002f" stroke-width="2"/>
  <text x="150" y="204" text-anchor="middle" fill="#c3002f" font-size="14" font-weight="700" font-family="Segoe UI,Arial,sans-serif">Component</text>
  <!-- Template -->
  <rect x="70" y="218" width="160" height="38" rx="6" fill="#374151" stroke="#fb923c" stroke-width="1.5"/>
  <text x="150" y="235" text-anchor="middle" fill="#fb923c" font-size="11" font-weight="600" font-family="Segoe UI,Arial,sans-serif">Template (HTML)</text>
  <text x="150" y="250" text-anchor="middle" fill="#94a3b8" font-size="9" font-family="Segoe UI,Arial,sans-serif">{{ interpolation }}, [binding]</text>
  <!-- Class -->
  <rect x="70" y="264" width="160" height="38" rx="6" fill="#374151" stroke="#3b82f6" stroke-width="1.5"/>
  <text x="150" y="281" text-anchor="middle" fill="#3b82f6" font-size="11" font-weight="600" font-family="Segoe UI,Arial,sans-serif">Class (TypeScript)</text>
  <text x="150" y="296" text-anchor="middle" fill="#94a3b8" font-size="9" font-family="Segoe UI,Arial,sans-serif">@Input, @Output, Logic</text>
  <!-- Styles -->
  <rect x="70" y="310" width="160" height="38" rx="6" fill="#374151" stroke="#a78bfa" stroke-width="1.5"/>
  <text x="150" y="327" text-anchor="middle" fill="#a78bfa" font-size="11" font-weight="600" font-family="Segoe UI,Arial,sans-serif">Styles (CSS/SCSS)</text>
  <text x="150" y="342" text-anchor="middle" fill="#94a3b8" font-size="9" font-family="Segoe UI,Arial,sans-serif">Scoped per component</text>
  <!-- Decorator -->
  <rect x="70" y="356" width="160" height="18" rx="4" fill="#dd0031"/>
  <text x="150" y="369" text-anchor="middle" fill="#fff" font-size="9" font-weight="600" font-family="Segoe UI,Arial,sans-serif">@Component() Decorator</text>

  <!-- Router Box -->
  <rect x="330" y="180" width="240" height="90" rx="10" fill="#1e293b" stroke="#22d3ee" stroke-width="2"/>
  <text x="450" y="204" text-anchor="middle" fill="#22d3ee" font-size="14" font-weight="700" font-family="Segoe UI,Arial,sans-serif">Router</text>
  <text x="450" y="224" text-anchor="middle" fill="#94a3b8" font-size="10" font-family="Segoe UI,Arial,sans-serif">URL → Component mapping</text>
  <rect x="355" y="236" width="190" height="24" rx="5" fill="#374151"/>
  <text x="450" y="253" text-anchor="middle" fill="#67e8f9" font-size="10" font-family="Segoe UI,Arial,sans-serif">Lazy Loading · Guards · Params</text>

  <!-- Services / DI Box -->
  <rect x="640" y="180" width="210" height="140" rx="10" fill="#1e293b" stroke="#4ade80" stroke-width="2"/>
  <text x="745" y="204" text-anchor="middle" fill="#4ade80" font-size="14" font-weight="700" font-family="Segoe UI,Arial,sans-serif">Services &amp; DI</text>
  <rect x="660" y="218" width="170" height="28" rx="5" fill="#374151"/>
  <text x="745" y="237" text-anchor="middle" fill="#86efac" font-size="10" font-family="Segoe UI,Arial,sans-serif">@Injectable() · Singleton</text>
  <rect x="660" y="254" width="170" height="28" rx="5" fill="#374151"/>
  <text x="745" y="273" text-anchor="middle" fill="#86efac" font-size="10" font-family="Segoe UI,Arial,sans-serif">HttpClient · API Calls</text>
  <rect x="660" y="290" width="170" height="24" rx="5" fill="#374151"/>
  <text x="745" y="307" text-anchor="middle" fill="#86efac" font-size="10" font-family="Segoe UI,Arial,sans-serif">inject() · providedIn: 'root'</text>

  <!-- Arrow: Service → Component -->
  <line x1="640" y1="260" x2="250" y2="300" stroke="#4ade80" stroke-width="1.5" stroke-dasharray="6,3"/>
  <text x="440" y="270" text-anchor="middle" fill="#4ade80" font-size="9" font-weight="600" font-family="Segoe UI,Arial,sans-serif">Dependency Injection</text>

  <!-- RxJS Box -->
  <rect x="330" y="300" width="240" height="60" rx="10" fill="#1e293b" stroke="#e879f9" stroke-width="2"/>
  <text x="450" y="324" text-anchor="middle" fill="#e879f9" font-size="14" font-weight="700" font-family="Segoe UI,Arial,sans-serif">RxJS &amp; Signals</text>
  <text x="450" y="344" text-anchor="middle" fill="#94a3b8" font-size="10" font-family="Segoe UI,Arial,sans-serif">Observables · pipe() · signal() · computed()</text>

  <!-- Bottom row -->
  <!-- Forms -->
  <rect x="50" y="400" width="170" height="50" rx="8" fill="#1e293b" stroke="#fbbf24" stroke-width="1.5"/>
  <text x="135" y="422" text-anchor="middle" fill="#fbbf24" font-size="12" font-weight="600" font-family="Segoe UI,Arial,sans-serif">Forms</text>
  <text x="135" y="440" text-anchor="middle" fill="#94a3b8" font-size="9" font-family="Segoe UI,Arial,sans-serif">Template-driven · Reactive</text>

  <!-- Directives -->
  <rect x="240" y="400" width="170" height="50" rx="8" fill="#1e293b" stroke="#fb923c" stroke-width="1.5"/>
  <text x="325" y="422" text-anchor="middle" fill="#fb923c" font-size="12" font-weight="600" font-family="Segoe UI,Arial,sans-serif">Directives</text>
  <text x="325" y="440" text-anchor="middle" fill="#94a3b8" font-size="9" font-family="Segoe UI,Arial,sans-serif">@if · @for · ngClass · Custom</text>

  <!-- Pipes -->
  <rect x="430" y="400" width="170" height="50" rx="8" fill="#1e293b" stroke="#38bdf8" stroke-width="1.5"/>
  <text x="515" y="422" text-anchor="middle" fill="#38bdf8" font-size="12" font-weight="600" font-family="Segoe UI,Arial,sans-serif">Pipes</text>
  <text x="515" y="440" text-anchor="middle" fill="#94a3b8" font-size="9" font-family="Segoe UI,Arial,sans-serif">date · currency · custom</text>

  <!-- Testing -->
  <rect x="620" y="400" width="170" height="50" rx="8" fill="#1e293b" stroke="#a78bfa" stroke-width="1.5"/>
  <text x="705" y="422" text-anchor="middle" fill="#a78bfa" font-size="12" font-weight="600" font-family="Segoe UI,Arial,sans-serif">Testing</text>
  <text x="705" y="440" text-anchor="middle" fill="#94a3b8" font-size="9" font-family="Segoe UI,Arial,sans-serif">Jasmine · Karma · TestBed</text>

  <!-- Connecting lines bottom row -->
  <line x1="135" y1="400" x2="150" y2="380" stroke="#475569" stroke-width="1"/>
  <line x1="325" y1="400" x2="350" y2="365" stroke="#475569" stroke-width="1"/>
  <line x1="515" y1="400" x2="500" y2="365" stroke="#475569" stroke-width="1"/>
  <line x1="705" y1="400" x2="745" y2="320" stroke="#475569" stroke-width="1"/>

  <!-- Legend -->
  <rect x="50" y="470" width="800" height="22" rx="4" fill="#111827"/>
  <rect x="62" y="475" width="10" height="10" rx="2" fill="#dd0031"/>
  <text x="78" y="484" fill="#94a3b8" font-size="9" font-family="Segoe UI,Arial,sans-serif">Components</text>
  <rect x="162" y="475" width="10" height="10" rx="2" fill="#4ade80"/>
  <text x="178" y="484" fill="#94a3b8" font-size="9" font-family="Segoe UI,Arial,sans-serif">Services/DI</text>
  <rect x="262" y="475" width="10" height="10" rx="2" fill="#22d3ee"/>
  <text x="278" y="484" fill="#94a3b8" font-size="9" font-family="Segoe UI,Arial,sans-serif">Router</text>
  <rect x="342" y="475" width="10" height="10" rx="2" fill="#e879f9"/>
  <text x="358" y="484" fill="#94a3b8" font-size="9" font-family="Segoe UI,Arial,sans-serif">RxJS/Signals</text>
  <rect x="452" y="475" width="10" height="10" rx="2" fill="#fbbf24"/>
  <text x="468" y="484" fill="#94a3b8" font-size="9" font-family="Segoe UI,Arial,sans-serif">Forms</text>
  <rect x="522" y="475" width="10" height="10" rx="2" fill="#fb923c"/>
  <text x="538" y="484" fill="#94a3b8" font-size="9" font-family="Segoe UI,Arial,sans-serif">Directives</text>
  <rect x="612" y="475" width="10" height="10" rx="2" fill="#38bdf8"/>
  <text x="628" y="484" fill="#94a3b8" font-size="9" font-family="Segoe UI,Arial,sans-serif">Pipes</text>
  <rect x="682" y="475" width="10" height="10" rx="2" fill="#a78bfa"/>
  <text x="698" y="484" fill="#94a3b8" font-size="9" font-family="Segoe UI,Arial,sans-serif">Testing</text>
</svg>
