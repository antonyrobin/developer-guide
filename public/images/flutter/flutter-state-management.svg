<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 460">
  <rect width="900" height="460" rx="16" fill="#0a0f1a"/>
  <text x="450" y="44" text-anchor="middle" fill="#fff" font-size="24" font-weight="700" font-family="Segoe UI,Arial,sans-serif">State Management with Riverpod</text>
  <text x="450" y="68" text-anchor="middle" fill="#94a3b8" font-size="13" font-family="Segoe UI,Arial,sans-serif">Compile-safe, testable state management with built-in async support</text>

  <!-- ProviderScope -->
  <rect x="60" y="90" width="780" height="340" rx="14" fill="#111827" stroke="#475569" stroke-width="1" stroke-dasharray="6"/>
  <text x="450" y="116" text-anchor="middle" fill="#475569" font-size="13" font-family="Segoe UI,Arial,sans-serif">ProviderScope (wraps entire app)</text>

  <!-- Provider Types Row -->
  <rect x="90" y="130" width="185" height="70" rx="10" fill="#1e293b" stroke="#4ade80" stroke-width="2"/>
  <text x="182" y="158" text-anchor="middle" fill="#4ade80" font-size="14" font-weight="700" font-family="Segoe UI,Arial,sans-serif">FutureProvider</text>
  <text x="182" y="178" text-anchor="middle" fill="#94a3b8" font-size="10" font-family="Segoe UI,Arial,sans-serif">Async API data fetching</text>

  <rect x="295" y="130" width="185" height="70" rx="10" fill="#1e293b" stroke="#60a5fa" stroke-width="2"/>
  <text x="387" y="158" text-anchor="middle" fill="#60a5fa" font-size="14" font-weight="700" font-family="Segoe UI,Arial,sans-serif">NotifierProvider</text>
  <text x="387" y="178" text-anchor="middle" fill="#94a3b8" font-size="10" font-family="Segoe UI,Arial,sans-serif">Complex mutable state</text>

  <rect x="500" y="130" width="165" height="70" rx="10" fill="#1e293b" stroke="#fbbf24" stroke-width="2"/>
  <text x="582" y="158" text-anchor="middle" fill="#fbbf24" font-size="14" font-weight="700" font-family="Segoe UI,Arial,sans-serif">StateProvider</text>
  <text x="582" y="178" text-anchor="middle" fill="#94a3b8" font-size="10" font-family="Segoe UI,Arial,sans-serif">Simple local state</text>

  <rect x="685" y="130" width="140" height="70" rx="10" fill="#1e293b" stroke="#f472b6" stroke-width="2"/>
  <text x="755" y="158" text-anchor="middle" fill="#f472b6" font-size="14" font-weight="700" font-family="Segoe UI,Arial,sans-serif">Provider</text>
  <text x="755" y="178" text-anchor="middle" fill="#94a3b8" font-size="10" font-family="Segoe UI,Arial,sans-serif">Dependencies / DI</text>

  <!-- Arrow down -->
  <line x1="182" y1="200" x2="182" y2="240" stroke="#4ade80" stroke-width="1.5"/>
  <line x1="387" y1="200" x2="387" y2="240" stroke="#60a5fa" stroke-width="1.5"/>
  <line x1="582" y1="200" x2="582" y2="240" stroke="#fbbf24" stroke-width="1.5"/>
  <line x1="755" y1="200" x2="755" y2="240" stroke="#f472b6" stroke-width="1.5"/>

  <!-- ref.watch / .when() -->
  <rect x="90" y="240" width="730" height="55" rx="10" fill="#1e293b" stroke="#a78bfa" stroke-width="2"/>
  <text x="450" y="264" text-anchor="middle" fill="#a78bfa" font-size="15" font-weight="700" font-family="Segoe UI,Arial,sans-serif">ConsumerWidget — ref.watch(provider)</text>
  <text x="450" y="284" text-anchor="middle" fill="#94a3b8" font-size="11" font-family="Segoe UI,Arial,sans-serif">asyncValue.when(data: ..., loading: ..., error: ...)  ·  ref.read()  ·  ref.invalidate()</text>

  <!-- Arrows to UI -->
  <line x1="250" y1="295" x2="170" y2="335" stroke="#475569" stroke-width="1.5"/>
  <line x1="450" y1="295" x2="450" y2="335" stroke="#475569" stroke-width="1.5"/>
  <line x1="650" y1="295" x2="720" y2="335" stroke="#475569" stroke-width="1.5"/>

  <!-- UI States -->
  <rect x="100" y="335" width="150" height="50" rx="8" fill="#16a34a"/>
  <text x="175" y="357" text-anchor="middle" fill="#fff" font-size="13" font-weight="700" font-family="Segoe UI,Arial,sans-serif">data:</text>
  <text x="175" y="375" text-anchor="middle" fill="#bbf7d0" font-size="10" font-family="Segoe UI,Arial,sans-serif">ProductListView</text>

  <rect x="375" y="335" width="150" height="50" rx="8" fill="#b45309"/>
  <text x="450" y="357" text-anchor="middle" fill="#fff" font-size="13" font-weight="700" font-family="Segoe UI,Arial,sans-serif">loading:</text>
  <text x="450" y="375" text-anchor="middle" fill="#fef3c7" font-size="10" font-family="Segoe UI,Arial,sans-serif">CircularProgress</text>

  <rect x="650" y="335" width="150" height="50" rx="8" fill="#be123c"/>
  <text x="725" y="357" text-anchor="middle" fill="#fff" font-size="13" font-weight="700" font-family="Segoe UI,Arial,sans-serif">error:</text>
  <text x="725" y="375" text-anchor="middle" fill="#fecdd3" font-size="10" font-family="Segoe UI,Arial,sans-serif">ErrorWidget + Retry</text>

  <!-- Legend -->
  <rect x="100" y="405" width="12" height="12" rx="3" fill="#4ade80"/>
  <text x="118" y="416" fill="#94a3b8" font-size="11" font-family="Segoe UI,Arial,sans-serif">Async Data</text>
  <rect x="210" y="405" width="12" height="12" rx="3" fill="#60a5fa"/>
  <text x="228" y="416" fill="#94a3b8" font-size="11" font-family="Segoe UI,Arial,sans-serif">Mutable State</text>
  <rect x="330" y="405" width="12" height="12" rx="3" fill="#fbbf24"/>
  <text x="348" y="416" fill="#94a3b8" font-size="11" font-family="Segoe UI,Arial,sans-serif">Simple State</text>
  <rect x="440" y="405" width="12" height="12" rx="3" fill="#f472b6"/>
  <text x="458" y="416" fill="#94a3b8" font-size="11" font-family="Segoe UI,Arial,sans-serif">Dependencies</text>
  <rect x="560" y="405" width="12" height="12" rx="3" fill="#a78bfa"/>
  <text x="578" y="416" fill="#94a3b8" font-size="11" font-family="Segoe UI,Arial,sans-serif">Widget Consumption</text>
</svg>
