<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 420">
  <rect width="900" height="420" rx="16" fill="#0a0f1a"/>
  <text x="450" y="44" text-anchor="middle" fill="#fff" font-size="24" font-weight="700" font-family="Segoe UI,Arial,sans-serif">Barcode &amp; QR Code Scanning</text>
  <text x="450" y="68" text-anchor="middle" fill="#94a3b8" font-size="13" font-family="Segoe UI,Arial,sans-serif">Camera scanning on mobile · USB scanner on desktop POS</text>

  <defs>
    <marker id="aB2" markerWidth="8" markerHeight="8" refX="8" refY="4" orient="auto"><path d="M0,0 L8,4 L0,8" fill="#60a5fa"/></marker>
    <marker id="aG2" markerWidth="8" markerHeight="8" refX="8" refY="4" orient="auto"><path d="M0,0 L8,4 L0,8" fill="#4ade80"/></marker>
  </defs>

  <!-- MOBILE FLOW -->
  <text x="230" y="105" text-anchor="middle" fill="#60a5fa" font-size="16" font-weight="700" font-family="Segoe UI,Arial,sans-serif">Mobile (Android / iOS)</text>

  <!-- Camera -->
  <rect x="30" y="125" width="140" height="65" rx="10" fill="#1e293b" stroke="#60a5fa" stroke-width="2"/>
  <text x="100" y="152" text-anchor="middle" fill="#60a5fa" font-size="13" font-weight="700" font-family="Segoe UI,Arial,sans-serif">Camera</text>
  <text x="100" y="172" text-anchor="middle" fill="#94a3b8" font-size="10" font-family="Segoe UI,Arial,sans-serif">Back-facing lens</text>

  <line x1="170" y1="157" x2="210" y2="157" stroke="#60a5fa" stroke-width="1.5" marker-end="url(#aB2)"/>

  <!-- MobileScanner -->
  <rect x="215" y="125" width="200" height="65" rx="10" fill="#1e293b" stroke="#a78bfa" stroke-width="2"/>
  <text x="315" y="150" text-anchor="middle" fill="#a78bfa" font-size="13" font-weight="700" font-family="Segoe UI,Arial,sans-serif">MobileScanner</text>
  <text x="315" y="168" text-anchor="middle" fill="#94a3b8" font-size="10" font-family="Segoe UI,Arial,sans-serif">onDetect → BarcodeCapture</text>
  <text x="315" y="182" text-anchor="middle" fill="#94a3b8" font-size="10" font-family="Segoe UI,Arial,sans-serif">Torch · Camera switch</text>

  <!-- Barcode overlay icon -->
  <rect x="70" y="210" width="60" height="60" rx="8" fill="none" stroke="#4ade80" stroke-width="2" stroke-dasharray="8"/>
  <rect x="82" y="222" width="36" height="4" rx="1" fill="#4ade80"/>
  <rect x="82" y="230" width="24" height="4" rx="1" fill="#4ade80"/>
  <rect x="82" y="238" width="30" height="4" rx="1" fill="#4ade80"/>
  <rect x="82" y="246" width="36" height="4" rx="1" fill="#4ade80"/>
  <rect x="82" y="254" width="18" height="4" rx="1" fill="#4ade80"/>

  <!-- DESKTOP FLOW -->
  <text x="670" y="105" text-anchor="middle" fill="#fbbf24" font-size="16" font-weight="700" font-family="Segoe UI,Arial,sans-serif">Desktop POS (Windows)</text>

  <!-- USB Scanner -->
  <rect x="530" y="125" width="140" height="65" rx="10" fill="#1e293b" stroke="#fbbf24" stroke-width="2"/>
  <text x="600" y="152" text-anchor="middle" fill="#fbbf24" font-size="13" font-weight="700" font-family="Segoe UI,Arial,sans-serif">USB Scanner</text>
  <text x="600" y="172" text-anchor="middle" fill="#94a3b8" font-size="10" font-family="Segoe UI,Arial,sans-serif">Keyboard input</text>

  <line x1="670" y1="157" x2="710" y2="157" stroke="#fbbf24" stroke-width="1.5" marker-end="url(#aG2)"/>

  <!-- Keyboard Listener -->
  <rect x="715" y="125" width="160" height="65" rx="10" fill="#1e293b" stroke="#22d3ee" stroke-width="2"/>
  <text x="795" y="150" text-anchor="middle" fill="#22d3ee" font-size="12" font-weight="700" font-family="Segoe UI,Arial,sans-serif">RawKeyboard</text>
  <text x="795" y="166" text-anchor="middle" fill="#22d3ee" font-size="12" font-weight="700" font-family="Segoe UI,Arial,sans-serif">Listener</text>
  <text x="795" y="182" text-anchor="middle" fill="#94a3b8" font-size="10" font-family="Segoe UI,Arial,sans-serif">Enter → process</text>

  <!-- Common flow -->
  <line x1="315" y1="190" x2="315" y2="310" stroke="#475569" stroke-width="1.5"/>
  <line x1="795" y1="190" x2="795" y2="310" stroke="#475569" stroke-width="1.5"/>
  <line x1="315" y1="310" x2="450" y2="310" stroke="#475569" stroke-width="1.5"/>
  <line x1="795" y1="310" x2="450" y2="310" stroke="#475569" stroke-width="1.5"/>

  <!-- Merge point -->
  <circle cx="450" cy="310" r="6" fill="#4ade80"/>

  <line x1="450" y1="316" x2="450" y2="340" stroke="#4ade80" stroke-width="2" marker-end="url(#aG2)"/>

  <!-- Product Lookup -->
  <rect x="280" y="340" width="340" height="55" rx="10" fill="#1e293b" stroke="#4ade80" stroke-width="2"/>
  <text x="450" y="364" text-anchor="middle" fill="#4ade80" font-size="15" font-weight="700" font-family="Segoe UI,Arial,sans-serif">Product Lookup by Barcode</text>
  <text x="450" y="384" text-anchor="middle" fill="#94a3b8" font-size="11" font-family="Segoe UI,Arial,sans-serif">Search API → Add to Cart / Show Details</text>

  <!-- Platform check note -->
  <rect x="160" y="230" width="260" height="30" rx="6" fill="#374151"/>
  <text x="290" y="250" text-anchor="middle" fill="#94a3b8" font-size="11" font-family="Segoe UI,Arial,sans-serif">context.pop(barcodeValue) → returns to caller</text>

  <rect x="570" y="230" width="290" height="30" rx="6" fill="#374151"/>
  <text x="715" y="250" text-anchor="middle" fill="#94a3b8" font-size="11" font-family="Segoe UI,Arial,sans-serif">Buffer chars → Enter key = scan complete</text>

  <!-- Debounce note -->
  <rect x="160" y="270" width="260" height="25" rx="6" fill="#252b3b"/>
  <text x="290" y="288" text-anchor="middle" fill="#f87171" font-size="10" font-family="Segoe UI,Arial,sans-serif">Debounce: 2s delay prevents rapid-fire scans</text>
</svg>
