<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 440">
  <rect width="800" height="440" rx="12" fill="#0f172a"/>
  <text x="400" y="36" text-anchor="middle" fill="#f1f5f9" font-family="Arial, sans-serif" font-size="20" font-weight="bold">Semantic HTML5 Layout</text>
  <!-- Page container -->
  <rect x="40" y="55" width="720" height="370" rx="10" fill="#1e293b" stroke="#334155" stroke-width="1"/>
  <!-- Header -->
  <rect x="55" y="65" width="690" height="55" rx="8" fill="#1a2744" stroke="#3b82f6" stroke-width="2"/>
  <text x="400" y="88" text-anchor="middle" fill="#93c5fd" font-family="Arial, sans-serif" font-size="15" font-weight="bold">&lt;header&gt;</text>
  <text x="400" y="108" text-anchor="middle" fill="#94a3b8" font-family="Arial, sans-serif" font-size="11">Logo + &lt;nav&gt; navigation links</text>
  <!-- Main + Aside row -->
  <!-- Main -->
  <rect x="55" y="130" width="490" height="230" rx="8" fill="#1a2744" stroke="#10b981" stroke-width="2"/>
  <text x="300" y="155" text-anchor="middle" fill="#6ee7b7" font-family="Arial, sans-serif" font-size="15" font-weight="bold">&lt;main&gt;</text>
  <!-- Article inside main -->
  <rect x="70" y="168" width="460" height="80" rx="6" fill="#0f172a" stroke="#8b5cf6" stroke-width="1.5"/>
  <text x="300" y="193" text-anchor="middle" fill="#c4b5fd" font-family="Arial, sans-serif" font-size="13" font-weight="bold">&lt;article&gt;</text>
  <text x="300" y="212" text-anchor="middle" fill="#94a3b8" font-family="Arial, sans-serif" font-size="10">Self-contained content (blog post, news story)</text>
  <text x="300" y="236" text-anchor="middle" fill="#64748b" font-family="Arial, sans-serif" font-size="10">Contains &lt;section&gt; elements for subsections</text>
  <!-- Section inside main -->
  <rect x="70" y="258" width="460" height="50" rx="6" fill="#0f172a" stroke="#f59e0b" stroke-width="1.5"/>
  <text x="300" y="283" text-anchor="middle" fill="#fcd34d" font-family="Arial, sans-serif" font-size="13" font-weight="bold">&lt;section&gt;</text>
  <text x="300" y="300" text-anchor="middle" fill="#94a3b8" font-family="Arial, sans-serif" font-size="10">Groups related content (Features, About Us)</text>
  <text x="300" y="345" text-anchor="middle" fill="#64748b" font-family="Arial, sans-serif" font-size="10" font-style="italic">Only one &lt;main&gt; per page</text>
  <!-- Aside -->
  <rect x="555" y="130" width="190" height="230" rx="8" fill="#1a2744" stroke="#ef4444" stroke-width="2"/>
  <text x="650" y="155" text-anchor="middle" fill="#fca5a5" font-family="Arial, sans-serif" font-size="15" font-weight="bold">&lt;aside&gt;</text>
  <text x="650" y="178" text-anchor="middle" fill="#94a3b8" font-family="Arial, sans-serif" font-size="10">Sidebar content</text>
  <rect x="570" y="192" width="160" height="28" rx="4" fill="#0f172a"/>
  <text x="650" y="211" text-anchor="middle" fill="#94a3b8" font-family="Arial, sans-serif" font-size="10">Related links</text>
  <rect x="570" y="228" width="160" height="28" rx="4" fill="#0f172a"/>
  <text x="650" y="247" text-anchor="middle" fill="#94a3b8" font-family="Arial, sans-serif" font-size="10">Advertisements</text>
  <rect x="570" y="264" width="160" height="28" rx="4" fill="#0f172a"/>
  <text x="650" y="283" text-anchor="middle" fill="#94a3b8" font-family="Arial, sans-serif" font-size="10">Social widgets</text>
  <!-- Footer -->
  <rect x="55" y="370" width="690" height="45" rx="8" fill="#1a2744" stroke="#06b6d4" stroke-width="2"/>
  <text x="400" y="398" text-anchor="middle" fill="#67e8f9" font-family="Arial, sans-serif" font-size="15" font-weight="bold">&lt;footer&gt;</text>
  <text x="590" y="398" fill="#94a3b8" font-family="Arial, sans-serif" font-size="10">Copyright, links, contact</text>
</svg>