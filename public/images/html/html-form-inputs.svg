  <line x1="610" y1="196" x2="740" y2="196" stroke="#334155" stroke-width="3" stroke-linecap="round"/>
  <circle cx="680" cy="196" r="8" fill="#14b8a6"/>
  <!-- Row 3 -->
  <rect x="30" y="240" width="170" height="72" rx="8" fill="#1e293b" stroke="#a855f7" stroke-width="1.5"/>
  <text x="115" y="264" text-anchor="middle" fill="#d8b4fe" font-family="Arial, sans-serif" font-size="12" font-weight="bold">select</text>
