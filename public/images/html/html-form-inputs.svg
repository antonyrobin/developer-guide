  <rect x="215" y="240" width="170" height="72" rx="8" fill="#1e293b" stroke="#f97316" stroke-width="1.5"/>
  <text x="300" y="264" text-anchor="middle" fill="#fdba74" font-family="Arial, sans-serif" font-size="12" font-weight="bold">textarea</text>
  <rect x="230" y="274" width="140" height="30" rx="4" fill="#0f172a" stroke="#334155" stroke-width="1"/>
  <text x="238" y="290" fill="#94a3b8" font-family="Arial, sans-serif" font-size="9">Multi-line text...</text>
  <rect x="400" y="240" width="170" height="72" rx="8" fill="#1e293b" stroke="#22c55e" stroke-width="1.5"/>
  <text x="485" y="264" text-anchor="middle" fill="#86efac" font-family="Arial, sans-serif" font-size="12" font-weight="bold">file</text>
  <rect x="415" y="276" width="140" height="24" rx="4" fill="#0f172a" stroke="#334155" stroke-width="1"/>
  <text x="425" y="292" fill="#94a3b8" font-family="Arial, sans-serif" font-size="10">📎 Choose file...</text>
  <rect x="585" y="240" width="185" height="72" rx="8" fill="#1e293b" stroke="#eab308" stroke-width="1.5"/>
  <text x="678" y="264" text-anchor="middle" fill="#fde047" font-family="Arial, sans-serif" font-size="12" font-weight="bold">color</text>
  <rect x="635" y="276" width="30" height="24" rx="4" fill="#3b82f6" stroke="#334155" stroke-width="1"/>
  <rect x="672" y="276" width="30" height="24" rx="4" fill="#ef4444" stroke="#334155" stroke-width="1"/>
  <rect x="709" y="276" width="30" height="24" rx="4" fill="#10b981" stroke="#334155" stroke-width="1"/>
  <!-- Validation -->
  <rect x="30" y="332" width="740" height="72" rx="8" fill="#1e293b" stroke="#3b82f6" stroke-width="1.5"/>
  <text x="400" y="356" text-anchor="middle" fill="#93c5fd" font-family="Arial, sans-serif" font-size="14" font-weight="bold">HTML5 Built-in Validation Attributes</text>
  <text x="120" y="385" text-anchor="middle" fill="#6ee7b7" font-family="monospace" font-size="11">required</text>
  <text x="260" y="385" text-anchor="middle" fill="#fcd34d" font-family="monospace" font-size="11">minlength</text>
  <text x="400" y="385" text-anchor="middle" fill="#c4b5fd" font-family="monospace" font-size="11">pattern</text>
  <text x="530" y="385" text-anchor="middle" fill="#fca5a5" font-family="monospace" font-size="11">min / max</text>
  <text x="670" y="385" text-anchor="middle" fill="#67e8f9" font-family="monospace" font-size="11">placeholder</text>
