  <text x="55" y="110" fill="#94a3b8" font-family="Arial, sans-serif" font-size="10">John Doe</text>
  <rect x="215" y="60" width="170" height="72" rx="8" fill="#1e293b" stroke="#8b5cf6" stroke-width="1.5"/>
