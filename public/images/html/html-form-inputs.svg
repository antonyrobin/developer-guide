  <text x="300" y="174" text-anchor="middle" fill="#67e8f9" font-family="Arial, sans-serif" font-size="12" font-weight="bold">radio</text>
  <circle cx="240" cy="194" r="8" fill="none" stroke="#06b6d4" stroke-width="1.5"/>
  <circle cx="240" cy="194" r="4" fill="#06b6d4"/>
  <text x="255" y="198" fill="#94a3b8" font-family="Arial, sans-serif" font-size="11">Yes</text>
