<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 380">
  <rect width="800" height="380" rx="12" fill="#0f172a"/>
  <text x="400" y="36" text-anchor="middle" fill="#f1f5f9" font-family="Arial, sans-serif" font-size="20" font-weight="bold">Block vs Inline Elements</text>
  <!-- Block section -->
  <text x="200" y="66" text-anchor="middle" fill="#3b82f6" font-family="Arial, sans-serif" font-size="16" font-weight="bold">Block Elements</text>
  <text x="200" y="84" text-anchor="middle" fill="#94a3b8" font-family="Arial, sans-serif" font-size="11">Full width · New line · Can contain anything</text>
  <rect x="30" y="96" width="340" height="40" rx="6" fill="#1e293b" stroke="#3b82f6" stroke-width="2"/>
  <text x="200" y="121" text-anchor="middle" fill="#93c5fd" font-family="monospace" font-size="12">&lt;div&gt; — generic container</text>
  <rect x="30" y="144" width="340" height="40" rx="6" fill="#1e293b" stroke="#3b82f6" stroke-width="1.5"/>
  <text x="200" y="169" text-anchor="middle" fill="#93c5fd" font-family="monospace" font-size="12">&lt;p&gt; — paragraph</text>
  <rect x="30" y="192" width="340" height="40" rx="6" fill="#1e293b" stroke="#3b82f6" stroke-width="1.5"/>
  <text x="200" y="217" text-anchor="middle" fill="#93c5fd" font-family="monospace" font-size="12">&lt;h1&gt; to &lt;h6&gt; — headings</text>
  <rect x="30" y="240" width="340" height="40" rx="6" fill="#1e293b" stroke="#3b82f6" stroke-width="1.5"/>
  <text x="200" y="265" text-anchor="middle" fill="#93c5fd" font-family="monospace" font-size="12">&lt;section&gt;, &lt;article&gt;, &lt;main&gt;</text>
  <rect x="30" y="288" width="340" height="40" rx="6" fill="#1e293b" stroke="#3b82f6" stroke-width="1.5"/>
  <text x="200" y="313" text-anchor="middle" fill="#93c5fd" font-family="monospace" font-size="12">&lt;ul&gt;, &lt;ol&gt;, &lt;form&gt;, &lt;table&gt;</text>
  <!-- Inline section -->
  <text x="600" y="66" text-anchor="middle" fill="#10b981" font-family="Arial, sans-serif" font-size="16" font-weight="bold">Inline Elements</text>
  <text x="600" y="84" text-anchor="middle" fill="#94a3b8" font-family="Arial, sans-serif" font-size="11">Content width · Same line · Inline children only</text>
  <rect x="445" y="96" width="145" height="40" rx="6" fill="#1e293b" stroke="#10b981" stroke-width="2"/>
  <text x="518" y="121" text-anchor="middle" fill="#6ee7b7" font-family="monospace" font-size="12">&lt;span&gt;</text>
  <rect x="598" y="96" width="170" height="40" rx="6" fill="#1e293b" stroke="#10b981" stroke-width="2"/>
  <text x="683" y="121" text-anchor="middle" fill="#6ee7b7" font-family="monospace" font-size="12">&lt;a&gt; link</text>
  <rect x="445" y="144" width="155" height="40" rx="6" fill="#1e293b" stroke="#10b981" stroke-width="1.5"/>
  <text x="523" y="169" text-anchor="middle" fill="#6ee7b7" font-family="monospace" font-size="12">&lt;strong&gt;</text>
  <rect x="608" y="144" width="160" height="40" rx="6" fill="#1e293b" stroke="#10b981" stroke-width="1.5"/>
  <text x="688" y="169" text-anchor="middle" fill="#6ee7b7" font-family="monospace" font-size="12">&lt;em&gt;</text>
  <rect x="445" y="192" width="130" height="40" rx="6" fill="#1e293b" stroke="#10b981" stroke-width="1.5"/>
  <text x="510" y="217" text-anchor="middle" fill="#6ee7b7" font-family="monospace" font-size="12">&lt;img&gt;</text>
  <rect x="583" y="192" width="185" height="40" rx="6" fill="#1e293b" stroke="#10b981" stroke-width="1.5"/>
  <text x="676" y="217" text-anchor="middle" fill="#6ee7b7" font-family="monospace" font-size="12">&lt;code&gt;</text>
  <rect x="445" y="240" width="323" height="40" rx="6" fill="#1e293b" stroke="#10b981" stroke-width="1.5"/>
  <text x="607" y="265" text-anchor="middle" fill="#6ee7b7" font-family="monospace" font-size="12">&lt;input&gt;, &lt;label&gt;, &lt;button&gt;</text>
  <!-- Key difference -->
  <rect x="100" y="344" width="600" height="28" rx="6" fill="#1e293b" stroke="#f59e0b" stroke-width="1"/>
  <text x="400" y="363" text-anchor="middle" fill="#fcd34d" font-family="Arial, sans-serif" font-size="12" font-weight="bold">Tip: Use display: inline-block to get both inline flow + width/height control</text>
</svg>