<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 400">
  <rect width="800" height="400" rx="12" fill="#0f172a"/>
  <text x="400" y="36" text-anchor="middle" fill="#f1f5f9" font-family="Arial, sans-serif" font-size="20" font-weight="bold">HTML Document Structure</text>
  <!-- DOCTYPE -->
  <rect x="250" y="55" width="300" height="30" rx="6" fill="#1e293b" stroke="#ef4444" stroke-width="1.5"/>
  <text x="400" y="75" text-anchor="middle" fill="#fca5a5" font-family="monospace" font-size="12">&lt;!DOCTYPE html&gt;</text>
  <!-- html -->
  <rect x="80" y="95" width="640" height="290" rx="8" fill="none" stroke="#3b82f6" stroke-width="2"/>
  <text x="100" y="115" fill="#93c5fd" font-family="monospace" font-size="13" font-weight="bold">&lt;html lang="en"&gt;</text>
  <!-- head -->
  <rect x="100" y="125" width="280" height="245" rx="8" fill="#1e293b" stroke="#8b5cf6" stroke-width="1.5"/>
  <text x="120" y="148" fill="#c4b5fd" font-family="monospace" font-size="13" font-weight="bold">&lt;head&gt;</text>
  <text x="120" y="170" fill="#94a3b8" font-family="Arial, sans-serif" font-size="11">Metadata (invisible)</text>
  <rect x="115" y="182" width="250" height="26" rx="4" fill="#1a2744"/>
  <text x="240" y="200" text-anchor="middle" fill="#a5b4fc" font-family="monospace" font-size="10">&lt;meta charset="UTF-8"&gt;</text>
  <rect x="115" y="214" width="250" height="26" rx="4" fill="#1a2744"/>
  <text x="240" y="232" text-anchor="middle" fill="#a5b4fc" font-family="monospace" font-size="10">&lt;meta name="viewport" ...&gt;</text>
  <rect x="115" y="246" width="250" height="26" rx="4" fill="#1a2744"/>
  <text x="240" y="264" text-anchor="middle" fill="#a5b4fc" font-family="monospace" font-size="10">&lt;title&gt;Page Title&lt;/title&gt;</text>
  <rect x="115" y="278" width="250" height="26" rx="4" fill="#1a2744"/>
  <text x="240" y="296" text-anchor="middle" fill="#a5b4fc" font-family="monospace" font-size="10">&lt;link rel="stylesheet" ...&gt;</text>
  <rect x="115" y="310" width="250" height="26" rx="4" fill="#1a2744"/>
  <text x="240" y="328" text-anchor="middle" fill="#a5b4fc" font-family="monospace" font-size="10">&lt;script src="app.js"&gt;</text>
  <!-- body -->
  <rect x="410" y="125" width="290" height="245" rx="8" fill="#1e293b" stroke="#10b981" stroke-width="1.5"/>
  <text x="430" y="148" fill="#6ee7b7" font-family="monospace" font-size="13" font-weight="bold">&lt;body&gt;</text>
  <text x="430" y="170" fill="#94a3b8" font-family="Arial, sans-serif" font-size="11">Visible content</text>
  <rect x="425" y="182" width="260" height="36" rx="4" fill="#1a2744" stroke="#3b82f6" stroke-width="1"/>
  <text x="555" y="204" text-anchor="middle" fill="#93c5fd" font-family="monospace" font-size="10">&lt;header&gt; Logo + Nav &lt;/header&gt;</text>
  <rect x="425" y="226" width="260" height="56" rx="4" fill="#1a2744" stroke="#10b981" stroke-width="1"/>
  <text x="555" y="250" text-anchor="middle" fill="#6ee7b7" font-family="monospace" font-size="10">&lt;main&gt;</text>
  <text x="555" y="270" text-anchor="middle" fill="#94a3b8" font-family="Arial, sans-serif" font-size="10">Primary content area</text>
  <rect x="425" y="290" width="260" height="36" rx="4" fill="#1a2744" stroke="#f59e0b" stroke-width="1"/>
  <text x="555" y="312" text-anchor="middle" fill="#fcd34d" font-family="monospace" font-size="10">&lt;footer&gt; &amp;copy; Info &lt;/footer&gt;</text>
  <text x="555" y="354" text-anchor="middle" fill="#64748b" font-family="Arial, sans-serif" font-size="10" font-style="italic">Everything users see goes here</text>
  <text x="400" y="394" text-anchor="middle" fill="#64748b" font-family="Arial, sans-serif" font-size="11" font-style="italic">&lt;head&gt; = metadata &amp; config | &lt;body&gt; = everything visible on screen</text>
</svg>