<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 380">
  <rect width="900" height="380" rx="16" fill="#0a0f1a"/>
  <text x="450" y="40" text-anchor="middle" fill="#fff" font-size="24" font-weight="700" font-family="Segoe UI,Arial,sans-serif">Next.js Middleware &amp; Authentication Flow</text>

  <!-- Request -->
  <rect x="30" y="100" width="120" height="60" rx="10" fill="#374151" stroke="#60a5fa" stroke-width="2"/>
  <text x="90" y="135" text-anchor="middle" fill="#60a5fa" font-size="14" font-weight="700" font-family="Segoe UI,Arial,sans-serif">Request</text>

  <line x1="150" y1="130" x2="200" y2="130" stroke="#60a5fa" stroke-width="2" marker-end="url(#arrB)"/>

  <!-- Middleware -->
  <rect x="200" y="75" width="180" height="110" rx="12" fill="#1e293b" stroke="#f472b6" stroke-width="2"/>
  <text x="290" y="105" text-anchor="middle" fill="#f472b6" font-size="15" font-weight="700" font-family="Segoe UI,Arial,sans-serif">Middleware</text>
  <text x="290" y="125" text-anchor="middle" fill="#94a3b8" font-size="11" font-family="Segoe UI,Arial,sans-serif">middleware.ts</text>
  <text x="290" y="145" text-anchor="middle" fill="#94a3b8" font-size="11" font-family="Segoe UI,Arial,sans-serif">Check cookies / JWT</text>
  <text x="290" y="163" text-anchor="middle" fill="#94a3b8" font-size="11" font-family="Segoe UI,Arial,sans-serif">Redirect / Rewrite</text>

  <!-- Branch: Authenticated -->
  <line x1="380" y1="110" x2="450" y2="110" stroke="#4ade80" stroke-width="2" marker-end="url(#arrG)"/>
  <text x="415" y="100" text-anchor="middle" fill="#4ade80" font-size="11" font-weight="600" font-family="Segoe UI,Arial,sans-serif">✓ Auth</text>

  <!-- Branch: Unauthenticated -->
  <line x1="290" y1="185" x2="290" y2="250" stroke="#ef4444" stroke-width="2" marker-end="url(#arrR)"/>
  <text x="330" y="220" fill="#ef4444" font-size="11" font-weight="600" font-family="Segoe UI,Arial,sans-serif">✗ No Auth</text>

  <!-- Login Redirect -->
  <rect x="220" y="255" width="140" height="50" rx="10" fill="#374151" stroke="#ef4444" stroke-width="2"/>
  <text x="290" y="286" text-anchor="middle" fill="#ef4444" font-size="13" font-weight="600" font-family="Segoe UI,Arial,sans-serif">→ /login</text>

  <!-- App Router -->
  <rect x="450" y="70" width="170" height="80" rx="12" fill="#1e293b" stroke="#4ade80" stroke-width="2"/>
  <text x="535" y="100" text-anchor="middle" fill="#4ade80" font-size="15" font-weight="700" font-family="Segoe UI,Arial,sans-serif">App Router</text>
  <text x="535" y="120" text-anchor="middle" fill="#94a3b8" font-size="11" font-family="Segoe UI,Arial,sans-serif">layout.tsx → page.tsx</text>
  <text x="535" y="138" text-anchor="middle" fill="#94a3b8" font-size="11" font-family="Segoe UI,Arial,sans-serif">Server Components</text>

  <line x1="620" y1="110" x2="680" y2="110" stroke="#fbbf24" stroke-width="2" marker-end="url(#arrY)"/>

  <!-- API Route / Backend -->
  <rect x="680" y="70" width="190" height="80" rx="12" fill="#1e293b" stroke="#fbbf24" stroke-width="2"/>
  <text x="775" y="100" text-anchor="middle" fill="#fbbf24" font-size="15" font-weight="700" font-family="Segoe UI,Arial,sans-serif">Backend API</text>
  <text x="775" y="120" text-anchor="middle" fill="#94a3b8" font-size="11" font-family="Segoe UI,Arial,sans-serif">fetch() with Bearer token</text>
  <text x="775" y="138" text-anchor="middle" fill="#94a3b8" font-size="11" font-family="Segoe UI,Arial,sans-serif">from httpOnly cookie</text>

  <!-- Cookie Flow -->
  <rect x="450" y="210" width="420" height="50" rx="10" fill="#1e293b" stroke="#a78bfa" stroke-width="1"/>
  <text x="660" y="232" text-anchor="middle" fill="#a78bfa" font-size="12" font-weight="600" font-family="Segoe UI,Arial,sans-serif">🍪 httpOnly Cookie — access_token + refresh_token</text>
  <text x="660" y="250" text-anchor="middle" fill="#94a3b8" font-size="11" font-family="Segoe UI,Arial,sans-serif">Secure, SameSite=Lax, never accessible by JavaScript (XSS-proof)</text>

  <!-- Response -->
  <rect x="450" y="290" width="420" height="50" rx="10" fill="#1e293b"/>
  <text x="660" y="312" text-anchor="middle" fill="#22d3ee" font-size="12" font-weight="600" font-family="Segoe UI,Arial,sans-serif">Response → HTML (SSR) or JSON (API) → Browser</text>
  <text x="660" y="330" text-anchor="middle" fill="#94a3b8" font-size="11" font-family="Segoe UI,Arial,sans-serif">Set-Cookie header attaches tokens automatically</text>

  <defs>
    <marker id="arrB" markerWidth="8" markerHeight="8" refX="7" refY="3" orient="auto"><path d="M0,0 L0,6 L7,3z" fill="#60a5fa"/></marker>
    <marker id="arrG" markerWidth="8" markerHeight="8" refX="7" refY="3" orient="auto"><path d="M0,0 L0,6 L7,3z" fill="#4ade80"/></marker>
    <marker id="arrR" markerWidth="8" markerHeight="8" refX="3" refY="7" orient="auto"><path d="M0,0 L6,0 L3,7z" fill="#ef4444"/></marker>
    <marker id="arrY" markerWidth="8" markerHeight="8" refX="7" refY="3" orient="auto"><path d="M0,0 L0,6 L7,3z" fill="#fbbf24"/></marker>
  </defs>
</svg>