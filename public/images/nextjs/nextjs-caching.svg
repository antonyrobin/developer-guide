<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 380">
  <rect width="900" height="380" rx="16" fill="#0a0f1a"/>
  <text x="450" y="40" text-anchor="middle" fill="#fff" font-size="24" font-weight="700" font-family="Segoe UI,Arial,sans-serif">Next.js Caching Layers</text>

  <!-- Request -->
  <rect x="30" y="80" width="100" height="50" rx="8" fill="#374151" stroke="#60a5fa" stroke-width="2"/>
  <text x="80" y="110" text-anchor="middle" fill="#60a5fa" font-size="13" font-weight="600" font-family="Segoe UI,Arial,sans-serif">Client</text>

  <line x1="130" y1="105" x2="175" y2="105" stroke="#60a5fa" stroke-width="2" marker-end="url(#aB)"/>

  <!-- Layer 1: Router Cache -->
  <rect x="175" y="60" width="155" height="90" rx="12" fill="#1e293b" stroke="#4ade80" stroke-width="2"/>
  <text x="252" y="88" text-anchor="middle" fill="#4ade80" font-size="13" font-weight="700" font-family="Segoe UI,Arial,sans-serif">Router Cache</text>
  <text x="252" y="108" text-anchor="middle" fill="#94a3b8" font-size="10" font-family="Segoe UI,Arial,sans-serif">In-memory (browser)</text>
  <text x="252" y="125" text-anchor="middle" fill="#94a3b8" font-size="10" font-family="Segoe UI,Arial,sans-serif">Prefetched routes</text>
  <text x="252" y="142" text-anchor="middle" fill="#fbbf24" font-size="10" font-family="Segoe UI,Arial,sans-serif">Duration: session</text>

  <line x1="330" y1="105" x2="375" y2="105" stroke="#4ade80" stroke-width="2" marker-end="url(#aG)"/>
  <text x="352" y="97" text-anchor="middle" fill="#94a3b8" font-size="9" font-family="Segoe UI,Arial,sans-serif">MISS</text>

  <!-- Layer 2: Full Route Cache -->
  <rect x="375" y="60" width="155" height="90" rx="12" fill="#1e293b" stroke="#a78bfa" stroke-width="2"/>
  <text x="452" y="85" text-anchor="middle" fill="#a78bfa" font-size="12" font-weight="700" font-family="Segoe UI,Arial,sans-serif">Full Route</text>
  <text x="452" y="100" text-anchor="middle" fill="#a78bfa" font-size="12" font-weight="700" font-family="Segoe UI,Arial,sans-serif">Cache</text>
  <text x="452" y="118" text-anchor="middle" fill="#94a3b8" font-size="10" font-family="Segoe UI,Arial,sans-serif">Rendered HTML + RSC</text>
  <text x="452" y="142" text-anchor="middle" fill="#fbbf24" font-size="10" font-family="Segoe UI,Arial,sans-serif">Duration: revalidate</text>

  <line x1="530" y1="105" x2="575" y2="105" stroke="#a78bfa" stroke-width="2" marker-end="url(#aP)"/>
  <text x="552" y="97" text-anchor="middle" fill="#94a3b8" font-size="9" font-family="Segoe UI,Arial,sans-serif">MISS</text>

  <!-- Layer 3: Data Cache -->
  <rect x="575" y="60" width="155" height="90" rx="12" fill="#1e293b" stroke="#fbbf24" stroke-width="2"/>
  <text x="652" y="88" text-anchor="middle" fill="#fbbf24" font-size="13" font-weight="700" font-family="Segoe UI,Arial,sans-serif">Data Cache</text>
  <text x="652" y="108" text-anchor="middle" fill="#94a3b8" font-size="10" font-family="Segoe UI,Arial,sans-serif">fetch() responses</text>
  <text x="652" y="125" text-anchor="middle" fill="#94a3b8" font-size="10" font-family="Segoe UI,Arial,sans-serif">Persistent across deploys</text>
  <text x="652" y="142" text-anchor="middle" fill="#fbbf24" font-size="10" font-family="Segoe UI,Arial,sans-serif">Duration: configurable</text>

  <line x1="730" y1="105" x2="770" y2="105" stroke="#fbbf24" stroke-width="2" marker-end="url(#aY)"/>
  <text x="750" y="97" text-anchor="middle" fill="#94a3b8" font-size="9" font-family="Segoe UI,Arial,sans-serif">MISS</text>

  <!-- Data Source -->
  <rect x="770" y="80" width="100" height="50" rx="8" fill="#374151" stroke="#ef4444" stroke-width="2"/>
  <text x="820" y="110" text-anchor="middle" fill="#ef4444" font-size="12" font-weight="600" font-family="Segoe UI,Arial,sans-serif">Data Source</text>

  <!-- Revalidation methods -->
  <rect x="60" y="190" width="780" height="160" rx="14" fill="#1e293b"/>
  <text x="450" y="218" text-anchor="middle" fill="#fff" font-size="15" font-weight="700" font-family="Segoe UI,Arial,sans-serif">Cache Invalidation Methods</text>

  <rect x="85" y="240" width="210" height="85" rx="8" fill="#374151"/>
  <text x="190" y="265" text-anchor="middle" fill="#4ade80" font-size="12" font-weight="700" font-family="Segoe UI,Arial,sans-serif">Time-based</text>
  <text x="190" y="283" text-anchor="middle" fill="#94a3b8" font-size="11" font-family="Consolas,monospace">revalidate: 60</text>
  <text x="190" y="303" text-anchor="middle" fill="#94a3b8" font-size="10" font-family="Segoe UI,Arial,sans-serif">Auto revalidate after N seconds</text>

  <rect x="320" y="240" width="260" height="85" rx="8" fill="#374151"/>
  <text x="450" y="265" text-anchor="middle" fill="#fb923c" font-size="12" font-weight="700" font-family="Segoe UI,Arial,sans-serif">On-Demand (Tag)</text>
  <text x="450" y="283" text-anchor="middle" fill="#94a3b8" font-size="11" font-family="Consolas,monospace">revalidateTag('products')</text>
  <text x="450" y="303" text-anchor="middle" fill="#94a3b8" font-size="10" font-family="Segoe UI,Arial,sans-serif">Invalidate by tag in Server Action</text>

  <rect x="605" y="240" width="210" height="85" rx="8" fill="#374151"/>
  <text x="710" y="265" text-anchor="middle" fill="#60a5fa" font-size="12" font-weight="700" font-family="Segoe UI,Arial,sans-serif">On-Demand (Path)</text>
  <text x="710" y="283" text-anchor="middle" fill="#94a3b8" font-size="11" font-family="Consolas,monospace">revalidatePath('/products')</text>
  <text x="710" y="303" text-anchor="middle" fill="#94a3b8" font-size="10" font-family="Segoe UI,Arial,sans-serif">Invalidate specific route</text>

  <defs>
    <marker id="aB" markerWidth="8" markerHeight="8" refX="7" refY="3" orient="auto"><path d="M0,0 L0,6 L7,3z" fill="#60a5fa"/></marker>
    <marker id="aG" markerWidth="8" markerHeight="8" refX="7" refY="3" orient="auto"><path d="M0,0 L0,6 L7,3z" fill="#4ade80"/></marker>
    <marker id="aP" markerWidth="8" markerHeight="8" refX="7" refY="3" orient="auto"><path d="M0,0 L0,6 L7,3z" fill="#a78bfa"/></marker>
    <marker id="aY" markerWidth="8" markerHeight="8" refX="7" refY="3" orient="auto"><path d="M0,0 L0,6 L7,3z" fill="#fbbf24"/></marker>
  </defs>
</svg>