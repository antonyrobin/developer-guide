<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 440">
  <rect width="900" height="440" rx="16" fill="#0a0f1a"/>
  <text x="450" y="44" text-anchor="middle" fill="#fff" font-size="24" font-weight="700" font-family="Segoe UI,Arial,sans-serif">Next.js Rendering Strategies</text>

  <!-- SSG -->
  <rect x="30" y="75" width="260" height="320" rx="14" fill="#1e293b" stroke="#2563eb" stroke-width="2"/>
  <text x="160" y="110" text-anchor="middle" fill="#2563eb" font-size="17" font-weight="700" font-family="Segoe UI,Arial,sans-serif">SSG</text>
  <text x="160" y="130" text-anchor="middle" fill="#94a3b8" font-size="12" font-family="Segoe UI,Arial,sans-serif">Static Site Generation</text>

  <rect x="50" y="150" width="220" height="28" rx="6" fill="#374151"/>
  <text x="160" y="170" text-anchor="middle" fill="#cbd5e1" font-size="11" font-family="Segoe UI,Arial,sans-serif">HTML generated at build time</text>

  <rect x="50" y="188" width="220" height="28" rx="6" fill="#374151"/>
  <text x="160" y="208" text-anchor="middle" fill="#cbd5e1" font-size="11" font-family="Segoe UI,Arial,sans-serif">Cached on CDN</text>

  <rect x="50" y="226" width="220" height="28" rx="6" fill="#374151"/>
  <text x="160" y="246" text-anchor="middle" fill="#cbd5e1" font-size="11" font-family="Segoe UI,Arial,sans-serif">Fastest — no server needed</text>

  <rect x="50" y="264" width="220" height="28" rx="6" fill="#374151"/>
  <text x="160" y="284" text-anchor="middle" fill="#4ade80" font-size="11" font-family="Segoe UI,Arial,sans-serif">Best for: blogs, docs, marketing</text>

  <rect x="50" y="315" width="220" height="55" rx="8" fill="#1a1a2e"/>
  <text x="160" y="337" text-anchor="middle" fill="#60a5fa" font-size="11" font-weight="600" font-family="Consolas,monospace">export default async function</text>
  <text x="160" y="357" text-anchor="middle" fill="#94a3b8" font-size="11" font-family="Consolas,monospace">Page() { /* no dynamic */ }</text>

  <!-- SSR -->
  <rect x="320" y="75" width="260" height="320" rx="14" fill="#1e293b" stroke="#16a34a" stroke-width="2"/>
  <text x="450" y="110" text-anchor="middle" fill="#4ade80" font-size="17" font-weight="700" font-family="Segoe UI,Arial,sans-serif">SSR</text>
  <text x="450" y="130" text-anchor="middle" fill="#94a3b8" font-size="12" font-family="Segoe UI,Arial,sans-serif">Server-Side Rendering</text>

  <rect x="340" y="150" width="220" height="28" rx="6" fill="#374151"/>
  <text x="450" y="170" text-anchor="middle" fill="#cbd5e1" font-size="11" font-family="Segoe UI,Arial,sans-serif">HTML generated per request</text>

  <rect x="340" y="188" width="220" height="28" rx="6" fill="#374151"/>
  <text x="450" y="208" text-anchor="middle" fill="#cbd5e1" font-size="11" font-family="Segoe UI,Arial,sans-serif">Always fresh data</text>

  <rect x="340" y="226" width="220" height="28" rx="6" fill="#374151"/>
  <text x="450" y="246" text-anchor="middle" fill="#cbd5e1" font-size="11" font-family="Segoe UI,Arial,sans-serif">SEO-friendly with dynamic content</text>

  <rect x="340" y="264" width="220" height="28" rx="6" fill="#374151"/>
  <text x="450" y="284" text-anchor="middle" fill="#4ade80" font-size="11" font-family="Segoe UI,Arial,sans-serif">Best for: dashboards, user pages</text>

  <rect x="340" y="315" width="220" height="55" rx="8" fill="#1a1a2e"/>
  <text x="450" y="337" text-anchor="middle" fill="#60a5fa" font-size="11" font-weight="600" font-family="Consolas,monospace">export const dynamic =</text>
  <text x="450" y="357" text-anchor="middle" fill="#94a3b8" font-size="11" font-family="Consolas,monospace">'force-dynamic'</text>

  <!-- ISR -->
  <rect x="610" y="75" width="260" height="320" rx="14" fill="#1e293b" stroke="#9333ea" stroke-width="2"/>
  <text x="740" y="110" text-anchor="middle" fill="#a78bfa" font-size="17" font-weight="700" font-family="Segoe UI,Arial,sans-serif">ISR</text>
  <text x="740" y="130" text-anchor="middle" fill="#94a3b8" font-size="12" font-family="Segoe UI,Arial,sans-serif">Incremental Static Regen.</text>

  <rect x="630" y="150" width="220" height="28" rx="6" fill="#374151"/>
  <text x="740" y="170" text-anchor="middle" fill="#cbd5e1" font-size="11" font-family="Segoe UI,Arial,sans-serif">Static + revalidates periodically</text>

  <rect x="630" y="188" width="220" height="28" rx="6" fill="#374151"/>
  <text x="740" y="208" text-anchor="middle" fill="#cbd5e1" font-size="11" font-family="Segoe UI,Arial,sans-serif">Best of SSG + SSR</text>

  <rect x="630" y="226" width="220" height="28" rx="6" fill="#374151"/>
  <text x="740" y="246" text-anchor="middle" fill="#cbd5e1" font-size="11" font-family="Segoe UI,Arial,sans-serif">Rebuilds in background on stale</text>

  <rect x="630" y="264" width="220" height="28" rx="6" fill="#374151"/>
  <text x="740" y="284" text-anchor="middle" fill="#4ade80" font-size="11" font-family="Segoe UI,Arial,sans-serif">Best for: e-commerce, news</text>

  <rect x="630" y="315" width="220" height="55" rx="8" fill="#1a1a2e"/>
  <text x="740" y="337" text-anchor="middle" fill="#60a5fa" font-size="11" font-weight="600" font-family="Consolas,monospace">export const revalidate =</text>
  <text x="740" y="357" text-anchor="middle" fill="#94a3b8" font-size="11" font-family="Consolas,monospace">60 // seconds</text>

  <!-- Timeline -->
  <text x="450" y="420" text-anchor="middle" fill="#fbbf24" font-size="13" font-weight="600" font-family="Segoe UI,Arial,sans-serif">Next.js automatically chooses the best strategy based on your code — or you configure it explicitly</text>
</svg>