<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 520 320">
  <rect width="520" height="320" rx="12" fill="#0f172a"/>
  <text x="260" y="28" text-anchor="middle" fill="#f1f5f9" font-family="Arial,sans-serif" font-size="18" font-weight="bold">DOM Tree Structure</text>
  <!-- document node -->
  <rect x="205" y="45" width="110" height="32" rx="6" fill="#8b5cf6" opacity="0.3" stroke="#8b5cf6" stroke-width="1.5"/>
  <text x="260" y="66" text-anchor="middle" fill="#c4b5fd" font-family="monospace" font-size="12">document</text>
  <!-- html -->
  <line x1="260" y1="77" x2="260" y2="95" stroke="#475569" stroke-width="1.5"/>
  <rect x="210" y="95" width="100" height="28" rx="5" fill="#3b82f6" opacity="0.25" stroke="#3b82f6" stroke-width="1.5"/>
  <text x="260" y="114" text-anchor="middle" fill="#93c5fd" font-family="monospace" font-size="12">&lt;html&gt;</text>
  <!-- head and body branches -->
  <line x1="260" y1="123" x2="130" y2="150" stroke="#475569" stroke-width="1.5"/>
  <line x1="260" y1="123" x2="390" y2="150" stroke="#475569" stroke-width="1.5"/>
  <rect x="75" y="150" width="110" height="28" rx="5" fill="#10b981" opacity="0.25" stroke="#10b981" stroke-width="1.5"/>
  <text x="130" y="169" text-anchor="middle" fill="#6ee7b7" font-family="monospace" font-size="12">&lt;head&gt;</text>
  <rect x="335" y="150" width="110" height="28" rx="5" fill="#f59e0b" opacity="0.25" stroke="#f59e0b" stroke-width="1.5"/>
  <text x="390" y="169" text-anchor="middle" fill="#fcd34d" font-family="monospace" font-size="12">&lt;body&gt;</text>
  <!-- head children -->
  <line x1="130" y1="178" x2="80" y2="200" stroke="#475569" stroke-width="1"/>
  <line x1="130" y1="178" x2="180" y2="200" stroke="#475569" stroke-width="1"/>
  <rect x="35" y="200" width="90" height="24" rx="4" fill="#1e293b"/>
  <text x="80" y="216" text-anchor="middle" fill="#94a3b8" font-family="monospace" font-size="10">&lt;title&gt;</text>
  <rect x="140" y="200" width="90" height="24" rx="4" fill="#1e293b"/>
  <text x="185" y="216" text-anchor="middle" fill="#94a3b8" font-family="monospace" font-size="10">&lt;meta&gt;</text>
  <!-- body children -->
  <line x1="390" y1="178" x2="310" y2="200" stroke="#475569" stroke-width="1"/>
  <line x1="390" y1="178" x2="390" y2="200" stroke="#475569" stroke-width="1"/>
  <line x1="390" y1="178" x2="470" y2="200" stroke="#475569" stroke-width="1"/>
  <rect x="265" y="200" width="90" height="24" rx="4" fill="#1e293b"/>
  <text x="310" y="216" text-anchor="middle" fill="#fcd34d" font-family="monospace" font-size="10">&lt;h1&gt;</text>
  <rect x="345" y="200" width="90" height="24" rx="4" fill="#1e293b"/>
  <text x="390" y="216" text-anchor="middle" fill="#fcd34d" font-family="monospace" font-size="10">&lt;div&gt;</text>
  <rect x="425" y="200" width="90" height="24" rx="4" fill="#1e293b"/>
  <text x="470" y="216" text-anchor="middle" fill="#fcd34d" font-family="monospace" font-size="10">&lt;p&gt;</text>
  <!-- div children -->
  <line x1="390" y1="224" x2="360" y2="248" stroke="#475569" stroke-width="1"/>
  <line x1="390" y1="224" x2="420" y2="248" stroke="#475569" stroke-width="1"/>
  <rect x="320" y="248" width="80" height="22" rx="4" fill="#1e293b"/>
  <text x="360" y="263" text-anchor="middle" fill="#94a3b8" font-family="monospace" font-size="9">&lt;span&gt;</text>
  <rect x="385" y="248" width="80" height="22" rx="4" fill="#1e293b"/>
  <text x="425" y="263" text-anchor="middle" fill="#94a3b8" font-family="monospace" font-size="9">&lt;a&gt;</text>
  <!-- Methods -->
  <rect x="20" y="282" width="480" height="30" rx="5" fill="#1e293b"/>
  <text x="260" y="302" text-anchor="middle" fill="#94a3b8" font-family="monospace" font-size="10">getElementById() | querySelector() | querySelectorAll() | createElement()</text>
</svg>