<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 520 320">
  <rect width="520" height="320" rx="12" fill="#0f172a"/>
  <text x="260" y="28" text-anchor="middle" fill="#f1f5f9" font-family="Arial,sans-serif" font-size="18" font-weight="bold">JavaScript Data Types</text>
  <!-- Primitives -->
  <rect x="20" y="45" width="240" height="255" rx="8" fill="#1e293b" stroke="#3b82f6" stroke-width="1.5"/>
  <text x="140" y="68" text-anchor="middle" fill="#3b82f6" font-family="Arial,sans-serif" font-size="14" font-weight="bold">Primitives (by value)</text>
  <rect x="35" y="80" width="100" height="30" rx="5" fill="#3b82f6" opacity="0.25"/>
  <text x="85" y="100" text-anchor="middle" fill="#93c5fd" font-family="monospace" font-size="12">String</text>
  <rect x="145" y="80" width="100" height="30" rx="5" fill="#3b82f6" opacity="0.25"/>
  <text x="195" y="100" text-anchor="middle" fill="#93c5fd" font-family="monospace" font-size="12">Number</text>
  <rect x="35" y="118" width="100" height="30" rx="5" fill="#3b82f6" opacity="0.25"/>
  <text x="85" y="138" text-anchor="middle" fill="#93c5fd" font-family="monospace" font-size="12">Boolean</text>
  <rect x="145" y="118" width="100" height="30" rx="5" fill="#3b82f6" opacity="0.25"/>
  <text x="195" y="138" text-anchor="middle" fill="#93c5fd" font-family="monospace" font-size="12">BigInt</text>
  <rect x="35" y="156" width="100" height="30" rx="5" fill="#3b82f6" opacity="0.25"/>
  <text x="85" y="176" text-anchor="middle" fill="#93c5fd" font-family="monospace" font-size="12">undefined</text>
  <rect x="145" y="156" width="100" height="30" rx="5" fill="#3b82f6" opacity="0.25"/>
  <text x="195" y="176" text-anchor="middle" fill="#93c5fd" font-family="monospace" font-size="12">null</text>
  <rect x="35" y="194" width="210" height="30" rx="5" fill="#3b82f6" opacity="0.25"/>
  <text x="140" y="214" text-anchor="middle" fill="#93c5fd" font-family="monospace" font-size="12">Symbol</text>
  <text x="140" y="245" text-anchor="middle" fill="#64748b" font-family="Arial,sans-serif" font-size="10">Immutable &amp; copied by value</text>
  <text x="140" y="260" text-anchor="middle" fill="#64748b" font-family="monospace" font-size="10">typeof "hi" → "string"</text>
  <text x="140" y="275" text-anchor="middle" fill="#f59e0b" font-family="monospace" font-size="10">typeof null → "object" ⚠</text>
  <!-- Reference types -->
  <rect x="275" y="45" width="225" height="255" rx="8" fill="#1e293b" stroke="#10b981" stroke-width="1.5"/>
  <text x="387" y="68" text-anchor="middle" fill="#10b981" font-family="Arial,sans-serif" font-size="14" font-weight="bold">Reference (by ref)</text>
  <rect x="290" y="80" width="195" height="40" rx="5" fill="#10b981" opacity="0.2"/>
  <text x="387" y="98" text-anchor="middle" fill="#6ee7b7" font-family="monospace" font-size="13">Object { }</text>
  <text x="387" y="112" text-anchor="middle" fill="#64748b" font-family="monospace" font-size="9">key-value pairs</text>
  <rect x="290" y="128" width="195" height="40" rx="5" fill="#10b981" opacity="0.2"/>
  <text x="387" y="146" text-anchor="middle" fill="#6ee7b7" font-family="monospace" font-size="13">Array [ ]</text>
  <text x="387" y="160" text-anchor="middle" fill="#64748b" font-family="monospace" font-size="9">ordered collection</text>
  <rect x="290" y="176" width="195" height="40" rx="5" fill="#10b981" opacity="0.2"/>
  <text x="387" y="194" text-anchor="middle" fill="#6ee7b7" font-family="monospace" font-size="13">Function ƒ</text>
  <text x="387" y="208" text-anchor="middle" fill="#64748b" font-family="monospace" font-size="9">first-class citizen</text>
  <text x="387" y="245" text-anchor="middle" fill="#64748b" font-family="Arial,sans-serif" font-size="10">Mutable &amp; shared by reference</text>
  <text x="387" y="260" text-anchor="middle" fill="#64748b" font-family="monospace" font-size="10">Array.isArray([]) → true</text>
  <!-- Equality note -->
  <rect x="20" y="302" width="480" height="16" rx="3" fill="none"/>
  <text x="260" y="315" text-anchor="middle" fill="#f59e0b" font-family="monospace" font-size="11">Always use === (strict equality) — avoid == coercion traps</text>
</svg>