<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 520 300">
  <rect width="520" height="300" rx="12" fill="#0f172a"/>
  <text x="260" y="28" text-anchor="middle" fill="#f1f5f9" font-family="Arial,sans-serif" font-size="18" font-weight="bold">Promise States</text>
  <!-- Pending -->
  <rect x="190" y="50" width="140" height="50" rx="8" fill="#f59e0b" opacity="0.25" stroke="#f59e0b" stroke-width="2"/>
  <text x="260" y="80" text-anchor="middle" fill="#fcd34d" font-family="Arial,sans-serif" font-size="15" font-weight="bold">⏳ Pending</text>
  <!-- Arrows -->
  <line x1="220" y1="100" x2="120" y2="140" stroke="#10b981" stroke-width="2" marker-end="url(#arrGreen)"/>
  <line x1="300" y1="100" x2="400" y2="140" stroke="#ef4444" stroke-width="2" marker-end="url(#arrRed)"/>
  <defs>
    <marker id="arrGreen" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto"><path d="M0,0 L8,3 L0,6Z" fill="#10b981"/></marker>
    <marker id="arrRed" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto"><path d="M0,0 L8,3 L0,6Z" fill="#ef4444"/></marker>
  </defs>
  <text x="155" y="125" text-anchor="middle" fill="#10b981" font-family="monospace" font-size="10">resolve(value)</text>
  <text x="370" y="125" text-anchor="middle" fill="#ef4444" font-family="monospace" font-size="10">reject(error)</text>
  <!-- Fulfilled -->
  <rect x="30" y="145" width="190" height="50" rx="8" fill="#10b981" opacity="0.25" stroke="#10b981" stroke-width="2"/>
  <text x="125" y="175" text-anchor="middle" fill="#6ee7b7" font-family="Arial,sans-serif" font-size="15" font-weight="bold">✓ Fulfilled</text>
  <!-- Rejected -->
  <rect x="300" y="145" width="190" height="50" rx="8" fill="#ef4444" opacity="0.25" stroke="#ef4444" stroke-width="2"/>
  <text x="395" y="175" text-anchor="middle" fill="#fca5a5" font-family="Arial,sans-serif" font-size="15" font-weight="bold">✗ Rejected</text>
  <!-- .then and .catch -->
  <line x1="125" y1="195" x2="125" y2="225" stroke="#10b981" stroke-width="1.5" marker-end="url(#arrGreen)"/>
  <line x1="395" y1="195" x2="395" y2="225" stroke="#ef4444" stroke-width="1.5" marker-end="url(#arrRed)"/>
  <rect x="50" y="228" width="150" height="28" rx="5" fill="#1e293b"/>
  <text x="125" y="247" text-anchor="middle" fill="#10b981" font-family="monospace" font-size="12">.then(value)</text>
  <rect x="320" y="228" width="150" height="28" rx="5" fill="#1e293b"/>
  <text x="395" y="247" text-anchor="middle" fill="#ef4444" font-family="monospace" font-size="12">.catch(error)</text>
  <!-- Finally -->
  <rect x="175" y="268" width="170" height="26" rx="5" fill="#1e293b" stroke="#8b5cf6" stroke-width="1"/>
  <text x="260" y="286" text-anchor="middle" fill="#c4b5fd" font-family="monospace" font-size="12">.finally() — always runs</text>
</svg>