<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 520 360">
  <rect width="520" height="360" rx="12" fill="#0f172a"/>
  <text x="260" y="28" text-anchor="middle" fill="#f1f5f9" font-family="Arial,sans-serif" font-size="18" font-weight="bold">JavaScript Event Loop</text>
  <!-- Call Stack -->
  <rect x="20" y="50" width="140" height="160" rx="8" fill="#1e293b" stroke="#ef4444" stroke-width="1.5"/>
  <text x="90" y="70" text-anchor="middle" fill="#ef4444" font-family="Arial,sans-serif" font-size="12" font-weight="bold">Call Stack</text>
  <rect x="30" y="80" width="120" height="24" rx="4" fill="#ef4444" opacity="0.25"/>
  <text x="90" y="96" text-anchor="middle" fill="#fca5a5" font-family="monospace" font-size="10">main()</text>
  <rect x="30" y="110" width="120" height="24" rx="4" fill="#ef4444" opacity="0.2"/>
  <text x="90" y="126" text-anchor="middle" fill="#fca5a5" font-family="monospace" font-size="10">fetchData()</text>
  <rect x="30" y="140" width="120" height="24" rx="4" fill="#ef4444" opacity="0.15"/>
  <text x="90" y="156" text-anchor="middle" fill="#fca5a5" font-family="monospace" font-size="10">console.log()</text>
  <text x="90" y="200" text-anchor="middle" fill="#64748b" font-family="Arial,sans-serif" font-size="9">LIFO — one at a time</text>
  <!-- Web APIs -->
  <rect x="190" y="50" width="140" height="160" rx="8" fill="#1e293b" stroke="#f59e0b" stroke-width="1.5"/>
  <text x="260" y="70" text-anchor="middle" fill="#f59e0b" font-family="Arial,sans-serif" font-size="12" font-weight="bold">Web APIs</text>
  <text x="260" y="95" text-anchor="middle" fill="#fcd34d" font-family="monospace" font-size="10">setTimeout()</text>
  <text x="260" y="115" text-anchor="middle" fill="#fcd34d" font-family="monospace" font-size="10">fetch()</text>
  <text x="260" y="135" text-anchor="middle" fill="#fcd34d" font-family="monospace" font-size="10">DOM Events</text>
  <text x="260" y="155" text-anchor="middle" fill="#fcd34d" font-family="monospace" font-size="10">setInterval()</text>
  <text x="260" y="200" text-anchor="middle" fill="#64748b" font-family="Arial,sans-serif" font-size="9">Browser-provided</text>
  <!-- Arrows -->
  <line x1="160" y1="120" x2="190" y2="120" stroke="#94a3b8" stroke-width="1.5" marker-end="url(#arrowG)"/>
  <defs><marker id="arrowG" markerWidth="7" markerHeight="5" refX="7" refY="2.5" orient="auto"><path d="M0,0 L7,2.5 L0,5Z" fill="#94a3b8"/></marker></defs>
  <!-- Microtask Queue -->
  <rect x="20" y="230" width="230" height="55" rx="8" fill="#1e293b" stroke="#8b5cf6" stroke-width="1.5"/>
  <text x="135" y="250" text-anchor="middle" fill="#8b5cf6" font-family="Arial,sans-serif" font-size="12" font-weight="bold">Microtask Queue (Priority)</text>
  <text x="135" y="272" text-anchor="middle" fill="#c4b5fd" font-family="monospace" font-size="10">Promise .then() | queueMicrotask()</text>
  <!-- Macrotask Queue -->
  <rect x="265" y="230" width="235" height="55" rx="8" fill="#1e293b" stroke="#3b82f6" stroke-width="1.5"/>
  <text x="382" y="250" text-anchor="middle" fill="#3b82f6" font-family="Arial,sans-serif" font-size="12" font-weight="bold">Macrotask Queue</text>
  <text x="382" y="272" text-anchor="middle" fill="#93c5fd" font-family="monospace" font-size="10">setTimeout | setInterval | I/O</text>
  <!-- Event Loop circle -->
  <rect x="360" y="50" width="140" height="160" rx="8" fill="#1e293b" stroke="#10b981" stroke-width="1.5"/>
  <text x="430" y="70" text-anchor="middle" fill="#10b981" font-family="Arial,sans-serif" font-size="12" font-weight="bold">Event Loop</text>
  <text x="430" y="95" text-anchor="middle" fill="#6ee7b7" font-family="Arial,sans-serif" font-size="10">1. Run sync code</text>
  <text x="430" y="115" text-anchor="middle" fill="#6ee7b7" font-family="Arial,sans-serif" font-size="10">2. Drain microtasks</text>
  <text x="430" y="135" text-anchor="middle" fill="#6ee7b7" font-family="Arial,sans-serif" font-size="10">3. One macrotask</text>
  <text x="430" y="155" text-anchor="middle" fill="#6ee7b7" font-family="Arial,sans-serif" font-size="10">4. Repeat ↻</text>
  <text x="430" y="195" text-anchor="middle" fill="#64748b" font-family="Arial,sans-serif" font-size="9">Checks if stack empty</text>
  <!-- Execution order -->
  <rect x="20" y="295" width="480" height="55" rx="8" fill="#1e293b"/>
  <text x="260" y="315" text-anchor="middle" fill="#e2e8f0" font-family="Arial,sans-serif" font-size="12" font-weight="bold">Execution Priority</text>
  <text x="260" y="338" text-anchor="middle" fill="#94a3b8" font-family="monospace" font-size="11">Sync Code → Microtasks (Promises) → Macrotasks (setTimeout)</text>
</svg>