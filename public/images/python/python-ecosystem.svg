<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 480">
  <rect width="900" height="480" rx="16" fill="#1a1a2e"/>
  <text x="450" y="48" text-anchor="middle" fill="#fff" font-size="28" font-weight="700" font-family="Segoe UI,Arial,sans-serif">Python Ecosystem</text>
  <text x="450" y="76" text-anchor="middle" fill="#94a3b8" font-size="15" font-family="Segoe UI,Arial,sans-serif">One language — many domains</text>

  <!-- Center Python logo area -->
  <circle cx="450" cy="230" r="60" fill="#3776ab"/>
  <text x="450" y="224" text-anchor="middle" fill="#ffd43b" font-size="32" font-weight="700" font-family="Segoe UI,Arial,sans-serif">Py</text>
  <text x="450" y="252" text-anchor="middle" fill="#ffd43b" font-size="16" font-family="Segoe UI,Arial,sans-serif">Python</text>

  <!-- Web Dev -->
  <line x1="390" y1="210" x2="200" y2="150" stroke="#4ade80" stroke-width="2"/>
  <rect x="80" y="110" width="180" height="80" rx="14" fill="#166534"/>
  <text x="170" y="145" text-anchor="middle" fill="#fff" font-size="18" font-weight="700" font-family="Segoe UI,Arial,sans-serif">Web Dev</text>
  <text x="170" y="170" text-anchor="middle" fill="#bbf7d0" font-size="13" font-family="Segoe UI,Arial,sans-serif">Django · Flask · FastAPI</text>

  <!-- Data Science -->
  <line x1="510" y1="210" x2="700" y2="150" stroke="#60a5fa" stroke-width="2"/>
  <rect x="610" y="110" width="200" height="80" rx="14" fill="#1e3a5f"/>
  <text x="710" y="145" text-anchor="middle" fill="#fff" font-size="18" font-weight="700" font-family="Segoe UI,Arial,sans-serif">Data Science</text>
  <text x="710" y="170" text-anchor="middle" fill="#bfdbfe" font-size="13" font-family="Segoe UI,Arial,sans-serif">Pandas · NumPy · Matplotlib</text>

  <!-- AI / ML -->
  <line x1="390" y1="250" x2="200" y2="320" stroke="#c084fc" stroke-width="2"/>
  <rect x="60" y="280" width="200" height="80" rx="14" fill="#4c1d95"/>
  <text x="160" y="315" text-anchor="middle" fill="#fff" font-size="18" font-weight="700" font-family="Segoe UI,Arial,sans-serif">AI / ML</text>
  <text x="160" y="340" text-anchor="middle" fill="#e9d5ff" font-size="13" font-family="Segoe UI,Arial,sans-serif">TensorFlow · PyTorch · sklearn</text>

  <!-- Automation -->
  <line x1="510" y1="250" x2="700" y2="320" stroke="#fbbf24" stroke-width="2"/>
  <rect x="610" y="280" width="210" height="80" rx="14" fill="#713f12"/>
  <text x="715" y="315" text-anchor="middle" fill="#fff" font-size="18" font-weight="700" font-family="Segoe UI,Arial,sans-serif">Automation</text>
  <text x="715" y="340" text-anchor="middle" fill="#fef3c7" font-size="13" font-family="Segoe UI,Arial,sans-serif">Scripting · DevOps · Testing</text>

  <!-- Bottom stats -->
  <rect x="140" y="410" width="180" height="44" rx="10" fill="#1e293b"/>
  <text x="230" y="438" text-anchor="middle" fill="#94a3b8" font-size="14" font-family="Segoe UI,Arial,sans-serif">400,000+ PyPI packages</text>
  <rect x="360" y="410" width="180" height="44" rx="10" fill="#1e293b"/>
  <text x="450" y="438" text-anchor="middle" fill="#94a3b8" font-size="14" font-family="Segoe UI,Arial,sans-serif">#1 in Data &amp; AI</text>
  <rect x="580" y="410" width="180" height="44" rx="10" fill="#1e293b"/>
  <text x="670" y="438" text-anchor="middle" fill="#94a3b8" font-size="14" font-family="Segoe UI,Arial,sans-serif">Beginner-friendly</text>
</svg>
