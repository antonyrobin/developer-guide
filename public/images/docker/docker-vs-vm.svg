<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 420">
  <rect width="900" height="420" rx="16" fill="#0f172a"/>
  <text x="450" y="44" text-anchor="middle" fill="#fff" font-size="26" font-weight="700" font-family="Segoe UI,Arial,sans-serif">Docker vs Virtual Machines</text>

  <!-- VM Side -->
  <text x="225" y="85" text-anchor="middle" fill="#f87171" font-size="18" font-weight="700" font-family="Segoe UI,Arial,sans-serif">Virtual Machine</text>

  <rect x="50" y="310" width="350" height="45" rx="8" fill="#475569"/>
  <text x="225" y="338" text-anchor="middle" fill="#fff" font-size="14" font-weight="600" font-family="Segoe UI,Arial,sans-serif">Infrastructure (Hardware)</text>

  <rect x="50" y="260" width="350" height="45" rx="8" fill="#1e40af"/>
  <text x="225" y="288" text-anchor="middle" fill="#fff" font-size="14" font-weight="600" font-family="Segoe UI,Arial,sans-serif">Hypervisor (VMware / Hyper-V)</text>

  <rect x="55" y="105" width="105" height="148" rx="8" fill="#1e293b" stroke="#f87171" stroke-width="1.5"/>
  <text x="107" y="128" text-anchor="middle" fill="#f87171" font-size="12" font-weight="700" font-family="Segoe UI,Arial,sans-serif">VM 1</text>
  <rect x="65" y="135" width="85" height="24" rx="4" fill="#374151"/>
  <text x="107" y="152" text-anchor="middle" fill="#e2e8f0" font-size="10" font-family="Segoe UI,Arial,sans-serif">App A</text>
  <rect x="65" y="163" width="85" height="24" rx="4" fill="#374151"/>
  <text x="107" y="180" text-anchor="middle" fill="#e2e8f0" font-size="10" font-family="Segoe UI,Arial,sans-serif">Bins/Libs</text>
  <rect x="65" y="195" width="85" height="48" rx="4" fill="#7c2d12"/>
  <text x="107" y="224" text-anchor="middle" fill="#fff" font-size="10" font-weight="600" font-family="Segoe UI,Arial,sans-serif">Guest OS</text>

  <rect x="172" y="105" width="105" height="148" rx="8" fill="#1e293b" stroke="#f87171" stroke-width="1.5"/>
  <text x="224" y="128" text-anchor="middle" fill="#f87171" font-size="12" font-weight="700" font-family="Segoe UI,Arial,sans-serif">VM 2</text>
  <rect x="182" y="135" width="85" height="24" rx="4" fill="#374151"/>
  <text x="224" y="152" text-anchor="middle" fill="#e2e8f0" font-size="10" font-family="Segoe UI,Arial,sans-serif">App B</text>
  <rect x="182" y="163" width="85" height="24" rx="4" fill="#374151"/>
  <text x="224" y="180" text-anchor="middle" fill="#e2e8f0" font-size="10" font-family="Segoe UI,Arial,sans-serif">Bins/Libs</text>
  <rect x="182" y="195" width="85" height="48" rx="4" fill="#7c2d12"/>
  <text x="224" y="224" text-anchor="middle" fill="#fff" font-size="10" font-weight="600" font-family="Segoe UI,Arial,sans-serif">Guest OS</text>

  <rect x="289" y="105" width="105" height="148" rx="8" fill="#1e293b" stroke="#f87171" stroke-width="1.5"/>
  <text x="341" y="128" text-anchor="middle" fill="#f87171" font-size="12" font-weight="700" font-family="Segoe UI,Arial,sans-serif">VM 3</text>
  <rect x="299" y="135" width="85" height="24" rx="4" fill="#374151"/>
  <text x="341" y="152" text-anchor="middle" fill="#e2e8f0" font-size="10" font-family="Segoe UI,Arial,sans-serif">App C</text>
  <rect x="299" y="163" width="85" height="24" rx="4" fill="#374151"/>
  <text x="341" y="180" text-anchor="middle" fill="#e2e8f0" font-size="10" font-family="Segoe UI,Arial,sans-serif">Bins/Libs</text>
  <rect x="299" y="195" width="85" height="48" rx="4" fill="#7c2d12"/>
  <text x="341" y="224" text-anchor="middle" fill="#fff" font-size="10" font-weight="600" font-family="Segoe UI,Arial,sans-serif">Guest OS</text>

  <!-- Docker Side -->
  <text x="675" y="85" text-anchor="middle" fill="#4ade80" font-size="18" font-weight="700" font-family="Segoe UI,Arial,sans-serif">Docker Containers</text>

  <rect x="500" y="310" width="350" height="45" rx="8" fill="#475569"/>
  <text x="675" y="338" text-anchor="middle" fill="#fff" font-size="14" font-weight="600" font-family="Segoe UI,Arial,sans-serif">Infrastructure (Hardware)</text>

  <rect x="500" y="260" width="350" height="45" rx="8" fill="#1e40af"/>
  <text x="675" y="288" text-anchor="middle" fill="#fff" font-size="14" font-weight="600" font-family="Segoe UI,Arial,sans-serif">Host Operating System</text>

  <rect x="500" y="210" width="350" height="45" rx="8" fill="#0d9488"/>
  <text x="675" y="238" text-anchor="middle" fill="#fff" font-size="14" font-weight="600" font-family="Segoe UI,Arial,sans-serif">Docker Engine</text>

  <rect x="505" y="105" width="105" height="100" rx="8" fill="#1e293b" stroke="#4ade80" stroke-width="1.5"/>
  <text x="557" y="128" text-anchor="middle" fill="#4ade80" font-size="12" font-weight="700" font-family="Segoe UI,Arial,sans-serif">Container 1</text>
  <rect x="515" y="138" width="85" height="24" rx="4" fill="#374151"/>
  <text x="557" y="155" text-anchor="middle" fill="#e2e8f0" font-size="10" font-family="Segoe UI,Arial,sans-serif">App A</text>
  <rect x="515" y="166" width="85" height="24" rx="4" fill="#374151"/>
  <text x="557" y="183" text-anchor="middle" fill="#e2e8f0" font-size="10" font-family="Segoe UI,Arial,sans-serif">Bins/Libs</text>

  <rect x="622" y="105" width="105" height="100" rx="8" fill="#1e293b" stroke="#4ade80" stroke-width="1.5"/>
  <text x="674" y="128" text-anchor="middle" fill="#4ade80" font-size="12" font-weight="700" font-family="Segoe UI,Arial,sans-serif">Container 2</text>
  <rect x="632" y="138" width="85" height="24" rx="4" fill="#374151"/>
  <text x="674" y="155" text-anchor="middle" fill="#e2e8f0" font-size="10" font-family="Segoe UI,Arial,sans-serif">App B</text>
  <rect x="632" y="166" width="85" height="24" rx="4" fill="#374151"/>
  <text x="674" y="183" text-anchor="middle" fill="#e2e8f0" font-size="10" font-family="Segoe UI,Arial,sans-serif">Bins/Libs</text>

  <rect x="739" y="105" width="105" height="100" rx="8" fill="#1e293b" stroke="#4ade80" stroke-width="1.5"/>
  <text x="791" y="128" text-anchor="middle" fill="#4ade80" font-size="12" font-weight="700" font-family="Segoe UI,Arial,sans-serif">Container 3</text>
  <rect x="749" y="138" width="85" height="24" rx="4" fill="#374151"/>
  <text x="791" y="155" text-anchor="middle" fill="#e2e8f0" font-size="10" font-family="Segoe UI,Arial,sans-serif">App C</text>
  <rect x="749" y="166" width="85" height="24" rx="4" fill="#374151"/>
  <text x="791" y="183" text-anchor="middle" fill="#e2e8f0" font-size="10" font-family="Segoe UI,Arial,sans-serif">Bins/Libs</text>

  <!-- Bottom comparison -->
  <text x="225" y="400" text-anchor="middle" fill="#f87171" font-size="13" font-family="Segoe UI,Arial,sans-serif">Heavy · Minutes to boot · GBs</text>
  <text x="675" y="400" text-anchor="middle" fill="#4ade80" font-size="13" font-family="Segoe UI,Arial,sans-serif">Lightweight · Seconds to start · MBs</text>
</svg>
