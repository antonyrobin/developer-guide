<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 440">
  <rect width="900" height="440" rx="16" fill="#0f172a"/>
  <text x="450" y="40" text-anchor="middle" fill="#fff" font-size="24" font-weight="700" font-family="Segoe UI,Arial,sans-serif">Docker Networking</text>
  <text x="450" y="62" text-anchor="middle" fill="#94a3b8" font-size="12" font-family="Segoe UI,Arial,sans-serif">Services communicate via service names within shared networks</text>

  <!-- Frontend Network -->
  <rect x="30" y="85" width="400" height="300" rx="12" fill="none" stroke="#4ade80" stroke-width="1.5" stroke-dasharray="8,4"/>
  <text x="230" y="110" text-anchor="middle" fill="#4ade80" font-size="14" font-weight="700" font-family="Segoe UI,Arial,sans-serif">frontend network</text>

  <!-- Backend Network -->
  <rect x="320" y="85" width="550" height="300" rx="12" fill="none" stroke="#60a5fa" stroke-width="1.5" stroke-dasharray="8,4"/>
  <text x="595" y="110" text-anchor="middle" fill="#60a5fa" font-size="14" font-weight="700" font-family="Segoe UI,Arial,sans-serif">backend network</text>

  <!-- Web -->
  <rect x="60" y="140" width="140" height="55" rx="8" fill="#1e293b" stroke="#4ade80" stroke-width="2"/>
  <text x="130" y="165" text-anchor="middle" fill="#4ade80" font-size="13" font-weight="700" font-family="Segoe UI,Arial,sans-serif">web</text>
  <text x="130" y="182" text-anchor="middle" fill="#94a3b8" font-size="10" font-family="Segoe UI,Arial,sans-serif">:3000</text>

  <!-- Gateway (in both networks) -->
  <rect x="340" y="140" width="150" height="55" rx="8" fill="#1e293b" stroke="#22d3ee" stroke-width="2"/>
  <text x="415" y="165" text-anchor="middle" fill="#22d3ee" font-size="13" font-weight="700" font-family="Segoe UI,Arial,sans-serif">gateway</text>
  <text x="415" y="182" text-anchor="middle" fill="#94a3b8" font-size="10" font-family="Segoe UI,Arial,sans-serif">:5000 (both networks)</text>

  <!-- Arrow web → gateway -->
  <line x1="200" y1="167" x2="338" y2="167" stroke="#475569" stroke-width="1.5"/>
  <polygon points="336,162 346,167 336,172" fill="#475569"/>
  <text x="268" y="160" text-anchor="middle" fill="#64748b" font-size="9" font-family="Segoe UI,Arial,sans-serif">http://gateway:8080</text>

  <!-- API Services -->
  <rect x="540" y="130" width="130" height="48" rx="8" fill="#1e293b" stroke="#60a5fa" stroke-width="1.5"/>
  <text x="605" y="153" text-anchor="middle" fill="#60a5fa" font-size="12" font-weight="600" font-family="Segoe UI,Arial,sans-serif">identity-api</text>
  <text x="605" y="168" text-anchor="middle" fill="#94a3b8" font-size="10" font-family="Segoe UI,Arial,sans-serif">:8080</text>

  <rect x="700" y="130" width="130" height="48" rx="8" fill="#1e293b" stroke="#60a5fa" stroke-width="1.5"/>
  <text x="765" y="153" text-anchor="middle" fill="#60a5fa" font-size="12" font-weight="600" font-family="Segoe UI,Arial,sans-serif">catalog-api</text>
  <text x="765" y="168" text-anchor="middle" fill="#94a3b8" font-size="10" font-family="Segoe UI,Arial,sans-serif">:8080</text>

  <rect x="540" y="190" width="130" height="48" rx="8" fill="#1e293b" stroke="#60a5fa" stroke-width="1.5"/>
  <text x="605" y="213" text-anchor="middle" fill="#60a5fa" font-size="12" font-weight="600" font-family="Segoe UI,Arial,sans-serif">commerce-api</text>
  <text x="605" y="228" text-anchor="middle" fill="#94a3b8" font-size="10" font-family="Segoe UI,Arial,sans-serif">:8080</text>

  <!-- Arrows gateway → services -->
  <line x1="490" y1="158" x2="538" y2="154" stroke="#475569" stroke-width="1"/>
  <line x1="490" y1="165" x2="538" y2="214" stroke="#475569" stroke-width="1"/>
  <line x1="490" y1="154" x2="698" y2="154" stroke="#475569" stroke-width="1"/>

  <!-- Infrastructure -->
  <rect x="380" y="270" width="115" height="48" rx="8" fill="#1e293b" stroke="#fbbf24" stroke-width="1.5"/>
  <text x="437" y="293" text-anchor="middle" fill="#fbbf24" font-size="12" font-weight="600" font-family="Segoe UI,Arial,sans-serif">postgres</text>
  <text x="437" y="308" text-anchor="middle" fill="#94a3b8" font-size="10" font-family="Segoe UI,Arial,sans-serif">:5432</text>

  <rect x="515" y="270" width="115" height="48" rx="8" fill="#1e293b" stroke="#f87171" stroke-width="1.5"/>
  <text x="572" y="293" text-anchor="middle" fill="#f87171" font-size="12" font-weight="600" font-family="Segoe UI,Arial,sans-serif">redis</text>
  <text x="572" y="308" text-anchor="middle" fill="#94a3b8" font-size="10" font-family="Segoe UI,Arial,sans-serif">:6379</text>

  <rect x="650" y="270" width="115" height="48" rx="8" fill="#1e293b" stroke="#a78bfa" stroke-width="1.5"/>
  <text x="707" y="293" text-anchor="middle" fill="#a78bfa" font-size="12" font-weight="600" font-family="Segoe UI,Arial,sans-serif">rabbitmq</text>
  <text x="707" y="308" text-anchor="middle" fill="#94a3b8" font-size="10" font-family="Segoe UI,Arial,sans-serif">:5672</text>

  <!-- Arrows services → infra -->
  <line x1="605" y1="238" x2="437" y2="270" stroke="#475569" stroke-width="1" stroke-dasharray="4,3"/>
  <line x1="605" y1="238" x2="572" y2="270" stroke="#475569" stroke-width="1" stroke-dasharray="4,3"/>
  <line x1="605" y1="238" x2="707" y2="270" stroke="#475569" stroke-width="1" stroke-dasharray="4,3"/>
  <line x1="765" y1="178" x2="572" y2="270" stroke="#475569" stroke-width="1" stroke-dasharray="4,3"/>

  <!-- Blocked indicator -->
  <text x="130" y="250" text-anchor="middle" fill="#f87171" font-size="11" font-weight="600" font-family="Segoe UI,Arial,sans-serif">web cannot reach</text>
  <text x="130" y="266" text-anchor="middle" fill="#f87171" font-size="11" font-weight="600" font-family="Segoe UI,Arial,sans-serif">postgres directly</text>
  <line x1="130" y1="278" x2="130" y2="310" stroke="#f87171" stroke-width="1.5"/>
  <text x="130" y="325" text-anchor="middle" fill="#f87171" font-size="20" font-family="Segoe UI,Arial,sans-serif">✕</text>

  <!-- Legend -->
  <rect x="60" y="400" width="12" height="12" rx="3" fill="#4ade80"/>
  <text x="78" y="411" fill="#94a3b8" font-size="11" font-family="Segoe UI,Arial,sans-serif">Frontend Network</text>
  <rect x="200" y="400" width="12" height="12" rx="3" fill="#60a5fa"/>
  <text x="218" y="411" fill="#94a3b8" font-size="11" font-family="Segoe UI,Arial,sans-serif">Backend Network</text>
  <rect x="350" y="400" width="12" height="12" rx="3" fill="#22d3ee"/>
  <text x="368" y="411" fill="#94a3b8" font-size="11" font-family="Segoe UI,Arial,sans-serif">Gateway (Both)</text>
  <rect x="500" y="400" width="12" height="12" rx="3" fill="#f87171"/>
  <text x="518" y="411" fill="#94a3b8" font-size="11" font-family="Segoe UI,Arial,sans-serif">Blocked Access</text>
</svg>
