<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 520">
  <rect width="900" height="520" rx="16" fill="#0f172a"/>
  <text x="450" y="40" text-anchor="middle" fill="#fff" font-size="24" font-weight="700" font-family="Segoe UI,Arial,sans-serif">Docker Compose — Microservice Stack</text>
  <text x="450" y="62" text-anchor="middle" fill="#94a3b8" font-size="12" font-family="Segoe UI,Arial,sans-serif">docker compose -f docker-compose.dev.yml up -d</text>

  <!-- Infrastructure row -->
  <text x="450" y="95" text-anchor="middle" fill="#fbbf24" font-size="14" font-weight="700" font-family="Segoe UI,Arial,sans-serif">Infrastructure</text>

  <rect x="40" y="108" width="140" height="65" rx="8" fill="#1e293b" stroke="#60a5fa" stroke-width="1.5"/>
  <text x="110" y="132" text-anchor="middle" fill="#60a5fa" font-size="13" font-weight="700" font-family="Segoe UI,Arial,sans-serif">PostgreSQL</text>
  <text x="110" y="150" text-anchor="middle" fill="#94a3b8" font-size="10" font-family="Segoe UI,Arial,sans-serif">postgres:16-alpine</text>
  <text x="110" y="164" text-anchor="middle" fill="#64748b" font-size="10" font-family="Segoe UI,Arial,sans-serif">:5432</text>

  <rect x="200" y="108" width="140" height="65" rx="8" fill="#1e293b" stroke="#f87171" stroke-width="1.5"/>
  <text x="270" y="132" text-anchor="middle" fill="#f87171" font-size="13" font-weight="700" font-family="Segoe UI,Arial,sans-serif">Redis</text>
  <text x="270" y="150" text-anchor="middle" fill="#94a3b8" font-size="10" font-family="Segoe UI,Arial,sans-serif">redis:7-alpine</text>
  <text x="270" y="164" text-anchor="middle" fill="#64748b" font-size="10" font-family="Segoe UI,Arial,sans-serif">:6379</text>

  <rect x="360" y="108" width="180" height="65" rx="8" fill="#1e293b" stroke="#fbbf24" stroke-width="1.5"/>
  <text x="450" y="132" text-anchor="middle" fill="#fbbf24" font-size="13" font-weight="700" font-family="Segoe UI,Arial,sans-serif">RabbitMQ</text>
  <text x="450" y="150" text-anchor="middle" fill="#94a3b8" font-size="10" font-family="Segoe UI,Arial,sans-serif">rabbitmq:3.13-management</text>
  <text x="450" y="164" text-anchor="middle" fill="#64748b" font-size="10" font-family="Segoe UI,Arial,sans-serif">:5672 / :15672</text>

  <rect x="560" y="108" width="140" height="65" rx="8" fill="#1e293b" stroke="#4ade80" stroke-width="1.5"/>
  <text x="630" y="132" text-anchor="middle" fill="#4ade80" font-size="13" font-weight="700" font-family="Segoe UI,Arial,sans-serif">MinIO</text>
  <text x="630" y="150" text-anchor="middle" fill="#94a3b8" font-size="10" font-family="Segoe UI,Arial,sans-serif">minio/minio:latest</text>
  <text x="630" y="164" text-anchor="middle" fill="#64748b" font-size="10" font-family="Segoe UI,Arial,sans-serif">:9000 / :9001</text>

  <rect x="720" y="108" width="140" height="65" rx="8" fill="#1e293b" stroke="#a78bfa" stroke-width="1.5"/>
  <text x="790" y="132" text-anchor="middle" fill="#a78bfa" font-size="13" font-weight="700" font-family="Segoe UI,Arial,sans-serif">DB Migrator</text>
  <text x="790" y="150" text-anchor="middle" fill="#94a3b8" font-size="10" font-family="Segoe UI,Arial,sans-serif">dotnet/runtime:9.0</text>
  <text x="790" y="164" text-anchor="middle" fill="#64748b" font-size="10" font-family="Segoe UI,Arial,sans-serif">run-once</text>

  <!-- Connection lines -->
  <line x1="110" y1="173" x2="110" y2="230" stroke="#475569" stroke-width="1" stroke-dasharray="4,3"/>
  <line x1="270" y1="173" x2="270" y2="230" stroke="#475569" stroke-width="1" stroke-dasharray="4,3"/>
  <line x1="450" y1="173" x2="450" y2="230" stroke="#475569" stroke-width="1" stroke-dasharray="4,3"/>

  <!-- API Services row -->
  <text x="450" y="220" text-anchor="middle" fill="#22d3ee" font-size="14" font-weight="700" font-family="Segoe UI,Arial,sans-serif">API Services (dotnet/aspnet:9.0-alpine)</text>

  <rect x="40" y="235" width="150" height="65" rx="8" fill="#1e293b" stroke="#22d3ee" stroke-width="2"/>
  <text x="115" y="259" text-anchor="middle" fill="#22d3ee" font-size="13" font-weight="700" font-family="Segoe UI,Arial,sans-serif">Gateway</text>
  <text x="115" y="277" text-anchor="middle" fill="#94a3b8" font-size="10" font-family="Segoe UI,Arial,sans-serif">YARP Reverse Proxy</text>
  <text x="115" y="291" text-anchor="middle" fill="#64748b" font-size="10" font-family="Segoe UI,Arial,sans-serif">:5000</text>

  <rect x="210" y="235" width="150" height="65" rx="8" fill="#1e293b" stroke="#22d3ee" stroke-width="1.5"/>
  <text x="285" y="259" text-anchor="middle" fill="#22d3ee" font-size="13" font-weight="700" font-family="Segoe UI,Arial,sans-serif">Identity API</text>
  <text x="285" y="277" text-anchor="middle" fill="#94a3b8" font-size="10" font-family="Segoe UI,Arial,sans-serif">Auth &amp; Tenants</text>
  <text x="285" y="291" text-anchor="middle" fill="#64748b" font-size="10" font-family="Segoe UI,Arial,sans-serif">:5001</text>

  <rect x="380" y="235" width="150" height="65" rx="8" fill="#1e293b" stroke="#22d3ee" stroke-width="1.5"/>
  <text x="455" y="259" text-anchor="middle" fill="#22d3ee" font-size="13" font-weight="700" font-family="Segoe UI,Arial,sans-serif">Catalog API</text>
  <text x="455" y="277" text-anchor="middle" fill="#94a3b8" font-size="10" font-family="Segoe UI,Arial,sans-serif">Products &amp; Inventory</text>
  <text x="455" y="291" text-anchor="middle" fill="#64748b" font-size="10" font-family="Segoe UI,Arial,sans-serif">:5002</text>

  <rect x="550" y="235" width="150" height="65" rx="8" fill="#1e293b" stroke="#22d3ee" stroke-width="1.5"/>
  <text x="625" y="259" text-anchor="middle" fill="#22d3ee" font-size="13" font-weight="700" font-family="Segoe UI,Arial,sans-serif">Commerce API</text>
  <text x="625" y="277" text-anchor="middle" fill="#94a3b8" font-size="10" font-family="Segoe UI,Arial,sans-serif">Orders &amp; Payments</text>
  <text x="625" y="291" text-anchor="middle" fill="#64748b" font-size="10" font-family="Segoe UI,Arial,sans-serif">:5003</text>

  <rect x="720" y="235" width="150" height="65" rx="8" fill="#1e293b" stroke="#22d3ee" stroke-width="1.5"/>
  <text x="795" y="259" text-anchor="middle" fill="#22d3ee" font-size="13" font-weight="700" font-family="Segoe UI,Arial,sans-serif">Engagement</text>
  <text x="795" y="277" text-anchor="middle" fill="#94a3b8" font-size="10" font-family="Segoe UI,Arial,sans-serif">Notifications</text>
  <text x="795" y="291" text-anchor="middle" fill="#64748b" font-size="10" font-family="Segoe UI,Arial,sans-serif">:5004</text>

  <!-- Web Frontend -->
  <text x="450" y="345" text-anchor="middle" fill="#4ade80" font-size="14" font-weight="700" font-family="Segoe UI,Arial,sans-serif">Web Frontend</text>

  <rect x="320" y="358" width="260" height="55" rx="8" fill="#1e293b" stroke="#4ade80" stroke-width="2"/>
  <text x="450" y="382" text-anchor="middle" fill="#4ade80" font-size="14" font-weight="700" font-family="Segoe UI,Arial,sans-serif">Next.js Web</text>
  <text x="450" y="400" text-anchor="middle" fill="#94a3b8" font-size="11" font-family="Segoe UI,Arial,sans-serif">node:22-alpine · :3000</text>

  <!-- Arrow from web to gateway -->
  <line x1="450" y1="413" x2="450" y2="440" stroke="#475569" stroke-width="1"/>
  <line x1="450" y1="440" x2="115" y2="440" stroke="#475569" stroke-width="1"/>
  <line x1="115" y1="440" x2="115" y2="300" stroke="#475569" stroke-width="1"/>
  <polygon points="110,302 115,292 120,302" fill="#475569"/>
  <text x="280" y="452" text-anchor="middle" fill="#64748b" font-size="10" font-family="Segoe UI,Arial,sans-serif">NEXT_PUBLIC_API_URL → gateway:8080</text>

  <!-- Volumes -->
  <text x="120" y="488" fill="#94a3b8" font-size="11" font-family="Segoe UI,Arial,sans-serif">Volumes: postgres_data · redis_data · rabbitmq_data · minio_data</text>

  <!-- Legend -->
  <rect x="550" y="478" width="12" height="12" rx="3" fill="#22d3ee"/>
  <text x="568" y="489" fill="#94a3b8" font-size="10" font-family="Segoe UI,Arial,sans-serif">API</text>
  <rect x="600" y="478" width="12" height="12" rx="3" fill="#4ade80"/>
  <text x="618" y="489" fill="#94a3b8" font-size="10" font-family="Segoe UI,Arial,sans-serif">Frontend</text>
  <rect x="680" y="478" width="12" height="12" rx="3" fill="#60a5fa"/>
  <text x="698" y="489" fill="#94a3b8" font-size="10" font-family="Segoe UI,Arial,sans-serif">Database</text>
  <rect x="760" y="478" width="12" height="12" rx="3" fill="#fbbf24"/>
  <text x="778" y="489" fill="#94a3b8" font-size="10" font-family="Segoe UI,Arial,sans-serif">Broker</text>
</svg>
