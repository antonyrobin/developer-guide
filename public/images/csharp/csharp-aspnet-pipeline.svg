<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 440">
  <rect width="900" height="440" rx="16" fill="#0f172a"/>
  <text x="450" y="44" text-anchor="middle" fill="#fff" font-size="26" font-weight="700" font-family="Segoe UI,Arial,sans-serif">ASP.NET Core Middleware Pipeline</text>
  <text x="450" y="70" text-anchor="middle" fill="#94a3b8" font-size="14" font-family="Segoe UI,Arial,sans-serif">Requests flow through middleware in order — responses flow back</text>

  <!-- Request arrow in -->
  <text x="40" y="160" fill="#4ade80" font-size="14" font-weight="700" font-family="Segoe UI,Arial,sans-serif">Request →</text>

  <!-- Middleware boxes -->
  <rect x="130" y="110" width="120" height="90" rx="12" fill="#7c3aed"/>
  <text x="190" y="148" text-anchor="middle" fill="#fff" font-size="14" font-weight="700" font-family="Segoe UI,Arial,sans-serif">Exception</text>
  <text x="190" y="168" text-anchor="middle" fill="#e9d5ff" font-size="12" font-family="Segoe UI,Arial,sans-serif">Handler</text>
  <polygon points="250,155 265,155 257,162" fill="#94a3b8"/>

  <rect x="275" y="110" width="120" height="90" rx="12" fill="#0078d4"/>
  <text x="335" y="148" text-anchor="middle" fill="#fff" font-size="14" font-weight="700" font-family="Segoe UI,Arial,sans-serif">HTTPS</text>
  <text x="335" y="168" text-anchor="middle" fill="#d4e4ff" font-size="12" font-family="Segoe UI,Arial,sans-serif">Redirect</text>
  <polygon points="395,155 410,155 402,162" fill="#94a3b8"/>

  <rect x="420" y="110" width="120" height="90" rx="12" fill="#1e40af"/>
  <text x="480" y="148" text-anchor="middle" fill="#fff" font-size="14" font-weight="700" font-family="Segoe UI,Arial,sans-serif">Auth</text>
  <text x="480" y="168" text-anchor="middle" fill="#bfdbfe" font-size="12" font-family="Segoe UI,Arial,sans-serif">Authentication</text>
  <polygon points="540,155 555,155 547,162" fill="#94a3b8"/>

  <rect x="565" y="110" width="120" height="90" rx="12" fill="#166534"/>
  <text x="625" y="148" text-anchor="middle" fill="#fff" font-size="14" font-weight="700" font-family="Segoe UI,Arial,sans-serif">CORS</text>
  <text x="625" y="168" text-anchor="middle" fill="#bbf7d0" font-size="12" font-family="Segoe UI,Arial,sans-serif">Policy</text>
  <polygon points="685,155 700,155 692,162" fill="#94a3b8"/>

  <rect x="710" y="110" width="130" height="90" rx="12" fill="#b91c1c"/>
  <text x="775" y="148" text-anchor="middle" fill="#fff" font-size="14" font-weight="700" font-family="Segoe UI,Arial,sans-serif">Routing</text>
  <text x="775" y="168" text-anchor="middle" fill="#fecaca" font-size="12" font-family="Segoe UI,Arial,sans-serif">→ Controller</text>

  <!-- Response arrow out -->
  <text x="40" y="280" fill="#f87171" font-size="14" font-weight="700" font-family="Segoe UI,Arial,sans-serif">← Response</text>
  <line x1="120" y1="275" x2="840" y2="275" stroke="#475569" stroke-width="2" stroke-dasharray="8,4"/>

  <!-- DI container -->
  <rect x="130" y="310" width="710" height="100" rx="14" fill="#1e293b" stroke="#6366f1" stroke-width="2"/>
  <text x="485" y="345" text-anchor="middle" fill="#a5b4fc" font-size="18" font-weight="700" font-family="Segoe UI,Arial,sans-serif">Built-in Dependency Injection Container</text>
  <text x="250" y="380" text-anchor="middle" fill="#94a3b8" font-size="13" font-family="Segoe UI,Arial,sans-serif">AddTransient&lt;T&gt;</text>
  <text x="450" y="380" text-anchor="middle" fill="#94a3b8" font-size="13" font-family="Segoe UI,Arial,sans-serif">AddScoped&lt;T&gt;</text>
  <text x="650" y="380" text-anchor="middle" fill="#94a3b8" font-size="13" font-family="Segoe UI,Arial,sans-serif">AddSingleton&lt;T&gt;</text>
</svg>
