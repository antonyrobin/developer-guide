<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 360" fill="none">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="800" y2="360">
      <stop offset="0%" stop-color="#EEF2FF"/>
      <stop offset="100%" stop-color="#F3E8FF"/>
    </linearGradient>
    <filter id="shadow" x="-4%" y="-4%" width="108%" height="108%">
      <feDropShadow dx="0" dy="2" stdDeviation="4" flood-opacity="0.10"/>
    </filter>
  </defs>
  <rect width="800" height="360" rx="16" fill="url(#bg)"/>
  <text x="400" y="35" text-anchor="middle" font-family="Inter,system-ui,sans-serif" font-size="20" font-weight="700" fill="#002D6E">Virtual Machine Components</text>
  <!-- VM Box -->
  <rect x="200" y="55" width="400" height="280" rx="14" fill="#fff" stroke="#3B82F6" stroke-width="2.5" filter="url(#shadow)"/>
  <text x="400" y="82" text-anchor="middle" font-family="Inter,sans-serif" font-size="16" font-weight="700" fill="#1D4ED8">Azure Virtual Machine</text>
  <!-- Compute -->
  <rect x="230" y="100" width="155" height="55" rx="8" fill="#DBEAFE" stroke="#3B82F6" stroke-width="1.5"/>
  <text x="307" y="123" text-anchor="middle" font-family="Inter,sans-serif" font-size="13" font-weight="700" fill="#1D4ED8">Compute</text>
  <text x="307" y="143" text-anchor="middle" font-family="Inter,sans-serif" font-size="10" fill="#6B7280">CPU + RAM</text>
  <!-- Storage -->
  <rect x="415" y="100" width="155" height="55" rx="8" fill="#D1FAE5" stroke="#10B981" stroke-width="1.5"/>
  <text x="492" y="123" text-anchor="middle" font-family="Inter,sans-serif" font-size="13" font-weight="700" fill="#065F46">Storage</text>
  <text x="492" y="143" text-anchor="middle" font-family="Inter,sans-serif" font-size="10" fill="#6B7280">Managed Disks</text>
  <!-- OS -->
  <rect x="230" y="175" width="155" height="55" rx="8" fill="#FEF3C7" stroke="#F59E0B" stroke-width="1.5"/>
  <text x="307" y="198" text-anchor="middle" font-family="Inter,sans-serif" font-size="13" font-weight="700" fill="#92400E">Operating System</text>
  <text x="307" y="218" text-anchor="middle" font-family="Inter,sans-serif" font-size="10" fill="#6B7280">Windows / Linux</text>
  <!-- Networking -->
  <rect x="415" y="175" width="155" height="55" rx="8" fill="#E0E7FF" stroke="#6366F1" stroke-width="1.5"/>
  <text x="492" y="198" text-anchor="middle" font-family="Inter,sans-serif" font-size="13" font-weight="700" fill="#4338CA">Networking</text>
  <text x="492" y="218" text-anchor="middle" font-family="Inter,sans-serif" font-size="10" fill="#6B7280">NIC + VNet + NSG</text>
  <!-- Management Tools -->
  <rect x="280" y="250" width="240" height="50" rx="8" fill="#F3E8FF" stroke="#8B5CF6" stroke-width="1.5"/>
  <text x="400" y="273" text-anchor="middle" font-family="Inter,sans-serif" font-size="13" font-weight="700" fill="#5B21B6">Management Tools</text>
  <text x="400" y="291" text-anchor="middle" font-family="Inter,sans-serif" font-size="10" fill="#6B7280">Azure Monitor, Portal, CLI</text>
  <!-- Connection methods -->
  <rect x="40" y="130" width="120" height="40" rx="6" fill="#FCA5A5" stroke="#EF4444" stroke-width="1.5"/>
  <text x="100" y="155" text-anchor="middle" font-family="Inter,sans-serif" font-size="12" font-weight="600" fill="#7F1D1D">RDP (Windows)</text>
  <line x1="160" y1="150" x2="200" y2="150" stroke="#EF4444" stroke-width="1.5" stroke-dasharray="4,3"/>
  <rect x="40" y="190" width="120" height="40" rx="6" fill="#D1FAE5" stroke="#10B981" stroke-width="1.5"/>
  <text x="100" y="215" text-anchor="middle" font-family="Inter,sans-serif" font-size="12" font-weight="600" fill="#065F46">SSH (Linux)</text>
  <line x1="160" y1="210" x2="200" y2="210" stroke="#10B981" stroke-width="1.5" stroke-dasharray="4,3"/>
  <!-- Billing note -->
  <rect x="640" y="130" width="140" height="100" rx="8" fill="#FEF3C7" stroke="#F59E0B" stroke-width="1.5" filter="url(#shadow)"/>
  <text x="710" y="160" text-anchor="middle" font-family="Inter,sans-serif" font-size="11" font-weight="700" fill="#92400E">Billing</text>
  <text x="710" y="180" text-anchor="middle" font-family="Inter,sans-serif" font-size="10" fill="#6B7280">Charged while</text>
  <text x="710" y="195" text-anchor="middle" font-family="Inter,sans-serif" font-size="10" fill="#6B7280">running. Deallocate</text>
  <text x="710" y="210" text-anchor="middle" font-family="Inter,sans-serif" font-size="10" fill="#6B7280">to stop billing.</text>
  <line x1="640" y1="180" x2="600" y2="180" stroke="#F59E0B" stroke-width="1.5" stroke-dasharray="4,3"/>
</svg>