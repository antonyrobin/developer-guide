<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="720" viewBox="0 0 1200 720">
  <defs>
    <linearGradient id="g" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#08131f"/>
      <stop offset="100%" stop-color="#133a63"/>
    </linearGradient>
    <marker id="arrow" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto">
      <path d="M0,0 L12,6 L0,12 z" fill="#8bd3ff"/>
    </marker>
  </defs>
  <rect width="1200" height="720" fill="url(#g)"/>
  <text x="70" y="84" fill="#ffffff" font-size="40" font-family="Segoe UI, Arial" font-weight="700">Azure Pipelines CI/CD Flow</text>
  <text x="70" y="120" fill="#c6e3ff" font-size="22" font-family="Segoe UI, Arial">From commit to artifact to deployment environment</text>

  <g font-family="Segoe UI, Arial" font-weight="700" font-size="26" text-anchor="middle">
    <rect x="70" y="250" width="170" height="110" rx="24" fill="#2563eb"/>
    <text x="155" y="305" fill="#fff">Commit / PR</text>
    <text x="155" y="337" fill="#dbeafe" font-size="18">Trigger pipeline</text>

    <rect x="290" y="250" width="170" height="110" rx="24" fill="#0ea5e9"/>
    <text x="375" y="305" fill="#fff">Build</text>
    <text x="375" y="337" fill="#e0f2fe" font-size="18">Restore + compile</text>

    <rect x="510" y="250" width="170" height="110" rx="24" fill="#14b8a6"/>
    <text x="595" y="305" fill="#fff">Test</text>
    <text x="595" y="337" fill="#e6fffb" font-size="18">Unit + quality gates</text>

    <rect x="730" y="250" width="170" height="110" rx="24" fill="#8b5cf6"/>
    <text x="815" y="305" fill="#fff">Artifact</text>
    <text x="815" y="337" fill="#f3e8ff" font-size="18">Package publish</text>

    <rect x="950" y="250" width="180" height="110" rx="24" fill="#f97316"/>
    <text x="1040" y="305" fill="#fff">Deploy</text>
    <text x="1040" y="337" fill="#ffedd5" font-size="18">Dev → Test → Prod</text>
  </g>

  <g stroke="#8bd3ff" stroke-width="8" fill="none" marker-end="url(#arrow)">
    <path d="M240 305 H290"/>
    <path d="M460 305 H510"/>
    <path d="M680 305 H730"/>
    <path d="M900 305 H950"/>
  </g>

  <g>
    <rect x="120" y="450" width="960" height="160" rx="28" fill="#f8fbff" opacity="0.96"/>
    <text x="160" y="500" fill="#12355c" font-size="26" font-family="Segoe UI, Arial" font-weight="700">What each stage teaches</text>
    <g fill="#1f3b57" font-size="21" font-family="Segoe UI, Arial">
      <text x="160" y="545">CI = prove the code is safe to merge.</text>
      <text x="500" y="545">CD = move validated artifacts through environments.</text>
      <text x="160" y="580">Artifacts separate build output from deployment logic.</text>
      <text x="500" y="580">Approvals and environments reduce accidental releases.</text>
    </g>
  </g>
</svg>