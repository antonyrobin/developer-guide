<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="720" viewBox="0 0 1200 720">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0b1f3a"/>
      <stop offset="100%" stop-color="#173d72"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="8" stdDeviation="12" flood-color="#00142c" flood-opacity="0.35"/>
    </filter>
  </defs>
  <rect width="1200" height="720" fill="url(#bg)"/>
  <text x="70" y="88" fill="#ffffff" font-size="42" font-family="Segoe UI, Arial, sans-serif" font-weight="700">Azure DevOps Service Map</text>
  <text x="70" y="126" fill="#c8dcff" font-size="22" font-family="Segoe UI, Arial, sans-serif">Core products and how they work together in a delivery workflow</text>

  <g filter="url(#shadow)">
    <rect x="70" y="180" rx="26" ry="26" width="190" height="130" fill="#1f8ceb"/>
    <text x="165" y="235" text-anchor="middle" fill="#fff" font-size="32" font-family="Segoe UI, Arial" font-weight="700">Boards</text>
    <text x="165" y="270" text-anchor="middle" fill="#e9f4ff" font-size="18" font-family="Segoe UI, Arial">Work items</text>
    <text x="165" y="294" text-anchor="middle" fill="#e9f4ff" font-size="18" font-family="Segoe UI, Arial">Sprints, Kanban</text>

    <rect x="300" y="180" rx="26" ry="26" width="190" height="130" fill="#2563eb"/>
    <text x="395" y="235" text-anchor="middle" fill="#fff" font-size="32" font-family="Segoe UI, Arial" font-weight="700">Repos</text>
    <text x="395" y="270" text-anchor="middle" fill="#e9f4ff" font-size="18" font-family="Segoe UI, Arial">Git repos</text>
    <text x="395" y="294" text-anchor="middle" fill="#e9f4ff" font-size="18" font-family="Segoe UI, Arial">Branch policies</text>

    <rect x="530" y="180" rx="26" ry="26" width="190" height="130" fill="#0078d4"/>
    <text x="625" y="235" text-anchor="middle" fill="#fff" font-size="32" font-family="Segoe UI, Arial" font-weight="700">Pipelines</text>
    <text x="625" y="270" text-anchor="middle" fill="#e9f4ff" font-size="18" font-family="Segoe UI, Arial">Build, test, deploy</text>
    <text x="625" y="294" text-anchor="middle" fill="#e9f4ff" font-size="18" font-family="Segoe UI, Arial">YAML automation</text>

    <rect x="760" y="180" rx="26" ry="26" width="190" height="130" fill="#0ea5a3"/>
    <text x="855" y="235" text-anchor="middle" fill="#fff" font-size="32" font-family="Segoe UI, Arial" font-weight="700">Test Plans</text>
    <text x="855" y="270" text-anchor="middle" fill="#e9f4ff" font-size="18" font-family="Segoe UI, Arial">Manual testing</text>
    <text x="855" y="294" text-anchor="middle" fill="#e9f4ff" font-size="18" font-family="Segoe UI, Arial">Traceability</text>

    <rect x="990" y="180" rx="26" ry="26" width="140" height="130" fill="#7c3aed"/>
    <text x="1060" y="232" text-anchor="middle" fill="#fff" font-size="28" font-family="Segoe UI, Arial" font-weight="700">Artifacts</text>
    <text x="1060" y="270" text-anchor="middle" fill="#efe6ff" font-size="16" font-family="Segoe UI, Arial">Packages</text>
    <text x="1060" y="292" text-anchor="middle" fill="#efe6ff" font-size="16" font-family="Segoe UI, Arial">Feeds</text>
  </g>

  <g stroke="#9cc4ff" stroke-width="6" fill="none" stroke-linecap="round">
    <path d="M165 338 C165 390, 395 390, 395 338"/>
    <path d="M395 338 C395 390, 625 390, 625 338"/>
    <path d="M625 338 C625 390, 855 390, 855 338"/>
    <path d="M855 338 C855 390, 1060 390, 1060 338"/>
  </g>
  <g fill="#cfe2ff" font-size="20" font-family="Segoe UI, Arial" text-anchor="middle">
    <text x="280" y="384">Plan work</text>
    <text x="510" y="384">Commit code</text>
    <text x="740" y="384">Validate & release</text>
    <text x="958" y="384">Test & publish</text>
  </g>

  <rect x="100" y="450" rx="28" ry="28" width="1000" height="180" fill="#f8fbff" opacity="0.95"/>
  <text x="140" y="505" fill="#12345c" font-size="26" font-family="Segoe UI, Arial" font-weight="700">Typical learning path</text>
  <g font-family="Segoe UI, Arial" font-size="22" fill="#21486f">
    <text x="140" y="550">1. Capture work in Boards</text>
    <text x="430" y="550">2. Build in Repos with branch policies</text>
    <text x="805" y="550">3. Automate CI/CD in Pipelines</text>
    <text x="140" y="590">4. Add tests and approvals</text>
    <text x="430" y="590">5. Publish packages or deployment artifacts</text>
    <text x="805" y="590">6. Monitor and iterate through the next sprint</text>
  </g>
</svg>