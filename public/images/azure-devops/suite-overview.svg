<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 960 540">
  <rect width="960" height="540" rx="16" fill="#0f1b2d"/>

  <text x="480" y="52" text-anchor="middle" fill="#ffffff" font-size="30" font-weight="700" font-family="Segoe UI,Arial,sans-serif">Azure DevOps — Five Core Services</text>
  <text x="480" y="82" text-anchor="middle" fill="#94b8db" font-size="16" font-family="Segoe UI,Arial,sans-serif">Plan → Code → Build → Test → Release</text>

  <!-- Boards -->
  <rect x="40" y="120" width="160" height="160" rx="18" fill="#1a73e8"/>
  <text x="120" y="170" text-anchor="middle" fill="#fff" font-size="24" font-weight="700" font-family="Segoe UI,Arial,sans-serif">Boards</text>
  <text x="120" y="200" text-anchor="middle" fill="#d4e4ff" font-size="14" font-family="Segoe UI,Arial,sans-serif">Work Items</text>
  <text x="120" y="220" text-anchor="middle" fill="#d4e4ff" font-size="14" font-family="Segoe UI,Arial,sans-serif">Sprints</text>
  <text x="120" y="240" text-anchor="middle" fill="#d4e4ff" font-size="14" font-family="Segoe UI,Arial,sans-serif">Kanban Boards</text>
  <text x="120" y="260" text-anchor="middle" fill="#d4e4ff" font-size="14" font-family="Segoe UI,Arial,sans-serif">Dashboards</text>

  <!-- Repos -->
  <rect x="230" y="120" width="160" height="160" rx="18" fill="#2563eb"/>
  <text x="310" y="170" text-anchor="middle" fill="#fff" font-size="24" font-weight="700" font-family="Segoe UI,Arial,sans-serif">Repos</text>
  <text x="310" y="200" text-anchor="middle" fill="#d4e4ff" font-size="14" font-family="Segoe UI,Arial,sans-serif">Git Repositories</text>
  <text x="310" y="220" text-anchor="middle" fill="#d4e4ff" font-size="14" font-family="Segoe UI,Arial,sans-serif">Branch Policies</text>
  <text x="310" y="240" text-anchor="middle" fill="#d4e4ff" font-size="14" font-family="Segoe UI,Arial,sans-serif">Pull Requests</text>
  <text x="310" y="260" text-anchor="middle" fill="#d4e4ff" font-size="14" font-family="Segoe UI,Arial,sans-serif">Code Reviews</text>

  <!-- Pipelines -->
  <rect x="420" y="120" width="160" height="160" rx="18" fill="#0078d4"/>
  <text x="500" y="170" text-anchor="middle" fill="#fff" font-size="24" font-weight="700" font-family="Segoe UI,Arial,sans-serif">Pipelines</text>
  <text x="500" y="200" text-anchor="middle" fill="#d4e4ff" font-size="14" font-family="Segoe UI,Arial,sans-serif">CI / CD</text>
  <text x="500" y="220" text-anchor="middle" fill="#d4e4ff" font-size="14" font-family="Segoe UI,Arial,sans-serif">YAML Automation</text>
  <text x="500" y="240" text-anchor="middle" fill="#d4e4ff" font-size="14" font-family="Segoe UI,Arial,sans-serif">Build &amp; Release</text>
  <text x="500" y="260" text-anchor="middle" fill="#d4e4ff" font-size="14" font-family="Segoe UI,Arial,sans-serif">Environments</text>

  <!-- Test Plans -->
  <rect x="610" y="120" width="160" height="160" rx="18" fill="#0e9e9b"/>
  <text x="690" y="170" text-anchor="middle" fill="#fff" font-size="22" font-weight="700" font-family="Segoe UI,Arial,sans-serif">Test Plans</text>
  <text x="690" y="200" text-anchor="middle" fill="#d4f5f4" font-size="14" font-family="Segoe UI,Arial,sans-serif">Manual Testing</text>
  <text x="690" y="220" text-anchor="middle" fill="#d4f5f4" font-size="14" font-family="Segoe UI,Arial,sans-serif">Exploratory Tests</text>
  <text x="690" y="240" text-anchor="middle" fill="#d4f5f4" font-size="14" font-family="Segoe UI,Arial,sans-serif">Test Suites</text>
  <text x="690" y="260" text-anchor="middle" fill="#d4f5f4" font-size="14" font-family="Segoe UI,Arial,sans-serif">Traceability</text>

  <!-- Artifacts -->
  <rect x="800" y="120" width="120" height="160" rx="18" fill="#7c3aed"/>
  <text x="860" y="170" text-anchor="middle" fill="#fff" font-size="22" font-weight="700" font-family="Segoe UI,Arial,sans-serif">Artifacts</text>
  <text x="860" y="200" text-anchor="middle" fill="#e8deff" font-size="14" font-family="Segoe UI,Arial,sans-serif">NuGet</text>
  <text x="860" y="220" text-anchor="middle" fill="#e8deff" font-size="14" font-family="Segoe UI,Arial,sans-serif">npm</text>
  <text x="860" y="240" text-anchor="middle" fill="#e8deff" font-size="14" font-family="Segoe UI,Arial,sans-serif">Maven</text>
  <text x="860" y="260" text-anchor="middle" fill="#e8deff" font-size="14" font-family="Segoe UI,Arial,sans-serif">Feeds</text>

  <!-- Arrows -->
  <line x1="200" y1="200" x2="230" y2="200" stroke="#5b9aff" stroke-width="3" stroke-linecap="round"/>
  <polygon points="227,194 237,200 227,206" fill="#5b9aff"/>

  <line x1="390" y1="200" x2="420" y2="200" stroke="#5b9aff" stroke-width="3" stroke-linecap="round"/>
  <polygon points="417,194 427,200 417,206" fill="#5b9aff"/>

  <line x1="580" y1="200" x2="610" y2="200" stroke="#5b9aff" stroke-width="3" stroke-linecap="round"/>
  <polygon points="607,194 617,200 607,206" fill="#5b9aff"/>

  <line x1="770" y1="200" x2="800" y2="200" stroke="#5b9aff" stroke-width="3" stroke-linecap="round"/>
  <polygon points="797,194 807,200 797,206" fill="#5b9aff"/>

  <!-- Flow labels -->
  <text x="215" y="188" text-anchor="middle" fill="#7aabff" font-size="11" font-family="Segoe UI,Arial,sans-serif">Plan</text>
  <text x="405" y="188" text-anchor="middle" fill="#7aabff" font-size="11" font-family="Segoe UI,Arial,sans-serif">Code</text>
  <text x="595" y="188" text-anchor="middle" fill="#7aabff" font-size="11" font-family="Segoe UI,Arial,sans-serif">Build</text>
  <text x="785" y="188" text-anchor="middle" fill="#7aabff" font-size="11" font-family="Segoe UI,Arial,sans-serif">Test</text>

  <!-- Learning Path section -->
  <rect x="40" y="320" width="880" height="190" rx="14" fill="#162742"/>
  <text x="480" y="358" text-anchor="middle" fill="#ffffff" font-size="20" font-weight="700" font-family="Segoe UI,Arial,sans-serif">Recommended Learning Path</text>

  <rect x="60" y="380" width="24" height="24" rx="12" fill="#1a73e8"/>
  <text x="72" y="397" text-anchor="middle" fill="#fff" font-size="13" font-weight="700" font-family="Segoe UI,Arial,sans-serif">1</text>
  <text x="94" y="397" fill="#c8dcff" font-size="15" font-family="Segoe UI,Arial,sans-serif">Capture work in Boards</text>

  <rect x="300" y="380" width="24" height="24" rx="12" fill="#2563eb"/>
  <text x="312" y="397" text-anchor="middle" fill="#fff" font-size="13" font-weight="700" font-family="Segoe UI,Arial,sans-serif">2</text>
  <text x="334" y="397" fill="#c8dcff" font-size="15" font-family="Segoe UI,Arial,sans-serif">Code in Repos with branch policies</text>

  <rect x="620" y="380" width="24" height="24" rx="12" fill="#0078d4"/>
  <text x="632" y="397" text-anchor="middle" fill="#fff" font-size="13" font-weight="700" font-family="Segoe UI,Arial,sans-serif">3</text>
  <text x="654" y="397" fill="#c8dcff" font-size="15" font-family="Segoe UI,Arial,sans-serif">Automate CI/CD in Pipelines</text>

  <rect x="60" y="420" width="24" height="24" rx="12" fill="#0e9e9b"/>
  <text x="72" y="437" text-anchor="middle" fill="#fff" font-size="13" font-weight="700" font-family="Segoe UI,Arial,sans-serif">4</text>
  <text x="94" y="437" fill="#c8dcff" font-size="15" font-family="Segoe UI,Arial,sans-serif">Add tests and approvals</text>

  <rect x="300" y="420" width="24" height="24" rx="12" fill="#7c3aed"/>
  <text x="312" y="437" text-anchor="middle" fill="#fff" font-size="13" font-weight="700" font-family="Segoe UI,Arial,sans-serif">5</text>
  <text x="334" y="437" fill="#c8dcff" font-size="15" font-family="Segoe UI,Arial,sans-serif">Publish packages to Artifacts</text>

  <rect x="620" y="420" width="24" height="24" rx="12" fill="#3b82f6"/>
  <text x="632" y="437" text-anchor="middle" fill="#fff" font-size="13" font-weight="700" font-family="Segoe UI,Arial,sans-serif">6</text>
  <text x="654" y="437" fill="#c8dcff" font-size="15" font-family="Segoe UI,Arial,sans-serif">Monitor, iterate, next sprint</text>

  <rect x="60" y="465" width="860" height="30" rx="8" fill="#1e3a5f"/>
  <text x="480" y="485" text-anchor="middle" fill="#7aabff" font-size="13" font-family="Segoe UI,Arial,sans-serif">Boards → Repos → Pipelines → Test Plans → Artifacts → Repeat</text>
</svg>
