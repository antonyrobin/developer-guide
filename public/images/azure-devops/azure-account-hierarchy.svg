<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 420" fill="none">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="800" y2="420">
      <stop offset="0%" stop-color="#EEF2FF"/>
      <stop offset="100%" stop-color="#E0E7FF"/>
    </linearGradient>
    <filter id="shadow" x="-4%" y="-4%" width="108%" height="108%">
      <feDropShadow dx="0" dy="2" stdDeviation="4" flood-opacity="0.10"/>
    </filter>
  </defs>
  <rect width="800" height="420" rx="16" fill="url(#bg)"/>
  <!-- Title -->
  <text x="400" y="40" text-anchor="middle" font-family="Inter,system-ui,sans-serif" font-size="20" font-weight="700" fill="#002D6E">Azure Account Hierarchy</text>
  <!-- Account -->
  <rect x="280" y="60" width="240" height="52" rx="10" fill="#0047AB" filter="url(#shadow)"/>
  <text x="400" y="92" text-anchor="middle" font-family="Inter,sans-serif" font-size="16" font-weight="600" fill="#fff">Azure Account (Email ID)</text>
  <!-- Arrow -->
  <line x1="400" y1="112" x2="400" y2="140" stroke="#0047AB" stroke-width="2" marker-end="url(#arrowhead)"/>
  <!-- Tenant -->
  <rect x="260" y="140" width="280" height="52" rx="10" fill="#1D4ED8" filter="url(#shadow)"/>
  <text x="400" y="172" text-anchor="middle" font-family="Inter,sans-serif" font-size="16" font-weight="600" fill="#fff">Tenant (Directory ID)</text>
  <!-- Arrow -->
  <line x1="400" y1="192" x2="400" y2="220" stroke="#1D4ED8" stroke-width="2"/>
  <!-- Subscriptions -->
  <rect x="120" y="220" width="240" height="52" rx="10" fill="#3B82F6" filter="url(#shadow)"/>
  <text x="240" y="252" text-anchor="middle" font-family="Inter,sans-serif" font-size="15" font-weight="600" fill="#fff">Subscription A (Billing)</text>
  <rect x="440" y="220" width="240" height="52" rx="10" fill="#3B82F6" filter="url(#shadow)"/>
  <text x="560" y="252" text-anchor="middle" font-family="Inter,sans-serif" font-size="15" font-weight="600" fill="#fff">Subscription B (Billing)</text>
  <line x1="300" y1="192" x2="240" y2="220" stroke="#3B82F6" stroke-width="2"/>
  <line x1="500" y1="192" x2="560" y2="220" stroke="#3B82F6" stroke-width="2"/>
  <!-- Resource Groups -->
  <rect x="60" y="300" width="200" height="48" rx="8" fill="#60A5FA" filter="url(#shadow)"/>
  <text x="160" y="330" text-anchor="middle" font-family="Inter,sans-serif" font-size="14" font-weight="600" fill="#fff">Resource Group 1</text>
  <rect x="300" y="300" width="200" height="48" rx="8" fill="#60A5FA" filter="url(#shadow)"/>
  <text x="400" y="330" text-anchor="middle" font-family="Inter,sans-serif" font-size="14" font-weight="600" fill="#fff">Resource Group 2</text>
  <rect x="540" y="300" width="200" height="48" rx="8" fill="#60A5FA" filter="url(#shadow)"/>
  <text x="640" y="330" text-anchor="middle" font-family="Inter,sans-serif" font-size="14" font-weight="600" fill="#fff">Resource Group 3</text>
  <line x1="180" y1="272" x2="160" y2="300" stroke="#60A5FA" stroke-width="1.5"/>
  <line x1="300" y1="272" x2="400" y2="300" stroke="#60A5FA" stroke-width="1.5"/>
  <line x1="560" y1="272" x2="640" y2="300" stroke="#60A5FA" stroke-width="1.5"/>
  <!-- Resources -->
  <rect x="70" y="370" width="80" height="36" rx="6" fill="#93C5FD"/>
  <text x="110" y="393" text-anchor="middle" font-family="Inter,sans-serif" font-size="11" font-weight="600" fill="#1E3A5F">VM</text>
  <rect x="170" y="370" width="80" height="36" rx="6" fill="#93C5FD"/>
  <text x="210" y="393" text-anchor="middle" font-family="Inter,sans-serif" font-size="11" font-weight="600" fill="#1E3A5F">Storage</text>
  <rect x="350" y="370" width="100" height="36" rx="6" fill="#93C5FD"/>
  <text x="400" y="393" text-anchor="middle" font-family="Inter,sans-serif" font-size="11" font-weight="600" fill="#1E3A5F">App Service</text>
  <rect x="570" y="370" width="80" height="36" rx="6" fill="#93C5FD"/>
  <text x="610" y="393" text-anchor="middle" font-family="Inter,sans-serif" font-size="11" font-weight="600" fill="#1E3A5F">SQL DB</text>
  <rect x="670" y="370" width="60" height="36" rx="6" fill="#93C5FD"/>
  <text x="700" y="393" text-anchor="middle" font-family="Inter,sans-serif" font-size="11" font-weight="600" fill="#1E3A5F">VNet</text>
</svg>