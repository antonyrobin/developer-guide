<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 400" fill="none">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="800" y2="400">
      <stop offset="0%" stop-color="#EEF2FF"/>
      <stop offset="100%" stop-color="#DBEAFE"/>
    </linearGradient>
    <filter id="shadow" x="-4%" y="-4%" width="108%" height="108%">
      <feDropShadow dx="0" dy="2" stdDeviation="4" flood-opacity="0.10"/>
    </filter>
  </defs>
  <rect width="800" height="400" rx="16" fill="url(#bg)"/>
  <text x="400" y="38" text-anchor="middle" font-family="Inter,system-ui,sans-serif" font-size="20" font-weight="700" fill="#002D6E">Virtual Network (VNet) &amp; Subnets</text>
  <!-- VNet box -->
  <rect x="60" y="60" width="680" height="320" rx="14" fill="none" stroke="#0047AB" stroke-width="3" stroke-dasharray="8,4"/>
  <text x="400" y="88" text-anchor="middle" font-family="Inter,sans-serif" font-size="16" font-weight="700" fill="#0047AB">Virtual Network (10.0.0.0/16)</text>
  <!-- Subnet 1 -->
  <rect x="90" y="110" width="300" height="240" rx="10" fill="#DBEAFE" stroke="#3B82F6" stroke-width="2" filter="url(#shadow)"/>
  <text x="240" y="138" text-anchor="middle" font-family="Inter,sans-serif" font-size="14" font-weight="700" fill="#1D4ED8">Public Subnet (10.0.1.0/24)</text>
  <!-- VM in public subnet -->
  <rect x="120" y="160" width="120" height="70" rx="8" fill="#fff" stroke="#60A5FA" stroke-width="1.5"/>
  <text x="180" y="185" text-anchor="middle" font-family="Inter,sans-serif" font-size="12" font-weight="600" fill="#374151">Web Server VM</text>
  <text x="180" y="205" text-anchor="middle" font-family="Inter,sans-serif" font-size="10" fill="#6B7280">10.0.1.4</text>
  <text x="180" y="220" text-anchor="middle" font-family="Inter,sans-serif" font-size="10" fill="#6B7280">Public IP: ✓</text>
  <!-- NSG -->
  <rect x="120" y="250" width="240" height="40" rx="6" fill="#FEF3C7" stroke="#F59E0B" stroke-width="1.5"/>
  <text x="240" y="275" text-anchor="middle" font-family="Inter,sans-serif" font-size="12" font-weight="600" fill="#92400E">NSG: Allow HTTP(80), SSH(22)</text>
  <!-- Public IP box -->
  <rect x="260" y="160" width="100" height="40" rx="6" fill="#D1FAE5" stroke="#10B981" stroke-width="1.5"/>
  <text x="310" y="185" text-anchor="middle" font-family="Inter,sans-serif" font-size="11" font-weight="600" fill="#065F46">Public IP</text>
  <!-- Load Balancer -->
  <rect x="120" y="305" width="240" height="30" rx="6" fill="#E0E7FF" stroke="#6366F1" stroke-width="1.5"/>
  <text x="240" y="325" text-anchor="middle" font-family="Inter,sans-serif" font-size="11" font-weight="600" fill="#4338CA">Load Balancer</text>
  <!-- Subnet 2 -->
  <rect x="420" y="110" width="300" height="240" rx="10" fill="#FEF3C7" stroke="#F59E0B" stroke-width="2" filter="url(#shadow)"/>
  <text x="570" y="138" text-anchor="middle" font-family="Inter,sans-serif" font-size="14" font-weight="700" fill="#92400E">Private Subnet (10.0.2.0/24)</text>
  <!-- DB in private subnet -->
  <rect x="450" y="160" width="120" height="70" rx="8" fill="#fff" stroke="#F59E0B" stroke-width="1.5"/>
  <text x="510" y="185" text-anchor="middle" font-family="Inter,sans-serif" font-size="12" font-weight="600" fill="#374151">Database VM</text>
  <text x="510" y="205" text-anchor="middle" font-family="Inter,sans-serif" font-size="10" fill="#6B7280">10.0.2.4</text>
  <text x="510" y="220" text-anchor="middle" font-family="Inter,sans-serif" font-size="10" fill="#6B7280">Public IP: ✗</text>
  <!-- Storage -->
  <rect x="600" y="160" width="100" height="70" rx="8" fill="#fff" stroke="#F59E0B" stroke-width="1.5"/>
  <text x="650" y="185" text-anchor="middle" font-family="Inter,sans-serif" font-size="12" font-weight="600" fill="#374151">Storage</text>
  <text x="650" y="205" text-anchor="middle" font-family="Inter,sans-serif" font-size="10" fill="#6B7280">10.0.2.5</text>
  <!-- NSG 2 -->
  <rect x="450" y="250" width="240" height="40" rx="6" fill="#FEF3C7" stroke="#F59E0B" stroke-width="1.5"/>
  <text x="570" y="275" text-anchor="middle" font-family="Inter,sans-serif" font-size="12" font-weight="600" fill="#92400E">NSG: Allow SQL(1433) from Subnet1</text>
  <!-- Note -->
  <text x="570" y="325" text-anchor="middle" font-family="Inter,sans-serif" font-size="11" fill="#9CA3AF">Azure reserves 5 IPs per subnet</text>
</svg>