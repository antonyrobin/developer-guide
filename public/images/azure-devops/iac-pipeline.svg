<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="720" viewBox="0 0 1200 720">
  <rect width="1200" height="720" fill="#0a1a2f"/>
  <text x="70" y="84" fill="#fff" font-size="40" font-family="Segoe UI, Arial" font-weight="700">IaC Delivery with Azure DevOps</text>
  <text x="70" y="120" fill="#cfe5ff" font-size="22" font-family="Segoe UI, Arial">ARM templates and Terraform follow the same reviewable pipeline pattern</text>

  <g font-family="Segoe UI, Arial" font-weight="700" text-anchor="middle">
    <rect x="80" y="250" width="180" height="110" rx="24" fill="#2563eb"/>
    <text x="170" y="307" fill="#fff" font-size="28">Repo</text>
    <text x="170" y="338" fill="#dbeafe" font-size="18">ARM / .tf files</text>

    <rect x="320" y="250" width="180" height="110" rx="24" fill="#0ea5e9"/>
    <text x="410" y="307" fill="#fff" font-size="28">Validate</text>
    <text x="410" y="338" fill="#e0f2fe" font-size="18">lint / plan</text>

    <rect x="560" y="250" width="180" height="110" rx="24" fill="#14b8a6"/>
    <text x="650" y="307" fill="#fff" font-size="28">Approve</text>
    <text x="650" y="338" fill="#ddfbff" font-size="18">PR + environment</text>

    <rect x="800" y="250" width="180" height="110" rx="24" fill="#8b5cf6"/>
    <text x="890" y="307" fill="#fff" font-size="28">Apply</text>
    <text x="890" y="338" fill="#f3e8ff" font-size="18">deploy / terraform apply</text>

    <rect x="1000" y="250" width="140" height="110" rx="24" fill="#f59e0b"/>
    <text x="1070" y="307" fill="#fff" font-size="26">Azure</text>
    <text x="1070" y="338" fill="#fff7ed" font-size="18">Resources</text>
  </g>

  <g stroke="#93c5fd" stroke-width="8" fill="none" stroke-linecap="round">
    <path d="M260 305 H320"/>
    <path d="M500 305 H560"/>
    <path d="M740 305 H800"/>
    <path d="M980 305 H1000"/>
  </g>
  <g fill="#93c5fd">
    <polygon points="320,305 300,293 300,317"/>
    <polygon points="560,305 540,293 540,317"/>
    <polygon points="800,305 780,293 780,317"/>
    <polygon points="1000,305 980,293 980,317"/>
  </g>

  <rect x="120" y="455" width="960" height="170" rx="28" fill="#f8fbff" opacity="0.96"/>
  <text x="160" y="505" fill="#12355c" font-size="26" font-family="Segoe UI, Arial" font-weight="700">Two common implementations</text>
  <g fill="#20496b" font-size="20" font-family="Segoe UI, Arial">
    <text x="160" y="548">ARM: AzureResourceManagerTemplateDeployment@3 with parameter files</text>
    <text x="160" y="584">Terraform: init → plan → apply, usually guarded by PR review and main-branch conditions</text>
    <text x="160" y="620">Best practice: keep infrastructure in Git, review plans before apply, and never store secrets directly in code.</text>
  </g>
</svg>