<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 520">
  <rect width="900" height="520" rx="16" fill="#0f172a"/>
  <text x="450" y="38" text-anchor="middle" fill="#fff" font-size="22" font-weight="700" font-family="Segoe UI,Arial,sans-serif">Kubernetes Cluster Layout</text>
  <text x="450" y="58" text-anchor="middle" fill="#94a3b8" font-size="12" font-family="Segoe UI,Arial,sans-serif">billing namespace — all microservices orchestrated</text>

  <!-- Cluster border -->
  <rect x="25" y="70" width="850" height="400" rx="14" fill="none" stroke="#326ce5" stroke-width="2"/>
  <text x="50" y="92" fill="#326ce5" font-size="14" font-weight="700" font-family="Segoe UI,Arial,sans-serif">Kubernetes Cluster</text>

  <!-- Namespace border -->
  <rect x="45" y="102" width="810" height="350" rx="10" fill="#111827" stroke="#475569" stroke-width="1" stroke-dasharray="6,4"/>
  <text x="70" y="122" fill="#94a3b8" font-size="12" font-weight="600" font-family="Segoe UI,Arial,sans-serif">billing namespace</text>

  <!-- Row 1: API Services -->
  <rect x="65" y="135" width="125" height="65" rx="8" fill="#1e293b" stroke="#22d3ee" stroke-width="1.5"/>
  <text x="127" y="158" text-anchor="middle" fill="#22d3ee" font-size="12" font-weight="700" font-family="Segoe UI,Arial,sans-serif">gateway</text>
  <text x="127" y="175" text-anchor="middle" fill="#94a3b8" font-size="10" font-family="Segoe UI,Arial,sans-serif">2 pods</text>
  <text x="127" y="190" text-anchor="middle" fill="#64748b" font-size="9" font-family="Segoe UI,Arial,sans-serif">YARP Proxy</text>

  <rect x="205" y="135" width="125" height="65" rx="8" fill="#1e293b" stroke="#22d3ee" stroke-width="1.5"/>
  <text x="267" y="158" text-anchor="middle" fill="#22d3ee" font-size="12" font-weight="700" font-family="Segoe UI,Arial,sans-serif">identity</text>
  <text x="267" y="175" text-anchor="middle" fill="#94a3b8" font-size="10" font-family="Segoe UI,Arial,sans-serif">2 pods</text>
  <text x="267" y="190" text-anchor="middle" fill="#64748b" font-size="9" font-family="Segoe UI,Arial,sans-serif">Auth &amp; Tenants</text>

  <rect x="345" y="135" width="125" height="65" rx="8" fill="#1e293b" stroke="#22d3ee" stroke-width="1.5"/>
  <text x="407" y="158" text-anchor="middle" fill="#22d3ee" font-size="12" font-weight="700" font-family="Segoe UI,Arial,sans-serif">catalog</text>
  <text x="407" y="175" text-anchor="middle" fill="#94a3b8" font-size="10" font-family="Segoe UI,Arial,sans-serif">2 pods</text>
  <text x="407" y="190" text-anchor="middle" fill="#64748b" font-size="9" font-family="Segoe UI,Arial,sans-serif">Products</text>

  <rect x="485" y="135" width="125" height="65" rx="8" fill="#1e293b" stroke="#22d3ee" stroke-width="1.5"/>
  <text x="547" y="158" text-anchor="middle" fill="#22d3ee" font-size="12" font-weight="700" font-family="Segoe UI,Arial,sans-serif">commerce</text>
  <text x="547" y="175" text-anchor="middle" fill="#94a3b8" font-size="10" font-family="Segoe UI,Arial,sans-serif">2 pods</text>
  <text x="547" y="190" text-anchor="middle" fill="#64748b" font-size="9" font-family="Segoe UI,Arial,sans-serif">Orders</text>

  <!-- Row 2: More services -->
  <rect x="65" y="215" width="125" height="65" rx="8" fill="#1e293b" stroke="#22d3ee" stroke-width="1.5"/>
  <text x="127" y="238" text-anchor="middle" fill="#22d3ee" font-size="12" font-weight="700" font-family="Segoe UI,Arial,sans-serif">engagement</text>
  <text x="127" y="255" text-anchor="middle" fill="#94a3b8" font-size="10" font-family="Segoe UI,Arial,sans-serif">2 pods</text>
  <text x="127" y="270" text-anchor="middle" fill="#64748b" font-size="9" font-family="Segoe UI,Arial,sans-serif">Notifications</text>

  <rect x="205" y="215" width="125" height="65" rx="8" fill="#1e293b" stroke="#4ade80" stroke-width="1.5"/>
  <text x="267" y="238" text-anchor="middle" fill="#4ade80" font-size="12" font-weight="700" font-family="Segoe UI,Arial,sans-serif">web</text>
  <text x="267" y="255" text-anchor="middle" fill="#94a3b8" font-size="10" font-family="Segoe UI,Arial,sans-serif">2 pods</text>
  <text x="267" y="270" text-anchor="middle" fill="#64748b" font-size="9" font-family="Segoe UI,Arial,sans-serif">Next.js</text>

  <!-- Infrastructure -->
  <rect x="345" y="215" width="125" height="65" rx="8" fill="#1e293b" stroke="#60a5fa" stroke-width="1.5"/>
  <text x="407" y="238" text-anchor="middle" fill="#60a5fa" font-size="12" font-weight="700" font-family="Segoe UI,Arial,sans-serif">postgres</text>
  <text x="407" y="255" text-anchor="middle" fill="#94a3b8" font-size="10" font-family="Segoe UI,Arial,sans-serif">1 pod (StatefulSet)</text>
  <text x="407" y="270" text-anchor="middle" fill="#64748b" font-size="9" font-family="Segoe UI,Arial,sans-serif">20Gi PVC</text>

  <rect x="485" y="215" width="125" height="65" rx="8" fill="#1e293b" stroke="#f87171" stroke-width="1.5"/>
  <text x="547" y="238" text-anchor="middle" fill="#f87171" font-size="12" font-weight="700" font-family="Segoe UI,Arial,sans-serif">redis</text>
  <text x="547" y="255" text-anchor="middle" fill="#94a3b8" font-size="10" font-family="Segoe UI,Arial,sans-serif">1 pod</text>
  <text x="547" y="270" text-anchor="middle" fill="#64748b" font-size="9" font-family="Segoe UI,Arial,sans-serif">Cache</text>

  <rect x="65" y="295" width="125" height="65" rx="8" fill="#1e293b" stroke="#fbbf24" stroke-width="1.5"/>
  <text x="127" y="318" text-anchor="middle" fill="#fbbf24" font-size="12" font-weight="700" font-family="Segoe UI,Arial,sans-serif">rabbitmq</text>
  <text x="127" y="335" text-anchor="middle" fill="#94a3b8" font-size="10" font-family="Segoe UI,Arial,sans-serif">1 pod</text>
  <text x="127" y="350" text-anchor="middle" fill="#64748b" font-size="9" font-family="Segoe UI,Arial,sans-serif">Message Broker</text>

  <rect x="205" y="295" width="125" height="65" rx="8" fill="#1e293b" stroke="#a78bfa" stroke-width="1.5"/>
  <text x="267" y="318" text-anchor="middle" fill="#a78bfa" font-size="12" font-weight="700" font-family="Segoe UI,Arial,sans-serif">minio</text>
  <text x="267" y="335" text-anchor="middle" fill="#94a3b8" font-size="10" font-family="Segoe UI,Arial,sans-serif">1 pod</text>
  <text x="267" y="350" text-anchor="middle" fill="#64748b" font-size="9" font-family="Segoe UI,Arial,sans-serif">Object Storage</text>

  <!-- Ingress flow on right side -->
  <rect x="650" y="130" width="180" height="50" rx="8" fill="#374151" stroke="#fb923c" stroke-width="2"/>
  <text x="740" y="152" text-anchor="middle" fill="#fb923c" font-size="13" font-weight="700" font-family="Segoe UI,Arial,sans-serif">Ingress Controller</text>
  <text x="740" y="170" text-anchor="middle" fill="#94a3b8" font-size="10" font-family="Segoe UI,Arial,sans-serif">Cloudflare / NGINX</text>

  <line x1="740" y1="180" x2="740" y2="210" stroke="#fb923c" stroke-width="1.5"/>
  <polygon points="735,208 740,218 745,208" fill="#fb923c"/>

  <rect x="650" y="220" width="180" height="44" rx="8" fill="#1e293b" stroke="#22d3ee" stroke-width="1.5"/>
  <text x="740" y="247" text-anchor="middle" fill="#22d3ee" font-size="12" font-weight="600" font-family="Segoe UI,Arial,sans-serif">gateway Service</text>

  <line x1="740" y1="264" x2="740" y2="292" stroke="#22d3ee" stroke-width="1.5"/>
  <polygon points="735,290 740,300 745,290" fill="#22d3ee"/>

  <rect x="660" y="302" width="70" height="36" rx="6" fill="#1e293b" stroke="#22d3ee" stroke-width="1"/>
  <text x="695" y="325" text-anchor="middle" fill="#94a3b8" font-size="10" font-family="Segoe UI,Arial,sans-serif">Pod 1</text>

  <rect x="750" y="302" width="70" height="36" rx="6" fill="#1e293b" stroke="#22d3ee" stroke-width="1"/>
  <text x="785" y="325" text-anchor="middle" fill="#94a3b8" font-size="10" font-family="Segoe UI,Arial,sans-serif">Pod 2</text>

  <text x="740" y="360" text-anchor="middle" fill="#64748b" font-size="10" font-family="Segoe UI,Arial,sans-serif">Load balanced</text>

  <!-- External traffic arrow -->
  <text x="740" y="118" text-anchor="middle" fill="#fb923c" font-size="11" font-weight="600" font-family="Segoe UI,Arial,sans-serif">External Traffic ↓</text>

  <!-- Legend -->
  <rect x="60" y="483" width="12" height="12" rx="3" fill="#22d3ee"/>
  <text x="78" y="494" fill="#94a3b8" font-size="10" font-family="Segoe UI,Arial,sans-serif">API Services</text>
  <rect x="160" y="483" width="12" height="12" rx="3" fill="#4ade80"/>
  <text x="178" y="494" fill="#94a3b8" font-size="10" font-family="Segoe UI,Arial,sans-serif">Frontend</text>
  <rect x="250" y="483" width="12" height="12" rx="3" fill="#60a5fa"/>
  <text x="268" y="494" fill="#94a3b8" font-size="10" font-family="Segoe UI,Arial,sans-serif">Database</text>
  <rect x="340" y="483" width="12" height="12" rx="3" fill="#f87171"/>
  <text x="358" y="494" fill="#94a3b8" font-size="10" font-family="Segoe UI,Arial,sans-serif">Cache</text>
  <rect x="410" y="483" width="12" height="12" rx="3" fill="#fbbf24"/>
  <text x="428" y="494" fill="#94a3b8" font-size="10" font-family="Segoe UI,Arial,sans-serif">Broker</text>
  <rect x="490" y="483" width="12" height="12" rx="3" fill="#fb923c"/>
  <text x="508" y="494" fill="#94a3b8" font-size="10" font-family="Segoe UI,Arial,sans-serif">Ingress</text>
</svg>
