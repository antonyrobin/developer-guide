<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 440">
  <rect width="900" height="440" rx="16" fill="#0f172a"/>
  <text x="450" y="38" text-anchor="middle" fill="#fff" font-size="22" font-weight="700" font-family="Segoe UI,Arial,sans-serif">Kubernetes Networking</text>
  <text x="450" y="58" text-anchor="middle" fill="#94a3b8" font-size="12" font-family="Segoe UI,Arial,sans-serif">Service Discovery &amp; Traffic Routing</text>

  <!-- External traffic -->
  <rect x="335" y="75" width="230" height="40" rx="8" fill="#374151" stroke="#fb923c" stroke-width="2"/>
  <text x="450" y="100" text-anchor="middle" fill="#fb923c" font-size="13" font-weight="700" font-family="Segoe UI,Arial,sans-serif">External Traffic (HTTPS)</text>

  <line x1="450" y1="115" x2="450" y2="145" stroke="#fb923c" stroke-width="1.5"/>
  <polygon points="445,143 450,153 455,143" fill="#fb923c"/>

  <!-- Ingress -->
  <rect x="320" y="155" width="260" height="42" rx="8" fill="#1e293b" stroke="#fb923c" stroke-width="2"/>
  <text x="450" y="175" text-anchor="middle" fill="#fb923c" font-size="14" font-weight="700" font-family="Segoe UI,Arial,sans-serif">Ingress Controller (NGINX)</text>
  <text x="450" y="190" text-anchor="middle" fill="#94a3b8" font-size="10" font-family="Segoe UI,Arial,sans-serif">TLS termination · host-based routing</text>

  <!-- Rules -->
  <line x1="380" y1="197" x2="180" y2="240" stroke="#fbbf24" stroke-width="1"/>
  <line x1="520" y1="197" x2="720" y2="240" stroke="#22d3ee" stroke-width="1"/>

  <text x="260" y="220" text-anchor="middle" fill="#fbbf24" font-size="9" font-family="Segoe UI,Arial,sans-serif">api.billing.example.com</text>
  <text x="640" y="220" text-anchor="middle" fill="#22d3ee" font-size="9" font-family="Segoe UI,Arial,sans-serif">app.billing.example.com</text>

  <!-- Gateway Service -->
  <rect x="80" y="243" width="200" height="38" rx="8" fill="#1e293b" stroke="#fbbf24" stroke-width="1.5"/>
  <text x="180" y="267" text-anchor="middle" fill="#fbbf24" font-size="12" font-weight="700" font-family="Segoe UI,Arial,sans-serif">gateway (Service:80)</text>

  <!-- Web Service -->
  <rect x="620" y="243" width="200" height="38" rx="8" fill="#1e293b" stroke="#22d3ee" stroke-width="1.5"/>
  <text x="720" y="267" text-anchor="middle" fill="#22d3ee" font-size="12" font-weight="700" font-family="Segoe UI,Arial,sans-serif">web (Service:80)</text>

  <!-- Gateway Pods -->
  <line x1="180" y1="281" x2="180" y2="305" stroke="#475569" stroke-width="1"/>
  <rect x="95" y="308" width="70" height="30" rx="6" fill="#1e293b" stroke="#4ade80" stroke-width="1"/>
  <text x="130" y="328" text-anchor="middle" fill="#4ade80" font-size="10" font-family="Segoe UI,Arial,sans-serif">Pod 1</text>
  <rect x="185" y="308" width="70" height="30" rx="6" fill="#1e293b" stroke="#4ade80" stroke-width="1"/>
  <text x="220" y="328" text-anchor="middle" fill="#4ade80" font-size="10" font-family="Segoe UI,Arial,sans-serif">Pod 2</text>

  <!-- Web Pods -->
  <line x1="720" y1="281" x2="720" y2="305" stroke="#475569" stroke-width="1"/>
  <rect x="635" y="308" width="70" height="30" rx="6" fill="#1e293b" stroke="#4ade80" stroke-width="1"/>
  <text x="670" y="328" text-anchor="middle" fill="#4ade80" font-size="10" font-family="Segoe UI,Arial,sans-serif">Pod 1</text>
  <rect x="725" y="308" width="70" height="30" rx="6" fill="#1e293b" stroke="#4ade80" stroke-width="1"/>
  <text x="760" y="328" text-anchor="middle" fill="#4ade80" font-size="10" font-family="Segoe UI,Arial,sans-serif">Pod 2</text>

  <!-- Internal services -->
  <text x="450" y="308" text-anchor="middle" fill="#e2e8f0" font-size="13" font-weight="700" font-family="Segoe UI,Arial,sans-serif">Internal ClusterIP Services</text>

  <rect x="345" y="318" width="100" height="30" rx="6" fill="#1e293b" stroke="#a78bfa" stroke-width="1"/>
  <text x="395" y="338" text-anchor="middle" fill="#a78bfa" font-size="10" font-weight="600" font-family="Segoe UI,Arial,sans-serif">catalog:80</text>

  <rect x="455" y="318" width="100" height="30" rx="6" fill="#1e293b" stroke="#a78bfa" stroke-width="1"/>
  <text x="505" y="338" text-anchor="middle" fill="#a78bfa" font-size="10" font-weight="600" font-family="Segoe UI,Arial,sans-serif">identity:80</text>

  <!-- Arrows from gateway pods to internal services -->
  <line x1="255" y1="323" x2="343" y2="333" stroke="#475569" stroke-width="1" stroke-dasharray="4,3"/>
  <line x1="255" y1="323" x2="453" y2="333" stroke="#475569" stroke-width="1" stroke-dasharray="4,3"/>

  <!-- Service type table -->
  <rect x="80" y="370" width="100" height="30" rx="5" fill="#14532d"/>
  <text x="130" y="390" text-anchor="middle" fill="#4ade80" font-size="10" font-weight="600" font-family="Segoe UI,Arial,sans-serif">ClusterIP</text>
  <text x="130" y="408" text-anchor="middle" fill="#64748b" font-size="9" font-family="Segoe UI,Arial,sans-serif">Internal only</text>

  <rect x="200" y="370" width="100" height="30" rx="5" fill="#7c2d12"/>
  <text x="250" y="390" text-anchor="middle" fill="#fca5a5" font-size="10" font-weight="600" font-family="Segoe UI,Arial,sans-serif">NodePort</text>
  <text x="250" y="408" text-anchor="middle" fill="#64748b" font-size="9" font-family="Segoe UI,Arial,sans-serif">Dev/testing</text>

  <rect x="320" y="370" width="115" height="30" rx="5" fill="#172554"/>
  <text x="377" y="390" text-anchor="middle" fill="#93c5fd" font-size="10" font-weight="600" font-family="Segoe UI,Arial,sans-serif">LoadBalancer</text>
  <text x="377" y="408" text-anchor="middle" fill="#64748b" font-size="9" font-family="Segoe UI,Arial,sans-serif">Cloud LB ($$)</text>

  <rect x="455" y="370" width="100" height="30" rx="5" fill="#431407"/>
  <text x="505" y="390" text-anchor="middle" fill="#fb923c" font-size="10" font-weight="600" font-family="Segoe UI,Arial,sans-serif">Ingress</text>
  <text x="505" y="408" text-anchor="middle" fill="#64748b" font-size="9" font-family="Segoe UI,Arial,sans-serif">Preferred ✓</text>

  <!-- DNS examples -->
  <text x="720" y="378" fill="#94a3b8" font-size="10" font-family="Segoe UI,Arial,sans-serif">DNS Resolution:</text>
  <text x="720" y="395" fill="#64748b" font-size="9" font-family="Segoe UI,Arial,sans-serif">Same ns: http://catalog-api:80</text>
  <text x="720" y="410" fill="#64748b" font-size="9" font-family="Segoe UI,Arial,sans-serif">Cross ns: catalog-api.billing.svc.cluster.local</text>
</svg>
