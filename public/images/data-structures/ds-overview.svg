<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 460">
  <rect width="900" height="460" rx="16" fill="#0f172a"/>
  <text x="450" y="44" text-anchor="middle" fill="#fff" font-size="26" font-weight="700" font-family="Segoe UI,Arial,sans-serif">Data Structures Overview</text>

  <!-- Linear -->
  <text x="225" y="85" text-anchor="middle" fill="#60a5fa" font-size="18" font-weight="700" font-family="Segoe UI,Arial,sans-serif">Linear Structures</text>

  <rect x="50" y="100" width="160" height="75" rx="10" fill="#1e293b" stroke="#60a5fa" stroke-width="2"/>
  <text x="130" y="130" text-anchor="middle" fill="#fff" font-size="16" font-weight="700" font-family="Segoe UI,Arial,sans-serif">Array</text>
  <text x="130" y="152" text-anchor="middle" fill="#94a3b8" font-size="12" font-family="Segoe UI,Arial,sans-serif">O(1) access by index</text>
  <text x="130" y="168" text-anchor="middle" fill="#64748b" font-size="11" font-family="Segoe UI,Arial,sans-serif">Fixed size, contiguous</text>

  <rect x="230" y="100" width="160" height="75" rx="10" fill="#1e293b" stroke="#60a5fa" stroke-width="2"/>
  <text x="310" y="130" text-anchor="middle" fill="#fff" font-size="16" font-weight="700" font-family="Segoe UI,Arial,sans-serif">Linked List</text>
  <text x="310" y="152" text-anchor="middle" fill="#94a3b8" font-size="12" font-family="Segoe UI,Arial,sans-serif">O(1) insert/delete</text>
  <text x="310" y="168" text-anchor="middle" fill="#64748b" font-size="11" font-family="Segoe UI,Arial,sans-serif">Dynamic, node-based</text>

  <rect x="50" y="190" width="160" height="75" rx="10" fill="#1e293b" stroke="#4ade80" stroke-width="2"/>
  <text x="130" y="220" text-anchor="middle" fill="#fff" font-size="16" font-weight="700" font-family="Segoe UI,Arial,sans-serif">Stack</text>
  <text x="130" y="242" text-anchor="middle" fill="#94a3b8" font-size="12" font-family="Segoe UI,Arial,sans-serif">LIFO — Last In First Out</text>
  <text x="130" y="258" text-anchor="middle" fill="#64748b" font-size="11" font-family="Segoe UI,Arial,sans-serif">push / pop</text>

  <rect x="230" y="190" width="160" height="75" rx="10" fill="#1e293b" stroke="#fbbf24" stroke-width="2"/>
  <text x="310" y="220" text-anchor="middle" fill="#fff" font-size="16" font-weight="700" font-family="Segoe UI,Arial,sans-serif">Queue</text>
  <text x="310" y="242" text-anchor="middle" fill="#94a3b8" font-size="12" font-family="Segoe UI,Arial,sans-serif">FIFO — First In First Out</text>
  <text x="310" y="258" text-anchor="middle" fill="#64748b" font-size="11" font-family="Segoe UI,Arial,sans-serif">enqueue / dequeue</text>

  <!-- Non-linear -->
  <text x="675" y="85" text-anchor="middle" fill="#c084fc" font-size="18" font-weight="700" font-family="Segoe UI,Arial,sans-serif">Non-Linear Structures</text>

  <rect x="510" y="100" width="160" height="75" rx="10" fill="#1e293b" stroke="#c084fc" stroke-width="2"/>
  <text x="590" y="130" text-anchor="middle" fill="#fff" font-size="16" font-weight="700" font-family="Segoe UI,Arial,sans-serif">Binary Tree</text>
  <text x="590" y="152" text-anchor="middle" fill="#94a3b8" font-size="12" font-family="Segoe UI,Arial,sans-serif">O(log n) search (BST)</text>
  <text x="590" y="168" text-anchor="middle" fill="#64748b" font-size="11" font-family="Segoe UI,Arial,sans-serif">Hierarchical</text>

  <rect x="690" y="100" width="160" height="75" rx="10" fill="#1e293b" stroke="#c084fc" stroke-width="2"/>
  <text x="770" y="130" text-anchor="middle" fill="#fff" font-size="16" font-weight="700" font-family="Segoe UI,Arial,sans-serif">Graph</text>
  <text x="770" y="152" text-anchor="middle" fill="#94a3b8" font-size="12" font-family="Segoe UI,Arial,sans-serif">Nodes + Edges</text>
  <text x="770" y="168" text-anchor="middle" fill="#64748b" font-size="11" font-family="Segoe UI,Arial,sans-serif">Directed / Undirected</text>

  <rect x="510" y="190" width="160" height="75" rx="10" fill="#1e293b" stroke="#f87171" stroke-width="2"/>
  <text x="590" y="220" text-anchor="middle" fill="#fff" font-size="16" font-weight="700" font-family="Segoe UI,Arial,sans-serif">Hash Table</text>
  <text x="590" y="242" text-anchor="middle" fill="#94a3b8" font-size="12" font-family="Segoe UI,Arial,sans-serif">O(1) avg lookup</text>
  <text x="590" y="258" text-anchor="middle" fill="#64748b" font-size="11" font-family="Segoe UI,Arial,sans-serif">Key-value mapping</text>

  <rect x="690" y="190" width="160" height="75" rx="10" fill="#1e293b" stroke="#0d9488" stroke-width="2"/>
  <text x="770" y="220" text-anchor="middle" fill="#fff" font-size="16" font-weight="700" font-family="Segoe UI,Arial,sans-serif">Heap</text>
  <text x="770" y="242" text-anchor="middle" fill="#94a3b8" font-size="12" font-family="Segoe UI,Arial,sans-serif">O(1) min/max access</text>
  <text x="770" y="258" text-anchor="middle" fill="#64748b" font-size="11" font-family="Segoe UI,Arial,sans-serif">Priority queue</text>

  <!-- Big O section -->
  <rect x="60" y="295" width="780" height="130" rx="14" fill="#1e293b"/>
  <text x="450" y="325" text-anchor="middle" fill="#fbbf24" font-size="17" font-weight="700" font-family="Segoe UI,Arial,sans-serif">Time Complexity Quick Reference</text>
  <text x="140" y="360" text-anchor="middle" fill="#4ade80" font-size="14" font-weight="600" font-family="Segoe UI,Arial,sans-serif">O(1)</text>
  <text x="140" y="380" text-anchor="middle" fill="#94a3b8" font-size="11" font-family="Segoe UI,Arial,sans-serif">Constant</text>
  <text x="260" y="360" text-anchor="middle" fill="#4ade80" font-size="14" font-weight="600" font-family="Segoe UI,Arial,sans-serif">O(log n)</text>
  <text x="260" y="380" text-anchor="middle" fill="#94a3b8" font-size="11" font-family="Segoe UI,Arial,sans-serif">Logarithmic</text>
  <text x="380" y="360" text-anchor="middle" fill="#fbbf24" font-size="14" font-weight="600" font-family="Segoe UI,Arial,sans-serif">O(n)</text>
  <text x="380" y="380" text-anchor="middle" fill="#94a3b8" font-size="11" font-family="Segoe UI,Arial,sans-serif">Linear</text>
  <text x="500" y="360" text-anchor="middle" fill="#fbbf24" font-size="14" font-weight="600" font-family="Segoe UI,Arial,sans-serif">O(n log n)</text>
  <text x="500" y="380" text-anchor="middle" fill="#94a3b8" font-size="11" font-family="Segoe UI,Arial,sans-serif">Linearithmic</text>
  <text x="630" y="360" text-anchor="middle" fill="#f87171" font-size="14" font-weight="600" font-family="Segoe UI,Arial,sans-serif">O(n²)</text>
  <text x="630" y="380" text-anchor="middle" fill="#94a3b8" font-size="11" font-family="Segoe UI,Arial,sans-serif">Quadratic</text>
  <text x="750" y="360" text-anchor="middle" fill="#f87171" font-size="14" font-weight="600" font-family="Segoe UI,Arial,sans-serif">O(2ⁿ)</text>
  <text x="750" y="380" text-anchor="middle" fill="#94a3b8" font-size="11" font-family="Segoe UI,Arial,sans-serif">Exponential</text>

  <text x="450" y="415" text-anchor="middle" fill="#64748b" font-size="12" font-family="Segoe UI,Arial,sans-serif">Choosing the right data structure depends on your access pattern: read-heavy, write-heavy, or search-heavy</text>
</svg>
