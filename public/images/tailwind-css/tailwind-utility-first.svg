<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 440">
  <rect width="900" height="440" rx="16" fill="#0f172a"/>
  <text x="450" y="38" text-anchor="middle" fill="#fff" font-size="22" font-weight="700" font-family="Segoe UI,Arial,sans-serif">Utility-First CSS</text>
  <text x="450" y="58" text-anchor="middle" fill="#94a3b8" font-size="12" font-family="Segoe UI,Arial,sans-serif">Traditional CSS vs Tailwind CSS approach</text>

  <!-- Traditional CSS Side -->
  <text x="225" y="90" text-anchor="middle" fill="#f87171" font-size="16" font-weight="700" font-family="Segoe UI,Arial,sans-serif">Traditional CSS</text>

  <!-- HTML file -->
  <rect x="40" y="110" width="370" height="60" rx="8" fill="#1e293b" stroke="#475569" stroke-width="1.5"/>
  <text x="55" y="130" fill="#64748b" font-size="10" font-family="Segoe UI,Arial,sans-serif">HTML</text>
  <text x="55" y="155" fill="#fb923c" font-size="12" font-family="monospace">&lt;div class="<tspan fill="#f87171">card</tspan>"&gt;</text>
  <text x="67" y="165" fill="#fb923c" font-size="12" font-family="monospace">&lt;h2 class="<tspan fill="#f87171">card-title</tspan>"&gt;Hello&lt;/h2&gt;</text>

  <!-- CSS file -->
  <rect x="40" y="180" width="370" height="120" rx="8" fill="#1e293b" stroke="#475569" stroke-width="1.5"/>
  <text x="55" y="200" fill="#64748b" font-size="10" font-family="Segoe UI,Arial,sans-serif">style.css</text>
  <text x="55" y="220" fill="#a78bfa" font-size="11" font-family="monospace">.card {</text>
  <text x="67" y="235" fill="#94a3b8" font-size="11" font-family="monospace">padding: 1.5rem;</text>
  <text x="67" y="250" fill="#94a3b8" font-size="11" font-family="monospace">border-radius: 0.5rem;</text>
  <text x="67" y="265" fill="#94a3b8" font-size="11" font-family="monospace">box-shadow: 0 1px 3px rgba(...);</text>
  <text x="55" y="280" fill="#a78bfa" font-size="11" font-family="monospace">}</text>
  <text x="55" y="295" fill="#a78bfa" font-size="11" font-family="monospace">.card-title { ... }</text>

  <!-- Arrow: separate files -->
  <rect x="80" y="310" width="290" height="30" rx="6" fill="#7f1d1d"/>
  <text x="225" y="330" text-anchor="middle" fill="#fca5a5" font-size="11" font-weight="600" font-family="Segoe UI,Arial,sans-serif">⚠ Separate files · Naming required · More code</text>

  <!-- Divider -->
  <line x1="450" y1="85" x2="450" y2="350" stroke="#475569" stroke-width="1" stroke-dasharray="6,4"/>
  <text x="450" y="375" text-anchor="middle" fill="#475569" font-size="11" font-weight="600" font-family="Segoe UI,Arial,sans-serif">vs</text>

  <!-- Tailwind CSS Side -->
  <text x="675" y="90" text-anchor="middle" fill="#38bdf8" font-size="16" font-weight="700" font-family="Segoe UI,Arial,sans-serif">Tailwind CSS</text>

  <!-- HTML with utilities -->
  <rect x="490" y="110" width="370" height="80" rx="8" fill="#1e293b" stroke="#38bdf8" stroke-width="1.5"/>
  <text x="505" y="130" fill="#64748b" font-size="10" font-family="Segoe UI,Arial,sans-serif">HTML (only file needed)</text>
  <text x="505" y="155" fill="#fb923c" font-size="12" font-family="monospace">&lt;div class="<tspan fill="#38bdf8">p-6 rounded-lg shadow-md</tspan>"&gt;</text>
  <text x="517" y="175" fill="#fb923c" font-size="12" font-family="monospace">&lt;h2 class="<tspan fill="#38bdf8">text-xl font-bold</tspan>"&gt;Hello&lt;/h2&gt;</text>

  <!-- Utility breakdown -->
  <rect x="490" y="205" width="370" height="130" rx="8" fill="#1e293b" stroke="#475569" stroke-width="1"/>
  <text x="675" y="228" text-anchor="middle" fill="#94a3b8" font-size="11" font-weight="600" font-family="Segoe UI,Arial,sans-serif">Each class = one CSS property</text>

  <rect x="510" y="240" width="80" height="24" rx="5" fill="#164e63"/>
  <text x="550" y="257" text-anchor="middle" fill="#22d3ee" font-size="10" font-weight="600" font-family="Segoe UI,Arial,sans-serif">p-6</text>
  <text x="608" y="257" fill="#94a3b8" font-size="10" font-family="Segoe UI,Arial,sans-serif">→ padding: 1.5rem</text>

  <rect x="510" y="270" width="110" height="24" rx="5" fill="#164e63"/>
  <text x="565" y="287" text-anchor="middle" fill="#22d3ee" font-size="10" font-weight="600" font-family="Segoe UI,Arial,sans-serif">rounded-lg</text>
  <text x="638" y="287" fill="#94a3b8" font-size="10" font-family="Segoe UI,Arial,sans-serif">→ border-radius: 0.5rem</text>

  <rect x="510" y="300" width="110" height="24" rx="5" fill="#164e63"/>
  <text x="565" y="317" text-anchor="middle" fill="#22d3ee" font-size="10" font-weight="600" font-family="Segoe UI,Arial,sans-serif">shadow-md</text>
  <text x="638" y="317" fill="#94a3b8" font-size="10" font-family="Segoe UI,Arial,sans-serif">→ box-shadow: ...</text>

  <!-- Arrow: benefits -->
  <rect x="530" y="345" width="290" height="30" rx="6" fill="#14532d"/>
  <text x="675" y="365" text-anchor="middle" fill="#86efac" font-size="11" font-weight="600" font-family="Segoe UI,Arial,sans-serif">✓ No CSS file · No naming · Less code</text>

  <!-- Bottom comparison -->
  <rect x="40" y="395" width="820" height="30" rx="6" fill="#111827" stroke="#475569" stroke-width="1"/>
  <text x="450" y="415" text-anchor="middle" fill="#94a3b8" font-size="11" font-family="Segoe UI,Arial,sans-serif">Tailwind scans your HTML → generates only used CSS → production build: <tspan fill="#4ade80" font-weight="700">~5-10 KB</tspan> gzipped</text>
</svg>
