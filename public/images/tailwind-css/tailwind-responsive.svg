<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 420">
  <rect width="900" height="420" rx="16" fill="#0f172a"/>
  <text x="450" y="38" text-anchor="middle" fill="#fff" font-size="22" font-weight="700" font-family="Segoe UI,Arial,sans-serif">Tailwind CSS Responsive Breakpoints</text>
  <text x="450" y="58" text-anchor="middle" fill="#94a3b8" font-size="12" font-family="Segoe UI,Arial,sans-serif">Mobile-first: base styles apply everywhere, prefixes add styles at larger widths</text>

  <!-- Mobile -->
  <rect x="40" y="85" width="100" height="180" rx="10" fill="#1e293b" stroke="#f87171" stroke-width="2"/>
  <rect x="55" y="95" width="70" height="10" rx="3" fill="#374151"/>
  <text x="90" y="128" text-anchor="middle" fill="#f87171" font-size="11" font-weight="700" font-family="Segoe UI,Arial,sans-serif">Mobile</text>
  <text x="90" y="144" text-anchor="middle" fill="#94a3b8" font-size="9" font-family="Segoe UI,Arial,sans-serif">0px+</text>
  <!-- 1 col layout -->
  <rect x="55" y="155" width="70" height="18" rx="3" fill="#374151" stroke="#f87171" stroke-width="1"/>
  <rect x="55" y="178" width="70" height="18" rx="3" fill="#374151" stroke="#f87171" stroke-width="1"/>
  <rect x="55" y="201" width="70" height="18" rx="3" fill="#374151" stroke="#f87171" stroke-width="1"/>
  <rect x="55" y="224" width="70" height="18" rx="3" fill="#374151" stroke="#f87171" stroke-width="1"/>
  <text x="90" y="255" text-anchor="middle" fill="#f87171" font-size="10" font-weight="600" font-family="Segoe UI,Arial,sans-serif">(default)</text>
  <text x="90" y="262" text-anchor="middle" fill="#94a3b8" font-size="8" font-family="Segoe UI,Arial,sans-serif">grid-cols-1</text>

  <!-- sm -->
  <rect x="170" y="85" width="140" height="180" rx="10" fill="#1e293b" stroke="#fbbf24" stroke-width="2"/>
  <rect x="195" y="95" width="90" height="10" rx="3" fill="#374151"/>
  <text x="240" y="128" text-anchor="middle" fill="#fbbf24" font-size="11" font-weight="700" font-family="Segoe UI,Arial,sans-serif">Small</text>
  <text x="240" y="144" text-anchor="middle" fill="#94a3b8" font-size="9" font-family="Segoe UI,Arial,sans-serif">sm: 640px+</text>
  <!-- 2 col layout -->
  <rect x="185" y="155" width="50" height="35" rx="3" fill="#374151" stroke="#fbbf24" stroke-width="1"/>
  <rect x="245" y="155" width="50" height="35" rx="3" fill="#374151" stroke="#fbbf24" stroke-width="1"/>
  <rect x="185" y="198" width="50" height="35" rx="3" fill="#374151" stroke="#fbbf24" stroke-width="1"/>
  <rect x="245" y="198" width="50" height="35" rx="3" fill="#374151" stroke="#fbbf24" stroke-width="1"/>
  <text x="240" y="255" text-anchor="middle" fill="#fbbf24" font-size="10" font-weight="600" font-family="Segoe UI,Arial,sans-serif">sm:grid-cols-2</text>

  <!-- md -->
  <rect x="340" y="85" width="180" height="180" rx="10" fill="#1e293b" stroke="#4ade80" stroke-width="2"/>
  <rect x="375" y="95" width="110" height="10" rx="3" fill="#374151"/>
  <text x="430" y="128" text-anchor="middle" fill="#4ade80" font-size="11" font-weight="700" font-family="Segoe UI,Arial,sans-serif">Medium</text>
  <text x="430" y="144" text-anchor="middle" fill="#94a3b8" font-size="9" font-family="Segoe UI,Arial,sans-serif">md: 768px+</text>
  <!-- 2 col layout wider -->
  <rect x="355" y="155" width="70" height="35" rx="3" fill="#374151" stroke="#4ade80" stroke-width="1"/>
  <rect x="435" y="155" width="70" height="35" rx="3" fill="#374151" stroke="#4ade80" stroke-width="1"/>
  <rect x="355" y="198" width="70" height="35" rx="3" fill="#374151" stroke="#4ade80" stroke-width="1"/>
  <rect x="435" y="198" width="70" height="35" rx="3" fill="#374151" stroke="#4ade80" stroke-width="1"/>
  <text x="430" y="255" text-anchor="middle" fill="#4ade80" font-size="10" font-weight="600" font-family="Segoe UI,Arial,sans-serif">md:grid-cols-2</text>

  <!-- lg -->
  <rect x="550" y="85" width="310" height="180" rx="10" fill="#1e293b" stroke="#38bdf8" stroke-width="2"/>
  <rect x="615" y="95" width="180" height="10" rx="3" fill="#374151"/>
  <text x="705" y="128" text-anchor="middle" fill="#38bdf8" font-size="11" font-weight="700" font-family="Segoe UI,Arial,sans-serif">Large / Desktop</text>
  <text x="705" y="144" text-anchor="middle" fill="#94a3b8" font-size="9" font-family="Segoe UI,Arial,sans-serif">lg: 1024px+</text>
  <!-- 4 col layout -->
  <rect x="565" y="155" width="62" height="75" rx="3" fill="#374151" stroke="#38bdf8" stroke-width="1"/>
  <rect x="637" y="155" width="62" height="75" rx="3" fill="#374151" stroke="#38bdf8" stroke-width="1"/>
  <rect x="709" y="155" width="62" height="75" rx="3" fill="#374151" stroke="#38bdf8" stroke-width="1"/>
  <rect x="781" y="155" width="62" height="75" rx="3" fill="#374151" stroke="#38bdf8" stroke-width="1"/>
  <text x="705" y="255" text-anchor="middle" fill="#38bdf8" font-size="10" font-weight="600" font-family="Segoe UI,Arial,sans-serif">lg:grid-cols-4</text>

  <!-- Code example -->
  <rect x="40" y="290" width="820" height="55" rx="8" fill="#1e293b" stroke="#475569" stroke-width="1"/>
  <text x="55" y="310" fill="#64748b" font-size="10" font-family="Segoe UI,Arial,sans-serif">Usage Example</text>
  <text x="55" y="332" fill="#fb923c" font-size="13" font-family="monospace">&lt;div class="<tspan fill="#f87171">grid-cols-1</tspan> <tspan fill="#fbbf24">sm:grid-cols-2</tspan> <tspan fill="#4ade80">md:grid-cols-2</tspan> <tspan fill="#38bdf8">lg:grid-cols-4</tspan> <tspan fill="#94a3b8">gap-6</tspan>"&gt;</text>

  <!-- Key principles -->
  <rect x="40" y="360" width="195" height="45" rx="8" fill="#14532d"/>
  <text x="138" y="380" text-anchor="middle" fill="#4ade80" font-size="11" font-weight="700" font-family="Segoe UI,Arial,sans-serif">1. Start Mobile</text>
  <text x="138" y="396" text-anchor="middle" fill="#86efac" font-size="9" font-family="Segoe UI,Arial,sans-serif">Base classes = mobile styles</text>

  <rect x="250" y="360" width="195" height="45" rx="8" fill="#422006"/>
  <text x="348" y="380" text-anchor="middle" fill="#fbbf24" font-size="11" font-weight="700" font-family="Segoe UI,Arial,sans-serif">2. Add Breakpoints</text>
  <text x="348" y="396" text-anchor="middle" fill="#fde68a" font-size="9" font-family="Segoe UI,Arial,sans-serif">sm: md: lg: xl: for larger</text>

  <rect x="460" y="360" width="195" height="45" rx="8" fill="#172554"/>
  <text x="558" y="380" text-anchor="middle" fill="#3b82f6" font-size="11" font-weight="700" font-family="Segoe UI,Arial,sans-serif">3. Min-Width Based</text>
  <text x="558" y="396" text-anchor="middle" fill="#93c5fd" font-size="9" font-family="Segoe UI,Arial,sans-serif">sm: means 640px and above</text>

  <rect x="670" y="360" width="195" height="45" rx="8" fill="#1e1b4b"/>
  <text x="768" y="380" text-anchor="middle" fill="#a78bfa" font-size="11" font-weight="700" font-family="Segoe UI,Arial,sans-serif">4. Override Upward</text>
  <text x="768" y="396" text-anchor="middle" fill="#c4b5fd" font-size="9" font-family="Segoe UI,Arial,sans-serif">Larger breakpoints override smaller</text>
</svg>
