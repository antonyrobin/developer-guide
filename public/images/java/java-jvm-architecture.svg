<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 520 360">
  <rect width="520" height="360" rx="12" fill="#0f172a"/>
  <text x="260" y="30" text-anchor="middle" fill="#f59e0b" font-size="16" font-weight="bold" font-family="system-ui">JVM Architecture</text>
  <!-- Class Loader -->
  <rect x="20" y="50" width="150" height="90" rx="8" fill="#1e293b" stroke="#3b82f6" stroke-width="1.5"/>
  <text x="95" y="72" text-anchor="middle" fill="#3b82f6" font-size="11" font-weight="bold" font-family="system-ui">Class Loader</text>
  <text x="95" y="90" text-anchor="middle" fill="#94a3b8" font-size="9" font-family="system-ui">Loading</text>
  <text x="95" y="104" text-anchor="middle" fill="#94a3b8" font-size="9" font-family="system-ui">Linking</text>
  <text x="95" y="118" text-anchor="middle" fill="#94a3b8" font-size="9" font-family="system-ui">Initialization</text>
  <!-- Arrow -->
  <path d="M170 95 L185 95" stroke="#475569" stroke-width="1.5" fill="none" marker-end="url(#arr1)"/>
  <defs><marker id="arr1" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto"><path d="M0,0 L8,3 L0,6" fill="#475569"/></marker></defs>
  <!-- Runtime Data Areas -->
  <rect x="190" y="50" width="310" height="145" rx="8" fill="#1e293b" stroke="#10b981" stroke-width="1.5"/>
  <text x="345" y="72" text-anchor="middle" fill="#10b981" font-size="11" font-weight="bold" font-family="system-ui">Runtime Data Areas</text>
  <!-- Method Area -->
  <rect x="200" y="82" width="90" height="45" rx="5" fill="#0f172a" stroke="#475569" stroke-width="1"/>
  <text x="245" y="100" text-anchor="middle" fill="#e2e8f0" font-size="9" font-weight="bold" font-family="system-ui">Method Area</text>
  <text x="245" y="115" text-anchor="middle" fill="#94a3b8" font-size="8" font-family="system-ui">Class metadata</text>
  <!-- Heap -->
  <rect x="300" y="82" width="90" height="45" rx="5" fill="#0f172a" stroke="#f59e0b" stroke-width="1"/>
  <text x="345" y="100" text-anchor="middle" fill="#f59e0b" font-size="9" font-weight="bold" font-family="system-ui">Heap Area</text>
  <text x="345" y="115" text-anchor="middle" fill="#94a3b8" font-size="8" font-family="system-ui">Objects live here</text>
  <!-- Stack -->
  <rect x="400" y="82" width="90" height="45" rx="5" fill="#0f172a" stroke="#a78bfa" stroke-width="1"/>
  <text x="445" y="100" text-anchor="middle" fill="#a78bfa" font-size="9" font-weight="bold" font-family="system-ui">Stack Area</text>
  <text x="445" y="115" text-anchor="middle" fill="#94a3b8" font-size="8" font-family="system-ui">Per-thread</text>
  <!-- PC Registers + Native Stacks -->
  <rect x="200" y="135" width="140" height="45" rx="5" fill="#0f172a" stroke="#475569" stroke-width="1"/>
  <text x="270" y="153" text-anchor="middle" fill="#e2e8f0" font-size="9" font-weight="bold" font-family="system-ui">PC Registers</text>
  <text x="270" y="168" text-anchor="middle" fill="#94a3b8" font-size="8" font-family="system-ui">Current instruction</text>
  <rect x="350" y="135" width="140" height="45" rx="5" fill="#0f172a" stroke="#475569" stroke-width="1"/>
  <text x="420" y="153" text-anchor="middle" fill="#e2e8f0" font-size="9" font-weight="bold" font-family="system-ui">Native Method Stack</text>
  <text x="420" y="168" text-anchor="middle" fill="#94a3b8" font-size="8" font-family="system-ui">JNI calls</text>
  <!-- Arrow down -->
  <path d="M345 195 L345 210" stroke="#475569" stroke-width="1.5" fill="none" marker-end="url(#arr1)"/>
  <!-- Execution Engine -->
  <rect x="100" y="215" width="400" height="125" rx="8" fill="#1e293b" stroke="#ef4444" stroke-width="1.5"/>
  <text x="300" y="237" text-anchor="middle" fill="#ef4444" font-size="11" font-weight="bold" font-family="system-ui">Execution Engine</text>
  <!-- Interpreter -->
  <rect x="115" y="250" width="115" height="75" rx="5" fill="#0f172a" stroke="#475569" stroke-width="1"/>
  <text x="172" y="272" text-anchor="middle" fill="#06b6d4" font-size="10" font-weight="bold" font-family="system-ui">Interpreter</text>
  <text x="172" y="290" text-anchor="middle" fill="#94a3b8" font-size="8" font-family="system-ui">Reads bytecode</text>
  <text x="172" y="304" text-anchor="middle" fill="#94a3b8" font-size="8" font-family="system-ui">line by line</text>
  <!-- JIT Compiler -->
  <rect x="242" y="250" width="115" height="75" rx="5" fill="#0f172a" stroke="#475569" stroke-width="1"/>
  <text x="300" y="272" text-anchor="middle" fill="#f59e0b" font-size="10" font-weight="bold" font-family="system-ui">JIT Compiler</text>
  <text x="300" y="290" text-anchor="middle" fill="#94a3b8" font-size="8" font-family="system-ui">Compiles hot code</text>
  <text x="300" y="304" text-anchor="middle" fill="#94a3b8" font-size="8" font-family="system-ui">to native code</text>
  <!-- Garbage Collector -->
  <rect x="369" y="250" width="115" height="75" rx="5" fill="#0f172a" stroke="#475569" stroke-width="1"/>
  <text x="427" y="272" text-anchor="middle" fill="#10b981" font-size="10" font-weight="bold" font-family="system-ui">Garbage Collector</text>
  <text x="427" y="290" text-anchor="middle" fill="#94a3b8" font-size="8" font-family="system-ui">Frees unused</text>
  <text x="427" y="304" text-anchor="middle" fill="#94a3b8" font-size="8" font-family="system-ui">memory</text>
  <!-- .java flow at top left -->
  <rect x="20" y="155" width="55" height="30" rx="4" fill="#0f172a" stroke="#f59e0b" stroke-width="1"/>
  <text x="47" y="174" text-anchor="middle" fill="#f59e0b" font-size="9" font-weight="bold" font-family="system-ui">.java</text>
  <path d="M75 170 L90 170 L90 95 L95 95" stroke="#475569" stroke-width="1" stroke-dasharray="4,3" fill="none"/>
  <rect x="100" y="155" width="60" height="30" rx="4" fill="#0f172a" stroke="#3b82f6" stroke-width="1"/>
  <text x="130" y="174" text-anchor="middle" fill="#3b82f6" font-size="9" font-weight="bold" font-family="system-ui">.class</text>
  <path d="M47 155 L47 143 L130 143 L130 155" stroke="#475569" stroke-width="1" fill="none" marker-end="url(#arr1)"/>
  <text x="88" y="140" text-anchor="middle" fill="#94a3b8" font-size="7" font-family="system-ui">javac</text>
</svg>