<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 520 280">
  <rect width="520" height="280" rx="12" fill="#0f172a"/>
  <text x="260" y="28" text-anchor="middle" fill="#f59e0b" font-size="15" font-weight="bold" font-family="system-ui">Java Program Execution Flow</text>
  <!-- Source Code -->
  <rect x="20" y="55" width="100" height="65" rx="8" fill="#1e293b" stroke="#3b82f6" stroke-width="1.5"/>
  <text x="70" y="78" text-anchor="middle" fill="#3b82f6" font-size="11" font-weight="bold" font-family="system-ui">Source</text>
  <text x="70" y="96" text-anchor="middle" fill="#06b6d4" font-size="10" font-family="monospace">Main.java</text>
  <text x="70" y="110" text-anchor="middle" fill="#94a3b8" font-size="8" font-family="system-ui">Human-readable</text>
  <!-- Arrow -->
  <path d="M120 87 L142 87" stroke="#475569" stroke-width="1.5" fill="none" marker-end="url(#a3)"/>
  <defs><marker id="a3" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto"><path d="M0,0 L8,3 L0,6" fill="#475569"/></marker></defs>
  <!-- Compiler -->
  <rect x="147" y="55" width="80" height="65" rx="8" fill="#1e293b" stroke="#f59e0b" stroke-width="1.5"/>
  <text x="187" y="78" text-anchor="middle" fill="#f59e0b" font-size="11" font-weight="bold" font-family="system-ui">javac</text>
  <text x="187" y="96" text-anchor="middle" fill="#94a3b8" font-size="9" font-family="system-ui">Compiler</text>
  <text x="187" y="110" text-anchor="middle" fill="#94a3b8" font-size="8" font-family="system-ui">Checks types</text>
  <!-- Arrow -->
  <path d="M227 87 L249 87" stroke="#475569" stroke-width="1.5" fill="none" marker-end="url(#a3)"/>
  <!-- Bytecode -->
  <rect x="254" y="55" width="100" height="65" rx="8" fill="#1e293b" stroke="#10b981" stroke-width="1.5"/>
  <text x="304" y="78" text-anchor="middle" fill="#10b981" font-size="11" font-weight="bold" font-family="system-ui">Bytecode</text>
  <text x="304" y="96" text-anchor="middle" fill="#06b6d4" font-size="10" font-family="monospace">Main.class</text>
  <text x="304" y="110" text-anchor="middle" fill="#94a3b8" font-size="8" font-family="system-ui">Platform-neutral</text>
  <!-- Arrow -->
  <path d="M354 87 L376 87" stroke="#475569" stroke-width="1.5" fill="none" marker-end="url(#a3)"/>
  <!-- JVM -->
  <rect x="381" y="45" width="120" height="85" rx="8" fill="#1e293b" stroke="#a78bfa" stroke-width="1.5"/>
  <text x="441" y="68" text-anchor="middle" fill="#a78bfa" font-size="11" font-weight="bold" font-family="system-ui">JVM</text>
  <text x="441" y="86" text-anchor="middle" fill="#94a3b8" font-size="8" font-family="system-ui">Interprets/JIT</text>
  <text x="441" y="100" text-anchor="middle" fill="#94a3b8" font-size="8" font-family="system-ui">Compiles bytecode</text>
  <text x="441" y="114" text-anchor="middle" fill="#94a3b8" font-size="8" font-family="system-ui">to native code</text>
  <!-- WORA Banner -->
  <rect x="40" y="148" width="440" height="35" rx="6" fill="#1e293b" stroke="#f59e0b" stroke-width="1"/>
  <text x="260" y="170" text-anchor="middle" fill="#f59e0b" font-size="12" font-weight="bold" font-family="system-ui">Write Once, Run Anywhere (WORA)</text>
  <!-- Platform boxes -->
  <rect x="40" y="200" width="100" height="55" rx="6" fill="#1e293b" stroke="#3b82f6" stroke-width="1"/>
  <text x="90" y="222" text-anchor="middle" fill="#3b82f6" font-size="10" font-weight="bold" font-family="system-ui">Windows</text>
  <text x="90" y="240" text-anchor="middle" fill="#94a3b8" font-size="8" font-family="system-ui">JVM for Windows</text>
  <rect x="160" y="200" width="100" height="55" rx="6" fill="#1e293b" stroke="#10b981" stroke-width="1"/>
  <text x="210" y="222" text-anchor="middle" fill="#10b981" font-size="10" font-weight="bold" font-family="system-ui">macOS</text>
  <text x="210" y="240" text-anchor="middle" fill="#94a3b8" font-size="8" font-family="system-ui">JVM for macOS</text>
  <rect x="280" y="200" width="100" height="55" rx="6" fill="#1e293b" stroke="#a78bfa" stroke-width="1"/>
  <text x="330" y="222" text-anchor="middle" fill="#a78bfa" font-size="10" font-weight="bold" font-family="system-ui">Linux</text>
  <text x="330" y="240" text-anchor="middle" fill="#94a3b8" font-size="8" font-family="system-ui">JVM for Linux</text>
  <rect x="400" y="200" width="100" height="55" rx="6" fill="#1e293b" stroke="#ef4444" stroke-width="1"/>
  <text x="450" y="222" text-anchor="middle" fill="#ef4444" font-size="10" font-weight="bold" font-family="system-ui">Android</text>
  <text x="450" y="240" text-anchor="middle" fill="#94a3b8" font-size="8" font-family="system-ui">ART / Dalvik</text>
  <!-- Same bytecode arrows -->
  <path d="M304 120 L304 148" stroke="#10b981" stroke-width="1" stroke-dasharray="4,3" fill="none"/>
  <path d="M90 198 L90 183 L260 183 L260 183 L450 183 L450 200" stroke="#475569" stroke-width="1" stroke-dasharray="3,3" fill="none"/>
  <path d="M210 200 L210 183" stroke="#475569" stroke-width="1" stroke-dasharray="3,3" fill="none"/>
  <path d="M330 200 L330 183" stroke="#475569" stroke-width="1" stroke-dasharray="3,3" fill="none"/>
</svg>