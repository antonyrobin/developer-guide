<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 520 340">
  <rect width="520" height="340" rx="12" fill="#0f172a"/>
  <text x="260" y="28" text-anchor="middle" fill="#f59e0b" font-size="15" font-weight="bold" font-family="system-ui">Java Exception Hierarchy</text>
  <!-- Throwable root -->
  <rect x="195" y="45" width="130" height="32" rx="6" fill="#1e293b" stroke="#f59e0b" stroke-width="2"/>
  <text x="260" y="66" text-anchor="middle" fill="#f59e0b" font-size="11" font-weight="bold" font-family="system-ui">Throwable</text>
  <!-- Branches -->
  <path d="M230 77 L230 95 L130 95 L130 105" stroke="#ef4444" stroke-width="1.5" fill="none"/>
  <path d="M290 77 L290 95 L390 95 L390 105" stroke="#3b82f6" stroke-width="1.5" fill="none"/>
  <!-- Error branch -->
  <rect x="65" y="105" width="130" height="32" rx="6" fill="#1e293b" stroke="#ef4444" stroke-width="1.5"/>
  <text x="130" y="126" text-anchor="middle" fill="#ef4444" font-size="11" font-weight="bold" font-family="system-ui">Error (Fatal)</text>
  <path d="M100 137 L100 152" stroke="#ef4444" stroke-width="1" fill="none"/>
  <path d="M160 137 L160 152" stroke="#ef4444" stroke-width="1" fill="none"/>
  <rect x="40" y="154" width="120" height="24" rx="4" fill="#0f172a" stroke="#ef4444" stroke-width="1"/>
  <text x="100" y="170" text-anchor="middle" fill="#ef4444" font-size="8" font-family="monospace">OutOfMemoryError</text>
  <rect x="40" y="184" width="120" height="24" rx="4" fill="#0f172a" stroke="#ef4444" stroke-width="1"/>
  <text x="100" y="200" text-anchor="middle" fill="#ef4444" font-size="8" font-family="monospace">StackOverflowError</text>
  <text x="100" y="225" text-anchor="middle" fill="#ef4444" font-size="8" font-family="system-ui">Don't catch these!</text>
  <!-- Exception branch -->
  <rect x="325" y="105" width="130" height="32" rx="6" fill="#1e293b" stroke="#3b82f6" stroke-width="1.5"/>
  <text x="390" y="126" text-anchor="middle" fill="#3b82f6" font-size="11" font-weight="bold" font-family="system-ui">Exception</text>
  <!-- Split into Checked and Unchecked -->
  <path d="M360 137 L360 155 L290 155 L290 165" stroke="#10b981" stroke-width="1.5" fill="none"/>
  <path d="M420 137 L420 155 L480 155 L480 165" stroke="#a78bfa" stroke-width="1.5" fill="none"/>
  <!-- Checked -->
  <rect x="215" y="167" width="150" height="28" rx="5" fill="#1e293b" stroke="#10b981" stroke-width="1.5"/>
  <text x="290" y="186" text-anchor="middle" fill="#10b981" font-size="10" font-weight="bold" font-family="system-ui">Checked (Compile-time)</text>
  <rect x="220" y="202" width="140" height="22" rx="3" fill="#0f172a" stroke="#475569" stroke-width="1"/>
  <text x="290" y="217" text-anchor="middle" fill="#94a3b8" font-size="8" font-family="monospace">FileNotFoundException</text>
  <rect x="220" y="230" width="140" height="22" rx="3" fill="#0f172a" stroke="#475569" stroke-width="1"/>
  <text x="290" y="245" text-anchor="middle" fill="#94a3b8" font-size="8" font-family="monospace">IOException</text>
  <rect x="220" y="258" width="140" height="22" rx="3" fill="#0f172a" stroke="#475569" stroke-width="1"/>
  <text x="290" y="273" text-anchor="middle" fill="#94a3b8" font-size="8" font-family="monospace">SQLException</text>
  <text x="290" y="296" text-anchor="middle" fill="#10b981" font-size="8" font-family="system-ui">Must handle: try-catch or throws</text>
  <!-- Unchecked -->
  <rect x="400" y="167" width="108" height="28" rx="5" fill="#1e293b" stroke="#a78bfa" stroke-width="1.5"/>
  <text x="454" y="186" text-anchor="middle" fill="#a78bfa" font-size="9" font-weight="bold" font-family="system-ui">Unchecked (Runtime)</text>
  <rect x="395" y="202" width="118" height="22" rx="3" fill="#0f172a" stroke="#475569" stroke-width="1"/>
  <text x="454" y="217" text-anchor="middle" fill="#94a3b8" font-size="8" font-family="monospace">NullPointerException</text>
  <rect x="395" y="230" width="118" height="22" rx="3" fill="#0f172a" stroke="#475569" stroke-width="1"/>
  <text x="454" y="245" text-anchor="middle" fill="#94a3b8" font-size="8" font-family="monospace">ArithmeticException</text>
  <rect x="395" y="258" width="118" height="22" rx="3" fill="#0f172a" stroke="#475569" stroke-width="1"/>
  <text x="454" y="273" text-anchor="middle" fill="#94a3b8" font-size="8" font-family="monospace">IndexOutOfBounds</text>
  <text x="454" y="296" text-anchor="middle" fill="#a78bfa" font-size="8" font-family="system-ui">Fix the code, don't catch</text>
  <!-- Try-catch flow -->
  <rect x="30" y="245" width="165" height="80" rx="6" fill="#1e293b" stroke="#f59e0b" stroke-width="1.2"/>
  <text x="112" y="265" text-anchor="middle" fill="#f59e0b" font-size="10" font-weight="bold" font-family="system-ui">Exception Handling</text>
  <text x="112" y="283" text-anchor="middle" fill="#06b6d4" font-size="9" font-family="monospace">try { ... }</text>
  <text x="112" y="298" text-anchor="middle" fill="#06b6d4" font-size="9" font-family="monospace">catch (Ex e) { ... }</text>
  <text x="112" y="313" text-anchor="middle" fill="#06b6d4" font-size="9" font-family="monospace">finally { ... }</text>
</svg>