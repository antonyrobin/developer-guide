<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 400">
  <rect width="900" height="400" rx="16" fill="#0f172a"/>
  <text x="450" y="44" text-anchor="middle" fill="#fff" font-size="26" font-weight="700" font-family="Segoe UI,Arial,sans-serif">PHP Request Lifecycle</text>

  <!-- Browser -->
  <rect x="40" y="120" width="130" height="70" rx="12" fill="#7c3aed"/>
  <text x="105" y="155" text-anchor="middle" fill="#fff" font-size="16" font-weight="700" font-family="Segoe UI,Arial,sans-serif">Browser</text>
  <text x="105" y="175" text-anchor="middle" fill="#e9d5ff" font-size="11" font-family="Segoe UI,Arial,sans-serif">HTTP Request</text>

  <polygon points="170,155 200,148 200,162" fill="#4ade80"/>

  <!-- Web Server -->
  <rect x="205" y="120" width="130" height="70" rx="12" fill="#166534"/>
  <text x="270" y="155" text-anchor="middle" fill="#fff" font-size="16" font-weight="700" font-family="Segoe UI,Arial,sans-serif">Web Server</text>
  <text x="270" y="175" text-anchor="middle" fill="#bbf7d0" font-size="11" font-family="Segoe UI,Arial,sans-serif">Apache / Nginx</text>

  <polygon points="335,155 365,148 365,162" fill="#4ade80"/>

  <!-- PHP Engine -->
  <rect x="370" y="100" width="160" height="100" rx="14" fill="#4338ca" stroke="#818cf8" stroke-width="2"/>
  <text x="450" y="140" text-anchor="middle" fill="#fff" font-size="18" font-weight="700" font-family="Segoe UI,Arial,sans-serif">PHP Engine</text>
  <text x="450" y="162" text-anchor="middle" fill="#c7d2fe" font-size="12" font-family="Segoe UI,Arial,sans-serif">Parse → Compile → Execute</text>
  <text x="450" y="182" text-anchor="middle" fill="#a5b4fc" font-size="11" font-family="Segoe UI,Arial,sans-serif">Zend Engine / OPcache</text>

  <polygon points="530,155 560,148 560,162" fill="#4ade80"/>

  <!-- Database -->
  <rect x="565" y="120" width="130" height="70" rx="12" fill="#854d0e"/>
  <text x="630" y="155" text-anchor="middle" fill="#fff" font-size="16" font-weight="700" font-family="Segoe UI,Arial,sans-serif">Database</text>
  <text x="630" y="175" text-anchor="middle" fill="#fef3c7" font-size="11" font-family="Segoe UI,Arial,sans-serif">MySQL / PostgreSQL</text>

  <!-- Response arrow back -->
  <line x1="630" y1="200" x2="630" y2="260" stroke="#f87171" stroke-width="2"/>
  <line x1="630" y1="260" x2="105" y2="260" stroke="#f87171" stroke-width="2"/>
  <polygon points="105,260 115,253 115,267" fill="#f87171"/>
  <text x="370" y="280" text-anchor="middle" fill="#f87171" font-size="13" font-weight="600" font-family="Segoe UI,Arial,sans-serif">← HTML Response</text>

  <!-- Frameworks -->
  <text x="450" y="330" text-anchor="middle" fill="#94a3b8" font-size="15" font-weight="600" font-family="Segoe UI,Arial,sans-serif">Popular PHP Frameworks</text>
  <rect x="120" y="345" width="140" height="38" rx="8" fill="#1e293b"/>
  <text x="190" y="370" text-anchor="middle" fill="#a5b4fc" font-size="14" font-family="Segoe UI,Arial,sans-serif">Laravel</text>
  <rect x="280" y="345" width="140" height="38" rx="8" fill="#1e293b"/>
  <text x="350" y="370" text-anchor="middle" fill="#a5b4fc" font-size="14" font-family="Segoe UI,Arial,sans-serif">Symfony</text>
  <rect x="440" y="345" width="140" height="38" rx="8" fill="#1e293b"/>
  <text x="510" y="370" text-anchor="middle" fill="#a5b4fc" font-size="14" font-family="Segoe UI,Arial,sans-serif">CodeIgniter</text>
  <rect x="600" y="345" width="140" height="38" rx="8" fill="#1e293b"/>
  <text x="670" y="370" text-anchor="middle" fill="#a5b4fc" font-size="14" font-family="Segoe UI,Arial,sans-serif">WordPress</text>
</svg>
