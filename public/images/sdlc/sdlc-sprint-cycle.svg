<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 380">
  <rect width="800" height="380" rx="12" fill="#0f172a"/>
  <text x="400" y="36" text-anchor="middle" fill="#f1f5f9" font-family="Arial, sans-serif" font-size="20" font-weight="bold">Sprint Workflow &amp; Ceremonies</text>
  <!-- Timeline -->
  <line x1="60" y1="190" x2="740" y2="190" stroke="#334155" stroke-width="2"/>
  <!-- Sprint Planning -->
  <rect x="40" y="100" width="130" height="60" rx="8" fill="#1e293b" stroke="#3b82f6" stroke-width="2"/>
  <text x="105" y="128" text-anchor="middle" fill="#93c5fd" font-family="Arial, sans-serif" font-size="12" font-weight="bold">Sprint</text>
  <text x="105" y="145" text-anchor="middle" fill="#93c5fd" font-family="Arial, sans-serif" font-size="12" font-weight="bold">Planning</text>
  <line x1="105" y1="160" x2="105" y2="185" stroke="#3b82f6" stroke-width="2"/>
  <circle cx="105" cy="190" r="6" fill="#3b82f6"/>
  <text x="105" y="220" text-anchor="middle" fill="#94a3b8" font-family="Arial, sans-serif" font-size="10">2-4 hours</text>
  <text x="105" y="235" text-anchor="middle" fill="#64748b" font-family="Arial, sans-serif" font-size="9">Select backlog items</text>
  <!-- Daily Standup -->
  <rect x="195" y="100" width="130" height="60" rx="8" fill="#1e293b" stroke="#10b981" stroke-width="2"/>
  <text x="260" y="128" text-anchor="middle" fill="#6ee7b7" font-family="Arial, sans-serif" font-size="12" font-weight="bold">Daily</text>
  <text x="260" y="145" text-anchor="middle" fill="#6ee7b7" font-family="Arial, sans-serif" font-size="12" font-weight="bold">Standup</text>
  <line x1="260" y1="160" x2="260" y2="185" stroke="#10b981" stroke-width="2"/>
  <circle cx="260" cy="190" r="6" fill="#10b981"/>
  <text x="260" y="220" text-anchor="middle" fill="#94a3b8" font-family="Arial, sans-serif" font-size="10">15 minutes</text>
  <text x="260" y="235" text-anchor="middle" fill="#64748b" font-family="Arial, sans-serif" font-size="9">Sync &amp; blockers</text>
  <!-- Development + Testing -->
  <rect x="350" y="100" width="130" height="60" rx="8" fill="#1e293b" stroke="#8b5cf6" stroke-width="2"/>
  <text x="415" y="128" text-anchor="middle" fill="#c4b5fd" font-family="Arial, sans-serif" font-size="12" font-weight="bold">Build &amp;</text>
  <text x="415" y="145" text-anchor="middle" fill="#c4b5fd" font-family="Arial, sans-serif" font-size="12" font-weight="bold">Test</text>
  <line x1="415" y1="160" x2="415" y2="185" stroke="#8b5cf6" stroke-width="2"/>
  <circle cx="415" cy="190" r="6" fill="#8b5cf6"/>
  <text x="415" y="220" text-anchor="middle" fill="#94a3b8" font-family="Arial, sans-serif" font-size="10">1-4 weeks</text>
  <text x="415" y="235" text-anchor="middle" fill="#64748b" font-family="Arial, sans-serif" font-size="9">Code + QA</text>
  <!-- Sprint Review -->
  <rect x="505" y="100" width="130" height="60" rx="8" fill="#1e293b" stroke="#f59e0b" stroke-width="2"/>
  <text x="570" y="128" text-anchor="middle" fill="#fcd34d" font-family="Arial, sans-serif" font-size="12" font-weight="bold">Sprint</text>
  <text x="570" y="145" text-anchor="middle" fill="#fcd34d" font-family="Arial, sans-serif" font-size="12" font-weight="bold">Review</text>
  <line x1="570" y1="160" x2="570" y2="185" stroke="#f59e0b" stroke-width="2"/>
  <circle cx="570" cy="190" r="6" fill="#f59e0b"/>
  <text x="570" y="220" text-anchor="middle" fill="#94a3b8" font-family="Arial, sans-serif" font-size="10">1-2 hours</text>
  <text x="570" y="235" text-anchor="middle" fill="#64748b" font-family="Arial, sans-serif" font-size="9">Demo to stakeholders</text>
  <!-- Retrospective -->
  <rect x="660" y="100" width="130" height="60" rx="8" fill="#1e293b" stroke="#ef4444" stroke-width="2"/>
  <text x="725" y="128" text-anchor="middle" fill="#fca5a5" font-family="Arial, sans-serif" font-size="12" font-weight="bold">Sprint</text>
  <text x="725" y="145" text-anchor="middle" fill="#fca5a5" font-family="Arial, sans-serif" font-size="12" font-weight="bold">Retrospective</text>
  <line x1="725" y1="160" x2="725" y2="185" stroke="#ef4444" stroke-width="2"/>
  <circle cx="725" cy="190" r="6" fill="#ef4444"/>
  <text x="725" y="220" text-anchor="middle" fill="#94a3b8" font-family="Arial, sans-serif" font-size="10">1-1.5 hours</text>
  <text x="725" y="235" text-anchor="middle" fill="#64748b" font-family="Arial, sans-serif" font-size="9">What to improve</text>
  <!-- Sprint labels -->
  <text x="105" y="270" text-anchor="middle" fill="#3b82f6" font-family="Arial, sans-serif" font-size="11" font-weight="bold">START</text>
  <text x="725" y="270" text-anchor="middle" fill="#ef4444" font-family="Arial, sans-serif" font-size="11" font-weight="bold">END</text>
  <!-- Feedback loop arrow -->
  <path d="M725,280 C725,340 105,340 105,280" fill="none" stroke="#06b6d4" stroke-width="1.5" stroke-dasharray="6,3"/>
  <polygon points="105,285 100,275 110,275" fill="#06b6d4"/>
  <text x="415" y="352" text-anchor="middle" fill="#67e8f9" font-family="Arial, sans-serif" font-size="12" font-weight="bold">Continuous Improvement Loop</text>
  <text x="415" y="370" text-anchor="middle" fill="#64748b" font-family="Arial, sans-serif" font-size="10" font-style="italic">Each retrospective feeds into the next sprint's planning</text>
</svg>