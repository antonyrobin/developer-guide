<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 400">
  <rect width="800" height="400" rx="12" fill="#0f172a"/>
  <text x="400" y="36" text-anchor="middle" fill="#f1f5f9" font-family="Arial, sans-serif" font-size="20" font-weight="bold">V-Model (Verification &amp; Validation)</text>
  <!-- Left side - Verification -->
  <text x="160" y="66" text-anchor="middle" fill="#3b82f6" font-family="Arial, sans-serif" font-size="14" font-weight="bold">Verification</text>
  <rect x="30" y="80" width="180" height="36" rx="6" fill="#1e293b" stroke="#3b82f6" stroke-width="1.5"/>
  <text x="120" y="103" text-anchor="middle" fill="#93c5fd" font-family="Arial, sans-serif" font-size="12">Requirements Analysis</text>
  <rect x="80" y="140" width="180" height="36" rx="6" fill="#1e293b" stroke="#8b5cf6" stroke-width="1.5"/>
  <text x="170" y="163" text-anchor="middle" fill="#c4b5fd" font-family="Arial, sans-serif" font-size="12">System Design</text>
  <rect x="130" y="200" width="180" height="36" rx="6" fill="#1e293b" stroke="#10b981" stroke-width="1.5"/>
  <text x="220" y="223" text-anchor="middle" fill="#6ee7b7" font-family="Arial, sans-serif" font-size="12">Architecture Design</text>
  <rect x="180" y="260" width="180" height="36" rx="6" fill="#1e293b" stroke="#f59e0b" stroke-width="1.5"/>
  <text x="270" y="283" text-anchor="middle" fill="#fcd34d" font-family="Arial, sans-serif" font-size="12">Module Design</text>
  <!-- Bottom - Coding -->
  <rect x="310" y="320" width="180" height="44" rx="8" fill="#1e293b" stroke="#ef4444" stroke-width="2"/>
  <text x="400" y="347" text-anchor="middle" fill="#fca5a5" font-family="Arial, sans-serif" font-size="14" font-weight="bold">Coding</text>
  <!-- Right side - Validation -->
  <text x="640" y="66" text-anchor="middle" fill="#10b981" font-family="Arial, sans-serif" font-size="14" font-weight="bold">Validation</text>
  <rect x="590" y="80" width="180" height="36" rx="6" fill="#1e293b" stroke="#3b82f6" stroke-width="1.5"/>
  <text x="680" y="103" text-anchor="middle" fill="#93c5fd" font-family="Arial, sans-serif" font-size="12">Acceptance Testing</text>
  <rect x="540" y="140" width="180" height="36" rx="6" fill="#1e293b" stroke="#8b5cf6" stroke-width="1.5"/>
  <text x="630" y="163" text-anchor="middle" fill="#c4b5fd" font-family="Arial, sans-serif" font-size="12">System Testing</text>
  <rect x="490" y="200" width="180" height="36" rx="6" fill="#1e293b" stroke="#10b981" stroke-width="1.5"/>
  <text x="580" y="223" text-anchor="middle" fill="#6ee7b7" font-family="Arial, sans-serif" font-size="12">Integration Testing</text>
  <rect x="440" y="260" width="180" height="36" rx="6" fill="#1e293b" stroke="#f59e0b" stroke-width="1.5"/>
  <text x="530" y="283" text-anchor="middle" fill="#fcd34d" font-family="Arial, sans-serif" font-size="12">Unit Testing</text>
  <!-- V-lines -->
  <line x1="210" y1="116" x2="260" y2="140" stroke="#475569" stroke-width="1.5"/>
  <line x1="260" y1="176" x2="310" y2="200" stroke="#475569" stroke-width="1.5"/>
  <line x1="310" y1="236" x2="360" y2="260" stroke="#475569" stroke-width="1.5"/>
  <line x1="360" y1="296" x2="400" y2="320" stroke="#475569" stroke-width="1.5"/>
  <line x1="400" y1="320" x2="440" y2="296" stroke="#475569" stroke-width="1.5"/>
  <line x1="490" y1="260" x2="440" y2="236" stroke="#475569" stroke-width="1.5"/>
  <line x1="540" y1="200" x2="490" y2="176" stroke="#475569" stroke-width="1.5"/>
  <line x1="590" y1="140" x2="540" y2="116" stroke="#475569" stroke-width="1.5"/>
  <!-- Horizontal dashed lines connecting matching phases -->
  <line x1="210" y1="98" x2="590" y2="98" stroke="#3b82f6" stroke-width="1" stroke-dasharray="4,4" opacity="0.4"/>
  <line x1="260" y1="158" x2="540" y2="158" stroke="#8b5cf6" stroke-width="1" stroke-dasharray="4,4" opacity="0.4"/>
  <line x1="310" y1="218" x2="490" y2="218" stroke="#10b981" stroke-width="1" stroke-dasharray="4,4" opacity="0.4"/>
  <line x1="360" y1="278" x2="440" y2="278" stroke="#f59e0b" stroke-width="1" stroke-dasharray="4,4" opacity="0.4"/>
  <text x="400" y="388" text-anchor="middle" fill="#64748b" font-family="Arial, sans-serif" font-size="11" font-style="italic">Each development phase maps to a corresponding testing phase</text>
</svg>