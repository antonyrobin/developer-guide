<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 420">
  <rect width="800" height="420" rx="12" fill="#0f172a"/>
  <text x="400" y="36" text-anchor="middle" fill="#f1f5f9" font-family="Arial, sans-serif" font-size="20" font-weight="bold">Agile &amp; Scrum Framework</text>
  <!-- Product Backlog -->
  <rect x="20" y="70" width="140" height="280" rx="8" fill="#1e293b" stroke="#8b5cf6" stroke-width="2"/>
  <text x="90" y="96" text-anchor="middle" fill="#c4b5fd" font-family="Arial, sans-serif" font-size="13" font-weight="bold">Product</text>
  <text x="90" y="113" text-anchor="middle" fill="#c4b5fd" font-family="Arial, sans-serif" font-size="13" font-weight="bold">Backlog</text>
  <rect x="35" y="128" width="110" height="24" rx="4" fill="#312e81"/>
  <text x="90" y="145" text-anchor="middle" fill="#a5b4fc" font-family="Arial, sans-serif" font-size="10">User Story 1</text>
  <rect x="35" y="158" width="110" height="24" rx="4" fill="#312e81"/>
  <text x="90" y="175" text-anchor="middle" fill="#a5b4fc" font-family="Arial, sans-serif" font-size="10">User Story 2</text>
  <rect x="35" y="188" width="110" height="24" rx="4" fill="#312e81"/>
  <text x="90" y="205" text-anchor="middle" fill="#a5b4fc" font-family="Arial, sans-serif" font-size="10">User Story 3</text>
  <rect x="35" y="218" width="110" height="24" rx="4" fill="#1a2744"/>
  <text x="90" y="235" text-anchor="middle" fill="#64748b" font-family="Arial, sans-serif" font-size="10">Story 4</text>
  <rect x="35" y="248" width="110" height="24" rx="4" fill="#1a2744"/>
  <text x="90" y="265" text-anchor="middle" fill="#64748b" font-family="Arial, sans-serif" font-size="10">Story 5</text>
  <rect x="35" y="278" width="110" height="24" rx="4" fill="#1a2744"/>
  <text x="90" y="295" text-anchor="middle" fill="#64748b" font-family="Arial, sans-serif" font-size="10">Story 6 ...</text>
  <text x="90" y="335" text-anchor="middle" fill="#64748b" font-family="Arial, sans-serif" font-size="10">Prioritized by</text>
  <text x="90" y="347" text-anchor="middle" fill="#c4b5fd" font-family="Arial, sans-serif" font-size="10" font-weight="bold">Product Owner</text>
  <!-- Arrow to Sprint -->
  <polygon points="165,210 185,200 185,220" fill="#8b5cf6"/>
  <!-- Sprint cycle -->
  <ellipse cx="400" cy="210" rx="180" ry="140" fill="none" stroke="#10b981" stroke-width="2" stroke-dasharray="8,4"/>
  <text x="400" y="80" text-anchor="middle" fill="#6ee7b7" font-family="Arial, sans-serif" font-size="15" font-weight="bold">Sprint (1-4 weeks)</text>
  <!-- Sprint activities -->
  <rect x="220" y="120" width="120" height="40" rx="6" fill="#1e293b" stroke="#3b82f6" stroke-width="1.5"/>
  <text x="280" y="145" text-anchor="middle" fill="#93c5fd" font-family="Arial, sans-serif" font-size="11" font-weight="bold">Planning</text>
  <rect x="345" y="130" width="110" height="40" rx="6" fill="#1e293b" stroke="#10b981" stroke-width="1.5"/>
  <text x="400" y="155" text-anchor="middle" fill="#6ee7b7" font-family="Arial, sans-serif" font-size="11" font-weight="bold">Development</text>
  <rect x="460" y="120" width="110" height="40" rx="6" fill="#1e293b" stroke="#f59e0b" stroke-width="1.5"/>
  <text x="515" y="145" text-anchor="middle" fill="#fcd34d" font-family="Arial, sans-serif" font-size="11" font-weight="bold">Testing</text>
  <!-- Daily standup -->
  <rect x="310" y="195" width="180" height="34" rx="6" fill="#1e293b" stroke="#06b6d4" stroke-width="1.5"/>
  <text x="400" y="216" text-anchor="middle" fill="#67e8f9" font-family="Arial, sans-serif" font-size="11" font-weight="bold">Daily Standup (15 min)</text>
  <!-- Review & Retro -->
  <rect x="260" y="260" width="120" height="40" rx="6" fill="#1e293b" stroke="#ef4444" stroke-width="1.5"/>
  <text x="320" y="285" text-anchor="middle" fill="#fca5a5" font-family="Arial, sans-serif" font-size="11" font-weight="bold">Review</text>
  <rect x="420" y="260" width="140" height="40" rx="6" fill="#1e293b" stroke="#ec4899" stroke-width="1.5"/>
  <text x="490" y="285" text-anchor="middle" fill="#f9a8d4" font-family="Arial, sans-serif" font-size="11" font-weight="bold">Retrospective</text>
  <!-- Arrow to Increment -->
  <polygon points="585,210 605,200 605,220" fill="#10b981"/>
  <!-- Increment -->
  <rect x="620" y="130" width="155" height="160" rx="8" fill="#1e293b" stroke="#f59e0b" stroke-width="2"/>
  <text x="698" y="158" text-anchor="middle" fill="#fcd34d" font-family="Arial, sans-serif" font-size="14" font-weight="bold">Shippable</text>
  <text x="698" y="176" text-anchor="middle" fill="#fcd34d" font-family="Arial, sans-serif" font-size="14" font-weight="bold">Increment</text>
  <text x="698" y="210" text-anchor="middle" fill="#94a3b8" font-family="Arial, sans-serif" font-size="11">Working software</text>
  <text x="698" y="226" text-anchor="middle" fill="#94a3b8" font-family="Arial, sans-serif" font-size="11">delivered to users</text>
  <text x="698" y="260" text-anchor="middle" fill="#64748b" font-family="Arial, sans-serif" font-size="10">Potentially</text>
  <text x="698" y="275" text-anchor="middle" fill="#64748b" font-family="Arial, sans-serif" font-size="10">releasable product</text>
  <!-- Roles -->
  <rect x="180" y="370" width="150" height="36" rx="6" fill="#1e293b" stroke="#8b5cf6" stroke-width="1"/>
  <text x="255" y="393" text-anchor="middle" fill="#c4b5fd" font-family="Arial, sans-serif" font-size="11" font-weight="bold">Product Owner</text>
  <rect x="345" y="370" width="150" height="36" rx="6" fill="#1e293b" stroke="#10b981" stroke-width="1"/>
  <text x="420" y="393" text-anchor="middle" fill="#6ee7b7" font-family="Arial, sans-serif" font-size="11" font-weight="bold">Scrum Master</text>
  <rect x="510" y="370" width="150" height="36" rx="6" fill="#1e293b" stroke="#3b82f6" stroke-width="1"/>
  <text x="585" y="393" text-anchor="middle" fill="#93c5fd" font-family="Arial, sans-serif" font-size="11" font-weight="bold">Dev Team (5-9)</text>
</svg>