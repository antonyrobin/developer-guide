<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 400">
  <rect width="800" height="400" rx="12" fill="#0f172a"/>
  <text x="400" y="38" text-anchor="middle" fill="#f1f5f9" font-family="Arial, sans-serif" font-size="22" font-weight="bold">Software Development Life Cycle</text>
  <!-- Center circle -->
  <circle cx="400" cy="210" r="70" fill="#1e293b" stroke="#8b5cf6" stroke-width="3"/>
  <text x="400" y="205" text-anchor="middle" fill="#c4b5fd" font-family="Arial, sans-serif" font-size="22" font-weight="bold">SDLC</text>
  <text x="400" y="225" text-anchor="middle" fill="#94a3b8" font-family="Arial, sans-serif" font-size="11">Framework</text>
  <!-- Quality -->
  <line x1="338" y1="175" x2="200" y2="105" stroke="#3b82f6" stroke-width="2"/>
  <rect x="90" y="78" width="175" height="54" rx="8" fill="#1e293b" stroke="#3b82f6" stroke-width="1.5"/>
  <text x="178" y="100" text-anchor="middle" fill="#93c5fd" font-family="Arial, sans-serif" font-size="14" font-weight="bold">Ensures Quality</text>
  <text x="178" y="120" text-anchor="middle" fill="#94a3b8" font-family="Arial, sans-serif" font-size="11">Catch errors early</text>
  <!-- Reduces Costs -->
  <line x1="462" y1="175" x2="600" y2="105" stroke="#10b981" stroke-width="2"/>
  <rect x="525" y="78" width="185" height="54" rx="8" fill="#1e293b" stroke="#10b981" stroke-width="1.5"/>
  <text x="618" y="100" text-anchor="middle" fill="#6ee7b7" font-family="Arial, sans-serif" font-size="14" font-weight="bold">Reduces Costs</text>
  <text x="618" y="120" text-anchor="middle" fill="#94a3b8" font-family="Arial, sans-serif" font-size="11">Planning prevents fixes</text>
  <!-- Clear Planning -->
  <line x1="338" y1="245" x2="200" y2="315" stroke="#f59e0b" stroke-width="2"/>
  <rect x="90" y="288" width="175" height="54" rx="8" fill="#1e293b" stroke="#f59e0b" stroke-width="1.5"/>
  <text x="178" y="310" text-anchor="middle" fill="#fcd34d" font-family="Arial, sans-serif" font-size="14" font-weight="bold">Clear Planning</text>
  <text x="178" y="330" text-anchor="middle" fill="#94a3b8" font-family="Arial, sans-serif" font-size="11">Who does what &amp; when</text>
  <!-- Better Teamwork -->
  <line x1="462" y1="245" x2="600" y2="315" stroke="#ef4444" stroke-width="2"/>
  <rect x="525" y="288" width="185" height="54" rx="8" fill="#1e293b" stroke="#ef4444" stroke-width="1.5"/>
  <text x="618" y="310" text-anchor="middle" fill="#fca5a5" font-family="Arial, sans-serif" font-size="14" font-weight="bold">Better Teamwork</text>
  <text x="618" y="330" text-anchor="middle" fill="#94a3b8" font-family="Arial, sans-serif" font-size="11">Collaboration &amp; clarity</text>
  <text x="400" y="388" text-anchor="middle" fill="#64748b" font-family="Arial, sans-serif" font-size="12" font-style="italic">A structured roadmap from concept to deployment</text>
</svg>