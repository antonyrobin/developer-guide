<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 420">
  <rect width="800" height="420" rx="12" fill="#0f172a"/>
  <text x="400" y="40" text-anchor="middle" fill="#f1f5f9" font-family="Arial, sans-serif" font-size="22" font-weight="bold">Types of Software</text>
  <!-- System Software -->
  <rect x="30" y="70" width="230" height="320" rx="10" fill="#1e293b" stroke="#3b82f6" stroke-width="2"/>
  <rect x="30" y="70" width="230" height="48" rx="10" fill="#3b82f6"/>
  <text x="145" y="100" text-anchor="middle" fill="#ffffff" font-family="Arial, sans-serif" font-size="16" font-weight="bold">System Software</text>
  <text x="145" y="140" text-anchor="middle" fill="#94a3b8" font-family="Arial, sans-serif" font-size="12">Manages hardware &amp; resources</text>
  <rect x="50" y="162" width="190" height="32" rx="6" fill="#1a2744"/>
  <text x="145" y="183" text-anchor="middle" fill="#93c5fd" font-family="Arial, sans-serif" font-size="13">Windows</text>
  <rect x="50" y="202" width="190" height="32" rx="6" fill="#1a2744"/>
  <text x="145" y="223" text-anchor="middle" fill="#93c5fd" font-family="Arial, sans-serif" font-size="13">Linux / macOS</text>
  <rect x="50" y="242" width="190" height="32" rx="6" fill="#1a2744"/>
  <text x="145" y="263" text-anchor="middle" fill="#93c5fd" font-family="Arial, sans-serif" font-size="13">Device Drivers</text>
  <rect x="50" y="282" width="190" height="32" rx="6" fill="#1a2744"/>
  <text x="145" y="303" text-anchor="middle" fill="#93c5fd" font-family="Arial, sans-serif" font-size="13">BIOS / Firmware</text>
  <text x="145" y="355" text-anchor="middle" fill="#64748b" font-family="Arial, sans-serif" font-size="11" font-style="italic">"The boss of your computer"</text>
  <!-- Application Software -->
  <rect x="285" y="70" width="230" height="320" rx="10" fill="#1e293b" stroke="#10b981" stroke-width="2"/>
  <rect x="285" y="70" width="230" height="48" rx="10" fill="#10b981"/>
  <text x="400" y="100" text-anchor="middle" fill="#ffffff" font-family="Arial, sans-serif" font-size="16" font-weight="bold">Application Software</text>
  <text x="400" y="140" text-anchor="middle" fill="#94a3b8" font-family="Arial, sans-serif" font-size="12">Helps users with tasks</text>
  <rect x="305" y="162" width="190" height="32" rx="6" fill="#1a2744"/>
  <text x="400" y="183" text-anchor="middle" fill="#6ee7b7" font-family="Arial, sans-serif" font-size="13">Google Docs / Word</text>
  <rect x="305" y="202" width="190" height="32" rx="6" fill="#1a2744"/>
  <text x="400" y="223" text-anchor="middle" fill="#6ee7b7" font-family="Arial, sans-serif" font-size="13">Photoshop / Figma</text>
  <rect x="305" y="242" width="190" height="32" rx="6" fill="#1a2744"/>
  <text x="400" y="263" text-anchor="middle" fill="#6ee7b7" font-family="Arial, sans-serif" font-size="13">Gmail / Slack</text>
  <rect x="305" y="282" width="190" height="32" rx="6" fill="#1a2744"/>
  <text x="400" y="303" text-anchor="middle" fill="#6ee7b7" font-family="Arial, sans-serif" font-size="13">VS Code / IntelliJ</text>
  <text x="400" y="355" text-anchor="middle" fill="#64748b" font-family="Arial, sans-serif" font-size="11" font-style="italic">"Tools for everyday tasks"</text>
  <!-- Embedded Software -->
  <rect x="540" y="70" width="230" height="320" rx="10" fill="#1e293b" stroke="#f59e0b" stroke-width="2"/>
  <rect x="540" y="70" width="230" height="48" rx="10" fill="#f59e0b"/>
  <text x="655" y="100" text-anchor="middle" fill="#ffffff" font-family="Arial, sans-serif" font-size="16" font-weight="bold">Embedded Software</text>
  <text x="655" y="140" text-anchor="middle" fill="#94a3b8" font-family="Arial, sans-serif" font-size="12">Lives inside devices</text>
  <rect x="560" y="162" width="190" height="32" rx="6" fill="#1a2744"/>
  <text x="655" y="183" text-anchor="middle" fill="#fcd34d" font-family="Arial, sans-serif" font-size="13">ATM Machines</text>
  <rect x="560" y="202" width="190" height="32" rx="6" fill="#1a2744"/>
  <text x="655" y="223" text-anchor="middle" fill="#fcd34d" font-family="Arial, sans-serif" font-size="13">Washing Machines</text>
  <rect x="560" y="242" width="190" height="32" rx="6" fill="#1a2744"/>
  <text x="655" y="263" text-anchor="middle" fill="#fcd34d" font-family="Arial, sans-serif" font-size="13">Car Dashboards</text>
  <rect x="560" y="282" width="190" height="32" rx="6" fill="#1a2744"/>
  <text x="655" y="303" text-anchor="middle" fill="#fcd34d" font-family="Arial, sans-serif" font-size="13">Smart Thermostats</text>
  <text x="655" y="355" text-anchor="middle" fill="#64748b" font-family="Arial, sans-serif" font-size="11" font-style="italic">"Brain in smart gadgets"</text>
</svg>