<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 520 340">
  <rect width="520" height="340" rx="12" fill="#0f172a"/>
  <text x="260" y="28" text-anchor="middle" fill="#f1f5f9" font-family="Arial,sans-serif" font-size="18" font-weight="bold">Inheritance Types</text>
  <!-- Single -->
  <rect x="15" y="50" width="120" height="125" rx="8" fill="#1e293b" stroke="#3b82f6" stroke-width="1.5"/>
  <text x="75" y="70" text-anchor="middle" fill="#3b82f6" font-family="Arial,sans-serif" font-size="11" font-weight="bold">Single</text>
  <rect x="30" y="80" width="90" height="24" rx="4" fill="#3b82f6" opacity="0.2"/>
  <text x="75" y="96" text-anchor="middle" fill="#93c5fd" font-family="monospace" font-size="10">Animal</text>
  <line x1="75" y1="104" x2="75" y2="125" stroke="#475569" stroke-width="1.5"/>
  <text x="82" y="118" fill="#64748b" font-family="Arial,sans-serif" font-size="8">▼</text>
  <rect x="30" y="125" width="90" height="24" rx="4" fill="#3b82f6" opacity="0.2"/>
  <text x="75" y="141" text-anchor="middle" fill="#93c5fd" font-family="monospace" font-size="10">Dog</text>
  <!-- Multilevel -->
  <rect x="145" y="50" width="120" height="158" rx="8" fill="#1e293b" stroke="#10b981" stroke-width="1.5"/>
  <text x="205" y="70" text-anchor="middle" fill="#10b981" font-family="Arial,sans-serif" font-size="11" font-weight="bold">Multilevel</text>
  <rect x="160" y="80" width="90" height="22" rx="4" fill="#10b981" opacity="0.2"/>
  <text x="205" y="95" text-anchor="middle" fill="#6ee7b7" font-family="monospace" font-size="9">Person</text>
  <line x1="205" y1="102" x2="205" y2="112" stroke="#475569" stroke-width="1.5"/>
  <rect x="160" y="112" width="90" height="22" rx="4" fill="#10b981" opacity="0.2"/>
  <text x="205" y="127" text-anchor="middle" fill="#6ee7b7" font-family="monospace" font-size="9">Employee</text>
  <line x1="205" y1="134" x2="205" y2="148" stroke="#475569" stroke-width="1.5"/>
  <rect x="160" y="148" width="90" height="22" rx="4" fill="#10b981" opacity="0.2"/>
  <text x="205" y="163" text-anchor="middle" fill="#6ee7b7" font-family="monospace" font-size="9">Manager</text>
  <text x="205" y="200" text-anchor="middle" fill="#64748b" font-family="Arial,sans-serif" font-size="8">Chain of inheritance</text>
  <!-- Hierarchical -->
  <rect x="275" y="50" width="120" height="158" rx="8" fill="#1e293b" stroke="#f59e0b" stroke-width="1.5"/>
  <text x="335" y="70" text-anchor="middle" fill="#f59e0b" font-family="Arial,sans-serif" font-size="11" font-weight="bold">Hierarchical</text>
  <rect x="290" y="82" width="90" height="22" rx="4" fill="#f59e0b" opacity="0.2"/>
  <text x="335" y="97" text-anchor="middle" fill="#fcd34d" font-family="monospace" font-size="9">Vehicle</text>
  <line x1="315" y1="104" x2="305" y2="118" stroke="#475569" stroke-width="1.5"/>
  <line x1="355" y1="104" x2="365" y2="118" stroke="#475569" stroke-width="1.5"/>
  <rect x="280" y="118" width="55" height="22" rx="4" fill="#f59e0b" opacity="0.2"/>
  <text x="307" y="133" text-anchor="middle" fill="#fcd34d" font-family="monospace" font-size="9">Car</text>
  <rect x="345" y="118" width="55" height="22" rx="4" fill="#f59e0b" opacity="0.2"/>
  <text x="372" y="133" text-anchor="middle" fill="#fcd34d" font-family="monospace" font-size="9">Bike</text>
  <text x="335" y="165" text-anchor="middle" fill="#64748b" font-family="Arial,sans-serif" font-size="8">One parent → many children</text>
  <!-- Multiple -->
  <rect x="405" y="50" width="100" height="158" rx="8" fill="#1e293b" stroke="#ef4444" stroke-width="1.5"/>
  <text x="455" y="70" text-anchor="middle" fill="#ef4444" font-family="Arial,sans-serif" font-size="11" font-weight="bold">Multiple</text>
  <rect x="415" y="82" width="80" height="20" rx="4" fill="#ef4444" opacity="0.2"/>
  <text x="455" y="96" text-anchor="middle" fill="#fca5a5" font-family="monospace" font-size="8">Camera</text>
  <rect x="415" y="108" width="80" height="20" rx="4" fill="#ef4444" opacity="0.2"/>
  <text x="455" y="122" text-anchor="middle" fill="#fca5a5" font-family="monospace" font-size="8">Player</text>
  <line x1="455" y1="128" x2="455" y2="145" stroke="#475569" stroke-width="1.5"/>
  <rect x="415" y="145" width="80" height="20" rx="4" fill="#ef4444" opacity="0.2"/>
  <text x="455" y="159" text-anchor="middle" fill="#fca5a5" font-family="monospace" font-size="8">Phone</text>
  <text x="455" y="185" text-anchor="middle" fill="#64748b" font-family="Arial,sans-serif" font-size="8">Via interfaces</text>
  <!-- Key concepts -->
  <rect x="15" y="225" width="490" height="50" rx="8" fill="#1e293b"/>
  <text x="260" y="246" text-anchor="middle" fill="#e2e8f0" font-family="Arial,sans-serif" font-size="11" font-weight="bold">Key Concepts</text>
  <text x="260" y="264" text-anchor="middle" fill="#94a3b8" font-family="monospace" font-size="10">extends (classes) • implements (interfaces) • super() • @Override</text>
  <!-- Warning -->
  <rect x="15" y="285" width="490" height="45" rx="8" fill="#f59e0b" opacity="0.1" stroke="#f59e0b" stroke-width="1"/>
  <text x="260" y="305" text-anchor="middle" fill="#f59e0b" font-family="Arial,sans-serif" font-size="11" font-weight="bold">Modern Advice</text>
  <text x="260" y="322" text-anchor="middle" fill="#94a3b8" font-family="Arial,sans-serif" font-size="10">"Favor composition over inheritance" — deep hierarchies become fragile</text>
</svg>