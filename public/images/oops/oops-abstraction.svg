<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 320" font-family="Segoe UI, Arial, sans-serif">
  <defs>
    <linearGradient id="g1" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#4CAF50;stop-opacity:1"/>
      <stop offset="100%" style="stop-color:#388E3C;stop-opacity:1"/>
    </linearGradient>
    <linearGradient id="g2" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#FF9800;stop-opacity:1"/>
      <stop offset="100%" style="stop-color:#F57C00;stop-opacity:1"/>
    </linearGradient>
    <linearGradient id="g3" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#2196F3;stop-opacity:1"/>
      <stop offset="100%" style="stop-color:#1976D2;stop-opacity:1"/>
    </linearGradient>
  </defs>
  <rect width="600" height="320" rx="12" fill="#f8f9fa"/>
  <text x="300" y="35" text-anchor="middle" font-size="20" font-weight="bold" fill="#333">Abstraction</text>
  <!-- User layer -->
  <rect x="60" y="60" width="200" height="70" rx="10" fill="url(#g1)"/>
  <text x="160" y="90" text-anchor="middle" fill="#fff" font-size="15" font-weight="bold">User Interface</text>
  <text x="160" y="112" text-anchor="middle" fill="#e8f5e9" font-size="12">drive(), brake(), steer()</text>
  <!-- Arrow -->
  <path d="M160 130 L160 158" stroke="#666" stroke-width="2" marker-end="url(#arrow)"/>
  <defs><marker id="arrow" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto"><polygon points="0 0, 10 3.5, 0 7" fill="#666"/></marker></defs>
  <!-- Hidden layer -->
  <rect x="60" y="160" width="200" height="90" rx="10" fill="url(#g2)" opacity="0.7"/>
  <text x="160" y="190" text-anchor="middle" fill="#fff" font-size="15" font-weight="bold">Hidden Details</text>
  <text x="160" y="210" text-anchor="middle" fill="#fff3e0" font-size="11">Engine combustion</text>
  <text x="160" y="226" text-anchor="middle" fill="#fff3e0" font-size="11">Fuel injection system</text>
  <text x="160" y="242" text-anchor="middle" fill="#fff3e0" font-size="11">Transmission mechanics</text>
  <!-- Right side - Code analogy -->
  <rect x="320" y="60" width="230" height="70" rx="10" fill="url(#g3)"/>
  <text x="435" y="88" text-anchor="middle" fill="#fff" font-size="15" font-weight="bold">Abstract Interface</text>
  <text x="435" y="110" text-anchor="middle" fill="#e3f2fd" font-size="12">abstract void draw();</text>
  <path d="M435 130 L435 158" stroke="#666" stroke-width="2" marker-end="url(#arrow)"/>
  <rect x="320" y="160" width="230" height="90" rx="10" fill="url(#g2)" opacity="0.7"/>
  <text x="435" y="188" text-anchor="middle" fill="#fff" font-size="15" font-weight="bold">Implementation</text>
  <text x="435" y="208" text-anchor="middle" fill="#fff3e0" font-size="11">Circle → π × r²</text>
  <text x="435" y="224" text-anchor="middle" fill="#fff3e0" font-size="11">Rectangle → w × h</text>
  <text x="435" y="240" text-anchor="middle" fill="#fff3e0" font-size="11">Triangle → ½ × b × h</text>
  <!-- Footer -->
  <text x="300" y="290" text-anchor="middle" font-size="13" fill="#666" font-style="italic">"Show WHAT it does, hide HOW it does it"</text>
</svg>