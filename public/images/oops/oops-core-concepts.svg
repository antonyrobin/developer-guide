<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 520 340">
  <rect width="520" height="340" rx="12" fill="#0f172a"/>
  <text x="260" y="30" text-anchor="middle" fill="#f1f5f9" font-family="Arial,sans-serif" font-size="18" font-weight="bold">OOP Core Concepts</text>
  <!-- Center object -->
  <rect x="195" y="48" width="130" height="40" rx="8" fill="#8b5cf6" opacity="0.3" stroke="#8b5cf6" stroke-width="2"/>
  <text x="260" y="73" text-anchor="middle" fill="#c4b5fd" font-family="Arial,sans-serif" font-size="14" font-weight="bold">OOP</text>
  <!-- 4 pillars -->
  <rect x="20" y="120" width="110" height="70" rx="8" fill="#3b82f6" opacity="0.25" stroke="#3b82f6" stroke-width="1.5"/>
  <text x="75" y="148" text-anchor="middle" fill="#93c5fd" font-family="Arial,sans-serif" font-size="12" font-weight="bold">Encapsulation</text>
  <text x="75" y="165" text-anchor="middle" fill="#64748b" font-family="Arial,sans-serif" font-size="9">Data hiding</text>
  <text x="75" y="178" text-anchor="middle" fill="#64748b" font-family="Arial,sans-serif" font-size="9">Access control</text>
  <line x1="195" y1="68" x2="130" y2="120" stroke="#475569" stroke-width="1.5"/>
  <rect x="148" y="120" width="110" height="70" rx="8" fill="#10b981" opacity="0.25" stroke="#10b981" stroke-width="1.5"/>
  <text x="203" y="148" text-anchor="middle" fill="#6ee7b7" font-family="Arial,sans-serif" font-size="12" font-weight="bold">Abstraction</text>
  <text x="203" y="165" text-anchor="middle" fill="#64748b" font-family="Arial,sans-serif" font-size="9">Hide complexity</text>
  <text x="203" y="178" text-anchor="middle" fill="#64748b" font-family="Arial,sans-serif" font-size="9">Show essentials</text>
  <line x1="260" y1="88" x2="260" y2="120" stroke="#475569" stroke-width="1.5"/>
  <rect x="275" y="120" width="110" height="70" rx="8" fill="#f59e0b" opacity="0.25" stroke="#f59e0b" stroke-width="1.5"/>
  <text x="330" y="148" text-anchor="middle" fill="#fcd34d" font-family="Arial,sans-serif" font-size="12" font-weight="bold">Inheritance</text>
  <text x="330" y="165" text-anchor="middle" fill="#64748b" font-family="Arial,sans-serif" font-size="9">Code reuse</text>
  <text x="330" y="178" text-anchor="middle" fill="#64748b" font-family="Arial,sans-serif" font-size="9">is-a relationship</text>
  <line x1="325" y1="68" x2="390" y2="120" stroke="#475569" stroke-width="1.5"/>
  <rect x="395" y="120" width="110" height="70" rx="8" fill="#ef4444" opacity="0.25" stroke="#ef4444" stroke-width="1.5"/>
  <text x="450" y="148" text-anchor="middle" fill="#fca5a5" font-family="Arial,sans-serif" font-size="12" font-weight="bold">Polymorphism</text>
  <text x="450" y="165" text-anchor="middle" fill="#64748b" font-family="Arial,sans-serif" font-size="9">Many forms</text>
  <text x="450" y="178" text-anchor="middle" fill="#64748b" font-family="Arial,sans-serif" font-size="9">Override/Overload</text>
  <!-- Building blocks -->
  <rect x="20" y="215" width="150" height="55" rx="8" fill="#1e293b" stroke="#06b6d4" stroke-width="1.5"/>
  <text x="95" y="238" text-anchor="middle" fill="#06b6d4" font-family="Arial,sans-serif" font-size="12" font-weight="bold">Class</text>
  <text x="95" y="255" text-anchor="middle" fill="#94a3b8" font-family="Arial,sans-serif" font-size="10">Blueprint / Template</text>
  <rect x="185" y="215" width="150" height="55" rx="8" fill="#1e293b" stroke="#06b6d4" stroke-width="1.5"/>
  <text x="260" y="238" text-anchor="middle" fill="#06b6d4" font-family="Arial,sans-serif" font-size="12" font-weight="bold">Object</text>
  <text x="260" y="255" text-anchor="middle" fill="#94a3b8" font-family="Arial,sans-serif" font-size="10">Instance with data</text>
  <rect x="350" y="215" width="150" height="55" rx="8" fill="#1e293b" stroke="#06b6d4" stroke-width="1.5"/>
  <text x="425" y="238" text-anchor="middle" fill="#06b6d4" font-family="Arial,sans-serif" font-size="12" font-weight="bold">Interface</text>
  <text x="425" y="255" text-anchor="middle" fill="#94a3b8" font-family="Arial,sans-serif" font-size="10">Contract / API</text>
  <!-- Benefits -->
  <rect x="20" y="285" width="480" height="45" rx="8" fill="#1e293b"/>
  <text x="260" y="305" text-anchor="middle" fill="#e2e8f0" font-family="Arial,sans-serif" font-size="11" font-weight="bold">Benefits</text>
  <text x="260" y="322" text-anchor="middle" fill="#94a3b8" font-family="Arial,sans-serif" font-size="10">Reusability • Maintainability • Security • Scalability • Real-world Modeling</text>
</svg>