<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 520 300">
  <rect width="520" height="300" rx="12" fill="#0f172a"/>
  <text x="260" y="28" text-anchor="middle" fill="#a78bfa" font-size="15" font-weight="bold" font-family="system-ui">Advanced JSONB &amp; Document Patterns</text>
  <!-- Functions -->
  <rect x="20" y="48" width="240" height="120" rx="8" fill="#1e293b" stroke="#a78bfa" stroke-width="1.5"/>
  <text x="140" y="68" text-anchor="middle" fill="#a78bfa" font-size="10" font-weight="bold" font-family="system-ui">JSONB Functions</text>
  <text x="35" y="88" fill="#60a5fa" font-size="8" font-family="monospace">jsonb_build_object()</text>
  <text x="35" y="104" fill="#4ade80" font-size="8" font-family="monospace">jsonb_each()</text>
  <text x="35" y="120" fill="#fbbf24" font-size="8" font-family="monospace">jsonb_array_elements()</text>
  <text x="35" y="136" fill="#f87171" font-size="8" font-family="monospace">jsonb_to_record()</text>
  <text x="35" y="152" fill="#fb923c" font-size="8" font-family="monospace">jsonb_path_query()</text>
  <text x="35" y="164" fill="#e2e8f0" font-size="8" font-family="monospace">jsonb_strip_nulls()</text>
  <!-- SQL/JSON Path -->
  <rect x="275" y="48" width="230" height="75" rx="8" fill="#1e293b" stroke="#fbbf24" stroke-width="1.5"/>
  <text x="390" y="68" text-anchor="middle" fill="#fbbf24" font-size="10" font-weight="bold" font-family="system-ui">SQL/JSON Path (PG 12+)</text>
  <text x="290" y="88" fill="#94a3b8" font-size="8" font-family="monospace">$.specs.cpu</text>
  <text x="290" y="104" fill="#94a3b8" font-size="8" font-family="monospace">$.tags[*] ? (@ &gt; 5)</text>
  <text x="290" y="118" fill="#4ade80" font-size="7" font-family="system-ui">XPath-like traversal • Filters • Regex</text>
  <!-- Document Store Pattern -->
  <rect x="275" y="133" width="230" height="35" rx="6" fill="#1e293b" stroke="#4ade80" stroke-width="1.2"/>
  <text x="390" y="155" text-anchor="middle" fill="#4ade80" font-size="9" font-weight="bold" font-family="system-ui">Document Store Pattern</text>
  <!-- Generated columns -->
  <rect x="20" y="185" width="485" height="55" rx="8" fill="#1e293b" stroke="#60a5fa" stroke-width="1.5"/>
  <text x="260" y="205" text-anchor="middle" fill="#60a5fa" font-size="10" font-weight="bold" font-family="system-ui">Generated Columns (Best of Both Worlds)</text>
  <text x="260" y="225" text-anchor="middle" fill="#94a3b8" font-size="8" font-family="system-ui">Extract JSONB fields → real columns → B-tree indexes + constraints</text>
  <text x="260" y="236" text-anchor="middle" fill="#fbbf24" font-size="7" font-family="monospace">event_type TEXT GENERATED ALWAYS AS (payload-&gt;&gt;'type') STORED</text>
  <!-- MongoDB comparison -->
  <rect x="20" y="255" width="485" height="30" rx="6" fill="#1e293b" stroke="#f87171" stroke-width="1"/>
  <text x="260" y="275" text-anchor="middle" fill="#e2e8f0" font-size="8" font-family="system-ui">Rivals <tspan fill="#4ade80">MongoDB</tspan> and <tspan fill="#fbbf24">DynamoDB</tspan> while retaining SQL joins, transactions, and constraints</text>
</svg>