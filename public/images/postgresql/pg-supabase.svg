<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 520 300">
  <rect width="520" height="300" rx="12" fill="#0f172a"/>
  <text x="260" y="28" text-anchor="middle" fill="#4ade80" font-size="15" font-weight="bold" font-family="system-ui">Supabase Cloud Setup</text>
  <!-- What is Supabase -->
  <rect x="20" y="48" width="240" height="100" rx="8" fill="#1e293b" stroke="#4ade80" stroke-width="1.5"/>
  <text x="140" y="68" text-anchor="middle" fill="#4ade80" font-size="10" font-weight="bold" font-family="system-ui">Supabase = PostgreSQL+</text>
  <text x="35" y="88" fill="#60a5fa" font-size="8" font-family="system-ui">✓ Full PostgreSQL database</text>
  <text x="35" y="102" fill="#fbbf24" font-size="8" font-family="system-ui">✓ Auto-generated REST API</text>
  <text x="35" y="116" fill="#f87171" font-size="8" font-family="system-ui">✓ Built-in Auth (OAuth, MFA)</text>
  <text x="35" y="130" fill="#a78bfa" font-size="8" font-family="system-ui">✓ Real-time WebSockets</text>
  <text x="35" y="144" fill="#4ade80" font-size="8" font-family="system-ui">✓ Storage &amp; Edge Functions</text>
  <!-- Getting started -->
  <rect x="275" y="48" width="230" height="100" rx="8" fill="#1e293b" stroke="#fbbf24" stroke-width="1.5"/>
  <text x="390" y="68" text-anchor="middle" fill="#fbbf24" font-size="10" font-weight="bold" font-family="system-ui">Getting Started</text>
  <text x="290" y="88" fill="#fbbf24" font-size="8" font-family="monospace">1.</text>
  <text x="310" y="88" fill="#94a3b8" font-size="8" font-family="system-ui">Sign up at supabase.com</text>
  <text x="290" y="104" fill="#fbbf24" font-size="8" font-family="monospace">2.</text>
  <text x="310" y="104" fill="#94a3b8" font-size="8" font-family="system-ui">Create project + set password</text>
  <text x="290" y="120" fill="#fbbf24" font-size="8" font-family="monospace">3.</text>
  <text x="310" y="120" fill="#94a3b8" font-size="8" font-family="system-ui">Use SQL Editor or client SDK</text>
  <text x="290" y="136" fill="#fbbf24" font-size="8" font-family="monospace">4.</text>
  <text x="310" y="136" fill="#94a3b8" font-size="8" font-family="system-ui">Enable RLS for security</text>
  <!-- Connection options -->
  <rect x="20" y="165" width="485" height="50" rx="6" fill="#1e293b" stroke="#60a5fa" stroke-width="1.2"/>
  <text x="260" y="185" text-anchor="middle" fill="#60a5fa" font-size="10" font-weight="bold" font-family="system-ui">Connection Options</text>
  <text x="100" y="205" text-anchor="middle" fill="#4ade80" font-size="8" font-family="system-ui">Direct :5432</text>
  <text x="260" y="205" text-anchor="middle" fill="#fbbf24" font-size="8" font-family="system-ui">Pooling :6543 ★</text>
  <text x="420" y="205" text-anchor="middle" fill="#a78bfa" font-size="8" font-family="system-ui">Client SDK (JS/Python)</text>
  <!-- RLS + auth -->
  <rect x="20" y="230" width="485" height="55" rx="8" fill="#1e293b" stroke="#f87171" stroke-width="1.5"/>
  <text x="260" y="250" text-anchor="middle" fill="#f87171" font-size="10" font-weight="bold" font-family="system-ui">Security: RLS + auth.uid()</text>
  <text x="260" y="270" text-anchor="middle" fill="#94a3b8" font-size="8" font-family="system-ui">RLS policies use auth.uid() to scope data per authenticated user</text>
  <text x="260" y="282" text-anchor="middle" fill="#4ade80" font-size="7" font-family="monospace">CREATE POLICY ... USING (auth.uid() = user_id);</text>
</svg>