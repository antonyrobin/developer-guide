<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 520 300">
  <rect width="520" height="300" rx="12" fill="#0f172a"/>
  <text x="260" y="28" text-anchor="middle" fill="#f87171" font-size="15" font-weight="bold" font-family="system-ui">Indexes &amp; Performance</text>
  <!-- Index types -->
  <rect x="20" y="48" width="240" height="140" rx="8" fill="#1e293b" stroke="#f87171" stroke-width="1.5"/>
  <text x="140" y="68" text-anchor="middle" fill="#f87171" font-size="11" font-weight="bold" font-family="system-ui">Index Types</text>
  <text x="35" y="88" fill="#60a5fa" font-size="9" font-family="monospace">B-tree</text>
  <text x="110" y="88" fill="#94a3b8" font-size="8" font-family="system-ui">Default. Equality &amp; range</text>
  <text x="35" y="106" fill="#4ade80" font-size="9" font-family="monospace">GIN</text>
  <text x="110" y="106" fill="#94a3b8" font-size="8" font-family="system-ui">JSONB, arrays, FTS</text>
  <text x="35" y="124" fill="#fbbf24" font-size="9" font-family="monospace">GiST</text>
  <text x="110" y="124" fill="#94a3b8" font-size="8" font-family="system-ui">Geometric, range types</text>
  <text x="35" y="142" fill="#a78bfa" font-size="9" font-family="monospace">BRIN</text>
  <text x="110" y="142" fill="#94a3b8" font-size="8" font-family="system-ui">Large sorted tables</text>
  <text x="35" y="160" fill="#fb923c" font-size="9" font-family="monospace">Hash</text>
  <text x="110" y="160" fill="#94a3b8" font-size="8" font-family="system-ui">Equality only</text>
  <text x="35" y="178" fill="#e2e8f0" font-size="9" font-family="monospace">SP-GiST</text>
  <text x="110" y="178" fill="#94a3b8" font-size="8" font-family="system-ui">IP addresses, phone #s</text>
  <!-- Strategies -->
  <rect x="275" y="48" width="230" height="140" rx="8" fill="#1e293b" stroke="#4ade80" stroke-width="1.5"/>
  <text x="390" y="68" text-anchor="middle" fill="#4ade80" font-size="11" font-weight="bold" font-family="system-ui">Index Strategies</text>
  <text x="290" y="88" fill="#60a5fa" font-size="9" font-weight="bold" font-family="system-ui">Partial</text>
  <text x="355" y="88" fill="#94a3b8" font-size="8" font-family="system-ui">WHERE is_active = true</text>
  <text x="290" y="108" fill="#fbbf24" font-size="9" font-weight="bold" font-family="system-ui">Expression</text>
  <text x="365" y="108" fill="#94a3b8" font-size="8" font-family="system-ui">LOWER(email)</text>
  <text x="290" y="128" fill="#f87171" font-size="9" font-weight="bold" font-family="system-ui">Covering</text>
  <text x="365" y="128" fill="#94a3b8" font-size="8" font-family="system-ui">INCLUDE (name, email)</text>
  <text x="290" y="148" fill="#a78bfa" font-size="9" font-weight="bold" font-family="system-ui">Multicolumn</text>
  <text x="375" y="148" fill="#94a3b8" font-size="8" font-family="system-ui">Compound queries</text>
  <text x="290" y="168" fill="#4ade80" font-size="9" font-weight="bold" font-family="system-ui">Unique</text>
  <text x="365" y="168" fill="#94a3b8" font-size="8" font-family="system-ui">Enforce uniqueness</text>
  <!-- EXPLAIN -->
  <rect x="20" y="205" width="485" height="80" rx="6" fill="#1e293b" stroke="#fbbf24" stroke-width="1.2"/>
  <text x="260" y="225" text-anchor="middle" fill="#fbbf24" font-size="10" font-weight="bold" font-family="system-ui">EXPLAIN ANALYZE</text>
  <text x="130" y="248" text-anchor="middle" fill="#4ade80" font-size="9" font-weight="bold" font-family="system-ui">Index Scan ✓</text>
  <text x="130" y="262" text-anchor="middle" fill="#94a3b8" font-size="7" font-family="system-ui">Fast: uses index</text>
  <text x="260" y="248" text-anchor="middle" fill="#60a5fa" font-size="9" font-weight="bold" font-family="system-ui">Index Only Scan ✓✓</text>
  <text x="260" y="262" text-anchor="middle" fill="#94a3b8" font-size="7" font-family="system-ui">Fastest: covering index</text>
  <text x="400" y="248" text-anchor="middle" fill="#f87171" font-size="9" font-weight="bold" font-family="system-ui">Seq Scan ✗</text>
  <text x="400" y="262" text-anchor="middle" fill="#94a3b8" font-size="7" font-family="system-ui">Slow: full table scan</text>
  <text x="260" y="278" text-anchor="middle" fill="#94a3b8" font-size="7" font-family="system-ui">Always verify that indexes are being used with EXPLAIN ANALYZE</text>
</svg>