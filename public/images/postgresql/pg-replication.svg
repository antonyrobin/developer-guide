<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 520 300">
  <rect width="520" height="300" rx="12" fill="#0f172a"/>
  <text x="260" y="28" text-anchor="middle" fill="#60a5fa" font-size="15" font-weight="bold" font-family="system-ui">Replication &amp; High Availability</text>
  <!-- Streaming -->
  <rect x="20" y="48" width="240" height="100" rx="8" fill="#1e293b" stroke="#60a5fa" stroke-width="1.5"/>
  <text x="140" y="68" text-anchor="middle" fill="#60a5fa" font-size="10" font-weight="bold" font-family="system-ui">Streaming Replication</text>
  <text x="35" y="88" fill="#94a3b8" font-size="8" font-family="system-ui">• Physical byte-for-byte copy</text>
  <text x="35" y="104" fill="#94a3b8" font-size="8" font-family="system-ui">• WAL records streamed live</text>
  <text x="35" y="120" fill="#4ade80" font-size="8" font-family="system-ui">• Hot standby (read queries)</text>
  <text x="35" y="136" fill="#94a3b8" font-size="8" font-family="system-ui">• Async or Synchronous</text>
  <!-- Logical -->
  <rect x="275" y="48" width="230" height="100" rx="8" fill="#1e293b" stroke="#fbbf24" stroke-width="1.5"/>
  <text x="390" y="68" text-anchor="middle" fill="#fbbf24" font-size="10" font-weight="bold" font-family="system-ui">Logical Replication</text>
  <text x="290" y="88" fill="#94a3b8" font-size="8" font-family="system-ui">• Row-level changes</text>
  <text x="290" y="104" fill="#94a3b8" font-size="8" font-family="system-ui">• Publication / Subscription</text>
  <text x="290" y="120" fill="#4ade80" font-size="8" font-family="system-ui">• Selective tables</text>
  <text x="290" y="136" fill="#94a3b8" font-size="8" font-family="system-ui">• Cross-version upgrades</text>
  <!-- Failover tools -->
  <rect x="20" y="165" width="485" height="55" rx="6" fill="#1e293b" stroke="#f87171" stroke-width="1.2"/>
  <text x="260" y="185" text-anchor="middle" fill="#f87171" font-size="10" font-weight="bold" font-family="system-ui">Automatic Failover Tools</text>
  <text x="100" y="208" text-anchor="middle" fill="#60a5fa" font-size="9" font-weight="bold" font-family="system-ui">Patroni</text>
  <text x="100" y="218" text-anchor="middle" fill="#94a3b8" font-size="7" font-family="system-ui">Industry standard</text>
  <text x="260" y="208" text-anchor="middle" fill="#4ade80" font-size="9" font-weight="bold" font-family="system-ui">pg_auto_failover</text>
  <text x="260" y="218" text-anchor="middle" fill="#94a3b8" font-size="7" font-family="system-ui">Simple alternative</text>
  <text x="420" y="208" text-anchor="middle" fill="#fbbf24" font-size="9" font-weight="bold" font-family="system-ui">repmgr</text>
  <text x="420" y="218" text-anchor="middle" fill="#94a3b8" font-size="7" font-family="system-ui">Replication manager</text>
  <!-- Architecture -->
  <rect x="20" y="235" width="485" height="50" rx="8" fill="#1e293b" stroke="#475569" stroke-width="1"/>
  <text x="260" y="255" text-anchor="middle" fill="#e2e8f0" font-size="9" font-weight="bold" font-family="system-ui">Typical HA Architecture</text>
  <text x="80" y="275" text-anchor="middle" fill="#60a5fa" font-size="8" font-family="system-ui">Primary (R/W)</text>
  <text x="155" y="275" text-anchor="middle" fill="#94a3b8" font-size="8" font-family="system-ui">→</text>
  <text x="230" y="275" text-anchor="middle" fill="#4ade80" font-size="8" font-family="system-ui">WAL Stream</text>
  <text x="305" y="275" text-anchor="middle" fill="#94a3b8" font-size="8" font-family="system-ui">→</text>
  <text x="380" y="275" text-anchor="middle" fill="#fbbf24" font-size="8" font-family="system-ui">Standby (RO)</text>
  <text x="455" y="275" text-anchor="middle" fill="#94a3b8" font-size="8" font-family="system-ui">→ Failover</text>
</svg>