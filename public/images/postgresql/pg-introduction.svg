<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 520 300">
  <rect width="520" height="300" rx="12" fill="#0f172a"/>
  <text x="260" y="28" text-anchor="middle" fill="#60a5fa" font-size="15" font-weight="bold" font-family="system-ui">PostgreSQL Overview</text>
  <!-- Elephant icon stylized -->
  <rect x="30" y="48" width="200" height="110" rx="8" fill="#1e293b" stroke="#60a5fa" stroke-width="1.5"/>
  <text x="130" y="68" text-anchor="middle" fill="#60a5fa" font-size="11" font-weight="bold" font-family="system-ui">PostgreSQL</text>
  <text x="45" y="88" fill="#94a3b8" font-size="9" font-family="system-ui">• Object-Relational DBMS</text>
  <text x="45" y="104" fill="#94a3b8" font-size="9" font-family="system-ui">• ACID Compliant</text>
  <text x="45" y="120" fill="#94a3b8" font-size="9" font-family="system-ui">• Extensible &amp; Standards-Based</text>
  <text x="45" y="136" fill="#94a3b8" font-size="9" font-family="system-ui">• JSON/JSONB + Full SQL</text>
  <text x="45" y="152" fill="#94a3b8" font-size="9" font-family="system-ui">• Cross-Platform</text>
  <!-- Features grid -->
  <rect x="250" y="48" width="120" height="50" rx="6" fill="#1e293b" stroke="#4ade80" stroke-width="1"/>
  <text x="310" y="68" text-anchor="middle" fill="#4ade80" font-size="9" font-weight="bold" font-family="system-ui">SQL Queries</text>
  <text x="310" y="84" text-anchor="middle" fill="#94a3b8" font-size="8" font-family="system-ui">Joins, CTEs, Windows</text>
  <rect x="385" y="48" width="120" height="50" rx="6" fill="#1e293b" stroke="#fbbf24" stroke-width="1"/>
  <text x="445" y="68" text-anchor="middle" fill="#fbbf24" font-size="9" font-weight="bold" font-family="system-ui">JSON / NoSQL</text>
  <text x="445" y="84" text-anchor="middle" fill="#94a3b8" font-size="8" font-family="system-ui">JSONB, Document Store</text>
  <rect x="250" y="110" width="120" height="50" rx="6" fill="#1e293b" stroke="#f87171" stroke-width="1"/>
  <text x="310" y="130" text-anchor="middle" fill="#f87171" font-size="9" font-weight="bold" font-family="system-ui">Extensions</text>
  <text x="310" y="146" text-anchor="middle" fill="#94a3b8" font-size="8" font-family="system-ui">pgvector, PostGIS</text>
  <rect x="385" y="110" width="120" height="50" rx="6" fill="#1e293b" stroke="#a78bfa" stroke-width="1"/>
  <text x="445" y="130" text-anchor="middle" fill="#a78bfa" font-size="9" font-weight="bold" font-family="system-ui">Security</text>
  <text x="445" y="146" text-anchor="middle" fill="#94a3b8" font-size="8" font-family="system-ui">RLS, Encryption</text>
  <!-- Companies -->
  <rect x="30" y="175" width="475" height="55" rx="8" fill="#1e293b" stroke="#475569" stroke-width="1"/>
  <text x="260" y="195" text-anchor="middle" fill="#e2e8f0" font-size="10" font-weight="bold" font-family="system-ui">Used By</text>
  <text x="85" y="216" text-anchor="middle" fill="#60a5fa" font-size="9" font-family="system-ui">Apple</text>
  <text x="170" y="216" text-anchor="middle" fill="#4ade80" font-size="9" font-family="system-ui">Instagram</text>
  <text x="260" y="216" text-anchor="middle" fill="#fbbf24" font-size="9" font-family="system-ui">Spotify</text>
  <text x="345" y="216" text-anchor="middle" fill="#f87171" font-size="9" font-family="system-ui">Reddit</text>
  <text x="430" y="216" text-anchor="middle" fill="#a78bfa" font-size="9" font-family="system-ui">Twitch</text>
  <!-- Timeline -->
  <rect x="30" y="245" width="475" height="40" rx="6" fill="#1e293b" stroke="#475569" stroke-width="1"/>
  <text x="260" y="265" text-anchor="middle" fill="#e2e8f0" font-size="9" font-weight="bold" font-family="system-ui">History</text>
  <text x="120" y="280" text-anchor="middle" fill="#fbbf24" font-size="8" font-family="system-ui">1986: Berkeley</text>
  <text x="260" y="280" text-anchor="middle" fill="#4ade80" font-size="8" font-family="system-ui">1996: PostgreSQL 6.0</text>
  <text x="410" y="280" text-anchor="middle" fill="#60a5fa" font-size="8" font-family="system-ui">2024: PostgreSQL 17</text>
</svg>