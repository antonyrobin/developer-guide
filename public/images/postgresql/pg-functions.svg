<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 520 300">
  <rect width="520" height="300" rx="12" fill="#0f172a"/>
  <text x="260" y="28" text-anchor="middle" fill="#fbbf24" font-size="15" font-weight="bold" font-family="system-ui">Functions, Procedures &amp; Triggers</text>
  <!-- Functions vs Procedures -->
  <rect x="20" y="48" width="230" height="100" rx="8" fill="#1e293b" stroke="#60a5fa" stroke-width="1.5"/>
  <text x="135" y="68" text-anchor="middle" fill="#60a5fa" font-size="10" font-weight="bold" font-family="system-ui">Functions</text>
  <text x="35" y="86" fill="#94a3b8" font-size="8" font-family="system-ui">• Returns a value</text>
  <text x="35" y="100" fill="#94a3b8" font-size="8" font-family="system-ui">• Called with SELECT / FROM</text>
  <text x="35" y="114" fill="#94a3b8" font-size="8" font-family="system-ui">• No COMMIT/ROLLBACK</text>
  <text x="35" y="128" fill="#4ade80" font-size="8" font-family="system-ui">• SQL functions inlineable</text>
  <text x="35" y="142" fill="#94a3b8" font-size="8" font-family="system-ui">• PL/pgSQL, PL/Python, PL/V8</text>
  <rect x="265" y="48" width="240" height="100" rx="8" fill="#1e293b" stroke="#fbbf24" stroke-width="1.5"/>
  <text x="385" y="68" text-anchor="middle" fill="#fbbf24" font-size="10" font-weight="bold" font-family="system-ui">Procedures (PG 11+)</text>
  <text x="280" y="86" fill="#94a3b8" font-size="8" font-family="system-ui">• No return value (OUT params)</text>
  <text x="280" y="100" fill="#94a3b8" font-size="8" font-family="system-ui">• Called with CALL</text>
  <text x="280" y="114" fill="#4ade80" font-size="8" font-family="system-ui">• COMMIT/ROLLBACK supported</text>
  <text x="280" y="128" fill="#94a3b8" font-size="8" font-family="system-ui">• Transaction control</text>
  <text x="280" y="142" fill="#94a3b8" font-size="8" font-family="system-ui">• Long-running operations</text>
  <!-- Triggers -->
  <rect x="20" y="165" width="485" height="70" rx="8" fill="#1e293b" stroke="#f87171" stroke-width="1.5"/>
  <text x="260" y="185" text-anchor="middle" fill="#f87171" font-size="10" font-weight="bold" font-family="system-ui">Triggers</text>
  <text x="100" y="205" text-anchor="middle" fill="#60a5fa" font-size="8" font-weight="bold" font-family="system-ui">BEFORE / AFTER</text>
  <text x="260" y="205" text-anchor="middle" fill="#4ade80" font-size="8" font-weight="bold" font-family="system-ui">INSERT / UPDATE / DELETE</text>
  <text x="430" y="205" text-anchor="middle" fill="#fbbf24" font-size="8" font-weight="bold" font-family="system-ui">FOR EACH ROW</text>
  <text x="260" y="225" text-anchor="middle" fill="#94a3b8" font-size="8" font-family="system-ui">Audit logging • Data validation • Computed fields • Cascading updates</text>
  <!-- Use cases -->
  <rect x="20" y="250" width="485" height="35" rx="6" fill="#1e293b" stroke="#475569" stroke-width="1"/>
  <text x="100" y="272" text-anchor="middle" fill="#a78bfa" font-size="8" font-family="system-ui">Audit Logging</text>
  <text x="220" y="272" text-anchor="middle" fill="#4ade80" font-size="8" font-family="system-ui">Auto Timestamps</text>
  <text x="340" y="272" text-anchor="middle" fill="#fbbf24" font-size="8" font-family="system-ui">Search Vectors</text>
  <text x="450" y="272" text-anchor="middle" fill="#f87171" font-size="8" font-family="system-ui">Validation</text>
</svg>