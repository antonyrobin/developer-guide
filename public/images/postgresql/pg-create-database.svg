<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 520 300">
  <rect width="520" height="300" rx="12" fill="#0f172a"/>
  <text x="260" y="28" text-anchor="middle" fill="#fbbf24" font-size="15" font-weight="bold" font-family="system-ui">Create Database &amp; Tables</text>
  <!-- Database hierarchy -->
  <rect x="20" y="48" width="230" height="130" rx="8" fill="#1e293b" stroke="#60a5fa" stroke-width="1.5"/>
  <text x="135" y="68" text-anchor="middle" fill="#60a5fa" font-size="11" font-weight="bold" font-family="system-ui">Database: myapp</text>
  <line x1="20" y1="76" x2="250" y2="76" stroke="#475569"/>
  <rect x="35" y="84" width="200" height="85" rx="6" fill="#0f172a" stroke="#4ade80" stroke-width="1"/>
  <text x="135" y="100" text-anchor="middle" fill="#4ade80" font-size="9" font-weight="bold" font-family="system-ui">Schema: app</text>
  <text x="50" y="118" fill="#fbbf24" font-size="8" font-family="monospace">users</text>
  <text x="110" y="118" fill="#94a3b8" font-size="8" font-family="system-ui">id, username, email</text>
  <text x="50" y="134" fill="#fbbf24" font-size="8" font-family="monospace">posts</text>
  <text x="110" y="134" fill="#94a3b8" font-size="8" font-family="system-ui">id, user_id, title</text>
  <text x="50" y="150" fill="#fbbf24" font-size="8" font-family="monospace">products</text>
  <text x="110" y="150" fill="#94a3b8" font-size="8" font-family="system-ui">id, name, data(JSONB)</text>
  <!-- Data types -->
  <rect x="270" y="48" width="230" height="130" rx="8" fill="#1e293b" stroke="#fbbf24" stroke-width="1.5"/>
  <text x="385" y="68" text-anchor="middle" fill="#fbbf24" font-size="11" font-weight="bold" font-family="system-ui">Data Types</text>
  <line x1="270" y1="76" x2="500" y2="76" stroke="#475569"/>
  <text x="285" y="94" fill="#60a5fa" font-size="8" font-family="system-ui">Numeric</text>
  <text x="350" y="94" fill="#94a3b8" font-size="8" font-family="system-ui">INT, BIGINT, NUMERIC</text>
  <text x="285" y="110" fill="#4ade80" font-size="8" font-family="system-ui">Text</text>
  <text x="350" y="110" fill="#94a3b8" font-size="8" font-family="system-ui">VARCHAR, TEXT</text>
  <text x="285" y="126" fill="#f87171" font-size="8" font-family="system-ui">Date/Time</text>
  <text x="350" y="126" fill="#94a3b8" font-size="8" font-family="system-ui">TIMESTAMPTZ, DATE</text>
  <text x="285" y="142" fill="#a78bfa" font-size="8" font-family="system-ui">JSON</text>
  <text x="350" y="142" fill="#94a3b8" font-size="8" font-family="system-ui">JSON, JSONB</text>
  <text x="285" y="158" fill="#fbbf24" font-size="8" font-family="system-ui">Special</text>
  <text x="350" y="158" fill="#94a3b8" font-size="8" font-family="system-ui">UUID, ARRAY, INET</text>
  <text x="285" y="174" fill="#f87171" font-size="8" font-family="system-ui">Boolean</text>
  <text x="350" y="174" fill="#94a3b8" font-size="8" font-family="system-ui">BOOLEAN</text>
  <!-- Constraints -->
  <rect x="20" y="195" width="485" height="40" rx="6" fill="#1e293b" stroke="#f87171" stroke-width="1"/>
  <text x="260" y="215" text-anchor="middle" fill="#f87171" font-size="10" font-weight="bold" font-family="system-ui">Constraints</text>
  <text x="80" y="230" text-anchor="middle" fill="#60a5fa" font-size="8" font-family="system-ui">PRIMARY KEY</text>
  <text x="175" y="230" text-anchor="middle" fill="#4ade80" font-size="8" font-family="system-ui">FOREIGN KEY</text>
  <text x="265" y="230" text-anchor="middle" fill="#fbbf24" font-size="8" font-family="system-ui">UNIQUE</text>
  <text x="340" y="230" text-anchor="middle" fill="#a78bfa" font-size="8" font-family="system-ui">NOT NULL</text>
  <text x="425" y="230" text-anchor="middle" fill="#f87171" font-size="8" font-family="system-ui">CHECK</text>
  <!-- IDENTITY vs SERIAL -->
  <rect x="20" y="250" width="485" height="35" rx="6" fill="#1e293b" stroke="#4ade80" stroke-width="1"/>
  <text x="260" y="272" text-anchor="middle" fill="#e2e8f0" font-size="9" font-family="system-ui">Prefer <tspan fill="#4ade80" font-weight="bold">GENERATED ALWAYS AS IDENTITY</tspan> over <tspan fill="#f87171">SERIAL</tspan> for new projects</text>
</svg>