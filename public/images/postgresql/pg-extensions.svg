  <text x="262" y="161" text-anchor="middle" fill="#94a3b8" font-size="7" font-family="system-ui">Location queries</text>
  <rect x="350" y="113" width="155" height="55" rx="6" fill="#1e293b" stroke="#e879f9" stroke-width="1.2"/>
