<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 520 300">
  <rect width="520" height="300" rx="12" fill="#0f172a"/>
  <text x="260" y="28" text-anchor="middle" fill="#fb923c" font-size="15" font-weight="bold" font-family="system-ui">CTEs &amp; Recursive Queries</text>
  <!-- Standard CTE -->
  <rect x="20" y="48" width="240" height="95" rx="8" fill="#1e293b" stroke="#fb923c" stroke-width="1.5"/>
  <text x="140" y="68" text-anchor="middle" fill="#fb923c" font-size="11" font-weight="bold" font-family="system-ui">Standard CTE</text>
  <text x="35" y="88" fill="#fbbf24" font-size="8" font-family="monospace">WITH name AS (</text>
  <text x="45" y="102" fill="#94a3b8" font-size="8" font-family="monospace">  SELECT ...</text>
  <text x="35" y="116" fill="#fbbf24" font-size="8" font-family="monospace">)</text>
  <text x="35" y="132" fill="#94a3b8" font-size="8" font-family="monospace">SELECT * FROM name;</text>
  <!-- Recursive CTE -->
  <rect x="275" y="48" width="230" height="95" rx="8" fill="#1e293b" stroke="#a78bfa" stroke-width="1.5"/>
  <text x="390" y="68" text-anchor="middle" fill="#a78bfa" font-size="11" font-weight="bold" font-family="system-ui">Recursive CTE</text>
  <text x="290" y="88" fill="#fbbf24" font-size="8" font-family="monospace">WITH RECURSIVE tree AS (</text>
  <text x="300" y="102" fill="#4ade80" font-size="8" font-family="system-ui">Base case</text>
  <text x="300" y="116" fill="#60a5fa" font-size="8" font-family="system-ui">UNION ALL</text>
  <text x="300" y="130" fill="#f87171" font-size="8" font-family="system-ui">Recursive step</text>
  <text x="290" y="140" fill="#fbbf24" font-size="8" font-family="monospace">)</text>
  <!-- CTE types -->
  <rect x="20" y="158" width="485" height="55" rx="6" fill="#1e293b" stroke="#475569" stroke-width="1"/>
  <text x="260" y="178" text-anchor="middle" fill="#e2e8f0" font-size="10" font-weight="bold" font-family="system-ui">CTE Types</text>
  <text x="100" y="200" text-anchor="middle" fill="#fb923c" font-size="9" font-weight="bold" font-family="system-ui">Standard</text>
  <text x="260" y="200" text-anchor="middle" fill="#a78bfa" font-size="9" font-weight="bold" font-family="system-ui">Recursive</text>
  <text x="420" y="200" text-anchor="middle" fill="#4ade80" font-size="9" font-weight="bold" font-family="system-ui">Writable</text>
  <!-- Use cases -->
  <rect x="20" y="228" width="240" height="55" rx="6" fill="#1e293b" stroke="#4ade80" stroke-width="1"/>
  <text x="140" y="248" text-anchor="middle" fill="#4ade80" font-size="9" font-weight="bold" font-family="system-ui">Use Cases</text>
  <text x="35" y="266" fill="#94a3b8" font-size="8" font-family="system-ui">Trees • Hierarchies • Series Generation</text>
  <text x="35" y="278" fill="#94a3b8" font-size="8" font-family="system-ui">Complex multi-step queries • Archival</text>
  <!-- Materialization -->
  <rect x="275" y="228" width="230" height="55" rx="6" fill="#1e293b" stroke="#fbbf24" stroke-width="1"/>
  <text x="390" y="248" text-anchor="middle" fill="#fbbf24" font-size="9" font-weight="bold" font-family="system-ui">Materialization (PG 12+)</text>
  <text x="290" y="266" fill="#94a3b8" font-size="8" font-family="system-ui">Single-ref CTEs are inlined</text>
  <text x="290" y="278" fill="#94a3b8" font-size="8" font-family="system-ui">Use MATERIALIZED to force cache</text>
</svg>