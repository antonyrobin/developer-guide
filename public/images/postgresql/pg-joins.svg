<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 520 300">
  <rect width="520" height="300" rx="12" fill="#0f172a"/>
  <text x="260" y="28" text-anchor="middle" fill="#60a5fa" font-size="15" font-weight="bold" font-family="system-ui">JOINs &amp; Subqueries</text>
  <!-- Join types -->
  <rect x="20" y="48" width="155" height="50" rx="6" fill="#1e293b" stroke="#4ade80" stroke-width="1.2"/>
  <text x="97" y="68" text-anchor="middle" fill="#4ade80" font-size="9" font-weight="bold" font-family="system-ui">INNER JOIN</text>
  <text x="97" y="84" text-anchor="middle" fill="#94a3b8" font-size="7" font-family="system-ui">Matching rows only</text>
  <rect x="185" y="48" width="155" height="50" rx="6" fill="#1e293b" stroke="#60a5fa" stroke-width="1.2"/>
  <text x="262" y="68" text-anchor="middle" fill="#60a5fa" font-size="9" font-weight="bold" font-family="system-ui">LEFT JOIN</text>
  <text x="262" y="84" text-anchor="middle" fill="#94a3b8" font-size="7" font-family="system-ui">All left + matching right</text>
  <rect x="350" y="48" width="155" height="50" rx="6" fill="#1e293b" stroke="#fbbf24" stroke-width="1.2"/>
  <text x="427" y="68" text-anchor="middle" fill="#fbbf24" font-size="9" font-weight="bold" font-family="system-ui">RIGHT JOIN</text>
  <text x="427" y="84" text-anchor="middle" fill="#94a3b8" font-size="7" font-family="system-ui">All right + matching left</text>
  <rect x="20" y="108" width="155" height="50" rx="6" fill="#1e293b" stroke="#f87171" stroke-width="1.2"/>
  <text x="97" y="128" text-anchor="middle" fill="#f87171" font-size="9" font-weight="bold" font-family="system-ui">FULL OUTER</text>
  <text x="97" y="144" text-anchor="middle" fill="#94a3b8" font-size="7" font-family="system-ui">All rows from both</text>
  <rect x="185" y="108" width="155" height="50" rx="6" fill="#1e293b" stroke="#a78bfa" stroke-width="1.2"/>
  <text x="262" y="128" text-anchor="middle" fill="#a78bfa" font-size="9" font-weight="bold" font-family="system-ui">CROSS JOIN</text>
  <text x="262" y="144" text-anchor="middle" fill="#94a3b8" font-size="7" font-family="system-ui">Cartesian product</text>
  <rect x="350" y="108" width="155" height="50" rx="6" fill="#1e293b" stroke="#fb923c" stroke-width="1.2"/>
  <text x="427" y="128" text-anchor="middle" fill="#fb923c" font-size="9" font-weight="bold" font-family="system-ui">LATERAL JOIN</text>
  <text x="427" y="144" text-anchor="middle" fill="#94a3b8" font-size="7" font-family="system-ui">Ref preceding tables</text>
  <!-- Subqueries -->
  <rect x="20" y="175" width="485" height="110" rx="8" fill="#1e293b" stroke="#475569" stroke-width="1"/>
  <text x="260" y="195" text-anchor="middle" fill="#e2e8f0" font-size="10" font-weight="bold" font-family="system-ui">Subqueries &amp; Set Operators</text>
  <text x="120" y="220" text-anchor="middle" fill="#60a5fa" font-size="9" font-weight="bold" font-family="system-ui">Scalar</text>
  <text x="120" y="236" text-anchor="middle" fill="#94a3b8" font-size="7" font-family="system-ui">Single value</text>
  <text x="230" y="220" text-anchor="middle" fill="#4ade80" font-size="9" font-weight="bold" font-family="system-ui">Correlated</text>
  <text x="230" y="236" text-anchor="middle" fill="#94a3b8" font-size="7" font-family="system-ui">Refs outer query</text>
  <text x="340" y="220" text-anchor="middle" fill="#fbbf24" font-size="9" font-weight="bold" font-family="system-ui">EXISTS</text>
  <text x="340" y="236" text-anchor="middle" fill="#94a3b8" font-size="7" font-family="system-ui">Row existence</text>
  <text x="440" y="220" text-anchor="middle" fill="#f87171" font-size="9" font-weight="bold" font-family="system-ui">IN / ANY / ALL</text>
  <text x="440" y="236" text-anchor="middle" fill="#94a3b8" font-size="7" font-family="system-ui">Set membership</text>
  <text x="260" y="268" text-anchor="middle" fill="#a78bfa" font-size="8" font-family="system-ui">Prefer EXISTS over IN for correlated checks — short-circuits on first match</text>
</svg>