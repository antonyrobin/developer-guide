<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 420">
  <rect width="900" height="420" rx="16" fill="#0f172a"/>
  <text x="450" y="44" text-anchor="middle" fill="#fff" font-size="26" font-weight="700" font-family="Segoe UI,Arial,sans-serif">RabbitMQ Exchange Types</text>
  <rect x="50" y="100" width="190" height="130" rx="10" fill="#1e293b" stroke="#4ade80" stroke-width="2"/>
  <text x="145" y="135" text-anchor="middle" fill="#4ade80" font-size="16" font-weight="700" font-family="Segoe UI,Arial,sans-serif">Direct</text>
  <text x="145" y="165" text-anchor="middle" fill="#94a3b8" font-size="11" font-family="Segoe UI,Arial,sans-serif">Exact routing key</text>
  <text x="145" y="185" text-anchor="middle" fill="#94a3b8" font-size="11" font-family="Segoe UI,Arial,sans-serif">match. 1-to-1</text>
  <text x="145" y="215" text-anchor="middle" fill="#64748b" font-size="10" font-family="Segoe UI,Arial,sans-serif">Use: Task queues</text>
  <rect x="260" y="100" width="190" height="130" rx="10" fill="#1e293b" stroke="#38bdf8" stroke-width="2"/>
  <text x="355" y="135" text-anchor="middle" fill="#38bdf8" font-size="16" font-weight="700" font-family="Segoe UI,Arial,sans-serif">Fanout</text>
  <text x="355" y="165" text-anchor="middle" fill="#94a3b8" font-size="11" font-family="Segoe UI,Arial,sans-serif">Broadcast to ALL</text>
  <text x="355" y="185" text-anchor="middle" fill="#94a3b8" font-size="11" font-family="Segoe UI,Arial,sans-serif">bound queues</text>
  <text x="355" y="215" text-anchor="middle" fill="#64748b" font-size="10" font-family="Segoe UI,Arial,sans-serif">Use: Notifications</text>
  <rect x="470" y="100" width="190" height="130" rx="10" fill="#1e293b" stroke="#f59e0b" stroke-width="2"/>
  <text x="565" y="135" text-anchor="middle" fill="#f59e0b" font-size="16" font-weight="700" font-family="Segoe UI,Arial,sans-serif">Topic</text>
  <text x="565" y="165" text-anchor="middle" fill="#94a3b8" font-size="11" font-family="Segoe UI,Arial,sans-serif">Pattern-based</text>
  <text x="565" y="185" text-anchor="middle" fill="#94a3b8" font-size="11" font-family="Segoe UI,Arial,sans-serif">wildcard routing</text>
  <text x="565" y="215" text-anchor="middle" fill="#64748b" font-size="10" font-family="Segoe UI,Arial,sans-serif">Use: Log routing</text>
  <rect x="680" y="100" width="170" height="130" rx="10" fill="#1e293b" stroke="#a78bfa" stroke-width="2"/>
  <text x="765" y="135" text-anchor="middle" fill="#a78bfa" font-size="16" font-weight="700" font-family="Segoe UI,Arial,sans-serif">Headers</text>
  <text x="765" y="165" text-anchor="middle" fill="#94a3b8" font-size="11" font-family="Segoe UI,Arial,sans-serif">Matches on msg</text>
  <text x="765" y="185" text-anchor="middle" fill="#94a3b8" font-size="11" font-family="Segoe UI,Arial,sans-serif">header attributes</text>
  <text x="765" y="215" text-anchor="middle" fill="#64748b" font-size="10" font-family="Segoe UI,Arial,sans-serif">Use: Complex routing</text>
  <rect x="150" y="280" width="600" height="100" rx="10" fill="#1e293b" stroke="#334155"/>
  <text x="450" y="310" text-anchor="middle" fill="#fff" font-size="16" font-weight="700" font-family="Segoe UI,Arial,sans-serif">Message Flow: Producer → Exchange → Binding → Queue → Consumer</text>
  <text x="450" y="340" text-anchor="middle" fill="#94a3b8" font-size="12" font-family="Segoe UI,Arial,sans-serif">Exchanges route messages to queues based on bindings and routing keys.</text>
  <text x="450" y="360" text-anchor="middle" fill="#94a3b8" font-size="12" font-family="Segoe UI,Arial,sans-serif">Consumers subscribe to queues and process messages asynchronously.</text>
</svg>
