<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 420">
  <rect width="900" height="420" rx="16" fill="#0f172a"/>
  <text x="450" y="44" text-anchor="middle" fill="#fff" font-size="26" font-weight="700" font-family="Segoe UI,Arial,sans-serif">JWT Authentication Flow</text>

  <!-- Step 1: Login -->
  <rect x="40" y="75" width="170" height="60" rx="10" fill="#7c3aed"/>
  <text x="125" y="102" text-anchor="middle" fill="#fff" font-size="13" font-weight="700" font-family="Segoe UI,Arial,sans-serif">1. Client Login</text>
  <text x="125" y="120" text-anchor="middle" fill="#ddd6fe" font-size="10" font-family="Segoe UI,Arial,sans-serif">email + password</text>
  <polygon points="210,105 235,98 235,112" fill="#60a5fa"/>

  <!-- Step 2: Validate -->
  <rect x="240" y="75" width="170" height="60" rx="10" fill="#1e40af"/>
  <text x="325" y="102" text-anchor="middle" fill="#fff" font-size="13" font-weight="700" font-family="Segoe UI,Arial,sans-serif">2. Validate Creds</text>
  <text x="325" y="120" text-anchor="middle" fill="#bfdbfe" font-size="10" font-family="Segoe UI,Arial,sans-serif">Check DB / Identity</text>
  <polygon points="410,105 435,98 435,112" fill="#60a5fa"/>

  <!-- Step 3: Issue JWT -->
  <rect x="440" y="75" width="170" height="60" rx="10" fill="#166534"/>
  <text x="525" y="102" text-anchor="middle" fill="#fff" font-size="13" font-weight="700" font-family="Segoe UI,Arial,sans-serif">3. Issue JWT</text>
  <text x="525" y="120" text-anchor="middle" fill="#bbf7d0" font-size="10" font-family="Segoe UI,Arial,sans-serif">Sign with RS256 key</text>
  <polygon points="610,105 635,98 635,112" fill="#60a5fa"/>

  <!-- Step 4: Return -->
  <rect x="640" y="75" width="220" height="60" rx="10" fill="#854d0e"/>
  <text x="750" y="102" text-anchor="middle" fill="#fff" font-size="13" font-weight="700" font-family="Segoe UI,Arial,sans-serif">4. Return Token</text>
  <text x="750" y="120" text-anchor="middle" fill="#fde68a" font-size="10" font-family="Segoe UI,Arial,sans-serif">{ token: "eyJhbGci..." }</text>

  <!-- JWT Token Structure -->
  <text x="450" y="165" text-anchor="middle" fill="#94a3b8" font-size="14" font-weight="600" font-family="Segoe UI,Arial,sans-serif">JWT Token Structure</text>

  <rect x="60" y="180" width="250" height="65" rx="10" fill="#b91c1c"/>
  <text x="185" y="205" text-anchor="middle" fill="#fff" font-size="14" font-weight="700" font-family="Segoe UI,Arial,sans-serif">Header</text>
  <text x="185" y="225" text-anchor="middle" fill="#fecaca" font-size="11" font-family="Segoe UI,Arial,sans-serif">{ alg: "RS256", typ: "JWT" }</text>

  <text x="325" y="215" text-anchor="middle" fill="#475569" font-size="20" font-weight="700" font-family="Segoe UI,Arial,sans-serif">.</text>

  <rect x="340" y="180" width="250" height="65" rx="10" fill="#7c3aed"/>
  <text x="465" y="205" text-anchor="middle" fill="#fff" font-size="14" font-weight="700" font-family="Segoe UI,Arial,sans-serif">Payload (Claims)</text>
  <text x="465" y="225" text-anchor="middle" fill="#ddd6fe" font-size="11" font-family="Segoe UI,Arial,sans-serif">sub, roles, tid, exp</text>

  <text x="605" y="215" text-anchor="middle" fill="#475569" font-size="20" font-weight="700" font-family="Segoe UI,Arial,sans-serif">.</text>

  <rect x="620" y="180" width="240" height="65" rx="10" fill="#166534"/>
  <text x="740" y="205" text-anchor="middle" fill="#fff" font-size="14" font-weight="700" font-family="Segoe UI,Arial,sans-serif">Signature</text>
  <text x="740" y="225" text-anchor="middle" fill="#bbf7d0" font-size="11" font-family="Segoe UI,Arial,sans-serif">RS256(header + payload, key)</text>

  <!-- Request with Token -->
  <text x="450" y="275" text-anchor="middle" fill="#94a3b8" font-size="14" font-weight="600" font-family="Segoe UI,Arial,sans-serif">Subsequent API Request</text>

  <rect x="40" y="290" width="180" height="50" rx="10" fill="#1e3a5f"/>
  <text x="130" y="312" text-anchor="middle" fill="#60a5fa" font-size="13" font-weight="700" font-family="Segoe UI,Arial,sans-serif">Client Request</text>
  <text x="130" y="328" text-anchor="middle" fill="#94a3b8" font-size="10" font-family="Segoe UI,Arial,sans-serif">Authorization: Bearer ...</text>
  <polygon points="220,315 245,308 245,322" fill="#4ade80"/>

  <rect x="250" y="290" width="180" height="50" rx="10" fill="#166534"/>
  <text x="340" y="312" text-anchor="middle" fill="#fff" font-size="13" font-weight="700" font-family="Segoe UI,Arial,sans-serif">Validate JWT</text>
  <text x="340" y="328" text-anchor="middle" fill="#bbf7d0" font-size="10" font-family="Segoe UI,Arial,sans-serif">Signature + Expiry</text>
  <polygon points="430,315 455,308 455,322" fill="#4ade80"/>

  <rect x="460" y="290" width="180" height="50" rx="10" fill="#1e40af"/>
  <text x="550" y="312" text-anchor="middle" fill="#fff" font-size="13" font-weight="700" font-family="Segoe UI,Arial,sans-serif">Extract Claims</text>
  <text x="550" y="328" text-anchor="middle" fill="#bfdbfe" font-size="10" font-family="Segoe UI,Arial,sans-serif">UserId, Role, TenantId</text>
  <polygon points="640,315 665,308 665,322" fill="#4ade80"/>

  <rect x="670" y="290" width="190" height="50" rx="10" fill="#b91c1c"/>
  <text x="765" y="312" text-anchor="middle" fill="#fff" font-size="13" font-weight="700" font-family="Segoe UI,Arial,sans-serif">Authorize Access</text>
  <text x="765" y="328" text-anchor="middle" fill="#fecaca" font-size="10" font-family="Segoe UI,Arial,sans-serif">[Authorize(Roles="Admin")]</text>

  <!-- RS256 vs HS256 -->
  <rect x="100" y="360" width="340" height="45" rx="8" fill="#1e3a5f"/>
  <text x="270" y="380" text-anchor="middle" fill="#4ade80" font-size="12" font-weight="700" font-family="Segoe UI,Arial,sans-serif">RS256 (Asymmetric) — Production</text>
  <text x="270" y="396" text-anchor="middle" fill="#94a3b8" font-size="10" font-family="Segoe UI,Arial,sans-serif">Public key verifies · Private key signs</text>

  <rect x="460" y="360" width="340" height="45" rx="8" fill="#1e3a5f"/>
  <text x="630" y="380" text-anchor="middle" fill="#fbbf24" font-size="12" font-weight="700" font-family="Segoe UI,Arial,sans-serif">HS256 (Symmetric) — Development</text>
  <text x="630" y="396" text-anchor="middle" fill="#94a3b8" font-size="10" font-family="Segoe UI,Arial,sans-serif">Same secret key for sign &amp; verify</text>
</svg>