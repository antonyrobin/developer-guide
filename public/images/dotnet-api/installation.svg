<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 420">
  <rect width="900" height="420" rx="16" fill="#0f172a"/>
  <text x="450" y="44" text-anchor="middle" fill="#fff" font-size="26" font-weight="700" font-family="Segoe UI,Arial,sans-serif">.NET Core SDK — Installation &amp; Setup</text>

  <!-- Visual Studio path -->
  <rect x="40" y="75" width="400" height="160" rx="12" fill="#1e293b" stroke="#334155" stroke-width="1"/>
  <text x="240" y="102" text-anchor="middle" fill="#a78bfa" font-size="16" font-weight="700" font-family="Segoe UI,Arial,sans-serif">Option 1: Visual Studio</text>
  <text x="65" y="130" fill="#e2e8f0" font-size="13" font-family="Segoe UI,Arial,sans-serif">1. Open Visual Studio Installer</text>
  <text x="65" y="152" fill="#e2e8f0" font-size="13" font-family="Segoe UI,Arial,sans-serif">2. Modify → Select .NET 10 SDK</text>
  <text x="65" y="174" fill="#e2e8f0" font-size="13" font-family="Segoe UI,Arial,sans-serif">3. Select ASP.NET workload</text>
  <text x="65" y="196" fill="#e2e8f0" font-size="13" font-family="Segoe UI,Arial,sans-serif">4. Click Update / Install</text>
  <rect x="65" y="210" width="350" height="16" rx="4" fill="#334155"/>
  <rect x="65" y="210" width="350" height="16" rx="4" fill="#4ade80" opacity="0.8"/>

  <!-- CLI path -->
  <rect x="460" y="75" width="400" height="160" rx="12" fill="#1e293b" stroke="#334155" stroke-width="1"/>
  <text x="660" y="102" text-anchor="middle" fill="#60a5fa" font-size="16" font-weight="700" font-family="Segoe UI,Arial,sans-serif">Option 2: Command Line</text>
  <rect x="480" y="118" width="360" height="105" rx="8" fill="#0a0f1a"/>
  <text x="495" y="140" fill="#4ade80" font-size="12" font-family="Consolas,monospace">&gt; winget install Microsoft.DotNet.SDK.10</text>
  <text x="495" y="162" fill="#94a3b8" font-size="12" font-family="Consolas,monospace"># Verify installation</text>
  <text x="495" y="184" fill="#4ade80" font-size="12" font-family="Consolas,monospace">&gt; dotnet --version</text>
  <text x="495" y="206" fill="#fbbf24" font-size="12" font-family="Consolas,monospace">  10.0.100</text>

  <!-- Global Tools -->
  <text x="450" y="265" text-anchor="middle" fill="#94a3b8" font-size="15" font-weight="600" font-family="Segoe UI,Arial,sans-serif">Required Global Tools</text>

  <rect x="40" y="280" width="200" height="55" rx="10" fill="#166534"/>
  <text x="140" y="305" text-anchor="middle" fill="#fff" font-size="14" font-weight="700" font-family="Segoe UI,Arial,sans-serif">dotnet-ef</text>
  <text x="140" y="323" text-anchor="middle" fill="#bbf7d0" font-size="11" font-family="Segoe UI,Arial,sans-serif">EF Core Migrations</text>

  <rect x="260" y="280" width="200" height="55" rx="10" fill="#1e40af"/>
  <text x="360" y="305" text-anchor="middle" fill="#fff" font-size="14" font-weight="700" font-family="Segoe UI,Arial,sans-serif">dotnet-format</text>
  <text x="360" y="323" text-anchor="middle" fill="#bfdbfe" font-size="11" font-family="Segoe UI,Arial,sans-serif">Code Formatting</text>

  <rect x="480" y="280" width="200" height="55" rx="10" fill="#7c3aed"/>
  <text x="580" y="305" text-anchor="middle" fill="#fff" font-size="14" font-weight="700" font-family="Segoe UI,Arial,sans-serif">HTTPS Cert</text>
  <text x="580" y="323" text-anchor="middle" fill="#ddd6fe" font-size="11" font-family="Segoe UI,Arial,sans-serif">dev-certs https --trust</text>

  <rect x="700" y="280" width="160" height="55" rx="10" fill="#854d0e"/>
  <text x="780" y="305" text-anchor="middle" fill="#fff" font-size="14" font-weight="700" font-family="Segoe UI,Arial,sans-serif">VS Code Ext</text>
  <text x="780" y="323" text-anchor="middle" fill="#fde68a" font-size="11" font-family="Segoe UI,Arial,sans-serif">C# + Dev Kit</text>

  <!-- Quick Start -->
  <rect x="140" y="355" width="620" height="50" rx="10" fill="#0a0f1a" stroke="#334155" stroke-width="1"/>
  <text x="160" y="378" fill="#94a3b8" font-size="12" font-family="Consolas,monospace">Quick Start:</text>
  <text x="265" y="378" fill="#4ade80" font-size="12" font-family="Consolas,monospace">dotnet new webapi -n MyApi &amp;&amp; cd MyApi &amp;&amp; dotnet run</text>
  <text x="160" y="396" fill="#60a5fa" font-size="11" font-family="Consolas,monospace">→ https://localhost:5001/swagger</text>
</svg>