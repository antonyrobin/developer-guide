<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 420">
  <rect width="900" height="420" rx="16" fill="#0f172a"/>
  <text x="450" y="44" text-anchor="middle" fill="#fff" font-size="26" font-weight="700" font-family="Segoe UI,Arial,sans-serif">Caching Strategy (Redis / In-Memory)</text>

  <rect x="40" y="160" width="120" height="60" rx="8" fill="#3b82f6"/>
  <text x="100" y="195" text-anchor="middle" fill="#fff" font-size="16" font-weight="700" font-family="Segoe UI,Arial,sans-serif">API Request</text>

  <line x1="160" y1="190" x2="250" y2="190" stroke="#fff" stroke-width="3"/>
  <text x="205" y="180" text-anchor="middle" fill="#94a3b8" font-size="12" font-family="Segoe UI,Arial,sans-serif">Get Data</text>

  <rect x="250" y="140" width="160" height="100" rx="12" fill="#7c3aed"/>
  <text x="330" y="185" text-anchor="middle" fill="#fff" font-size="18" font-weight="700" font-family="Segoe UI,Arial,sans-serif">Cache Layer</text>
  <text x="330" y="205" text-anchor="middle" fill="#ddd" font-size="12" font-family="Segoe UI,Arial,sans-serif">Redis / IMemoryCache</text>

  <!-- Cache Hit -->
  <path d="M 330 140 Q 330 80 100 80 L 100 160" fill="none" stroke="#10b981" stroke-width="3" stroke-dasharray="6,6"/>
  <text x="215" y="100" text-anchor="middle" fill="#10b981" font-size="16" font-weight="700" font-family="Segoe UI,Arial,sans-serif">Cache Hit (Fast Return)</text>

  <!-- Cache Miss -->
  <line x1="410" y1="190" x2="600" y2="190" stroke="#ef4444" stroke-width="3" stroke-dasharray="6,6"/>
  <text x="505" y="180" text-anchor="middle" fill="#ef4444" font-size="14" font-weight="700" font-family="Segoe UI,Arial,sans-serif">Cache Miss</text>

  <rect x="600" y="130" width="160" height="120" rx="12" fill="#047857"/>
  <text x="680" y="185" text-anchor="middle" fill="#fff" font-size="18" font-weight="700" font-family="Segoe UI,Arial,sans-serif">Database</text>
  <text x="680" y="205" text-anchor="middle" fill="#a7f3d0" font-size="12" font-family="Segoe UI,Arial,sans-serif">PostgreSQL</text>

  <!-- Write back to cache -->
  <path d="M 680 250 Q 680 320 330 320 L 330 240" fill="none" stroke="#f59e0b" stroke-width="3" stroke-dasharray="4,4"/>
  <text x="505" y="310" text-anchor="middle" fill="#f59e0b" font-size="14" font-weight="700" font-family="Segoe UI,Arial,sans-serif">Update Cache</text>

  <!-- Return Data -->
  <path d="M 680 130 Q 680 40 100 40 L 100 160" fill="none" stroke="#fff" stroke-width="2" stroke-dasharray="6,6"/>
  <text x="390" y="30" text-anchor="middle" fill="#94a3b8" font-size="12" font-weight="700" font-family="Segoe UI,Arial,sans-serif">Return Data to Client</text>
</svg>