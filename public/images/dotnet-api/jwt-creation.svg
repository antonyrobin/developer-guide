<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 420">
  <rect width="900" height="420" rx="16" fill="#0f172a"/>
  <text x="450" y="44" text-anchor="middle" fill="#fff" font-size="26" font-weight="700" font-family="Segoe UI,Arial,sans-serif">JWT Generation &amp; Validation</text>

  <!-- Client -->
  <rect x="50" y="100" width="140" height="200" rx="14" fill="#3b82f6"/>
  <text x="120" y="195" text-anchor="middle" fill="#fff" font-size="20" font-weight="700" font-family="Segoe UI,Arial,sans-serif">Client App</text>
  <text x="120" y="220" text-anchor="middle" fill="#bfdbfe" font-size="12" font-family="Segoe UI,Arial,sans-serif">(Web/Mobile)</text>

  <!-- Auth flow -->
  <line x1="190" y1="130" x2="400" y2="130" stroke="#f59e0b" stroke-width="3" stroke-dasharray="5,5"/>
  <text x="295" y="120" text-anchor="middle" fill="#f59e0b" font-size="14" font-weight="600" font-family="Segoe UI,Arial,sans-serif">1. POST /login (Credentials)</text>

  <line x1="400" y1="160" x2="190" y2="160" stroke="#10b981" stroke-width="3"/>
  <text x="295" y="180" text-anchor="middle" fill="#10b981" font-size="14" font-weight="600" font-family="Segoe UI,Arial,sans-serif">2. Returns signed JWT</text>

  <rect x="400" y="90" width="200" height="90" rx="12" fill="#7c3aed"/>
  <text x="500" y="130" text-anchor="middle" fill="#fff" font-size="18" font-weight="700" font-family="Segoe UI,Arial,sans-serif">Identity Service</text>
  <text x="500" y="150" text-anchor="middle" fill="#ddd" font-size="11" font-family="Segoe UI,Arial,sans-serif">Signs token with Secret Key</text>

  <!-- Secret Key Vault -->
  <rect x="650" y="90" width="150" height="90" rx="12" fill="#be185d"/>
  <text x="725" y="130" text-anchor="middle" fill="#fff" font-size="16" font-weight="700" font-family="Segoe UI,Arial,sans-serif">Secret String</text>
  <text x="725" y="150" text-anchor="middle" fill="#fbcfe8" font-size="10" font-family="Segoe UI,Arial,sans-serif">HMAC SHA256</text>
  <line x1="600" y1="135" x2="650" y2="135" stroke="#fff" stroke-width="2" stroke-dasharray="4,4"/>

  <!-- API Access -->
  <line x1="190" y1="260" x2="400" y2="260" stroke="#3b82f6" stroke-width="3"/>
  <text x="295" y="250" text-anchor="middle" fill="#3b82f6" font-size="14" font-weight="600" font-family="Segoe UI,Arial,sans-serif">3. Request + Bearer JWT</text>

  <rect x="400" y="220" width="200" height="90" rx="12" fill="#1e40af"/>
  <text x="500" y="260" text-anchor="middle" fill="#fff" font-size="18" font-weight="700" font-family="Segoe UI,Arial,sans-serif">Protected API</text>
  <text x="500" y="280" text-anchor="middle" fill="#bfdbfe" font-size="11" font-family="Segoe UI,Arial,sans-serif">Validates Signature &amp; Claims</text>

  <line x1="600" y1="265" x2="650" y2="265" stroke="#fff" stroke-width="2" stroke-dasharray="4,4"/>
  <rect x="650" y="220" width="150" height="90" rx="12" fill="#047857"/>
  <text x="725" y="260" text-anchor="middle" fill="#fff" font-size="16" font-weight="700" font-family="Segoe UI,Arial,sans-serif">Resource Data</text>

  <!-- Anatomy of JWT -->
  <rect x="150" y="340" width="600" height="50" rx="8" fill="#1e293b"/>
  <text x="450" y="370" text-anchor="middle" font-size="16" font-weight="700" font-family="Consolas,monospace">
    <tspan fill="#ef4444">Header</tspan>.<tspan fill="#8b5cf6">Payload (Claims)</tspan>.<tspan fill="#10b981">Signature</tspan>
  </text>
</svg>