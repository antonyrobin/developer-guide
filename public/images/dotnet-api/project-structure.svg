  <text x="630" y="372" fill="#64748b" font-size="10" font-family="Consolas,monospace">← Entities, DTOs</text>
  <text x="470" y="388" fill="#94a3b8" font-size="12" font-family="Consolas,monospace">└── appsettings.json</text>
  <text x="630" y="388" fill="#64748b" font-size="10" font-family="Consolas,monospace">← Configuration</text>
