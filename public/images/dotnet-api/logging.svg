<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 420">
  <rect width="900" height="420" rx="16" fill="#0f172a"/>
  <text x="450" y="44" text-anchor="middle" fill="#fff" font-size="26" font-weight="700" font-family="Segoe UI,Arial,sans-serif">Structured Logging with Serilog</text>

  <!-- App -->
  <rect x="50" y="140" width="180" height="120" rx="12" fill="#2563eb"/>
  <text x="140" y="185" text-anchor="middle" fill="#fff" font-size="20" font-weight="700" font-family="Segoe UI,Arial,sans-serif">.NET API</text>
  <text x="140" y="210" text-anchor="middle" fill="#bfdbfe" font-size="12" font-family="Segoe UI,Arial,sans-serif">Controller / Service</text>
  <text x="140" y="235" text-anchor="middle" fill="#bfdbfe" font-size="12" font-family="Consolas,monospace">_logger.LogInformation()</text>

  <!-- Flow to Serilog -->
  <line x1="230" y1="200" x2="350" y2="200" stroke="#fff" stroke-width="3"/>
  
  <rect x="350" y="140" width="160" height="120" rx="12" fill="#7c3aed"/>
  <text x="430" y="195" text-anchor="middle" fill="#fff" font-size="22" font-weight="700" font-family="Segoe UI,Arial,sans-serif">Serilog</text>
  <text x="430" y="215" text-anchor="middle" fill="#ddd" font-size="12" font-family="Segoe UI,Arial,sans-serif">Enrichers · Formatter</text>

  <!-- Sinks -->
  <line x1="510" y1="200" x2="650" y2="100" stroke="#fff" stroke-width="2" stroke-dasharray="4,4"/>
  <line x1="510" y1="200" x2="650" y2="200" stroke="#fff" stroke-width="2" stroke-dasharray="4,4"/>
  <line x1="510" y1="200" x2="650" y2="300" stroke="#fff" stroke-width="2" stroke-dasharray="4,4"/>

  <rect x="650" y="70" width="200" height="60" rx="10" fill="#1e293b" stroke="#334155" stroke-width="2"/>
  <text x="750" y="105" text-anchor="middle" fill="#fbbf24" font-size="16" font-weight="700" font-family="Segoe UI,Arial,sans-serif">Console Sink</text>
  <text x="750" y="120" text-anchor="middle" fill="#94a3b8" font-size="11" font-family="Segoe UI,Arial,sans-serif">Local Development</text>

  <rect x="650" y="170" width="200" height="60" rx="10" fill="#1e293b" stroke="#334155" stroke-width="2"/>
  <text x="750" y="205" text-anchor="middle" fill="#4ade80" font-size="16" font-weight="700" font-family="Segoe UI,Arial,sans-serif">File Sink</text>
  <text x="750" y="220" text-anchor="middle" fill="#94a3b8" font-size="11" font-family="Segoe UI,Arial,sans-serif">Logs/log-.txt (Rolling)</text>

  <rect x="650" y="270" width="200" height="60" rx="10" fill="#1e293b" stroke="#334155" stroke-width="2"/>
  <text x="750" y="305" text-anchor="middle" fill="#38bdf8" font-size="16" font-weight="700" font-family="Segoe UI,Arial,sans-serif">Seq / Elasticsearch</text>
  <text x="750" y="320" text-anchor="middle" fill="#94a3b8" font-size="11" font-family="Segoe UI,Arial,sans-serif">Centralized Observability</text>

  <!-- Example Log -->
  <rect x="150" y="320" width="600" height="60" rx="8" fill="#111827" stroke="#374151" stroke-width="1"/>
  <text x="450" y="355" text-anchor="middle" fill="#a3e635" font-size="14" font-family="Consolas,monospace">
    {"@t": "2024-03-24T12:00:00Z", "@m": "User login success", "UserId": 123}
  </text>
</svg>