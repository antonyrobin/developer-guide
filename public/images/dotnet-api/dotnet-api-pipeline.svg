<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 420">
  <rect width="900" height="420" rx="16" fill="#0f172a"/>
  <text x="450" y="44" text-anchor="middle" fill="#fff" font-size="26" font-weight="700" font-family="Segoe UI,Arial,sans-serif">.NET Web API Request Pipeline</text>

  <!-- Request -->
  <rect x="40" y="110" width="130" height="60" rx="10" fill="#7c3aed"/>
  <text x="105" y="146" text-anchor="middle" fill="#fff" font-size="15" font-weight="700" font-family="Segoe UI,Arial,sans-serif">HTTP Request</text>
  <polygon points="170,140 195,133 195,147" fill="#60a5fa"/>

  <!-- Kestrel -->
  <rect x="200" y="100" width="120" height="80" rx="10" fill="#0e7490"/>
  <text x="260" y="138" text-anchor="middle" fill="#fff" font-size="15" font-weight="700" font-family="Segoe UI,Arial,sans-serif">Kestrel</text>
  <text x="260" y="157" text-anchor="middle" fill="#d4f5f4" font-size="11" font-family="Segoe UI,Arial,sans-serif">Web Server</text>
  <polygon points="320,140 345,133 345,147" fill="#60a5fa"/>

  <!-- Middleware -->
  <rect x="350" y="100" width="140" height="80" rx="10" fill="#1e40af"/>
  <text x="420" y="133" text-anchor="middle" fill="#fff" font-size="15" font-weight="700" font-family="Segoe UI,Arial,sans-serif">Middleware</text>
  <text x="420" y="152" text-anchor="middle" fill="#bfdbfe" font-size="11" font-family="Segoe UI,Arial,sans-serif">Auth · CORS · Log</text>
  <polygon points="490,140 515,133 515,147" fill="#60a5fa"/>

  <!-- Routing -->
  <rect x="520" y="100" width="120" height="80" rx="10" fill="#166534"/>
  <text x="580" y="138" text-anchor="middle" fill="#fff" font-size="15" font-weight="700" font-family="Segoe UI,Arial,sans-serif">Routing</text>
  <text x="580" y="157" text-anchor="middle" fill="#bbf7d0" font-size="11" font-family="Segoe UI,Arial,sans-serif">Map endpoints</text>
  <polygon points="640,140 665,133 665,147" fill="#60a5fa"/>

  <!-- Controller -->
  <rect x="670" y="100" width="180" height="80" rx="10" fill="#b91c1c"/>
  <text x="760" y="133" text-anchor="middle" fill="#fff" font-size="15" font-weight="700" font-family="Segoe UI,Arial,sans-serif">Controller Action</text>
  <text x="760" y="152" text-anchor="middle" fill="#fecaca" font-size="11" font-family="Segoe UI,Arial,sans-serif">[HttpGet] [HttpPost]</text>

  <!-- Return arrow -->
  <line x1="760" y1="180" x2="760" y2="220" stroke="#fbbf24" stroke-width="2"/>
  <text x="760" y="245" text-anchor="middle" fill="#fbbf24" font-size="14" font-weight="600" font-family="Segoe UI,Arial,sans-serif">JSON Response</text>

  <!-- REST Verbs -->
  <text x="450" y="295" text-anchor="middle" fill="#94a3b8" font-size="15" font-weight="600" font-family="Segoe UI,Arial,sans-serif">RESTful HTTP Verbs</text>
  <rect x="100" y="310" width="140" height="42" rx="8" fill="#166534"/>
  <text x="170" y="337" text-anchor="middle" fill="#fff" font-size="15" font-weight="700" font-family="Segoe UI,Arial,sans-serif">GET</text>
  <rect x="260" y="310" width="140" height="42" rx="8" fill="#1e40af"/>
  <text x="330" y="337" text-anchor="middle" fill="#fff" font-size="15" font-weight="700" font-family="Segoe UI,Arial,sans-serif">POST</text>
  <rect x="420" y="310" width="140" height="42" rx="8" fill="#854d0e"/>
  <text x="490" y="337" text-anchor="middle" fill="#fff" font-size="15" font-weight="700" font-family="Segoe UI,Arial,sans-serif">PUT</text>
  <rect x="580" y="310" width="140" height="42" rx="8" fill="#b91c1c"/>
  <text x="650" y="337" text-anchor="middle" fill="#fff" font-size="15" font-weight="700" font-family="Segoe UI,Arial,sans-serif">DELETE</text>

  <text x="170" y="370" text-anchor="middle" fill="#86efac" font-size="11" font-family="Segoe UI,Arial,sans-serif">Read resources</text>
  <text x="330" y="370" text-anchor="middle" fill="#93c5fd" font-size="11" font-family="Segoe UI,Arial,sans-serif">Create resources</text>
  <text x="490" y="370" text-anchor="middle" fill="#fde68a" font-size="11" font-family="Segoe UI,Arial,sans-serif">Update resources</text>
  <text x="650" y="370" text-anchor="middle" fill="#fca5a5" font-size="11" font-family="Segoe UI,Arial,sans-serif">Remove resources</text>

  <text x="450" y="410" text-anchor="middle" fill="#64748b" font-size="13" font-family="Segoe UI,Arial,sans-serif">Minimal APIs: app.MapGet("/items", () =&gt; ...); — No controller class needed</text>
</svg>
