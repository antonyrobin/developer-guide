<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 420">
  <rect width="900" height="420" rx="16" fill="#0f172a"/>
  <text x="450" y="44" text-anchor="middle" fill="#fff" font-size="26" font-weight="700" font-family="Segoe UI,Arial,sans-serif">ASP.NET Core Web API — Overview</text>

  <!-- Center logo area -->
  <rect x="330" y="70" width="240" height="70" rx="14" fill="#512bd4"/>
  <text x="450" y="108" text-anchor="middle" fill="#fff" font-size="22" font-weight="700" font-family="Segoe UI,Arial,sans-serif">.NET Core Web API</text>
  <text x="450" y="128" text-anchor="middle" fill="#c4b5fd" font-size="12" font-family="Segoe UI,Arial,sans-serif">Cross-platform · High-performance · C#</text>

  <!-- Feature boxes row 1 -->
  <rect x="40" y="165" width="185" height="65" rx="10" fill="#166534"/>
  <text x="132" y="195" text-anchor="middle" fill="#fff" font-size="14" font-weight="700" font-family="Segoe UI,Arial,sans-serif">Minimal APIs</text>
  <text x="132" y="215" text-anchor="middle" fill="#bbf7d0" font-size="11" font-family="Segoe UI,Arial,sans-serif">Less boilerplate, fast setup</text>

  <rect x="245" y="165" width="185" height="65" rx="10" fill="#1e40af"/>
  <text x="337" y="195" text-anchor="middle" fill="#fff" font-size="14" font-weight="700" font-family="Segoe UI,Arial,sans-serif">Controller-based</text>
  <text x="337" y="215" text-anchor="middle" fill="#bfdbfe" font-size="11" font-family="Segoe UI,Arial,sans-serif">Structured, organized code</text>

  <rect x="450" y="165" width="185" height="65" rx="10" fill="#7c3aed"/>
  <text x="542" y="195" text-anchor="middle" fill="#fff" font-size="14" font-weight="700" font-family="Segoe UI,Arial,sans-serif">Swagger / OpenAPI</text>
  <text x="542" y="215" text-anchor="middle" fill="#ddd6fe" font-size="11" font-family="Segoe UI,Arial,sans-serif">Auto-generated API docs</text>

  <rect x="655" y="165" width="200" height="65" rx="10" fill="#b91c1c"/>
  <text x="755" y="195" text-anchor="middle" fill="#fff" font-size="14" font-weight="700" font-family="Segoe UI,Arial,sans-serif">Native AOT</text>
  <text x="755" y="215" text-anchor="middle" fill="#fecaca" font-size="11" font-family="Segoe UI,Arial,sans-serif">Fast container startup</text>

  <!-- Feature boxes row 2 -->
  <rect x="40" y="250" width="185" height="65" rx="10" fill="#0e7490"/>
  <text x="132" y="280" text-anchor="middle" fill="#fff" font-size="14" font-weight="700" font-family="Segoe UI,Arial,sans-serif">Built-in DI</text>
  <text x="132" y="300" text-anchor="middle" fill="#d4f5f4" font-size="11" font-family="Segoe UI,Arial,sans-serif">First-class DI container</text>

  <rect x="245" y="250" width="185" height="65" rx="10" fill="#854d0e"/>
  <text x="337" y="280" text-anchor="middle" fill="#fff" font-size="14" font-weight="700" font-family="Segoe UI,Arial,sans-serif">JWT Auth</text>
  <text x="337" y="300" text-anchor="middle" fill="#fde68a" font-size="11" font-family="Segoe UI,Arial,sans-serif">Token-based security</text>

  <rect x="450" y="250" width="185" height="65" rx="10" fill="#be185d"/>
  <text x="542" y="280" text-anchor="middle" fill="#fff" font-size="14" font-weight="700" font-family="Segoe UI,Arial,sans-serif">EF Core</text>
  <text x="542" y="300" text-anchor="middle" fill="#fbcfe8" font-size="11" font-family="Segoe UI,Arial,sans-serif">ORM with LINQ queries</text>

  <rect x="655" y="250" width="200" height="65" rx="10" fill="#374151"/>
  <text x="755" y="280" text-anchor="middle" fill="#fff" font-size="14" font-weight="700" font-family="Segoe UI,Arial,sans-serif">Docker + K8s</text>
  <text x="755" y="300" text-anchor="middle" fill="#d1d5db" font-size="11" font-family="Segoe UI,Arial,sans-serif">Container-ready deployment</text>

  <!-- Architecture flow -->
  <text x="450" y="350" text-anchor="middle" fill="#94a3b8" font-size="14" font-weight="600" font-family="Segoe UI,Arial,sans-serif">Microservices Architecture</text>
  <rect x="80" y="365" width="150" height="36" rx="8" fill="#1e3a5f"/>
  <text x="155" y="388" text-anchor="middle" fill="#60a5fa" font-size="12" font-weight="600" font-family="Segoe UI,Arial,sans-serif">Identity Service</text>
  <rect x="250" y="365" width="150" height="36" rx="8" fill="#1e3a5f"/>
  <text x="325" y="388" text-anchor="middle" fill="#60a5fa" font-size="12" font-weight="600" font-family="Segoe UI,Arial,sans-serif">Catalog Service</text>
  <rect x="420" y="365" width="150" height="36" rx="8" fill="#1e3a5f"/>
  <text x="495" y="388" text-anchor="middle" fill="#60a5fa" font-size="12" font-weight="600" font-family="Segoe UI,Arial,sans-serif">Commerce Service</text>
  <rect x="590" y="365" width="170" height="36" rx="8" fill="#1e3a5f"/>
  <text x="675" y="388" text-anchor="middle" fill="#60a5fa" font-size="12" font-weight="600" font-family="Segoe UI,Arial,sans-serif">Engagement Service</text>
</svg>