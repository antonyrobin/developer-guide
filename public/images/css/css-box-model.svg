<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 520 360">
  <rect width="520" height="360" rx="12" fill="#0f172a"/>
  <text x="260" y="30" text-anchor="middle" fill="#f1f5f9" font-family="Arial,sans-serif" font-size="18" font-weight="bold">CSS Box Model</text>
  <!-- Margin -->
  <rect x="40" y="50" width="440" height="280" rx="8" fill="#f59e0b" opacity="0.25" stroke="#f59e0b" stroke-width="2"/>
  <text x="260" y="72" text-anchor="middle" fill="#f59e0b" font-family="Arial,sans-serif" font-size="13" font-weight="bold">MARGIN</text>
  <!-- Border -->
  <rect x="80" y="85" width="360" height="220" rx="6" fill="#ef4444" opacity="0.25" stroke="#ef4444" stroke-width="2"/>
  <text x="260" y="105" text-anchor="middle" fill="#ef4444" font-family="Arial,sans-serif" font-size="13" font-weight="bold">BORDER</text>
  <!-- Padding -->
  <rect x="120" y="118" width="280" height="160" rx="6" fill="#3b82f6" opacity="0.25" stroke="#3b82f6" stroke-width="2"/>
  <text x="260" y="138" text-anchor="middle" fill="#3b82f6" font-family="Arial,sans-serif" font-size="13" font-weight="bold">PADDING</text>
  <!-- Content -->
  <rect x="165" y="152" width="190" height="100" rx="6" fill="#10b981" opacity="0.35" stroke="#10b981" stroke-width="2"/>
  <text x="260" y="195" text-anchor="middle" fill="#10b981" font-family="Arial,sans-serif" font-size="16" font-weight="bold">CONTENT</text>
  <text x="260" y="215" text-anchor="middle" fill="#94a3b8" font-family="monospace" font-size="11">width × height</text>
  <!-- Labels on sides -->
  <text x="55" y="195" fill="#f59e0b" font-family="monospace" font-size="10" transform="rotate(-90 55 195)">margin</text>
  <text x="95" y="205" fill="#ef4444" font-family="monospace" font-size="10" transform="rotate(-90 95 205)">border</text>
  <text x="135" y="208" fill="#3b82f6" font-family="monospace" font-size="10" transform="rotate(-90 135 208)">padding</text>
  <!-- box-sizing note -->
  <text x="260" y="345" text-anchor="middle" fill="#94a3b8" font-family="monospace" font-size="11">box-sizing: border-box → width includes padding + border</text>
</svg>