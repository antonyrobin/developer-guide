<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 520 360">
  <rect width="520" height="360" rx="12" fill="#0f172a"/>
  <text x="260" y="28" text-anchor="middle" fill="#f1f5f9" font-family="Arial,sans-serif" font-size="18" font-weight="bold">CSS Grid Layout</text>
  <!-- Grid container -->
  <rect x="30" y="45" width="460" height="240" rx="8" fill="none" stroke="#475569" stroke-width="2" stroke-dasharray="6,4"/>
  <text x="45" y="62" fill="#94a3b8" font-family="monospace" font-size="10">display: grid; grid-template-columns: 1fr 2fr 1fr;</text>
  <!-- Row 1 -->
  <rect x="45" y="72" width="105" height="95" rx="6" fill="#3b82f6" opacity="0.3" stroke="#3b82f6" stroke-width="1.5"/>
  <text x="97" y="115" text-anchor="middle" fill="#93c5fd" font-family="Arial,sans-serif" font-size="12" font-weight="bold">1fr</text>
  <text x="97" y="132" text-anchor="middle" fill="#64748b" font-family="monospace" font-size="9">col 1</text>
  <rect x="165" y="72" width="210" height="95" rx="6" fill="#10b981" opacity="0.3" stroke="#10b981" stroke-width="1.5"/>
  <text x="270" y="115" text-anchor="middle" fill="#6ee7b7" font-family="Arial,sans-serif" font-size="12" font-weight="bold">2fr</text>
  <text x="270" y="132" text-anchor="middle" fill="#64748b" font-family="monospace" font-size="9">col 2</text>
  <rect x="390" y="72" width="85" height="95" rx="6" fill="#f59e0b" opacity="0.3" stroke="#f59e0b" stroke-width="1.5"/>
  <text x="432" y="115" text-anchor="middle" fill="#fcd34d" font-family="Arial,sans-serif" font-size="12" font-weight="bold">1fr</text>
  <text x="432" y="132" text-anchor="middle" fill="#64748b" font-family="monospace" font-size="9">col 3</text>
  <!-- Row 2 - span example -->
  <rect x="45" y="180" width="330" height="90" rx="6" fill="#8b5cf6" opacity="0.3" stroke="#8b5cf6" stroke-width="1.5"/>
  <text x="210" y="222" text-anchor="middle" fill="#c4b5fd" font-family="Arial,sans-serif" font-size="12" font-weight="bold">grid-column: span 2</text>
  <text x="210" y="240" text-anchor="middle" fill="#64748b" font-family="monospace" font-size="9">spans columns 1-2</text>
  <rect x="390" y="180" width="85" height="90" rx="6" fill="#ef4444" opacity="0.3" stroke="#ef4444" stroke-width="1.5"/>
  <text x="432" y="225" text-anchor="middle" fill="#fca5a5" font-family="monospace" font-size="10">cell</text>
  <!-- Gap labels -->
  <text x="155" y="175" text-anchor="middle" fill="#06b6d4" font-family="monospace" font-size="9">← gap →</text>
  <!-- Named areas example -->
  <rect x="30" y="295" width="460" height="55" rx="6" fill="#1e293b"/>
  <text x="260" y="314" text-anchor="middle" fill="#e2e8f0" font-family="monospace" font-size="11">grid-template-areas:</text>
  <text x="260" y="332" text-anchor="middle" fill="#94a3b8" font-family="monospace" font-size="10">"header header" "sidebar main" "footer footer"</text>
</svg>