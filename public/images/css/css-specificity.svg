<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 520 320">
  <rect width="520" height="320" rx="12" fill="#0f172a"/>
  <text x="260" y="30" text-anchor="middle" fill="#f1f5f9" font-family="Arial,sans-serif" font-size="18" font-weight="bold">CSS Specificity Hierarchy</text>
  <!-- Scale bar backgrounds -->
  <rect x="40" y="50" width="440" height="50" rx="8" fill="#ef4444" opacity="0.25" stroke="#ef4444" stroke-width="1.5"/>
  <rect x="40" y="110" width="330" height="50" rx="8" fill="#f59e0b" opacity="0.25" stroke="#f59e0b" stroke-width="1.5"/>
  <rect x="40" y="170" width="220" height="50" rx="8" fill="#3b82f6" opacity="0.25" stroke="#3b82f6" stroke-width="1.5"/>
  <rect x="40" y="230" width="110" height="50" rx="8" fill="#10b981" opacity="0.25" stroke="#10b981" stroke-width="1.5"/>
  <!-- Labels and scores -->
  <text x="55" y="72" fill="#fca5a5" font-family="Arial,sans-serif" font-size="14" font-weight="bold">Inline Styles</text>
  <text x="55" y="88" fill="#94a3b8" font-family="monospace" font-size="11">style="color: red"</text>
  <text x="460" y="80" text-anchor="end" fill="#ef4444" font-family="Arial,sans-serif" font-size="16" font-weight="bold">1,0,0,0</text>
  <text x="55" y="132" fill="#fcd34d" font-family="Arial,sans-serif" font-size="14" font-weight="bold">ID Selectors</text>
  <text x="55" y="148" fill="#94a3b8" font-family="monospace" font-size="11">#header { }</text>
  <text x="350" y="140" text-anchor="end" fill="#f59e0b" font-family="Arial,sans-serif" font-size="16" font-weight="bold">0,1,0,0</text>
  <text x="55" y="192" fill="#93c5fd" font-family="Arial,sans-serif" font-size="14" font-weight="bold">Class / Attribute / Pseudo-class</text>
  <text x="55" y="208" fill="#94a3b8" font-family="monospace" font-size="11">.nav, [type], :hover</text>
  <text x="240" y="200" text-anchor="end" fill="#3b82f6" font-family="Arial,sans-serif" font-size="16" font-weight="bold">0,0,1,0</text>
  <text x="55" y="252" fill="#6ee7b7" font-family="Arial,sans-serif" font-size="14" font-weight="bold">Element / Pseudo-element</text>
  <text x="55" y="268" fill="#94a3b8" font-family="monospace" font-size="11">p, div, ::before</text>
  <text x="130" y="260" text-anchor="end" fill="#10b981" font-family="Arial,sans-serif" font-size="16" font-weight="bold">0,0,0,1</text>
  <!-- Warning -->
  <rect x="40" y="290" width="440" height="24" rx="4" fill="#1e293b"/>
  <text x="260" y="306" text-anchor="middle" fill="#f59e0b" font-family="monospace" font-size="11">⚠ !important overrides all — use sparingly!</text>
</svg>