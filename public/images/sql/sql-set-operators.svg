<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 520 280">
  <rect width="520" height="280" rx="12" fill="#0f172a"/>
  <text x="260" y="28" text-anchor="middle" fill="#f59e0b" font-size="15" font-weight="bold" font-family="system-ui">SQL Set Operators</text>
  <!-- Query A result -->
  <rect x="30" y="50" width="140" height="100" rx="8" fill="#1e293b" stroke="#3b82f6" stroke-width="1.5"/>
  <text x="100" y="70" text-anchor="middle" fill="#3b82f6" font-size="10" font-weight="bold" font-family="system-ui">Query A</text>
  <text x="100" y="90" text-anchor="middle" fill="#e2e8f0" font-size="9" font-family="monospace">Alice</text>
  <text x="100" y="106" text-anchor="middle" fill="#e2e8f0" font-size="9" font-family="monospace">Bob</text>
  <text x="100" y="122" text-anchor="middle" fill="#f59e0b" font-size="9" font-family="monospace">Charlie</text>
  <text x="100" y="138" text-anchor="middle" fill="#e2e8f0" font-size="9" font-family="monospace">Diana</text>
  <!-- Query B result -->
  <rect x="350" y="50" width="140" height="100" rx="8" fill="#1e293b" stroke="#10b981" stroke-width="1.5"/>
  <text x="420" y="70" text-anchor="middle" fill="#10b981" font-size="10" font-weight="bold" font-family="system-ui">Query B</text>
  <text x="420" y="90" text-anchor="middle" fill="#f59e0b" font-size="9" font-family="monospace">Charlie</text>
  <text x="420" y="106" text-anchor="middle" fill="#e2e8f0" font-size="9" font-family="monospace">Eve</text>
  <text x="420" y="122" text-anchor="middle" fill="#e2e8f0" font-size="9" font-family="monospace">Frank</text>
  <!-- Operators -->
  <rect x="190" y="50" width="140" height="48" rx="6" fill="#1e293b" stroke="#f59e0b" stroke-width="1.5"/>
  <text x="260" y="68" text-anchor="middle" fill="#f59e0b" font-size="10" font-weight="bold" font-family="system-ui">UNION</text>
  <text x="260" y="84" text-anchor="middle" fill="#94a3b8" font-size="8" font-family="system-ui">All rows, no duplicates</text>
  <rect x="190" y="105" width="140" height="48" rx="6" fill="#1e293b" stroke="#10b981" stroke-width="1.5"/>
  <text x="260" y="123" text-anchor="middle" fill="#10b981" font-size="10" font-weight="bold" font-family="system-ui">INTERSECT</text>
  <text x="260" y="139" text-anchor="middle" fill="#94a3b8" font-size="8" font-family="system-ui">Only common: Charlie</text>
  <!-- EXCEPT -->
  <rect x="30" y="170" width="220" height="48" rx="6" fill="#1e293b" stroke="#a78bfa" stroke-width="1.5"/>
  <text x="140" y="188" text-anchor="middle" fill="#a78bfa" font-size="10" font-weight="bold" font-family="system-ui">A EXCEPT B</text>
  <text x="140" y="204" text-anchor="middle" fill="#94a3b8" font-size="8" font-family="system-ui">Only in A: Alice, Bob, Diana</text>
  <!-- UNION ALL -->
  <rect x="270" y="170" width="220" height="48" rx="6" fill="#1e293b" stroke="#06b6d4" stroke-width="1.5"/>
  <text x="380" y="188" text-anchor="middle" fill="#06b6d4" font-size="10" font-weight="bold" font-family="system-ui">UNION ALL</text>
  <text x="380" y="204" text-anchor="middle" fill="#94a3b8" font-size="8" font-family="system-ui">All rows, keeps duplicates (faster)</text>
  <!-- Note -->
  <rect x="30" y="235" width="460" height="30" rx="5" fill="#1e293b" stroke="#475569" stroke-width="1"/>
  <text x="260" y="255" text-anchor="middle" fill="#94a3b8" font-size="9" font-family="system-ui">All set operations require compatible column shapes (same count, same types)</text>
</svg>