<svg viewBox="0 0 950 600" xmlns="http://www.w3.org/2000/svg">
  <!-- Title -->
  <text x="475" y="35" font-size="24" font-weight="bold" text-anchor="middle" fill="#333">Deployment Strategies Comparison</text>
  
  <!-- ROLLING -->
  <g>
    <text x="120" y="90" font-size="13" font-weight="bold" text-anchor="middle" fill="#333">Rolling</text>
    <text x="120" y="110" font-size="10" fill="#666" text-anchor="middle">(Incremental)</text>
    
    <!-- Servers before -->
    <circle cx="70" cy="150" r="12" fill="#D32F2F" stroke="#B71C1C" stroke-width="2"/>
    <circle cx="100" cy="150" r="12" fill="#D32F2F" stroke="#B71C1C" stroke-width="2"/>
    <circle cx="130" cy="150" r="12" fill="#D32F2F" stroke="#B71C1C" stroke-width="2"/>
    <text x="120" y="185" font-size="9" text-anchor="middle" fill="#666">v1, v1, v1</text>
    
    <!-- Arrow down -->
    <text x="120" y="210" font-size="12" fill="#666">↓</text>
    
    <!-- Servers during (mixed) -->
    <circle cx="70" cy="240" r="12" fill="#4CAF50" stroke="#2E7D32" stroke-width="2"/>
    <circle cx="100" cy="240" r="12" fill="#D32F2F" stroke="#B71C1C" stroke-width="2"/>
    <circle cx="130" cy="240" r="12" fill="#D32F2F" stroke="#B71C1C" stroke-width="2"/>
    <text x="120" y="275" font-size="9" text-anchor="middle" fill="#666">v2, v1, v1</text>
    
    <!-- Arrow down -->
    <text x="120" y="300" font-size="12" fill="#666">↓</text>
    
    <!-- Servers after -->
    <circle cx="70" cy="330" r="12" fill="#4CAF50" stroke="#2E7D32" stroke-width="2"/>
    <circle cx="100" cy="330" r="12" fill="#4CAF50" stroke="#2E7D32" stroke-width="2"/>
    <circle cx="130" cy="330" r="12" fill="#4CAF50" stroke="#2E7D32" stroke-width="2"/>
    <text x="120" y="365" font-size="9" text-anchor="middle" fill="#666">v2, v2, v2</text>
    
    <!-- Traits -->
    <text x="120" y="395" font-size="10" font-weight="bold" fill="#2196F3">Traits:</text>
    <text x="70" y="415" font-size="9" fill="#333">✓ Cost efficient</text>
    <text x="70" y="430" font-size="9" fill="#D32F2F">✗ Version mixing</text>
    <text x="70" y="445" font-size="9" fill="#D32F2F">✗ Slower</text>
  </g>
  
  <!-- SHADOW -->
  <g>
    <text x="320" y="90" font-size="13" font-weight="bold" text-anchor="middle" fill="#333">Shadow</text>
    <text x="320" y="110" font-size="10" fill="#666" text-anchor="middle">(Dark Launch)</text>
    
    <!-- Traffic duplication diagram -->
    <rect x="260" y="145" width="60" height="60" fill="#D32F2F" stroke="#B71C1C" stroke-width="2" rx="3"/>
    <text x="290" y="170" font-size="9" text-anchor="middle" fill="#FFF" font-weight="bold">v1</text>
    <text x="290" y="185" font-size="8" text-anchor="middle" fill="#FFF">Live</text>
    
    <!-- Traffic flowing -->
    <line x1="320" y1="175" x2="340" y2="175" stroke="#333" stroke-width="2" marker-end="url(#arrowhead)"/>
    <text x="330" y="165" font-size="9" fill="#666">Real</text>
    
    <!-- Duplicate traffic -->
    <line x1="290" y1="210" x2="290" y2="240" stroke="#FF9800" stroke-width="2" stroke-dasharray="5,5"/>
    <text x="270" y="230" font-size="9" fill="#FF9800">Duplicate</text>
    
    <rect x="260" y="250" width="60" height="60" fill="#4CAF50" stroke="#2E7D32" stroke-width="2" rx="3" opacity="0.6"/>
    <text x="290" y="275" font-size="9" text-anchor="middle" fill="#FFF" font-weight="bold">v2</text>
    <text x="290" y="290" font-size="8" text-anchor="middle" fill="#FFF">Shadow</text>
    
    <!-- Results logged -->
    <text x="290" y="325" font-size="9" text-anchor="middle" fill="#666">Logged only</text>
    <text x="290" y="340" font-size="9" text-anchor="middle" fill="#666">Not returned</text>
    
    <!-- Check results -->
    <text x="290" y="370" font-size="10" font-weight="bold" fill="#2196F3">Results:</text>
    <text x="240" y="390" font-size="9" fill="#333">✓ Real production test</text>
    <text x="240" y="405" font-size="9" fill="#333">✓ Zero user impact</text>
    <text x="240" y="420" font-size="9" fill="#D32F2F">✗ Double resources</text>
    <text x="240" y="435" font-size="9" fill="#D32F2F">✗ Complex setup</text>
  </g>
  
  <!-- A/B TESTING -->
  <g>
    <text x="530" y="90" font-size="13" font-weight="bold" text-anchor="middle" fill="#333">A/B Testing</text>
    <text x="530" y="110" font-size="10" fill="#666" text-anchor="middle">(Split Testing)</text>
    
    <!-- Split traffic -->
    <circle cx="500" cy="160" r="8" fill="#333" stroke="#000" stroke-width="1"/>
    
    <line x1="500" y1="168" x2="470" y2="210" stroke="#D32F2F" stroke-width="2"/>
    <rect x="430" y="220" width="60" height="60" fill="#D32F2F" stroke="#B71C1C" stroke-width="2" rx="3"/>
    <text x="460" y="245" font-size="9" text-anchor="middle" fill="#FFF" font-weight="bold">Version A</text>
    <text x="460" y="260" font-size="8" text-anchor="middle" fill="#FFF">Current</text>
    
    <line x1="500" y1="168" x2="530" y2="210" stroke="#4CAF50" stroke-width="2"/>
    <rect x="500" y="220" width="60" height="60" fill="#4CAF50" stroke="#2E7D32" stroke-width="2" rx="3"/>
    <text x="530" y="245" font-size="9" text-anchor="middle" fill="#FFF" font-weight="bold">Version B</text>
    <text x="530" y="260" font-size="8" text-anchor="middle" fill="#FFF">New</text>
    
    <!-- Measure results -->
    <text x="530" y="310" font-size="9" text-anchor="middle" fill="#666">50% to each version</text>
    <text x="530" y="330" font-size="10" font-weight="bold" fill="#2196F3">Measure:</text>
    <text x="460" y="350" font-size="9" fill="#333">• Click rate</text>
    <text x="460" y="365" font-size="9" fill="#333">• Conversion</text>
    <text x="460" y="380" font-size="9" fill="#333">• Engagement</text>
    
    <!-- Decision -->
    <text x="530" y="410" font-size="10" font-weight="bold" fill="#2196F3">Result:</text>
    <text x="460" y="430" font-size="9" fill="#333">✓ Data-driven</text>
    <text x="460" y="445" font-size="9" fill="#D32F2F">✗ Need large sample</text>
  </g>
  
  <!-- RECREATE -->
  <g>
    <text x="750" y="90" font-size="13" font-weight="bold" text-anchor="middle" fill="#333">Recreate</text>
    <text x="750" y="110" font-size="10" fill="#666" text-anchor="middle">(Big Bang)</text>
    
    <!-- All stop -->
    <circle cx="710" cy="160" r="15" fill="#D32F2F" stroke="#B71C1C" stroke-width="2"/>
    <circle cx="750" cy="160" r="15" fill="#D32F2F" stroke="#B71C1C" stroke-width="2"/>
    <circle cx="790" cy="160" r="15" fill="#D32F2F" stroke="#B71C1C" stroke-width="2"/>
    <text x="750" y="185" font-size="9" text-anchor="middle" fill="#666">All v1</text>
    
    <!-- X mark (downtime) -->
    <text x="750" y="240" font-size="40" text-anchor="middle" fill="#D32F2F" opacity="0.3">⏸</text>
    <text x="750" y="270" font-size="10" text-anchor="middle" fill="#D32F2F" font-weight="bold">DOWNTIME!</text>
    
    <!-- All restart -->
    <circle cx="710" cy="310" r="15" fill="#4CAF50" stroke="#2E7D32" stroke-width="2"/>
    <circle cx="750" cy="310" r="15" fill="#4CAF50" stroke="#2E7D32" stroke-width="2"/>
    <circle cx="790" cy="310" r="15" fill="#4CAF50" stroke="#2E7D32" stroke-width="2"/>
    <text x="750" y="335" font-size="9" text-anchor="middle" fill="#666">All v2</text>
    
    <!-- Issues -->
    <text x="750" y="365" font-size="10" font-weight="bold" fill="#D32F2F">Anti-Pattern:</text>
    <text x="680" y="385" font-size="9" fill="#D32F2F">✗ Service unavailable</text>
    <text x="680" y="400" font-size="9" fill="#D32F2F">✗ All users affected</text>
    <text x="680" y="415" font-size="9" fill="#D32F2F">✗ No easy rollback</text>
    <text x="680" y="430" font-size="9" fill="#D32F2F">✗ AVOID in production!</text>
  </g>
  
  <!-- COMPARISON TABLE -->
  <rect x="40" y="480" width="870" height="110" fill="#F5F5F5" stroke="#BDBDBD" stroke-width="1" rx="4"/>
  
  <text x="50" y="505" font-size="11" font-weight="bold" fill="#333">Strategy</text>
  <text x="140" y="505" font-size="11" font-weight="bold" fill="#333">Risk</text>
  <text x="220" y="505" font-size="11" font-weight="bold" fill="#333">Speed</text>
  <text x="300" y="505" font-size="11" font-weight="bold" fill="#333">Cost</text>
  <text x="380" y="505" font-size="11" font-weight="bold" fill="#333">Best For</text>
  <text x="700" y="505" font-size="11" font-weight="bold" fill="#333">Downtime</text>
  
  <!-- Rolling row -->
  <text x="50" y="525" font-size="10" fill="#333">Rolling</text>
  <text x="140" y="525" font-size="10" fill="#FF9800">Medium</text>
  <text x="220" y="525" font-size="10" fill="#666">Medium</text>
  <text x="300" y="525" font-size="10" fill="#4CAF50">Low</text>
  <text x="380" y="525" font-size="10" fill="#666">Stateless services</text>
  <text x="700" y="525" font-size="10" fill="#4CAF50">None</text>
  
  <!-- Shadow row -->
  <text x="50" y="545" font-size="10" fill="#333">Shadow</text>
  <text x="140" y="545" font-size="10" fill="#4CAF50">Very Low</text>
  <text x="220" y="545" font-size="10" fill="#FF9800">Medium</text>
  <text x="300" y="545" font-size="10" fill="#D32F2F">High</text>
  <text x="380" y="545" font-size="10" fill="#666">Critical services</text>
  <text x="700" y="545" font-size="10" fill="#4CAF50">None</text>
  
  <!-- A/B Testing row -->
  <text x="50" y="565" font-size="10" fill="#333">A/B Testing</text>
  <text x="140" y="565" font-size="10" fill="#FF9800">Medium</text>
  <text x="220" y="565" font-size="10" fill="#D32F2F">Slow</text>
  <text x="300" y="565" font-size="10" fill="#FF9800">Medium</text>
  <text x="380" y="565" font-size="10" fill="#666">Feature optimization</text>
  <text x="700" y="565" font-size="10" fill="#4CAF50">None</text>
  
  <!-- Recreate row -->
  <text x="50" y="580" font-size="10" fill="#D32F2F" font-weight="bold">Recreate</text>
  <text x="140" y="580" font-size="10" fill="#D32F2F" font-weight="bold">VERY HIGH</text>
  <text x="220" y="580" font-size="10" fill="#4CAF50">Fast</text>
  <text x="300" y="580" font-size="10" fill="#4CAF50">Low</text>
  <text x="380" y="580" font-size="10" fill="#D32F2F">NEVER production</text>
  <text x="700" y="580" font-size="10" fill="#D32F2F">YES - avoid!</text>
  
  <!-- Arrow marker -->
  <defs>
    <marker id="arrowhead" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto">
      <polygon points="0 0, 10 3, 0 6" fill="#333"/>
    </marker>
  </defs>
</svg>
