    <text x="115" y="115" font-size="9" text-anchor="middle" fill="#333" font-style="italic">Move as-is</text>
    
    <text x="115" y="175" font-size="10" text-anchor="middle" fill="#333">On-Prem</text>
    <rect x="70" y="195" width="45" height="40" fill="#D32F2F" stroke="#B71C1C" stroke-width="2" rx="2"/>
    <text x="92" y="220" font-size="8" text-anchor="middle" fill="#FFF" font-weight="bold">App</text>
    
    <text x="115" y="265" font-size="11" text-anchor="middle" fill="#666">→</text>
    
    <text x="115" y="300" font-size="10" text-anchor="middle" fill="#333">Cloud VM</text>
    <rect x="70" y="320" width="45" height="40" fill="#FF9800" stroke="#E65100" stroke-width="2" rx="2"/>
