    <text x="115" y="385" font-size="9" font-weight="bold" text-anchor="middle" fill="#333">Effort: Low</text>
    <text x="115" y="402" font-size="9" text-anchor="middle" fill="#666">Speed: Fast</text>
    <text x="115" y="419" font-size="9" text-anchor="middle" fill="#666">Cost: Initial Low</text>
