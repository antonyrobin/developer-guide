<svg viewBox="0 0 1000 650" xmlns="http://www.w3.org/2000/svg">
  <title>Replatforming &amp; Migration Strategies</title>
  
  <defs>
    <style>
      .title { font-size: 24px; font-weight: bold; text-anchor: middle; fill: #333; }
      .strategy-label { font-size: 12px; font-weight: bold; text-anchor: middle; }
      .subtitle { font-size: 9px; text-anchor: middle; fill: #333; font-style: italic; }
      .metrics { font-size: 9px; text-anchor: middle; }
      .table-header { font-size: 11px; font-weight: bold; fill: #333; }
      .table-row { font-size: 10px; fill: #333; }
    </style>
  </defs>
  
  <text class="title" x="500" y="35">Replatforming &amp; Migration Strategies</text>
  
  <!-- Strategy 1: Lift & Shift -->
  <g>
    <rect x="30" y="70" width="170" height="70" fill="#FCE4EC" stroke="#C2185B" stroke-width="2" rx="6"/>
    <text class="strategy-label" x="115" y="95" fill="#C2185B">1. Lift &amp; Shift</text>
    <text class="subtitle" x="115" y="115">Move as-is</text>
    
    <text class="metrics" x="115" y="175" fill="#333">On-Prem</text>
    <rect x="70" y="195" width="45" height="40" fill="#D32F2F" stroke="#B71C1C" stroke-width="2" rx="2"/>
    <text class="metrics" x="92" y="220" fill="#FFF" font-weight="bold">App</text>
    
    <text class="metrics" x="115" y="265" fill="#666">→</text>
    
    <text class="metrics" x="115" y="300" fill="#333">Cloud VM</text>
    <rect x="70" y="320" width="45" height="40" fill="#FF9800" stroke="#E65100" stroke-width="2" rx="2"/>
    <text class="metrics" x="92" y="345" fill="#FFF" font-weight="bold">App</text>
    
    <text class="metrics" x="115" y="385" font-weight="bold">Effort: Low</text>
    <text class="metrics" x="115" y="402" fill="#666">Speed: Fast</text>
    <text class="metrics" x="115" y="419" fill="#666">Cost: Initial Low</text>
  </g>
  
  <!-- Strategy 2: Replatform -->
  <g>
    <rect x="235" y="70" width="170" height="70" fill="#FCE4EC" stroke="#C2185B" stroke-width="2" rx="6"/>
    <text class="strategy-label" x="320" y="95" fill="#C2185B">2. Replatform</text>
    <text class="subtitle" x="320" y="115">Refactor code</text>
    
    <text class="metrics" x="320" y="175" fill="#333">On-Prem</text>
    <rect x="275" y="195" width="45" height="40" fill="#D32F2F" stroke="#B71C1C" stroke-width="2" rx="2"/>
    <text class="metrics" x="297" y="220" fill="#FFF" font-weight="bold">App</text>
    
    <text class="metrics" x="320" y="265" fill="#666">→</text>
    
    <text class="metrics" x="320" y="300" fill="#333">Cloud Optimized</text>
    <rect x="275" y="320" width="45" height="40" fill="#FF9800" stroke="#E65100" stroke-width="2" rx="2"/>
    <text class="metrics" x="297" y="345" fill="#FFF" font-weight="bold">App</text>
    <text class="metrics" x="320" y="368" fill="#333">(optimized)</text>
    
    <text class="metrics" x="320" y="405" font-weight="bold">Effort: Medium</text>
    <text class="metrics" x="320" y="422" fill="#666">Speed: Medium</text>
    <text class="metrics" x="320" y="439" fill="#666">Cost: Medium</text>
  </g>
  
  <!-- Strategy 3: Refactor/Rebuild -->
  <g>
    <rect x="440" y="70" width="170" height="70" fill="#FCE4EC" stroke="#C2185B" stroke-width="2" rx="6"/>
    <text class="strategy-label" x="525" y="95" fill="#C2185B">3. Refactor/Rebuild</text>
    <text class="subtitle" x="525" y="115">New architecture</text>
    
    <text class="metrics" x="525" y="175" fill="#333">On-Prem</text>
    <rect x="480" y="195" width="45" height="40" fill="#D32F2F" stroke="#B71C1C" stroke-width="2" rx="2"/>
    <text class="metrics" x="502" y="220" fill="#FFF" font-weight="bold">App</text>
    
    <text class="metrics" x="525" y="265" fill="#666">→</text>
    
    <text class="metrics" x="525" y="300" fill="#333">Microservices</text>
    <g>
      <rect x="485" y="320" width="15" height="40" fill="#4CAF50" stroke="#2E7D32" stroke-width="1" rx="1"/>
      <rect x="502" y="320" width="15" height="40" fill="#4CAF50" stroke="#2E7D32" stroke-width="1" rx="1"/>
      <rect x="519" y="320" width="15" height="40" fill="#4CAF50" stroke="#2E7D32" stroke-width="1" rx="1"/>
      <rect x="536" y="320" width="15" height="40" fill="#4CAF50" stroke="#2E7D32" stroke-width="1" rx="1"/>
    </g>
    
    <text class="metrics" x="525" y="385" font-weight="bold">Effort: High</text>
    <text class="metrics" x="525" y="402" fill="#666">Speed: Slow</text>
    <text class="metrics" x="525" y="419" fill="#666">Cost: High</text>
  </g>
  
  <!-- Strategy 4: Replace SaaS -->
  <g>
    <rect x="645" y="70" width="170" height="70" fill="#FCE4EC" stroke="#C2185B" stroke-width="2" rx="6"/>
    <text class="strategy-label" x="730" y="95" fill="#C2185B">4. Replace SaaS</text>
    <text class="subtitle" x="730" y="115">Buy instead</text>
    
    <text class="metrics" x="730" y="175" fill="#333">On-Prem</text>
    <rect x="685" y="195" width="45" height="40" fill="#D32F2F" stroke="#B71C1C" stroke-width="2" rx="2"/>
    <text class="metrics" x="707" y="220" fill="#FFF" font-weight="bold">App</text>
    
    <text class="metrics" x="730" y="265" fill="#666">→</text>
    
    <text class="metrics" x="730" y="300" fill="#333">SaaS Provider</text>
    <rect x="685" y="320" width="45" height="40" fill="#1976D2" stroke="#0D47A1" stroke-width="2" rx="2"/>
    <text class="metrics" x="707" y="345" fill="#FFF" font-weight="bold">SaaS</text>
    
    <text class="metrics" x="730" y="385" font-weight="bold">Effort: Low</text>
    <text class="metrics" x="730" y="402" fill="#666">Speed: Fast</text>
    <text class="metrics" x="730" y="419" fill="#666">Cost: Recurring</text>
  </g>
  
  <!-- Strategy 5: Retire -->
  <g>
    <rect x="850" y="70" width="170" height="70" fill="#FCE4EC" stroke="#C2185B" stroke-width="2" rx="6"/>
    <text class="strategy-label" x="935" y="95" fill="#C2185B">5. Retire</text>
    <text class="subtitle" x="935" y="115">No longer needed</text>
    
    <text class="metrics" x="935" y="175" fill="#333">On-Prem</text>
    <rect x="890" y="195" width="45" height="40" fill="#D32F2F" stroke="#B71C1C" stroke-width="2" rx="2" opacity="0.5"/>
    <text class="metrics" x="912" y="220" fill="#FFF" font-weight="bold">App</text>
    
    <text class="metrics" x="935" y="265" font-size="14" fill="#666">✕</text>
    
    <text class="metrics" x="935" y="300" fill="#333">Decommissioned</text>
    <rect x="890" y="320" width="45" height="40" fill="#BDBDBD" stroke="#616161" stroke-width="2" rx="2"/>
    <text class="metrics" x="912" y="345" fill="#FFF" font-weight="bold">—</text>
    
    <text class="metrics" x="935" y="385" font-weight="bold">Effort: Low</text>
    <text class="metrics" x="935" y="402" fill="#666">Speed: Fast</text>
    <text class="metrics" x="935" y="419" fill="#666">Cost: Savings</text>
  </g>
  
  <!-- Comparison Table -->
  <rect x="30" y="480" width="940" height="150" fill="#F5F5F5" stroke="#BDBDBD" stroke-width="1" rx="4"/>
  
  <text class="table-header" x="40" y="505">Strategy</text>
  <text class="table-header" x="200" y="505">Timeline</text>
  <text class="table-header" x="380" y="505">Effort</text>
  <text class="table-header" x="560" y="505">Cost Impact</text>
  <text class="table-header" x="780" y="505">Best For</text>
  
  <text class="table-row" x="40" y="530">Lift &amp; Shift</text>
  <text class="table-row" x="200" y="530">Weeks</text>
  <text class="table-row" x="380" y="530" fill="#FF9800">Low</text>
  <text class="table-row" x="560" y="530">VM running costs</text>
  <text class="table-row" x="780" y="530" fill="#666">Simple apps, quick migration</text>
  
  <text class="table-row" x="40" y="555">Replatform</text>
  <text class="table-row" x="200" y="555">Months</text>
  <text class="table-row" x="380" y="555" fill="#FF9800">Medium</text>
  <text class="table-row" x="560" y="555">Refactoring time</text>
  <text class="table-row" x="780" y="555" fill="#666">Cloud-optimized systems</text>
  
  <text class="table-row" x="40" y="580">Refactor/Rebuild</text>
  <text class="table-row" x="200" y="580">Quarters</text>
  <text class="table-row" x="380" y="580" fill="#D32F2F">High</text>
  <text class="table-row" x="560" y="580">Major rewrite investment</text>
  <text class="table-row" x="780" y="580" fill="#666">Microservices, modern arch</text>
  
  <text class="table-row" x="40" y="605">Replace SaaS</text>
  <text class="table-row" x="200" y="605">Weeks</text>
  <text class="table-row" x="380" y="605" fill="#4CAF50">Very Low</text>
  <text class="table-row" x="560" y="605">Licensing + migration</text>
  <text class="table-row" x="780" y="605" fill="#666">Non-core functions</text>
</svg>