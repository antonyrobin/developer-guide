<svg viewBox="0 0 800 500" xmlns="http://www.w3.org/2000/svg">
  <!-- Title -->
  <text x="400" y="35" font-size="24" font-weight="bold" text-anchor="middle" fill="#333">Greenfield vs Brownfield Development</text>
  
  <!-- GREENFIELD SIDE -->
  <!-- Ground -->
  <rect x="50" y="350" width="300" height="100" fill="#8B7355"/>
  
  <!-- Sky -->
  <rect x="50" y="100" width="300" height="250" fill="#87CEEB"/>
  
  <!-- New building -->
  <rect x="120" y="200" width="80" height="150" fill="#4CAF50" stroke="#2E7D32" stroke-width="2"/>
  <rect x="135" y="220" width="15" height="20" fill="#90CAF9"/>
  <rect x="155" y="220" width="15" height="20" fill="#90CAF9"/>
  <rect x="175" y="220" width="15" height="20" fill="#90CAF9"/>
  <rect x="135" y="250" width="15" height="20" fill="#90CAF9"/>
  <rect x="155" y="250" width="15" height="20" fill="#90CAF9"/>
  <rect x="175" y="250" width="15" height="20" fill="#90CAF9"/>
  <polygon points="120,200 160,150 200,200" fill="#2E7D32"/>
  
  <!-- Title and features -->
  <text x="200" y="80" font-size="18" font-weight="bold" text-anchor="middle" fill="#333">Greenfield</text>
  <text x="200" y="430" font-size="13" font-weight="bold" text-anchor="middle" fill="#FFF">New System</text>
  
  <text x="50" y="480" font-size="11" fill="#333">✓ Complete freedom</text>
  <text x="50" y="495" font-size="11" fill="#333">✓ Clean code, no debt</text>
  
  <text x="200" y="480" font-size="11" fill="#D32F2F">✗ Higher risk</text>
  <text x="200" y="495" font-size="11" fill="#D32F2F">✗ Expensive</text>
  
  <!-- BROWNFIELD SIDE -->
  <!-- Ground -->
  <rect x="450" y="350" width="300" height="100" fill="#8B7355"/>
  
  <!-- Old buildings (existing system) -->
  <rect x="480" y="250" width="60" height="100" fill="#A0522D" stroke="#654321" stroke-width="2"/>
  <rect x="490" y="265" width="10" height="12" fill="#90CAF9"/>
  <rect x="505" y="265" width="10" height="12" fill="#90CAF9"/>
  <rect x="520" y="265" width="10" height="12" fill="#90CAF9"/>
  <polygon points="480,250 510,210 540,250" fill="#654321"/>
  
  <!-- New addition (renovation) -->
  <rect x="580" y="270" width="60" height="80" fill="#4CAF50" stroke="#2E7D32" stroke-width="2" opacity="0.7"/>
  <text x="610" y="310" font-size="10" text-anchor="middle" fill="#FFF" font-weight="bold">New</text>
  
  <!-- Arrow showing renovation -->
  <path d="M 550 300 L 575 300" stroke="#FF6F00" stroke-width="3" fill="none" marker-end="url(#arrowhead)"/>
  
  <!-- Title and features -->
  <text x="600" y="80" font-size="18" font-weight="bold" text-anchor="middle" fill="#333">Brownfield</text>
  <text x="600" y="430" font-size="13" font-weight="bold" text-anchor="middle" fill="#FFF">Existing System</text>
  
  <text x="450" y="480" font-size="11" fill="#333">✓ Lower risk</text>
  <text x="450" y="495" font-size="11" fill="#333">✓ Faster value</text>
  
  <text x="600" y="480" font-size="11" fill="#D32F2F">✗ Technical debt</text>
  <text x="600" y="495" font-size="11" fill="#D32F2F">✗ Tight constraints</text>
  
  <!-- Arrow marker definition -->
  <defs>
    <marker id="arrowhead" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto">
      <polygon points="0 0, 10 3, 0 6" fill="#FF6F00"/>
    </marker>
  </defs>
</svg>
