<svg viewBox="0 0 900 550" xmlns="http://www.w3.org/2000/svg">
  <!-- Title -->
  <text x="450" y="35" font-size="24" font-weight="bold" text-anchor="middle" fill="#333">Testing Strategies: Shift Left vs Shift Right</text>
  
  <!-- SHIFT LEFT SECTION -->
  <g>
    <text x="225" y="85" font-size="16" font-weight="bold" text-anchor="middle" fill="#4CAF50">Shift Left</text>
    <text x="225" y="105" font-size="11" fill="#666" text-anchor="middle">(Test Earlier)</text>
    
    <!-- Timeline arrow -->
    <line x1="50" y1="140" x2="400" y2="140" stroke="#333" stroke-width="2"/>
    <polygon points="400,140 415,140 407.5,150" fill="#333"/>
    
    <!-- Timeline items -->
    <circle cx="80" cy="140" r="6" fill="#4CAF50"/>
    <text x="80" y="165" font-size="11" text-anchor="middle" fill="#333" font-weight="bold">Requirements</text>
    
    <circle cx="140" cy="140" r="6" fill="#4CAF50"/>
    <text x="140" y="165" font-size="11" text-anchor="middle" fill="#333" font-weight="bold">Design</text>
    
    <circle cx="200" cy="140" r="8" fill="#2196F3" stroke="#1976D2" stroke-width="2"/>
    <text x="200" y="165" font-size="11" text-anchor="middle" fill="#1976D2" font-weight="bold">Testing</text>
    <text x="200" y="180" font-size="9" text-anchor="middle" fill="#1976D2">(Early!)</text>
    
    <circle cx="260" cy="140" r="6" fill="#4CAF50"/>
    <text x="260" y="165" font-size="11" text-anchor="middle" fill="#333" font-weight="bold">Development</text>
    
    <circle cx="320" cy="140" r="6" fill="#4CAF50"/>
    <text x="320" y="165" font-size="11" text-anchor="middle" fill="#333" font-weight="bold">Production</text>
    
    <!-- Practices -->
    <text x="50" y="220" font-size="12" font-weight="bold" fill="#4CAF50">Practices:</text>
    <text x="50" y="240" font-size="11" fill="#333">✓ TDD (Test-Driven Development)</text>
    <text x="50" y="258" font-size="11" fill="#333">✓ Static Analysis (Linters, TypeScript)</text>
    <text x="50" y="276" font-size="11" fill="#333">✓ Code Review</text>
    <text x="50" y="294" font-size="11" fill="#333">✓ Unit Testing alongside code</text>
    <text x="50" y="312" font-size="11" fill="#333">✓ Build Verification Testing (BVT)</text>
    
    <!-- Benefits -->
    <text x="50" y="345" font-size="12" font-weight="bold" fill="#2196F3">Benefits:</text>
    <text x="50" y="365" font-size="10" fill="#666">• Defects caught immediately (10-100x cheaper to fix)</text>
    <text x="50" y="380" font-size="10" fill="#666">• Code designed for testability</text>
    <text x="50" y="395" font-size="10" fill="#666">• Prevents bugs from being introduced</text>
    <text x="50" y="410" font-size="10" fill="#666">• Faster development cycle</text>
  </g>
  
  <!-- SHIFT RIGHT SECTION -->
  <g>
    <text x="675" y="85" font-size="16" font-weight="bold" text-anchor="middle" fill="#FF6F00">Shift Right</text>
    <text x="675" y="105" font-size="11" fill="#666" text-anchor="middle">(Test in Production)</text>
    
    <!-- Timeline arrow -->
    <line x1="500" y1="140" x2="850" y2="140" stroke="#333" stroke-width="2"/>
    <polygon points="850,140 865,140 857.5,150" fill="#333"/>
    
    <!-- Timeline items -->
    <circle cx="530" cy="140" r="6" fill="#4CAF50"/>
    <text x="530" y="165" font-size="11" text-anchor="middle" fill="#333" font-weight="bold">Design</text>
    
    <circle cx="590" cy="140" r="6" fill="#4CAF50"/>
    <text x="590" y="165" font-size="11" text-anchor="middle" fill="#333" font-weight="bold">Development</text>
    
    <circle cx="650" cy="140" r="6" fill="#4CAF50"/>
    <text x="650" y="165" font-size="11" text-anchor="middle" fill="#333" font-weight="bold">Staging</text>
    
    <circle cx="710" cy="140" r="8" fill="#FF6F00" stroke="#E65100" stroke-width="2"/>
    <text x="710" y="165" font-size="11" text-anchor="middle" fill="#E65100" font-weight="bold">Production</text>
    <text x="710" y="180" font-size="9" text-anchor="middle" fill="#E65100">(Testing!)</text>
    
    <circle cx="770" cy="140" r="6" fill="#4CAF50"/>
    <text x="770" y="165" font-size="11" text-anchor="middle" fill="#333" font-weight="bold">Monitoring</text>
    
    <!-- Practices -->
    <text x="500" y="220" font-size="12" font-weight="bold" fill="#FF6F00">Practices:</text>
    <text x="500" y="240" font-size="11" fill="#333">✓ Canary Deployment (5% → 50% → 100%)</text>
    <text x="500" y="258" font-size="11" fill="#333">✓ Feature Flags (enable/disable without deploy)</text>
    <text x="500" y="276" font-size="11" fill="#333">✓ Real User Monitoring (RUM)</text>
    <text x="500" y="294" font-size="11" fill="#333">✓ A/B Testing</text>
    <text x="500" y="312" font-size="11" fill="#333">✓ Chaos Engineering</text>
    
    <!-- Benefits -->
    <text x="500" y="345" font-size="12" font-weight="bold" fill="#2196F3">Benefits:</text>
    <text x="500" y="365" font-size="10" fill="#666">• Test with real users and real data</text>
    <text x="500" y="380" font-size="10" fill="#666">• Detects edge cases that tests miss</text>
    <text x="500" y="395" font-size="10" fill="#666">• Validates system under real load</text>
    <text x="500" y="410" font-size="10" fill="#666">• Quick rollback if issues found</text>
  </g>
  
  <!-- BEST PRACTICE -->
  <rect x="50" y="435" width="800" height="95" fill="#E8F5E9" stroke="#4CAF50" stroke-width="2" rx="4"/>
  <text x="450" y="460" font-size="14" font-weight="bold" text-anchor="middle" fill="#2E7D32">Best Practice: Do Both!</text>
  <text x="60" y="485" font-size="11" fill="#333">Shift Left 70-80% of testing: Catch issues early before they reach production (cost-effective)</text>
  <text x="60" y="505" font-size="11" fill="#333">Shift Right 20-30% of testing: Validate in production-like environments with real traffic (confidence)</text>
  <text x="60" y="520" font-size="11" fill="#333">Result: Both SPEED (catch issues quickly) and CONFIDENCE (validate in real conditions)</text>
</svg>
