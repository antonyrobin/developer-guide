<svg viewBox="0 0 900 500" xmlns="http://www.w3.org/2000/svg">
  <title>Development Strategies Overview</title>
  <defs>
    <style>
      .title { font-size: 26px; font-weight: bold; text-anchor: middle; fill: #333; }
      .column-title { font-size: 15px; font-weight: bold; text-anchor: middle; }
      .item-text { font-size: 11px; fill: #333; }
      .box-text { font-size: 10px; text-anchor: middle; fill: #333; }
      .focus-text { font-size: 9px; text-anchor: middle; fill: #999; font-style: italic; }
      .footer-text { font-size: 12px; text-anchor: middle; fill: #333; font-weight: bold; }
    </style>
  </defs>
  <text class="title" x="450" y="35">Development Strategies Overview</text>
  <rect x="30" y="80" width="260" height="340" fill="#E3F2FD" stroke="#1976D2" stroke-width="2" rx="8"/>
  <text class="column-title" x="160" y="115" fill="#1565C0">Development Approaches</text>
  <line x1="50" y1="125" x2="270" y2="125" stroke="#1976D2" stroke-width="1"/>
  <text class="item-text" x="50" y="150">- Greenfield: New systems</text>
  <text class="item-text" x="50" y="172">- Brownfield: Modernize</text>
  <text class="item-text" x="50" y="194">- Strangler Fig: Gradual</text>
  <text class="item-text" x="50" y="216">- Lift &amp; Shift: Move as-is</text>
  <text class="item-text" x="50" y="238">- Replatform: Optimize</text>
  <text class="item-text" x="50" y="260">- Refactor: Rebuild</text>
  <text class="item-text" x="50" y="282">- Replace: SaaS</text>
  <rect x="50" y="300" width="220" height="100" fill="#FFFFFF" stroke="#BDBDBD" stroke-width="1" rx="4"/>
  <text class="box-text" x="160" y="320" fill="#1565C0" font-weight="bold">Key Question:</text>
  <text class="box-text" x="160" y="340">How do we build or</text>
  <text class="box-text" x="160" y="357">modernize our system?</text>
  <text class="focus-text" x="160" y="385">Focus: Architecture &amp; Scope</text>
  <rect x="320" y="80" width="260" height="340" fill="#F3E5F5" stroke="#7B1FA2" stroke-width="2" rx="8"/>
  <text class="column-title" x="450" y="115" fill="#6A1B9A">Testing Strategies</text>
  <line x1="340" y1="125" x2="560" y2="125" stroke="#7B1FA2" stroke-width="1"/>
  <text class="item-text" x="340" y="150" font-weight="bold">Shift Left (Early):</text>
  <text class="item-text" x="340" y="172">- TDD &amp; Unit tests</text>
  <text class="item-text" x="340" y="194">- Static analysis</text>
  <text class="item-text" x="340" y="216">- Code review</text>
  <text class="item-text" x="340" y="244" font-weight="bold">Shift Right (Late):</text>
  <text class="item-text" x="340" y="266">- Canary testing</text>
  <text class="item-text" x="340" y="288">- Feature flags</text>
  <rect x="340" y="300" width="220" height="100" fill="#FFFFFF" stroke="#BDBDBD" stroke-width="1" rx="4"/>
  <text class="box-text" x="450" y="320" fill="#6A1B9A" font-weight="bold">Key Question:</text>
  <text class="box-text" x="450" y="340">When do we test and</text>
  <text class="box-text" x="450" y="357">validate quality?</text>
  <text class="focus-text" x="450" y="385">Focus: Validation Timeline</text>
  <rect x="610" y="80" width="260" height="340" fill="#E0F2F1" stroke="#00796B" stroke-width="2" rx="8"/>
  <text class="column-title" x="740" y="115" fill="#00695C">Deployment Methods</text>
  <line x1="630" y1="125" x2="850" y2="125" stroke="#00796B" stroke-width="1"/>
  <text class="item-text" x="630" y="150">- Blue-Green: Instant</text>
  <text class="item-text" x="630" y="172">- Canary: Gradual</text>
  <text class="item-text" x="630" y="194">- Rolling: Incremental</text>
  <text class="item-text" x="630" y="216">- Shadow: Testing only</text>
  <text class="item-text" x="630" y="238">- A/B Testing: Compare</text>
  <text class="item-text" x="630" y="260">- Recreate: Restart (avoid)</text>
  <rect x="630" y="300" width="220" height="100" fill="#FFFFFF" stroke="#BDBDBD" stroke-width="1" rx="4"/>
  <text class="box-text" x="740" y="320" fill="#00695C" font-weight="bold">Key Question:</text>
  <text class="box-text" x="740" y="340">How do we release</text>
  <text class="box-text" x="740" y="357">with zero downtime?</text>
  <text class="focus-text" x="740" y="385">Focus: Release Safety</text>
  <rect x="30" y="440" width="840" height="40" fill="#FFF9C4" stroke="#F57F17" stroke-width="1" rx="4"/>
  <text class="footer-text" x="450" y="465">All three work together: Choose approach - Test appropriately - Deploy safely</text>
</svg>