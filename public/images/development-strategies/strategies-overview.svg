<svg viewBox="0 0 900 500" xmlns="http://www.w3.org/2000/svg">
  <!-- Title -->
  <text x="450" y="35" font-size="26" font-weight="bold" text-anchor="middle" fill="#333">Development Strategies Overview</text>
  
  <!-- Three main categories with better spacing -->
  <!-- Column 1: Development Strategies -->
  <rect x="30" y="80" width="260" height="340" fill="#E3F2FD" stroke="#1976D2" stroke-width="2" rx="8"/>
  <text x="160" y="115" font-size="15" font-weight="bold" text-anchor="middle" fill="#1565C0">Development Approaches</text>
  <line x1="50" y1="125" x2="270" y2="125" stroke="#1976D2" stroke-width="1"/>
  <text x="50" y="150" font-size="11" fill="#333">• Greenfield: New systems</text>
  <text x="50" y="172" font-size="11" fill="#333">• Brownfield: Modernize</text>
  <text x="50" y="194" font-size="11" fill="#333">• Strangler Fig: Gradual</text>
  <text x="50" y="216" font-size="11" fill="#333">• Lift & Shift: Move as-is</text>
  <text x="50" y="238" font-size="11" fill="#333">• Replatform: Optimize</text>
  <text x="50" y="260" font-size="11" fill="#333">• Refactor: Rebuild</text>
  <text x="50" y="282" font-size="11" fill="#333">• Replace: SaaS</text>
  <rect x="50" y="300" width="220" height="100" fill="#FFFFFF" stroke="#BDBDBD" stroke-width="1" rx="4"/>
  <text x="160" y="320" font-size="10" font-weight="bold" text-anchor="middle" fill="#1565C0">Key Question:</text>
  <text x="160" y="340" font-size="10" text-anchor="middle" fill="#333">How do we build or</text>
  <text x="160" y="357" font-size="10" text-anchor="middle" fill="#333">modernize our system?</text>
  <text x="160" y="385" font-size="9" text-anchor="middle" fill="#999" font-style="italic">Focus: Architecture & Scope</text>
  
  <!-- Column 2: Testing Strategies -->
  <rect x="320" y="80" width="260" height="340" fill="#F3E5F5" stroke="#7B1FA2" stroke-width="2" rx="8"/>
  <text x="450" y="115" font-size="15" font-weight="bold" text-anchor="middle" fill="#6A1B9A">Testing Strategies</text>
  <line x1="340" y1="125" x2="560" y2="125" stroke="#7B1FA2" stroke-width="1"/>
  <text x="340" y="150" font-size="11" font-weight="bold" fill="#333">Shift Left (Early):</text>
  <text x="340" y="172" font-size="11" fill="#333">• TDD & Unit tests</text>
  <text x="340" y="194" font-size="11" fill="#333">• Static analysis</text>
  <text x="340" y="216" font-size="11" fill="#333">• Code review</text>
  <text x="340" y="244" font-size="11" font-weight="bold" fill="#333">Shift Right (Late):</text>
  <text x="340" y="266" font-size="11" fill="#333">• Canary testing</text>
  <text x="340" y="288" font-size="11" fill="#333">• Feature flags</text>
  <rect x="340" y="300" width="220" height="100" fill="#FFFFFF" stroke="#BDBDBD" stroke-width="1" rx="4"/>
  <text x="450" y="320" font-size="10" font-weight="bold" text-anchor="middle" fill="#6A1B9A">Key Question:</text>
  <text x="450" y="340" font-size="10" text-anchor="middle" fill="#333">When do we test and</text>
  <text x="450" y="357" font-size="10" text-anchor="middle" fill="#333">validate quality?</text>
  <text x="450" y="385" font-size="9" text-anchor="middle" fill="#999" font-style="italic">Focus: Validation Timeline</text>
  
  <!-- Column 3: Deployment Strategies -->
  <rect x="610" y="80" width="260" height="340" fill="#E0F2F1" stroke="#00796B" stroke-width="2" rx="8"/>
  <text x="740" y="115" font-size="15" font-weight="bold" text-anchor="middle" fill="#00695C">Deployment Methods</text>
  <line x1="630" y1="125" x2="850" y2="125" stroke="#00796B" stroke-width="1"/>
  <text x="630" y="150" font-size="11" fill="#333">• Blue-Green: Instant</text>
  <text x="630" y="172" font-size="11" fill="#333">• Canary: Gradual</text>
  <text x="630" y="194" font-size="11" fill="#333">• Rolling: Incremental</text>
  <text x="630" y="216" font-size="11" fill="#333">• Shadow: Testing only</text>
  <text x="630" y="238" font-size="11" fill="#333">• A/B Testing: Compare</text>
  <text x="630" y="260" font-size="11" fill="#333">• Recreate: Restart (avoid)</text>
  <rect x="630" y="300" width="220" height="100" fill="#FFFFFF" stroke="#BDBDBD" stroke-width="1" rx="4"/>
  <text x="740" y="320" font-size="10" font-weight="bold" text-anchor="middle" fill="#00695C">Key Question:</text>
  <text x="740" y="340" font-size="10" text-anchor="middle" fill="#333">How do we release</text>
  <text x="740" y="357" font-size="10" text-anchor="middle" fill="#333">with zero downtime?</text>
  <text x="740" y="385" font-size="9" text-anchor="middle" fill="#999" font-style="italic">Focus: Release Safety</text>
  
  <!-- Bottom footer -->
  <rect x="30" y="440" width="840" height="40" fill="#FFF9C4" stroke="#F57F17" stroke-width="1" rx="4"/>
  <text x="450" y="465" font-size="12" text-anchor="middle" fill="#333" font-weight="bold">All three work together: Choose development approach → Test appropriately → Deploy safely</text>
</svg>
