<svg viewBox="0 0 800 500" xmlns="http://www.w3.org/2000/svg">
  <!-- Title -->
  <text x="400" y="35" font-size="24" font-weight="bold" text-anchor="middle" fill="#333">Strangler Fig Pattern</text>
  
  <!-- PHASE 1: Build in parallel -->
  <g>
    <text x="120" y="80" font-size="14" font-weight="bold" text-anchor="middle" fill="#333">Phase 1: Build</text>
    
    <!-- Old system -->
    <rect x="40" y="120" width="60" height="80" fill="#D32F2F" stroke="#B71C1C" stroke-width="2" rx="4"/>
    <text x="70" y="155" font-size="11" text-anchor="middle" fill="#FFF" font-weight="bold">Old</text>
    <text x="70" y="170" font-size="10" text-anchor="middle" fill="#FFF">System</text>
    
    <!-- New system -->
    <rect x="140" y="120" width="60" height="80" fill="#4CAF50" stroke="#2E7D32" stroke-width="2" rx="4" opacity="0.5" stroke-dasharray="5,5"/>
    <text x="170" y="155" font-size="11" text-anchor="middle" fill="#FFF" font-weight="bold">New</text>
    <text x="170" y="170" font-size="10" text-anchor="middle" fill="#FFF">System</text>
    
    <!-- Traffic -->
    <text x="70" y="230" font-size="11" text-anchor="middle" fill="#666">100%</text>
    <line x1="70" y1="245" x2="70" y2="270" stroke="#666" stroke-width="2"/>
  </g>
  
  <!-- PHASE 2: Shift some traffic -->
  <g>
    <text x="310" y="80" font-size="14" font-weight="bold" text-anchor="middle" fill="#333">Phase 2: 10%</text>
    
    <!-- Old system -->
    <rect x="240" y="120" width="60" height="80" fill="#D32F2F" stroke="#B71C1C" stroke-width="2" rx="4"/>
    <text x="270" y="155" font-size="11" text-anchor="middle" fill="#FFF" font-weight="bold">Old</text>
    <text x="270" y="170" font-size="10" text-anchor="middle" fill="#FFF">System</text>
    
    <!-- New system -->
    <rect x="340" y="120" width="60" height="80" fill="#4CAF50" stroke="#2E7D32" stroke-width="2" rx="4"/>
    <text x="370" y="155" font-size="11" text-anchor="middle" fill="#FFF" font-weight="bold">New</text>
    <text x="370" y="170" font-size="10" text-anchor="middle" fill="#FFF">System</text>
    
    <!-- Traffic split -->
    <text x="270" y="230" font-size="11" text-anchor="middle" fill="#D32F2F" font-weight="bold">90%</text>
    <text x="370" y="230" font-size="11" text-anchor="middle" fill="#4CAF50" font-weight="bold">10%</text>
    <line x1="270" y1="245" x2="270" y2="270" stroke="#D32F2F" stroke-width="2"/>
    <line x1="370" y1="245" x2="370" y2="270" stroke="#4CAF50" stroke-width="2"/>
  </g>
  
  <!-- PHASE 3: More traffic -->
  <g>
    <text x="500" y="80" font-size="14" font-weight="bold" text-anchor="middle" fill="#333">Phase 3: 50%</text>
    
    <!-- Old system -->
    <rect x="430" y="120" width="60" height="80" fill="#D32F2F" stroke="#B71C1C" stroke-width="2" rx="4" opacity="0.6"/>
    <text x="460" y="155" font-size="11" text-anchor="middle" fill="#FFF" font-weight="bold">Old</text>
    <text x="460" y="170" font-size="10" text-anchor="middle" fill="#FFF">System</text>
    
    <!-- New system -->
    <rect x="530" y="120" width="60" height="80" fill="#4CAF50" stroke="#2E7D32" stroke-width="2" rx="4"/>
    <text x="560" y="155" font-size="11" text-anchor="middle" fill="#FFF" font-weight="bold">New</text>
    <text x="560" y="170" font-size="10" text-anchor="middle" fill="#FFF">System</text>
    
    <!-- Traffic split -->
    <text x="460" y="230" font-size="11" text-anchor="middle" fill="#D32F2F" font-weight="bold">50%</text>
    <text x="560" y="230" font-size="11" text-anchor="middle" fill="#4CAF50" font-weight="bold">50%</text>
    <line x1="460" y1="245" x2="460" y2="270" stroke="#D32F2F" stroke-width="2"/>
    <line x1="560" y1="245" x2="560" y2="270" stroke="#4CAF50" stroke-width="2"/>
  </g>
  
  <!-- PHASE 4: Complete migration -->
  <g>
    <text x="690" y="80" font-size="14" font-weight="bold" text-anchor="middle" fill="#333">Phase 4: 100%</text>
    
    <!-- Old system (disabled) -->
    <rect x="620" y="120" width="60" height="80" fill="#BDBDBD" stroke="#757575" stroke-width="2" rx="4" opacity="0.4" stroke-dasharray="5,5"/>
    <text x="650" y="155" font-size="11" text-anchor="middle" fill="#999" font-weight="bold">Old</text>
    <text x="650" y="170" font-size="10" text-anchor="middle" fill="#999">System</text>
    
    <!-- New system -->
    <rect x="720" y="120" width="60" height="80" fill="#4CAF50" stroke="#2E7D32" stroke-width="2" rx="4"/>
    <text x="750" y="155" font-size="11" text-anchor="middle" fill="#FFF" font-weight="bold">New</text>
    <text x="750" y="170" font-size="10" text-anchor="middle" fill="#FFF">System</text>
    
    <!-- Traffic -->
    <text x="750" y="230" font-size="11" text-anchor="middle" fill="#4CAF50" font-weight="bold">100%</text>
    <line x1="750" y1="245" x2="750" y2="270" stroke="#4CAF50" stroke-width="2"/>
  </g>
  
  <!-- Bottom explanation -->
  <rect x="50" y="320" width="700" height="140" fill="#F5F5F5" stroke="#BDBDBD" stroke-width="1" rx="4"/>
  
  <text x="400" y="345" font-size="13" font-weight="bold" text-anchor="middle" fill="#333">Key Benefits:</text>
  <text x="60" y="370" font-size="11" fill="#333">• Zero downtime — old system keeps running while new is built</text>
  <text x="60" y="390" font-size="11" fill="#333">• Easy rollback — if new system fails, switch back to old instantly</text>
  <text x="60" y="410" font-size="11" fill="#333">• Gradual validation — detect and fix issues before full rollout</text>
  <text x="60" y="430" font-size="11" fill="#333">• Reduced risk — small, testable changes instead of big rewrites</text>
  <text x="400" y="370" font-size="11" fill="#333">• Proxy/Gateway routes requests to new system</text>
  <text x="400" y="390" font-size="11" fill="#333">• Traffic gradually shifted: 10% → 50% → 100%</text>
  <text x="400" y="410" font-size="11" fill="#333">• Old system decommissioned once stable</text>
  <text x="400" y="430" font-size="11" fill="#333">• Perfect for modernizing legacy systems</text>
</svg>
