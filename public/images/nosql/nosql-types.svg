<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 440">
  <rect width="900" height="440" rx="16" fill="#0f172a"/>
  <text x="450" y="44" text-anchor="middle" fill="#fff" font-size="26" font-weight="700" font-family="Segoe UI,Arial,sans-serif">NoSQL Database Types</text>
  <text x="450" y="70" text-anchor="middle" fill="#94a3b8" font-size="14" font-family="Segoe UI,Arial,sans-serif">Choose the right model for your data access pattern</text>

  <!-- Document Store -->
  <rect x="50" y="95" width="380" height="140" rx="14" fill="#1e293b" stroke="#60a5fa" stroke-width="2"/>
  <text x="240" y="125" text-anchor="middle" fill="#60a5fa" font-size="18" font-weight="700" font-family="Segoe UI,Arial,sans-serif">Document Store</text>
  <text x="240" y="150" text-anchor="middle" fill="#94a3b8" font-size="13" font-family="Segoe UI,Arial,sans-serif">JSON-like documents with flexible schemas</text>
  <text x="240" y="175" text-anchor="middle" fill="#64748b" font-size="12" font-family="Segoe UI,Arial,sans-serif">Best for: content management, catalogs, user profiles</text>
  <rect x="110" y="190" width="100" height="30" rx="6" fill="#1e40af"/>
  <text x="160" y="210" text-anchor="middle" fill="#fff" font-size="12" font-weight="600" font-family="Segoe UI,Arial,sans-serif">MongoDB</text>
  <rect x="225" y="190" width="100" height="30" rx="6" fill="#1e40af"/>
  <text x="275" y="210" text-anchor="middle" fill="#fff" font-size="12" font-weight="600" font-family="Segoe UI,Arial,sans-serif">CouchDB</text>

  <!-- Key-Value Store -->
  <rect x="470" y="95" width="380" height="140" rx="14" fill="#1e293b" stroke="#4ade80" stroke-width="2"/>
  <text x="660" y="125" text-anchor="middle" fill="#4ade80" font-size="18" font-weight="700" font-family="Segoe UI,Arial,sans-serif">Key-Value Store</text>
  <text x="660" y="150" text-anchor="middle" fill="#94a3b8" font-size="13" font-family="Segoe UI,Arial,sans-serif">Simple key → value pairs, ultra-fast lookups</text>
  <text x="660" y="175" text-anchor="middle" fill="#64748b" font-size="12" font-family="Segoe UI,Arial,sans-serif">Best for: caching, sessions, real-time data</text>
  <rect x="540" y="190" width="100" height="30" rx="6" fill="#166534"/>
  <text x="590" y="210" text-anchor="middle" fill="#fff" font-size="12" font-weight="600" font-family="Segoe UI,Arial,sans-serif">Redis</text>
  <rect x="660" y="190" width="100" height="30" rx="6" fill="#166534"/>
  <text x="710" y="210" text-anchor="middle" fill="#fff" font-size="12" font-weight="600" font-family="Segoe UI,Arial,sans-serif">DynamoDB</text>

  <!-- Column-Family -->
  <rect x="50" y="260" width="380" height="140" rx="14" fill="#1e293b" stroke="#fbbf24" stroke-width="2"/>
  <text x="240" y="290" text-anchor="middle" fill="#fbbf24" font-size="18" font-weight="700" font-family="Segoe UI,Arial,sans-serif">Column-Family</text>
  <text x="240" y="315" text-anchor="middle" fill="#94a3b8" font-size="13" font-family="Segoe UI,Arial,sans-serif">Rows with dynamic columns, optimized for writes</text>
  <text x="240" y="340" text-anchor="middle" fill="#64748b" font-size="12" font-family="Segoe UI,Arial,sans-serif">Best for: time-series, IoT, event logging</text>
  <rect x="110" y="355" width="100" height="30" rx="6" fill="#854d0e"/>
  <text x="160" y="375" text-anchor="middle" fill="#fff" font-size="12" font-weight="600" font-family="Segoe UI,Arial,sans-serif">Cassandra</text>
  <rect x="225" y="355" width="100" height="30" rx="6" fill="#854d0e"/>
  <text x="275" y="375" text-anchor="middle" fill="#fff" font-size="12" font-weight="600" font-family="Segoe UI,Arial,sans-serif">HBase</text>

  <!-- Graph Database -->
  <rect x="470" y="260" width="380" height="140" rx="14" fill="#1e293b" stroke="#c084fc" stroke-width="2"/>
  <text x="660" y="290" text-anchor="middle" fill="#c084fc" font-size="18" font-weight="700" font-family="Segoe UI,Arial,sans-serif">Graph Database</text>
  <text x="660" y="315" text-anchor="middle" fill="#94a3b8" font-size="13" font-family="Segoe UI,Arial,sans-serif">Nodes + edges for relationship-heavy data</text>
  <text x="660" y="340" text-anchor="middle" fill="#64748b" font-size="12" font-family="Segoe UI,Arial,sans-serif">Best for: social networks, recommendations, fraud</text>
  <rect x="540" y="355" width="100" height="30" rx="6" fill="#4c1d95"/>
  <text x="590" y="375" text-anchor="middle" fill="#fff" font-size="12" font-weight="600" font-family="Segoe UI,Arial,sans-serif">Neo4j</text>
  <rect x="660" y="355" width="120" height="30" rx="6" fill="#4c1d95"/>
  <text x="720" y="375" text-anchor="middle" fill="#fff" font-size="12" font-weight="600" font-family="Segoe UI,Arial,sans-serif">Amazon Neptune</text>
</svg>
