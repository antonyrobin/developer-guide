    <style>
      /* Initial loading indicator — removed once React mounts */
      #initial-loader {
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        height: 100vh;
        background: #0a0a0f;
        color: #e2e8f0;
        font-family: 'Inter', system-ui, sans-serif;
        gap: 1rem;
      }
      #initial-loader .loader-title {
        font-size: 1.5rem;
        font-weight: 700;
      }
      #initial-loader .loader-accent { color: #f59e0b; }
      #initial-loader .loader-bar {
        width: 200px;
        height: 3px;
        background: #1e293b;
        border-radius: 4px;
        overflow: hidden;
      }
      #initial-loader .loader-bar::after {
        content: '';
        display: block;
        width: 40%;
        height: 100%;
        background: #f59e0b;
        border-radius: 4px;
        animation: loader-slide 1s ease-in-out infinite;
      }
      @keyframes loader-slide {
        0% { transform: translateX(-100%); }
        100% { transform: translateX(350%); }
      }
    </style>
  </head>
  <body>
    <div id="root">
      <div id="initial-loader">
        <div class="loader-title">Quick<span class="loader-accent">Dev</span>Guide</div>
        <div class="loader-bar"></div>
      </div>
    </div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
